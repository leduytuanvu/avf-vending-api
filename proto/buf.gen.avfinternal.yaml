# Generates avf.internal.v1 Go+gRPC stubs under internal/gen/avfinternalv1 (importable from any package).
# Proto sources remain in avf/internal/v1/*.proto; Go cannot import packages under proto/.../internal/... on disk.
version: v2
plugins:
  - remote: buf.build/protocolbuffers/go
    out: ../
    opt:
      - module=github.com/avf/avf-vending-api
      - paths=import
  - remote: buf.build/grpc/go
    out: ../
    opt:
      - module=github.com/avf/avf-vending-api
      - paths=import
