syntax = "proto3";

package avf.v1;

option go_package = "github.com/avf/avf-vending-api/proto/avf/v1;avfv1";

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

service InternalMachineQueryService {
  rpc GetMachineSummary(GetMachineRequest) returns (GetMachineSummaryResponse);
  rpc GetMachineState(GetMachineRequest) returns (GetMachineStateResponse);
  rpc GetMachineCabinetSlotSummary(GetMachineRequest) returns (GetMachineCabinetSlotSummaryResponse);
}

service InternalTelemetryQueryService {
  rpc GetLatestMachineTelemetry(GetMachineRequest) returns (GetLatestMachineTelemetryResponse);
  rpc GetMachineIncidentSummary(GetMachineIncidentSummaryRequest) returns (GetMachineIncidentSummaryResponse);
}

service InternalCommerceQueryService {
  rpc GetOrderPaymentVendState(GetOrderPaymentVendStateRequest) returns (GetOrderPaymentVendStateResponse);
}

message GetMachineRequest {
  string machine_id = 1;
}

message GetMachineIncidentSummaryRequest {
  string machine_id = 1;
  int32 limit = 2;
}

message GetOrderPaymentVendStateRequest {
  string organization_id = 1;
  string order_id = 2;
  int32 slot_index = 3;
}

message MachineSummary {
  string machine_id = 1;
  string organization_id = 2;
  string site_id = 3;
  google.protobuf.StringValue hardware_profile_id = 4;
  string serial_number = 5;
  string name = 6;
  string status = 7;
  int64 command_sequence = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
}

message MachineShadowState {
  string machine_id = 1;
  google.protobuf.Struct desired_state = 2;
  google.protobuf.Struct reported_state = 3;
  int64 version = 4;
}

message MachineTelemetrySnapshot {
  string machine_id = 1;
  string organization_id = 2;
  string site_id = 3;
  google.protobuf.Struct reported_state = 4;
  google.protobuf.Struct metrics_state = 5;
  google.protobuf.Timestamp last_heartbeat_at = 6;
  google.protobuf.StringValue app_version = 7;
  google.protobuf.StringValue firmware_version = 8;
  google.protobuf.Timestamp updated_at = 9;
  google.protobuf.StringValue android_id = 10;
  google.protobuf.StringValue sim_serial = 11;
  google.protobuf.StringValue sim_iccid = 12;
  google.protobuf.StringValue device_model = 13;
  google.protobuf.StringValue os_version = 14;
  google.protobuf.Timestamp last_identity_at = 15;
  string effective_timezone = 16;
}

message MachineCabinetSummary {
  string id = 1;
  string machine_id = 2;
  string code = 3;
  string title = 4;
  int32 sort_order = 5;
  google.protobuf.Struct metadata = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}

message MachineConfiguredSlotSummary {
  string config_id = 1;
  string cabinet_code = 2;
  string slot_code = 3;
  google.protobuf.Int32Value slot_index = 4;
  google.protobuf.StringValue product_id = 5;
  string product_sku = 6;
  string product_name = 7;
  int32 max_quantity = 8;
  int64 price_minor = 9;
  google.protobuf.Timestamp effective_from = 10;
  bool is_current = 11;
  string machine_slot_layout_id = 12;
}

message MachineLegacySlotSummary {
  string planogram_id = 1;
  string planogram_name = 2;
  int32 slot_index = 3;
  int32 current_quantity = 4;
  int32 max_quantity = 5;
  int64 price_minor = 6;
  google.protobuf.StringValue product_id = 7;
  string product_sku = 8;
  string product_name = 9;
  int32 planogram_revision = 10;
}

message MachineAssortmentProductSummary {
  string product_id = 1;
  string sku = 2;
  string name = 3;
  int32 sort_order = 4;
  string assortment_id = 5;
  string assortment_name = 6;
}

message MachineIncidentSummary {
  string id = 1;
  string machine_id = 2;
  string severity = 3;
  string code = 4;
  google.protobuf.StringValue title = 5;
  google.protobuf.Struct detail = 6;
  google.protobuf.StringValue dedupe_key = 7;
  google.protobuf.Timestamp opened_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}

message CommerceOrderSummary {
  string id = 1;
  string organization_id = 2;
  string machine_id = 3;
  string status = 4;
  string currency = 5;
  int64 subtotal_minor = 6;
  int64 tax_minor = 7;
  int64 total_minor = 8;
  google.protobuf.StringValue idempotency_key = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
}

message CommerceVendSummary {
  string id = 1;
  string order_id = 2;
  string machine_id = 3;
  int32 slot_index = 4;
  string product_id = 5;
  string state = 6;
  google.protobuf.StringValue final_command_attempt_id = 7;
  google.protobuf.Timestamp created_at = 8;
}

message CommercePaymentSummary {
  string id = 1;
  string order_id = 2;
  string provider = 3;
  string state = 4;
  int64 amount_minor = 5;
  string currency = 6;
  google.protobuf.StringValue idempotency_key = 7;
  string reconciliation_status = 8;
  string settlement_status = 9;
  google.protobuf.StringValue settlement_batch_id = 10;
  google.protobuf.Timestamp created_at = 11;
}

message GetMachineSummaryResponse {
  MachineSummary machine = 1;
}

message GetMachineStateResponse {
  MachineShadowState shadow = 1;
  MachineTelemetrySnapshot snapshot = 2;
}

message GetMachineCabinetSlotSummaryResponse {
  MachineSummary machine = 1;
  repeated MachineCabinetSummary cabinets = 2;
  repeated MachineConfiguredSlotSummary configured_slots = 3;
  repeated MachineLegacySlotSummary legacy_slots = 4;
  repeated MachineAssortmentProductSummary assortment_products = 5;
}

message GetLatestMachineTelemetryResponse {
  MachineTelemetrySnapshot snapshot = 1;
}

message GetMachineIncidentSummaryResponse {
  string machine_id = 1;
  int32 limit = 2;
  int32 returned = 3;
  repeated MachineIncidentSummary items = 4;
}

message GetOrderPaymentVendStateResponse {
  CommerceOrderSummary order = 1;
  CommerceVendSummary vend = 2;
  CommercePaymentSummary payment = 3;
  bool payment_present = 4;
}
