syntax = "proto3";

package avf.machine.v1;

option go_package = "github.com/avf/avf-vending-api/proto/avf/machine/v1;machinev1";

import "avf/machine/v1/common.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

// MachineBootstrapService serves setup/bootstrap reads for an activated machine (requires machine access JWT).
service MachineBootstrapService {
  rpc GetBootstrap(GetBootstrapRequest) returns (GetBootstrapResponse);
  rpc CheckIn(MachineBootstrapServiceCheckInRequest) returns (MachineBootstrapServiceCheckInResponse);
  rpc AckConfigVersion(AckConfigVersionRequest) returns (AckConfigVersionResponse);
  rpc CheckForUpdates(CheckForUpdatesRequest) returns (CheckForUpdatesResponse);
}

message GetBootstrapRequest {
  MachineRequestMeta meta = 1;
}

message MqttConfigMetadata {
  string broker_url = 1;
  string topic_prefix = 2;
}

message BootstrapMachine {
  string machine_id = 1;
  string organization_id = 2;
  string site_id = 3;
  string hardware_profile_id = 4;
  string serial_number = 5;
  string name = 6;
  string status = 7;
  int64 command_sequence = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
}

message BootstrapSlot {
  string config_id = 1;
  string slot_code = 2;
  int32 slot_index = 3;
  string product_id = 4;
  string product_sku = 5;
  string product_name = 6;
  int32 max_quantity = 7;
  int64 price_minor = 8;
  string effective_from_rfc3339 = 9;
  bool is_current = 10;
  string machine_slot_layout_id = 11;
}

message BootstrapCabinet {
  string id = 1;
  string code = 2;
  string title = 3;
  int32 sort_order = 4;
  google.protobuf.Struct metadata = 5;
  repeated BootstrapSlot slots = 6;
}

message BootstrapTopology {
  repeated BootstrapCabinet cabinets = 1;
}

message BootstrapCatalogProduct {
  string product_id = 1;
  string sku = 2;
  string name = 3;
  int32 sort_order = 4;
  string assortment_id = 5;
  string assortment_name = 6;
}

message BootstrapCatalog {
  repeated BootstrapCatalogProduct products = 1;
}

message RuntimeHints {
  map<string, bool> feature_flags = 1;
  int32 applied_machine_config_revision = 2;
  repeated PendingRolloutHint pending_machine_config_rollouts = 3;
}

message PendingRolloutHint {
  string rollout_id = 1;
  string target_version_id = 2;
  string target_version_label = 3;
  string status = 4;
}

message GetBootstrapResponse {
  BootstrapMachine machine = 1;
  BootstrapTopology topology = 2;
  BootstrapCatalog catalog = 3;
  string catalog_fingerprint = 4;
  string pricing_fingerprint = 5;
  string planogram_fingerprint = 6;
  string media_fingerprint = 7;
  google.protobuf.Timestamp server_time = 8;
  MqttConfigMetadata mqtt = 9;
  RuntimeHints runtime_hints = 10;
  MachineResponseMeta meta = 11;
  string published_planogram_version_id = 12;
  int32 published_planogram_version_no = 13;
}

message MachineBootstrapServiceCheckInRequest {
  MachineRequestMeta meta = 1;
  string boot_id = 2;
  string network_state = 3;
  map<string, string> attributes = 4;
}

message MachineBootstrapServiceCheckInResponse {
  MachineResponseMeta meta = 1;
}

message AckConfigVersionRequest {
  MachineRequestMeta meta = 1;
  int64 acknowledged_config_version = 2;
  string acknowledged_planogram_version_id = 3;
}

message AckConfigVersionResponse {
  MachineResponseMeta meta = 1;
}

message CheckForUpdatesRequest {
  string catalog_fingerprint = 1;
  string pricing_fingerprint = 2;
  string planogram_fingerprint = 3;
  string media_fingerprint = 4;
}

message CheckForUpdatesResponse {
  bool catalog_changed = 1;
  bool pricing_changed = 2;
  bool planogram_changed = 3;
  bool media_changed = 4;
  bool firmware_or_app_update_available = 5;
  string server_catalog_fingerprint = 6;
  string server_pricing_fingerprint = 7;
  string server_planogram_fingerprint = 8;
  string server_media_fingerprint = 9;
}
