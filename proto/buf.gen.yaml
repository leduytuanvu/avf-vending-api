# Generates tracked Go protobuf + gRPC stubs alongside proto sources.
# Internal APIs use buf.gen.avfinternal.yaml → internal/gen/avfinternalv1 (see Makefile proto-check paths).
version: v2
plugins:
  - remote: buf.build/protocolbuffers/go
    out: .
    opt:
      - paths=source_relative
  - remote: buf.build/grpc/go
    out: .
    opt:
      - paths=source_relative
