# Enterprise release verification — **not** Security Release, **not** a deploy trigger, **not** an image gate.
# Does **not** run staging/production deploy workflows; operators use **Staging Deployment Contract** (develop chain)
# and **Deploy Production** (main, manual + protected `production` env) separately.
# Runs `make verify-enterprise-release` → scripts/verify_enterprise_release.sh (compose/OpenAPI/legacy checks). Do not rename to imply
# "security release" or replace security-release.yml.
name: Enterprise release verification

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: enterprise-verify-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  verify-enterprise-release:
    name: verify-enterprise-release
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.9"
          cache: true
          cache-dependency-path: go.sum

      - name: Install PyYAML for deployment YAML structural checks
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y python3-yaml

      - name: Run enterprise release verification
        shell: bash
        run: |
          set -Eeuo pipefail
          make verify-enterprise-release
