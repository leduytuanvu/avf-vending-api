name: Enterprise release verification

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: enterprise-verify-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify-enterprise-release:
    name: verify-enterprise-release
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.9"
          cache: true
          cache-dependency-path: go.sum

      - name: Install PyYAML for deployment YAML structural checks
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y python3-yaml

      - name: Run enterprise release verification
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/verify_enterprise_release.sh
