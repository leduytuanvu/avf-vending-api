name: Develop Build Artifact

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_run:
    workflows:
      - Build and Push Images
    types:
      - completed

permissions:
  actions: read
  contents: read
  packages: read

concurrency:
  group: develop-build-artifact
  cancel-in-progress: true

jobs:
  resolve-build-run-id:
    name: Resolve Develop Build Run
    if: |
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'develop'
    runs-on: ubuntu-latest
    outputs:
      workflow_run_id: ${{ steps.lookup.outputs.workflow_run_id }}
    steps:
      - name: Use triggering develop build run
        id: lookup
        shell: bash
        run: |
          set -Eeuo pipefail
          echo "workflow_run_id=${{ github.event.workflow_run.id }}" >> "${GITHUB_OUTPUT}"

  resolve-image-refs:
    name: Resolve Develop Image Refs
    if: |
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'develop'
    uses: ./.github/workflows/_reusable-deploy.yml
    needs: resolve-build-run-id
    with:
      resolution_mode: workflow_run
      workflow_run_id: ${{ needs.resolve-build-run-id.outputs.workflow_run_id }}
      app_image_ref: ""
      goose_image_ref: ""
    secrets:
      gh_api_token: ${{ secrets.GITHUB_TOKEN }}

  publish-develop-artifact-summary:
    name: Publish Develop Artifact Summary
    runs-on: ubuntu-latest
    needs: resolve-image-refs
    if: |
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'develop'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Validate develop deployment assets
        shell: bash
        run: |
          set -Eeuo pipefail
          # The repo still keeps the non-production deployment assets under deployments/staging/.
          # For develop we only validate/package against those assets; we do not SSH deploy anywhere.
          docker compose --env-file deployments/staging/.env.staging.example -f deployments/staging/docker-compose.staging.yml config >/dev/null
          bash -n deployments/prod/shared/scripts/smoke_http.sh
          bash -n deployments/staging/scripts/deploy_staging.sh
          bash -n deployments/staging/scripts/healthcheck_staging.sh
          bash -n deployments/staging/scripts/smoke_staging.sh

      - name: Show develop promotion context
        shell: bash
        env:
          DEVELOP_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          {
            echo "## Develop Promotion Context"
            echo "- trigger: \`workflow_run\`"
            echo "- develop branch ref: \`${DEVELOP_BRANCH}\`"
            echo "- deployment target: \`none\`"
            echo "- outcome: \`build/package only; no SSH deploy because no real develop server exists\`"
            echo "- app image: \`${{ needs.resolve-image-refs.outputs.app_image_ref }}\`"
            echo "- goose image: \`${{ needs.resolve-image-refs.outputs.goose_image_ref }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Write develop build summary
        if: always()
        shell: bash
        env:
          ACTOR: ${{ github.actor }}
          APP_IMAGE_REF: ${{ needs.resolve-image-refs.outputs.app_image_ref }}
          BUILD_COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}
          GOOSE_IMAGE_REF: ${{ needs.resolve-image-refs.outputs.goose_image_ref }}
          TRIGGER_NAME: workflow_run
        run: |
          mkdir -p deployment-evidence

          cat > deployment-evidence/develop-deployment-manifest.json <<EOF
          {
            "environment": "develop",
            "commit_sha": "${BUILD_COMMIT_SHA}",
            "app_image_ref": "${APP_IMAGE_REF}",
            "goose_image_ref": "${GOOSE_IMAGE_REF}",
            "actor": "${ACTOR}",
            "trigger": "${TRIGGER_NAME}",
            "deployment_target": "none",
            "result": "build-package-only"
          }
          EOF

          {
            echo "## Develop Build Artifact"
            echo "- environment: \`develop\`"
            echo "- commit SHA: \`${BUILD_COMMIT_SHA}\`"
            echo "- app image: \`${APP_IMAGE_REF}\`"
            echo "- goose image: \`${GOOSE_IMAGE_REF}\`"
            echo "- actor: \`${ACTOR}\`"
            echo "- trigger: \`${TRIGGER_NAME}\`"
            echo "- deployment target: \`none\`"
            echo "- result: \`build/package only\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload develop build manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: develop-build-manifest
          path: deployment-evidence/develop-deployment-manifest.json
          if-no-files-found: error
          retention-days: 14
