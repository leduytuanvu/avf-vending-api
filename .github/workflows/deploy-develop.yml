name: Develop Promotion Validation

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_run:
    workflows:
      - Build and Push Images
    types:
      - completed

permissions:
  actions: read
  contents: read
  packages: read

concurrency:
  group: develop-release-assets
  cancel-in-progress: true

jobs:
  resolve-build-run-id:
    name: Resolve Develop Promotion Candidate
    if: |
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'develop'
    runs-on: ubuntu-latest
    outputs:
      workflow_run_id: ${{ steps.lookup.outputs.workflow_run_id }}
    steps:
      - name: Use triggering develop build run
        id: lookup
        shell: bash
        run: |
          set -Eeuo pipefail
          echo "workflow_run_id=${{ github.event.workflow_run.id }}" >> "${GITHUB_OUTPUT}"

  resolve-image-refs:
    name: Resolve Develop Promotion Image Refs
    if: |
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'develop'
    uses: ./.github/workflows/_reusable-deploy.yml
    needs: resolve-build-run-id
    with:
      resolution_mode: workflow_run
      target_environment: develop
      workflow_run_id: ${{ needs.resolve-build-run-id.outputs.workflow_run_id }}
      app_image_ref: ""
      goose_image_ref: ""
    secrets:
      gh_api_token: ${{ secrets.GITHUB_TOKEN }}

  publish-develop-artifact-summary:
    name: Validate Develop Promotion Package
    runs-on: ubuntu-latest
    needs: resolve-image-refs
    if: |
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'develop'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Validate develop release asset package
        shell: bash
        run: |
          set -Eeuo pipefail
          # The repo still keeps the non-production deployment assets under deployments/staging/.
          # For develop we only prepare/validate package assets against those files; no server deploy happens here.
          STAGING_ENV_FILE=.env.staging.example docker compose --env-file deployments/staging/.env.staging.example -f deployments/staging/docker-compose.staging.yml config >/dev/null
          bash -n deployments/prod/shared/scripts/smoke_http.sh
          bash -n deployments/staging/scripts/deploy_staging.sh
          bash -n deployments/staging/scripts/healthcheck_staging.sh
          bash -n deployments/staging/scripts/smoke_staging.sh

      - name: Show develop release asset context
        shell: bash
        env:
          DEVELOP_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          {
            echo "## Develop Promotion Validation"
            echo "- trigger: \`workflow_run\`"
            echo "- develop branch ref: \`${DEVELOP_BRANCH}\`"
            echo "- workflow intent: \`promotion-prep validation only\`"
            echo "- real environment deploy performed: \`false\`"
            echo "- remote SSH/deploy performed: \`false\`"
            echo "- compose validation only: \`true\`"
            echo "- outcome: \`validated package inputs only; no real develop server exists in this repo\`"
            echo "- app image: \`${{ needs.resolve-image-refs.outputs.app_image_ref }}\`"
            echo "- goose image: \`${{ needs.resolve-image-refs.outputs.goose_image_ref }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Write develop release asset manifest
        if: always()
        shell: bash
        env:
          ACTOR: ${{ github.actor }}
          APP_IMAGE_REF: ${{ needs.resolve-image-refs.outputs.app_image_ref }}
          BUILD_COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}
          GOOSE_IMAGE_REF: ${{ needs.resolve-image-refs.outputs.goose_image_ref }}
          TRIGGER_NAME: workflow_run
        run: |
          mkdir -p deployment-evidence

          cat > deployment-evidence/develop-release-assets-manifest.json <<EOF
          {
            "environment": "develop",
            "commit_sha": "${BUILD_COMMIT_SHA}",
            "app_image_ref": "${APP_IMAGE_REF}",
            "goose_image_ref": "${GOOSE_IMAGE_REF}",
            "actor": "${ACTOR}",
            "trigger": "${TRIGGER_NAME}",
            "artifact_kind": "develop-release-assets",
            "workflow_intent": "promotion-validation",
            "server_deploy_performed": false,
            "remote_ssh_performed": false,
            "validation_scope": "compose-config-and-script-syntax-only",
            "result": "prepare-package-validate-only"
          }
          EOF

          {
            echo "## Develop Promotion Validation"
            echo "- environment: \`develop\`"
            echo "- commit SHA: \`${BUILD_COMMIT_SHA}\`"
            echo "- app image: \`${APP_IMAGE_REF}\`"
            echo "- goose image: \`${GOOSE_IMAGE_REF}\`"
            echo "- actor: \`${ACTOR}\`"
            echo "- trigger: \`${TRIGGER_NAME}\`"
            echo "- workflow intent: \`promotion-validation\`"
            echo "- server deploy performed: \`false\`"
            echo "- remote SSH performed: \`false\`"
            echo "- result: \`prepare/package/validate only\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload develop release asset manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: develop-release-assets-manifest
          path: deployment-evidence/develop-release-assets-manifest.json
          if-no-files-found: error
          retention-days: 14
