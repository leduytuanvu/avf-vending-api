name: Staging Deployment Contract

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_run:
    workflows:
      - "Security Release"
    types:
      - completed
    branches:
      - develop

# Staging only runs after a *successful* Security Release on develop (github.event.workflow_run.name
# == 'Security Release'). Never from CI, repo Security, or Build directly. security-verdict from the
# triggering run (github.event.workflow_run.id) is the only candidate source. verdict=skipped
# (no releasable Security Release candidate) finishes cleanly — no build resolution, no deploy.
# Real deploy: vars.ENABLE_REAL_STAGING_DEPLOY == true. Otherwise: validate only when verdict=pass.

permissions:
  actions: read
  attestations: read
  contents: read
  packages: read

concurrency:
  group: staging-deployment
  cancel-in-progress: true

jobs:
  resolve-staging-candidate:
    name: Resolve Staging Deployment Candidate
    if: |
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.name == 'Security Release' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'develop'
    runs-on: ubuntu-latest
    outputs:
      staging_verdict: ${{ steps.lookup.outputs.staging_verdict }}
      source_commit_sha: ${{ steps.lookup.outputs.source_commit_sha }}
      workflow_run_id: ${{ steps.lookup.outputs.workflow_run_id }}
      source_branch: ${{ steps.lookup.outputs.source_branch }}
      source_event: ${{ steps.lookup.outputs.source_event }}
      security_workflow_run_id: ${{ steps.lookup.outputs.security_workflow_run_id }}
    steps:
      - name: Resolve candidate from Security Release security-verdict artifact
        id: lookup
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SECURITY_RELEASE_RUN_ID: ${{ github.event.workflow_run.id }}
          SECURITY_RELEASE_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          WF_STAGING_CANDIDATE_RESOLVE: |
            import json
            import os
            import re
            import sys
            from pathlib import Path

            path = Path("security-verdict-bundle/security-verdict.json")
            payload = json.loads(path.read_text(encoding="utf-8"))
            sec_run = os.environ["SECURITY_RELEASE_RUN_ID"]
            conc = os.environ["SECURITY_RELEASE_CONCLUSION"]

            def out(k, v):
                p = os.environ["GITHUB_OUTPUT"]
                with open(p, "a", encoding="utf-8") as fh:
                    fh.write(f"{k}={v}\n")

            def need_digest_pinned(name, ref):
                sref = (ref or "").strip()
                if not sref or "@sha256:" not in sref or not re.search(r"sha256:[0-9a-f]{64}", sref):
                    print(f"error: {name} must be digest-pinned (registry/.../img@sha256:...), got {ref!r}", file=sys.stderr)
                    sys.exit(1)

            if conc != "success":
                print("Security Release run did not complete with conclusion success; refusing staging", file=sys.stderr)
                sys.exit(1)

            if str(payload.get("workflow_run_id", "")) != str(sec_run):
                print(
                    f"error: security-verdict workflow_run_id {payload.get('workflow_run_id')!r} does not match triggering Security Release run {sec_run!r}",
                    file=sys.stderr,
                )
                sys.exit(1)

            verdict = (payload.get("verdict") or "").lower()
            if verdict == "skipped":
                out("staging_verdict", "skipped")
                out("source_commit_sha", "")
                out("workflow_run_id", "")
                out("source_branch", "")
                out("source_event", "")
                out("security_workflow_run_id", sec_run)
                summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
                if summary_path:
                    with open(summary_path, "a", encoding="utf-8") as fh:
                        fh.write("\n## Staging (neutral)\n\nNo releasable staging candidate. Staging deployment skipped.\n")
                sys.exit(0)

            if verdict != "pass":
                for r in payload.get("failure_reasons") or []:
                    print(f"failure_reason: {r}", file=sys.stderr)
                print(f"error: security-verdict verdict is {verdict!r} (staging allows only pass or skipped)", file=sys.stderr)
                sys.exit(1)

            secv = payload.get("security_verdict")
            if secv is not None and str(secv).lower() != "pass":
                print("security-verdict security_verdict is not pass; refusing staging", file=sys.stderr)
                sys.exit(1)

            rgv = (payload.get("release_gate_verdict") or "").strip()
            if rgv != "pass":
                print(f"error: release_gate_verdict must be pass, got {rgv!r}", file=sys.stderr)
                sys.exit(1)

            branch = (payload.get("source_branch") or "").strip()
            if branch != "develop":
                print(f"error: staging candidate source_branch must be develop, got {branch!r}", file=sys.stderr)
                sys.exit(1)

            sha = (payload.get("source_sha") or "").strip()
            if not sha or not re.fullmatch(r"[0-9a-f]{40}", sha):
                print(f"error: source_sha must be a non-empty 40-character hex SHA, got {sha!r}", file=sys.stderr)
                sys.exit(1)

            build_id = str(payload.get("source_build_run_id") or "").strip()
            if not build_id.isdigit():
                print(f"error: source_build_run_id must be a numeric Actions run id, got {build_id!r}", file=sys.stderr)
                sys.exit(1)

            src_ev = (payload.get("source_event") or "").strip()
            if src_ev != "push":
                print(
                    f"error: automatic staging requires source_event push (semantic build trigger), got {src_ev!r}",
                    file=sys.stderr,
                )
                sys.exit(1)

            pub = payload.get("published_images") or {}
            need_digest_pinned("published_images.app_image_ref", pub.get("app_image_ref", ""))
            need_digest_pinned("published_images.goose_image_ref", pub.get("goose_image_ref", ""))

            out("workflow_run_id", build_id)
            out("source_commit_sha", sha)
            out("source_branch", "develop")
            out("source_event", src_ev)
            out("security_workflow_run_id", sec_run)
            out("staging_verdict", "pass")
        run: |
          set -Eeuo pipefail

          fail() {
            echo "error: $*" >&2
            exit 1
          }

          [[ "${SECURITY_RELEASE_CONCLUSION}" == "success" ]] || fail "triggering Security Release conclusion must be success (got ${SECURITY_RELEASE_CONCLUSION})"

          rm -rf security-verdict-bundle
          mkdir -p security-verdict-bundle

          artifact_id=""
          for attempt in 1 2 3 4 5 6 7 8; do
            artifact_id="$(
              gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${SECURITY_RELEASE_RUN_ID}/artifacts" \
                --jq '[.artifacts[]? | select(.name == "security-verdict") | .id] | .[0] // empty'
            )" || true
            [[ -n "${artifact_id}" ]] && break
            if [[ "${attempt}" -lt 8 ]]; then
              echo "security-verdict artifact not visible on Security Release run ${SECURITY_RELEASE_RUN_ID} yet; retrying (${attempt}/8) …" >&2
              sleep 8
            fi
          done
          [[ -n "${artifact_id}" ]] || fail "no security-verdict artifact on Security Release run ${SECURITY_RELEASE_RUN_ID} after bounded retries; cannot resolve build via source_build_run_id"

          for dattempt in 1 2 3 4 5; do
            if gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts/${artifact_id}/zip" > security-verdict-bundle/security-verdict.zip; then
              break
            fi
            if [[ "${dattempt}" -lt 5 ]]; then
              echo "security-verdict artifact zip not downloadable yet; retrying (${dattempt}/5) …" >&2
              sleep 6
            fi
          done
          [[ -f security-verdict-bundle/security-verdict.zip ]] || fail "failed to download security-verdict zip"
          python3 -m zipfile -e security-verdict-bundle/security-verdict.zip security-verdict-bundle
          [[ -f security-verdict-bundle/security-verdict.json ]] || fail "security-verdict.zip did not contain security-verdict.json"

          printenv WF_STAGING_CANDIDATE_RESOLVE | python3 -

  resolve-image-refs:
    name: Resolve Staging Immutable Image Refs
    if: |
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.name == 'Security Release' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'develop' &&
      needs.resolve-staging-candidate.outputs.staging_verdict == 'pass'
    needs: resolve-staging-candidate
    uses: ./.github/workflows/_reusable-deploy.yml
    with:
      resolution_mode: workflow_run
      target_environment: staging
      workflow_run_id: ${{ needs.resolve-staging-candidate.outputs.workflow_run_id }}
      app_image_ref: ""
      goose_image_ref: ""
    secrets:
      gh_api_token: ${{ secrets.GITHUB_TOKEN }}

  validate-staging-security-verdict:
    name: Validate Staging Security Verdict
    if: |
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.name == 'Security Release' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'develop' &&
      needs.resolve-staging-candidate.outputs.staging_verdict == 'pass'
    runs-on: ubuntu-latest
    needs:
      - resolve-staging-candidate
      - resolve-image-refs
    outputs:
      security_verdict_age_seconds: ${{ steps.gate.outputs.security_verdict_age_seconds }}
      security_verdict_max_age_hours: ${{ steps.gate.outputs.security_verdict_max_age_hours }}
      release_gate_mode: ${{ steps.gate.outputs.release_gate_mode }}
      release_gate_verdict: ${{ steps.gate.outputs.release_gate_verdict }}
      repo_release_verdict: ${{ steps.gate.outputs.repo_release_verdict }}
      provenance_release_verdict: ${{ steps.gate.outputs.provenance_release_verdict }}
      security_workflow_run_id: ${{ steps.gate.outputs.security_workflow_run_id }}
      security_verdict_generated_at_utc: ${{ steps.gate.outputs.security_verdict_generated_at_utc }}
    steps:
      - name: Re-validate security-verdict and immutable image alignment
        id: gate
        shell: bash
        env:
          EXPECTED_APP_IMAGE_REF: ${{ needs.resolve-image-refs.outputs.app_image_ref }}
          EXPECTED_BUILD_RUN_ID: ${{ needs.resolve-staging-candidate.outputs.workflow_run_id }}
          EXPECTED_GOOSE_IMAGE_REF: ${{ needs.resolve-image-refs.outputs.goose_image_ref }}
          EXPECTED_SOURCE_SHA: ${{ needs.resolve-staging-candidate.outputs.source_commit_sha }}
          EXPECTED_SOURCE_EVENT: ${{ needs.resolve-staging-candidate.outputs.source_event }}
          RESOLVED_ARTIFACT_SHA: ${{ needs.resolve-image-refs.outputs.artifact_source_sha }}
          RESOLVED_ARTIFACT_BRANCH: ${{ needs.resolve-image-refs.outputs.artifact_source_branch }}
          RESOLVED_ARTIFACT_EVENT: ${{ needs.resolve-image-refs.outputs.artifact_source_event }}
          RESOLVED_ARTIFACT_WORKFLOW_NAME: ${{ needs.resolve-image-refs.outputs.artifact_source_workflow_name }}
          SECURITY_RELEASE_RUN_ID: ${{ github.event.workflow_run.id }}
          GH_TOKEN: ${{ github.token }}
          SECURITY_VERDICT_MAX_AGE_HOURS: ${{ secrets.STAGING_SECURITY_VERDICT_MAX_AGE_HOURS || vars.STAGING_SECURITY_VERDICT_MAX_AGE_HOURS || secrets.SECURITY_VERDICT_MAX_AGE_HOURS || vars.SECURITY_VERDICT_MAX_AGE_HOURS || '72' }}
          VERDICT_FILE: security-gate/verify/security-verdict.json
          WF_STAGING_GATE_VALIDATE: |
            import json
            import os
            import sys
            from datetime import datetime, timezone
            from pathlib import Path

            private_repo_provenance_fallback = "accepted-private-repo-no-github-attestations"

            def fail_msg(m):
                print(m, file=sys.stderr)
                sys.exit(1)

            verdict_path = Path(os.environ["VERDICT_FILE"])
            payload = json.loads(verdict_path.read_text(encoding="utf-8"))
            run_id = os.environ["SECURITY_RELEASE_RUN_ID"]
            expected_build = os.environ["EXPECTED_BUILD_RUN_ID"]
            expected_sha = os.environ["EXPECTED_SOURCE_SHA"]
            expected_app = os.environ["EXPECTED_APP_IMAGE_REF"]
            expected_goose = os.environ["EXPECTED_GOOSE_IMAGE_REF"]
            max_age_hours = int(os.environ["SECURITY_VERDICT_MAX_AGE_HOURS"])

            required_keys = (
                "schema_version", "event_name", "verdict", "source_build_run_id", "source_sha", "workflow_run_id",
                "generated_at_utc", "published_images", "release_gate_verdict", "release_gate_mode", "release_gate",
                "repo_level_checks", "image_level_checks", "provenance_release_checks",
            )
            missing = [k for k in required_keys if k not in payload]
            if missing:
                fail_msg(f"security-verdict.json missing keys: {missing}")

            if payload.get("schema_version") != "v1":
                fail_msg("security-verdict schema_version must be v1")

            if str(payload.get("workflow_run_id", "")) != str(run_id):
                fail_msg("security-verdict workflow_run_id does not match triggering Security Release run")

            if str(payload.get("source_build_run_id", "")) != str(expected_build):
                fail_msg("security-verdict source_build_run_id does not match candidate build run id")

            if payload.get("source_sha", "") != expected_sha:
                fail_msg("security-verdict source_sha does not match candidate source_commit_sha")

            if payload.get("event_name") not in ("workflow_run", "workflow_dispatch"):
                fail_msg(f"unexpected security-verdict event_name: {payload.get('event_name')!r}")

            if (payload.get("verdict") or "").lower() != "pass":
                fail_msg("Security Release verdict is not pass; refusing staging deploy")

            secv = payload.get("security_verdict")
            if secv is not None and str(secv).lower() != "pass":
                fail_msg("Security Release verdict is not pass; refusing staging deploy")

            if payload.get("release_gate_verdict", "") != "pass":
                fail_msg(f"release_gate_verdict must be pass, got {payload.get('release_gate_verdict')!r}")

            repo_release_verdict = (((payload.get("repo_level_checks") or {}).get("release_evidence") or {}).get("required_for_release_verdict", ""))
            if repo_release_verdict != "pass":
                fail_msg(f"repo release evidence not pass: {repo_release_verdict!r}")

            image_release_verdict = ((payload.get("image_level_checks") or {}).get("required_for_release_verdict", ""))
            if image_release_verdict != "pass":
                fail_msg(f"image-level release evidence not pass: {image_release_verdict!r}")

            provenance_release_verdict = ((payload.get("provenance_release_checks") or {}).get("required_for_release_verdict", ""))
            if provenance_release_verdict not in ("pass", private_repo_provenance_fallback):
                fail_msg(f"provenance release evidence not acceptable: {provenance_release_verdict!r}")

            published_images = payload.get("published_images") or {}
            if published_images.get("app_image_ref", "") != expected_app:
                fail_msg("security-verdict app_image_ref does not match resolved immutable app ref")
            if published_images.get("goose_image_ref", "") != expected_goose:
                fail_msg("security-verdict goose_image_ref does not match resolved immutable goose ref")

            generated_at_raw = payload.get("generated_at_utc", "")
            try:
                generated_at = datetime.strptime(generated_at_raw, "%Y-%m-%dT%H:%M:%SZ").replace(tzinfo=timezone.utc)
            except ValueError:
                fail_msg(f"generated_at_utc malformed: {generated_at_raw!r}")

            age_seconds = int((datetime.now(timezone.utc) - generated_at).total_seconds())
            if age_seconds < 0 or age_seconds > max_age_hours * 3600:
                fail_msg(
                    f"security-verdict is stale ({age_seconds}s old, max {max_age_hours}h); rerun Security Release or adjust STAGING_SECURITY_VERDICT_MAX_AGE_HOURS"
                )

            out_path = os.environ["GITHUB_OUTPUT"]
            with open(out_path, "a", encoding="utf-8") as fh:
                fh.write(f"security_verdict_age_seconds={age_seconds}\n")
                fh.write(f"security_verdict_max_age_hours={max_age_hours}\n")
                fh.write(f"release_gate_mode={payload.get('release_gate_mode', '')}\n")
                fh.write(f"release_gate_verdict={payload.get('release_gate_verdict', '')}\n")
                fh.write(f"repo_release_verdict={repo_release_verdict}\n")
                fh.write(f"provenance_release_verdict={provenance_release_verdict}\n")
                fh.write(f"security_workflow_run_id={run_id}\n")
                fh.write(f"security_verdict_generated_at_utc={generated_at_raw}\n")
        run: |
          set -Eeuo pipefail
          mkdir -p security-gate

          {
            echo "## Staging Security Gate"
            echo "- source of truth: \`security-verdict\` from triggering **Security Release** run \`${SECURITY_RELEASE_RUN_ID}\`"
            echo "- build candidate: \`source_build_run_id\` from that artifact → **_reusable-deploy** loads Build artifacts by **run id** (no \`gh\` search by \`head_sha\`)"
            echo "- post-check: immutable image metadata from **_reusable-deploy** must match security-verdict and candidate \`source_event\`"
          } >> "$GITHUB_STEP_SUMMARY"

          fail() {
            echo "error: $*" >&2
            echo "- result: \`fail\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- reason: $*" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          }

          [[ "${SECURITY_VERDICT_MAX_AGE_HOURS}" =~ ^[0-9]+$ ]] || fail "SECURITY_VERDICT_MAX_AGE_HOURS must be numeric"
          [[ -n "${EXPECTED_BUILD_RUN_ID}" ]] || fail "missing expected build run id for staging security gate"
          [[ -n "${EXPECTED_APP_IMAGE_REF}" ]] || fail "missing expected app image ref for staging security gate"
          [[ -n "${EXPECTED_GOOSE_IMAGE_REF}" ]] || fail "missing expected goose image ref for staging security gate"
          [[ -n "${EXPECTED_SOURCE_SHA}" ]] || fail "missing expected source SHA for staging security gate"
          [[ -n "${RESOLVED_ARTIFACT_SHA}" ]] || fail "missing artifact_source_sha from image resolution"
          [[ "${RESOLVED_ARTIFACT_SHA}" == "${EXPECTED_SOURCE_SHA}" ]] || fail "artifact_source_sha (${RESOLVED_ARTIFACT_SHA}) does not match security-verdict source_commit_sha (${EXPECTED_SOURCE_SHA})"
          [[ "${RESOLVED_ARTIFACT_BRANCH}" == "develop" ]] || fail "artifact_source_branch must be develop for staging, got ${RESOLVED_ARTIFACT_BRANCH:-empty}"
          [[ "${RESOLVED_ARTIFACT_EVENT}" == "${EXPECTED_SOURCE_EVENT}" ]] || fail "artifact_source_event (${RESOLVED_ARTIFACT_EVENT:-empty}) does not match security-verdict source_event (${EXPECTED_SOURCE_EVENT})"
          [[ "${RESOLVED_ARTIFACT_WORKFLOW_NAME}" == "Build and Push Images" ]] || fail "artifact_source_workflow_name must be Build and Push Images, got ${RESOLVED_ARTIFACT_WORKFLOW_NAME:-empty}"

          artifact_id=""
          for attempt in 1 2 3 4 5 6 7 8; do
            artifact_id="$(
              gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${SECURITY_RELEASE_RUN_ID}/artifacts" \
                --jq '[.artifacts[]? | select(.name == "security-verdict") | .id] | .[0] // empty'
            )" || true
            [[ -n "${artifact_id}" ]] && break
            if [[ "${attempt}" -lt 8 ]]; then
              echo "security-verdict artifact not visible; retrying (${attempt}/8) …" >&2
              sleep 8
            fi
          done
          [[ -n "${artifact_id}" ]] || fail "no security-verdict artifact on Security Release run ${SECURITY_RELEASE_RUN_ID} after bounded retries"

          extract_dir="security-gate/verify"
          rm -rf "${extract_dir}"
          mkdir -p "${extract_dir}"
          for dattempt in 1 2 3 4 5; do
            if gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts/${artifact_id}/zip" > "${extract_dir}/security-verdict.zip"; then
              break
            fi
            if [[ "${dattempt}" -lt 5 ]]; then
              echo "security-verdict download retry (${dattempt}/5) …" >&2
              sleep 6
            fi
          done
          [[ -f "${extract_dir}/security-verdict.zip" ]] || fail "failed to download security-verdict zip"
          python3 -m zipfile -e "${extract_dir}/security-verdict.zip" "${extract_dir}"
          verdict_file="${extract_dir}/security-verdict.json"
          [[ -f "${verdict_file}" ]] || fail "security-verdict.zip did not contain security-verdict.json"

          printenv WF_STAGING_GATE_VALIDATE | python3 -


      - name: Record staging gate summary
        if: success()
        shell: bash
        env:
          SECURITY_VERDICT_MAX_AGE_HOURS: ${{ secrets.STAGING_SECURITY_VERDICT_MAX_AGE_HOURS || vars.STAGING_SECURITY_VERDICT_MAX_AGE_HOURS || secrets.SECURITY_VERDICT_MAX_AGE_HOURS || vars.SECURITY_VERDICT_MAX_AGE_HOURS || '72' }}
        run: |
          set -Eeuo pipefail
          {
            echo "- result: \`pass\`"
            echo "- security workflow run: \`${{ github.event.workflow_run.id }}\`"
            echo "- freshness window: \`${SECURITY_VERDICT_MAX_AGE_HOURS}h\`"
            echo "- verdict age at evaluation: \`${{ steps.gate.outputs.security_verdict_age_seconds }}\`"
            echo "- release gate mode: \`${{ steps.gate.outputs.release_gate_mode }}\`"
            echo "- release gate verdict: \`${{ steps.gate.outputs.release_gate_verdict }}\`"
            echo "- repo release verdict: \`${{ steps.gate.outputs.repo_release_verdict }}\`"
            echo "- provenance release verdict: \`${{ steps.gate.outputs.provenance_release_verdict }}\`"
            echo "- verdict generated at (UTC): \`${{ steps.gate.outputs.security_verdict_generated_at_utc }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  # When real staging is off: validate the same release chain as above, then exit success without SSH/VPS.
  record-staging-disabled-outcome:
    name: Staging — Contract only (no VPS)
    if: |
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.name == 'Security Release' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'develop' &&
      needs.resolve-staging-candidate.outputs.staging_verdict == 'pass' &&
      vars.ENABLE_REAL_STAGING_DEPLOY != 'true'
    runs-on: ubuntu-latest
    needs:
      - resolve-staging-candidate
      - resolve-image-refs
      - validate-staging-security-verdict
    outputs:
      contract_validated: ${{ steps.noop.outputs.contract_validated }}
      deployment_executed: ${{ steps.noop.outputs.deployment_executed }}
      staging_enabled: ${{ steps.noop.outputs.staging_enabled }}
      skip_reason: ${{ steps.noop.outputs.skip_reason }}
    steps:
      - name: Write truthful staging-disabled contract outcome
        id: noop
        shell: bash
        env:
          SRC_SHA: ${{ needs.resolve-staging-candidate.outputs.source_commit_sha }}
          BUILD_RUN: ${{ needs.resolve-staging-candidate.outputs.workflow_run_id }}
          SEC_RUN: ${{ needs.resolve-staging-candidate.outputs.security_workflow_run_id }}
          APP_REF: ${{ needs.resolve-image-refs.outputs.app_image_ref }}
          GOOSE_REF: ${{ needs.resolve-image-refs.outputs.goose_image_ref }}
          RG_MODE: ${{ needs.validate-staging-security-verdict.outputs.release_gate_mode }}
          RG_VER: ${{ needs.validate-staging-security-verdict.outputs.release_gate_verdict }}
          SKIP_REASON: staging deployment skipped because real staging is disabled
        run: |
          set -Eeuo pipefail
          mkdir -p deployment-evidence
          python3 <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          out = Path("deployment-evidence/staging-contract-outcome.json")
          out.parent.mkdir(parents=True, exist_ok=True)
          payload = {
            "schema_version": "v1",
            "environment": "staging",
            "contract_validated": True,
            "deployment_executed": False,
            "staging_enabled": False,
            "skip_reason": os.environ["SKIP_REASON"],
            "resolved_source_sha": os.environ.get("SRC_SHA", ""),
            "source_build_run_id": os.environ.get("BUILD_RUN", ""),
            "security_release_workflow_run_id": os.environ.get("SEC_RUN", ""),
            "app_image_ref": os.environ.get("APP_REF", ""),
            "goose_image_ref": os.environ.get("GOOSE_REF", ""),
            "release_gate_mode": os.environ.get("RG_MODE", ""),
            "release_gate_verdict": os.environ.get("RG_VER", ""),
            "recorded_at_utc": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
          }
          out.write_text(json.dumps(payload, indent=2) + "\n", encoding="utf-8")
          PY
          {
            echo "## Staging deployment contract (no real staging)"
            echo "- **${SKIP_REASON}**"
            echo "- \`contract_validated\`: \`true\`"
            echo "- \`staging_enabled\`: \`false\`"
            echo "- \`deployment_executed\`: \`false\`"
            echo "- \`source_sha\`: \`${SRC_SHA}\`"
            echo "- \`source_build_run_id\` (from security-verdict): \`${BUILD_RUN}\`"
            echo "- \`app_image_ref\` (digest-pinned): \`${APP_REF}\`"
            echo "- \`goose_image_ref\` (digest-pinned): \`${GOOSE_REF}\`"
            echo "- (set repository variable \`ENABLE_REAL_STAGING_DEPLOY=true\` to require host, SSH, and remote deploy)"
          } >> "$GITHUB_STEP_SUMMARY"
          {
            echo "contract_validated=true"
            echo "deployment_executed=false"
            echo "staging_enabled=false"
            echo "skip_reason=${SKIP_REASON}"
          } >> "${GITHUB_OUTPUT}"

      - name: Upload staging contract outcome (disabled path)
        uses: actions/upload-artifact@v4
        with:
          name: staging-contract-outcome
          path: deployment-evidence/staging-contract-outcome.json
          if-no-files-found: error
          retention-days: 14

  validate-staging-prerequisites:
    name: Validate Staging Deployment Contract
    if: |
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.name == 'Security Release' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'develop' &&
      needs.resolve-staging-candidate.outputs.staging_verdict == 'pass' &&
      vars.ENABLE_REAL_STAGING_DEPLOY == 'true'
    runs-on: ubuntu-latest
    needs:
      - resolve-staging-candidate
      - resolve-image-refs
      - validate-staging-security-verdict
    outputs:
      release_gate_mode: ${{ steps.contract.outputs.release_gate_mode }}
      release_gate_verdict: ${{ steps.contract.outputs.release_gate_verdict }}
      repo_release_verdict: ${{ steps.contract.outputs.repo_release_verdict }}
      ssh_port: ${{ steps.contract.outputs.ssh_port }}
      security_verdict_age_seconds: ${{ steps.contract.outputs.security_verdict_age_seconds }}
      security_verdict_generated_at_utc: ${{ steps.contract.outputs.security_verdict_generated_at_utc }}
      security_verdict_max_age_hours: ${{ steps.contract.outputs.security_verdict_max_age_hours }}
      security_workflow_run_id: ${{ steps.contract.outputs.security_workflow_run_id }}
      ssh_user: ${{ steps.contract.outputs.ssh_user }}
      staging_deploy_root: ${{ steps.contract.outputs.staging_deploy_root }}
      staging_host: ${{ steps.contract.outputs.staging_host }}
      staging_remote_env_file: ${{ steps.contract.outputs.staging_remote_env_file }}
    steps:
      - name: Check local staging deployment contract
        id: contract
        shell: bash
        env:
          APP_IMAGE_REF: ${{ needs.resolve-image-refs.outputs.app_image_ref }}
          GOOSE_IMAGE_REF: ${{ needs.resolve-image-refs.outputs.goose_image_ref }}
          PROVENANCE_VERDICT: ${{ needs.resolve-image-refs.outputs.provenance_verdict }}
          RELEASE_GATE_MODE: ${{ needs.validate-staging-security-verdict.outputs.release_gate_mode }}
          RELEASE_GATE_VERDICT: ${{ needs.validate-staging-security-verdict.outputs.release_gate_verdict }}
          REPO_RELEASE_VERDICT: ${{ needs.validate-staging-security-verdict.outputs.repo_release_verdict }}
          PROVENANCE_RELEASE_VERDICT: ${{ needs.validate-staging-security-verdict.outputs.provenance_release_verdict }}
          SECURITY_VERDICT_AGE_SECONDS: ${{ needs.validate-staging-security-verdict.outputs.security_verdict_age_seconds }}
          SECURITY_VERDICT_GENERATED_AT_UTC: ${{ needs.validate-staging-security-verdict.outputs.security_verdict_generated_at_utc }}
          SECURITY_VERDICT_MAX_AGE_HOURS: ${{ needs.validate-staging-security-verdict.outputs.security_verdict_max_age_hours }}
          SECURITY_WORKFLOW_RUN_ID: ${{ needs.validate-staging-security-verdict.outputs.security_workflow_run_id }}
          SSH_KNOWN_HOSTS_CONTENT: ${{ secrets.STAGING_SSH_KNOWN_HOSTS || secrets.PREPROD_SSH_KNOWN_HOSTS || vars.STAGING_SSH_KNOWN_HOSTS || vars.PREPROD_SSH_KNOWN_HOSTS }}
          SSH_PORT: ${{ secrets.STAGING_SSH_PORT || secrets.PREPROD_SSH_PORT || vars.STAGING_SSH_PORT || vars.PREPROD_SSH_PORT || '22' }}
          SSH_PRIVATE_KEY: ${{ secrets.STAGING_SSH_KEY || secrets.STAGING_SSH_PRIVATE_KEY || secrets.PREPROD_SSH_KEY || secrets.PREPROD_SSH_PRIVATE_KEY }}
          SSH_USER: ${{ secrets.STAGING_SSH_USER || secrets.PREPROD_SSH_USER || vars.STAGING_SSH_USER || vars.PREPROD_SSH_USER }}
          STAGING_DEPLOY_ROOT: ${{ secrets.STAGING_DEPLOY_ROOT || secrets.PREPROD_DEPLOY_ROOT || vars.STAGING_DEPLOY_ROOT || vars.PREPROD_DEPLOY_ROOT }}
          STAGING_HOST: ${{ secrets.STAGING_HOST || secrets.PREPROD_HOST || vars.STAGING_HOST || vars.PREPROD_HOST }}
          STAGING_REMOTE_ENV_FILE: ${{ secrets.STAGING_REMOTE_ENV_FILE || secrets.PREPROD_REMOTE_ENV_FILE || vars.STAGING_REMOTE_ENV_FILE || vars.PREPROD_REMOTE_ENV_FILE }}
          WF_STAGING_LOCAL_PREREQ_JSON: |
            import json
            import os
            from pathlib import Path

            missing = [line.strip() for line in Path("deployment-evidence/staging-missing-prerequisites.txt").read_text(encoding="utf-8").splitlines() if line.strip()]
            payload = {
                "environment": "staging",
                "contract_validated": True,
                "staging_enabled": True,
                "skip_reason": "",
                "workflow_intent": "real-staging-deploy",
                "deployment_executed": False,
                "control_status": "blocked" if missing else "ready-for-remote-validation",
                "verdict": "blocked" if missing else "ready",
                "result": "blocked-missing-prerequisites" if missing else "local-prerequisites-passed",
                "summary_of_what_happened": "staging deployment was blocked before remote execution because required local prerequisites are missing" if missing else "local staging deployment prerequisites passed; remote staging validation has not run yet",
                "staging_host": os.environ.get("STAGING_HOST", ""),
                "staging_deploy_root": os.environ.get("STAGING_DEPLOY_ROOT", ""),
                "staging_remote_env_file": os.environ.get("STAGING_REMOTE_ENV_FILE_RESOLVED", ""),
                "app_image_ref": os.environ.get("APP_IMAGE_REF", ""),
                "goose_image_ref": os.environ.get("GOOSE_IMAGE_REF", ""),
                "release_gate_mode": os.environ.get("RELEASE_GATE_MODE", ""),
                "release_gate_verdict": os.environ.get("RELEASE_GATE_VERDICT", ""),
                "repo_release_verdict": os.environ.get("REPO_RELEASE_VERDICT", ""),
                "security_verdict_age_seconds": os.environ.get("SECURITY_VERDICT_AGE_SECONDS", ""),
                "security_workflow_run_id": os.environ.get("SECURITY_WORKFLOW_RUN_ID", ""),
                "security_verdict_generated_at_utc": os.environ.get("SECURITY_VERDICT_GENERATED_AT_UTC", ""),
                "security_verdict_max_age_hours": os.environ.get("SECURITY_VERDICT_MAX_AGE_HOURS", ""),
                "provenance_release_verdict": os.environ.get("PROVENANCE_RELEASE_VERDICT", ""),
                "provenance_verdict": os.environ.get("PROVENANCE_VERDICT", ""),
                "missing_prerequisites": missing,
            }
            Path("deployment-evidence/staging-prerequisites.json").write_text(json.dumps(payload, indent=2) + "\n", encoding="utf-8")
        run: |
          set -Eeuo pipefail
          mkdir -p deployment-evidence

          missing=()
          add_missing() {
            missing+=("$1")
          }

          [[ -n "${STAGING_HOST}" ]] || add_missing "STAGING_HOST"
          [[ -n "${STAGING_DEPLOY_ROOT}" ]] || add_missing "STAGING_DEPLOY_ROOT"
          [[ -n "${SSH_USER}" ]] || add_missing "STAGING_SSH_USER"
          [[ -n "${SSH_PRIVATE_KEY}" ]] || add_missing "STAGING_SSH_KEY"
          [[ -n "${SSH_KNOWN_HOSTS_CONTENT}" ]] || add_missing "STAGING_SSH_KNOWN_HOSTS"
          [[ -n "${APP_IMAGE_REF}" && "${APP_IMAGE_REF}" == *@sha256:* ]] || add_missing "APP_IMAGE_REF"
          [[ -n "${GOOSE_IMAGE_REF}" && "${GOOSE_IMAGE_REF}" == *@sha256:* ]] || add_missing "GOOSE_IMAGE_REF"
          [[ -n "${RELEASE_GATE_VERDICT}" && "${RELEASE_GATE_VERDICT}" == "pass" ]] || add_missing "RELEASE_GATE_VERDICT=pass"
          [[ "${REPO_RELEASE_VERDICT}" == "pass" ]] || add_missing "REPO_RELEASE_VERDICT=pass"
          [[ "${PROVENANCE_RELEASE_VERDICT}" == "pass" || "${PROVENANCE_RELEASE_VERDICT}" == "accepted-private-repo-no-github-attestations" ]] || add_missing "PROVENANCE_RELEASE_VERDICT in {pass, accepted-private-repo-no-github-attestations}"
          [[ "${PROVENANCE_VERDICT}" == "verified" || "${PROVENANCE_VERDICT}" == "accepted-private-repo-no-github-attestations" ]] || add_missing "PROVENANCE_VERDICT in {verified, accepted-private-repo-no-github-attestations}"
          [[ "${SSH_PORT}" =~ ^[0-9]+$ ]] || add_missing "STAGING_SSH_PORT"

          staging_remote_env_file="${STAGING_REMOTE_ENV_FILE:-${STAGING_DEPLOY_ROOT}/deployments/staging/.env.staging}"
          export STAGING_REMOTE_ENV_FILE_RESOLVED="${staging_remote_env_file}"
          printf '%s\n' "${missing[@]}" > deployment-evidence/staging-missing-prerequisites.txt

          printenv WF_STAGING_LOCAL_PREREQ_JSON | python3 -

          {
            echo "## Staging Deployment Contract"
            echo "- environment: \`staging\`"
            echo "- intended staging host: \`${STAGING_HOST:-missing}\`"
            echo "- intended deploy root: \`${STAGING_DEPLOY_ROOT:-missing}\`"
            echo "- app image: \`${APP_IMAGE_REF:-missing}\`"
            echo "- goose image: \`${GOOSE_IMAGE_REF:-missing}\`"
            echo "- security release gate artifact: verdict=\`${RELEASE_GATE_VERDICT:-missing}\`, mode=\`${RELEASE_GATE_MODE:-missing}\`, repo=\`${REPO_RELEASE_VERDICT:-missing}\`, workflow_run=\`${SECURITY_WORKFLOW_RUN_ID:-missing}\`"
            echo "- security verdict generated at (UTC): \`${SECURITY_VERDICT_GENERATED_AT_UTC:-missing}\`"
            echo "- security freshness policy: max-age=\`${SECURITY_VERDICT_MAX_AGE_HOURS:-missing}h\` / observed-age=\`${SECURITY_VERDICT_AGE_SECONDS:-missing}\`"
            echo "- image provenance verdict: \`${PROVENANCE_VERDICT:-missing}\`"
            if [[ "${PROVENANCE_VERDICT:-}" == "accepted-private-repo-no-github-attestations" ]]; then
              echo "- provenance note: \`GitHub Artifact Attestations are unavailable for this private repository, so staging relies on digest-pinned images plus the remaining security gate evidence\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "${#missing[@]}" -gt 0 ]]; then
            {
              echo "- result: \`blocked\`"
              echo "- deployment executed: \`false\`"
              echo "- outcome: \`staging deployment blocked before remote execution\`"
              echo "- missing prerequisites:"
              for item in "${missing[@]}"; do
                echo "  - \`${item}\`"
              done
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          {
            echo "staging_host=${STAGING_HOST}"
            echo "staging_deploy_root=${STAGING_DEPLOY_ROOT}"
            echo "staging_remote_env_file=${staging_remote_env_file}"
            echo "release_gate_mode=${RELEASE_GATE_MODE}"
            echo "release_gate_verdict=${RELEASE_GATE_VERDICT}"
            echo "repo_release_verdict=${REPO_RELEASE_VERDICT}"
            echo "security_verdict_age_seconds=${SECURITY_VERDICT_AGE_SECONDS}"
            echo "security_verdict_generated_at_utc=${SECURITY_VERDICT_GENERATED_AT_UTC}"
            echo "security_verdict_max_age_hours=${SECURITY_VERDICT_MAX_AGE_HOURS}"
            echo "security_workflow_run_id=${SECURITY_WORKFLOW_RUN_ID}"
            echo "ssh_port=${SSH_PORT}"
            echo "ssh_user=${SSH_USER}"
          } >> "${GITHUB_OUTPUT}"

      - name: Start staging SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY || secrets.STAGING_SSH_PRIVATE_KEY || secrets.PREPROD_SSH_KEY || secrets.PREPROD_SSH_PRIVATE_KEY }}

      - name: Install pinned staging SSH trust
        shell: bash
        env:
          SSH_KNOWN_HOSTS_CONTENT: ${{ secrets.STAGING_SSH_KNOWN_HOSTS || secrets.PREPROD_SSH_KNOWN_HOSTS || vars.STAGING_SSH_KNOWN_HOSTS || vars.PREPROD_SSH_KNOWN_HOSTS }}
        run: |
          set -Eeuo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${SSH_KNOWN_HOSTS_CONTENT}" > ~/.ssh/known_hosts
          {
            echo 'Host *'
            echo '  BatchMode yes'
            echo '  IdentitiesOnly yes'
            echo '  StrictHostKeyChecking yes'
            echo '  UserKnownHostsFile ~/.ssh/known_hosts'
            echo '  GlobalKnownHostsFile ~/.ssh/known_hosts'
          } > ~/.ssh/config
          chmod 600 ~/.ssh/config ~/.ssh/known_hosts
          {
            echo "SSH_OPTS=-o BatchMode=yes -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=${HOME}/.ssh/known_hosts -o GlobalKnownHostsFile=${HOME}/.ssh/known_hosts"
          } >> "$GITHUB_ENV"

      - name: Validate pinned staging host identity and remote contract
        shell: bash
        env:
          WF_STAGING_REMOTE_PREREQ_JSON: |
            import json
            from pathlib import Path

            path = Path("deployment-evidence/staging-prerequisites.json")
            payload = json.loads(path.read_text(encoding="utf-8"))
            issues = [line.strip() for line in Path("deployment-evidence/staging-remote-prerequisites.txt").read_text(encoding="utf-8").splitlines() if line.strip()]
            payload["remote_validation_issues"] = issues
            payload["control_status"] = "blocked" if issues else "ready-for-deployment"
            payload["verdict"] = "blocked" if issues else "ready"
            payload["result"] = "blocked-remote-prerequisites" if issues else "ready-for-real-staging-deploy"
            payload["summary_of_what_happened"] = (
                "staging deployment was blocked before remote execution because remote environment validation failed"
                if issues
                else "staging deployment prerequisites passed; the workflow may proceed to a real remote deployment"
            )
            path.write_text(json.dumps(payload, indent=2) + "\n", encoding="utf-8")
          SSH_PORT: ${{ steps.contract.outputs.ssh_port }}
          SSH_USER: ${{ steps.contract.outputs.ssh_user }}
          STAGING_DEPLOY_ROOT: ${{ steps.contract.outputs.staging_deploy_root }}
          STAGING_HOST: ${{ steps.contract.outputs.staging_host }}
          STAGING_REMOTE_ENV_FILE: ${{ steps.contract.outputs.staging_remote_env_file }}
        run: |
          set -Eeuo pipefail

          issues=()
          add_issue() {
            issues+=("$1")
          }

          if ! ssh-keygen -F "${STAGING_HOST}" -f "${HOME}/.ssh/known_hosts" >/dev/null && ! ssh-keygen -F "[${STAGING_HOST}]:${SSH_PORT}" -f "${HOME}/.ssh/known_hosts" >/dev/null; then
            add_issue "known_hosts does not contain a pinned identity for ${STAGING_HOST}:${SSH_PORT}"
          fi

          python3 -c "import socket,sys; socket.getaddrinfo(sys.argv[1], None)" "${STAGING_HOST}" || add_issue "staging host DNS resolution failed"
          python3 -c "import socket,sys; s=socket.create_connection((sys.argv[1], int(sys.argv[2])), timeout=10); s.close()" "${STAGING_HOST}" "${SSH_PORT}" || add_issue "staging host TCP reachability failed"

          target="${SSH_USER}@${STAGING_HOST}"
          read -r -a ssh_opts <<< "${SSH_OPTS}"
          if ! ssh "${ssh_opts[@]}" -p "${SSH_PORT}" "${target}" "test -f '${STAGING_REMOTE_ENV_FILE}'"; then
            add_issue "remote staging env file is missing at ${STAGING_REMOTE_ENV_FILE}"
          fi
          if ! ssh "${ssh_opts[@]}" -p "${SSH_PORT}" "${target}" "docker info >/dev/null 2>&1"; then
            add_issue "docker daemon is not reachable on the staging host"
          fi
          if ! ssh "${ssh_opts[@]}" -p "${SSH_PORT}" "${target}" "docker compose version >/dev/null 2>&1"; then
            add_issue "docker compose is not available on the staging host"
          fi
          if ssh "${ssh_opts[@]}" -p "${SSH_PORT}" "${target}" "grep -Eq '^[A-Z0-9_]+=.*(CHANGE_ME|REPLACE_ME|example\\.com|example\\.invalid|placeholder)' '${STAGING_REMOTE_ENV_FILE}'"; then
            add_issue "remote staging env file still contains placeholder values"
          fi

          printf '%s\n' "${issues[@]}" > deployment-evidence/staging-remote-prerequisites.txt
          printenv WF_STAGING_REMOTE_PREREQ_JSON | python3 -

          if [[ "${#issues[@]}" -gt 0 ]]; then
            {
              echo "- result: \`blocked\`"
              echo "- deployment executed: \`false\`"
              echo "- outcome: \`staging deployment blocked before remote execution\`"
              echo "- remote prerequisite issues:"
              for item in "${issues[@]}"; do
                echo "  - ${item}"
              done
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          {
            echo "- result: \`ready-for-real-staging-deploy\`"
            echo "- deployment executed: \`false\`"
            echo "- outcome: \`staging deployment contract passed; remote deploy not started in this job yet\`"
            echo "- remote env file: \`${STAGING_REMOTE_ENV_FILE}\`"
            echo "- remote docker/compose contract: \`validated\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload staging deployment contract report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-deployment-contract-report
          path: deployment-evidence/staging-prerequisites.json
          if-no-files-found: error
          retention-days: 14

  deploy-staging:
    name: Execute Staging Deployment
    if: |
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.name == 'Security Release' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'develop' &&
      needs.resolve-staging-candidate.outputs.staging_verdict == 'pass' &&
      vars.ENABLE_REAL_STAGING_DEPLOY == 'true'
    runs-on: ubuntu-latest
    needs:
      - resolve-staging-candidate
      - resolve-image-refs
      - validate-staging-prerequisites
    environment: staging
    env:
      APP_IMAGE_REF: ${{ needs.resolve-image-refs.outputs.app_image_ref }}
      GOOSE_IMAGE_REF: ${{ needs.resolve-image-refs.outputs.goose_image_ref }}
      PROVENANCE_VERDICT: ${{ needs.resolve-image-refs.outputs.provenance_verdict }}
      RELEASE_GATE_MODE: ${{ needs.validate-staging-prerequisites.outputs.release_gate_mode }}
      RELEASE_GATE_VERDICT: ${{ needs.validate-staging-prerequisites.outputs.release_gate_verdict }}
      REPO_RELEASE_VERDICT: ${{ needs.validate-staging-prerequisites.outputs.repo_release_verdict }}
      SECURITY_VERDICT_AGE_SECONDS: ${{ needs.validate-staging-prerequisites.outputs.security_verdict_age_seconds }}
      SECURITY_VERDICT_GENERATED_AT_UTC: ${{ needs.validate-staging-prerequisites.outputs.security_verdict_generated_at_utc }}
      SECURITY_VERDICT_MAX_AGE_HOURS: ${{ needs.validate-staging-prerequisites.outputs.security_verdict_max_age_hours }}
      SECURITY_WORKFLOW_RUN_ID: ${{ needs.validate-staging-prerequisites.outputs.security_workflow_run_id }}
      SOURCE_COMMIT_SHA: ${{ needs.resolve-staging-candidate.outputs.source_commit_sha }}
      STAGING_DEPLOY_ROOT: ${{ needs.validate-staging-prerequisites.outputs.staging_deploy_root }}
      STAGING_HOST: ${{ needs.validate-staging-prerequisites.outputs.staging_host }}
      STAGING_REMOTE_ENV_FILE: ${{ needs.validate-staging-prerequisites.outputs.staging_remote_env_file }}
      SSH_PORT: ${{ needs.validate-staging-prerequisites.outputs.ssh_port }}
      SSH_USER: ${{ needs.validate-staging-prerequisites.outputs.ssh_user }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-staging-candidate.outputs.source_commit_sha }}

      - name: Start staging SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY || secrets.STAGING_SSH_PRIVATE_KEY || secrets.PREPROD_SSH_KEY || secrets.PREPROD_SSH_PRIVATE_KEY }}

      - name: Install pinned staging SSH trust
        shell: bash
        env:
          SSH_KNOWN_HOSTS_CONTENT: ${{ secrets.STAGING_SSH_KNOWN_HOSTS || secrets.PREPROD_SSH_KNOWN_HOSTS || vars.STAGING_SSH_KNOWN_HOSTS || vars.PREPROD_SSH_KNOWN_HOSTS }}
        run: |
          set -Eeuo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${SSH_KNOWN_HOSTS_CONTENT}" > ~/.ssh/known_hosts
          {
            echo 'Host *'
            echo '  BatchMode yes'
            echo '  IdentitiesOnly yes'
            echo '  StrictHostKeyChecking yes'
            echo '  UserKnownHostsFile ~/.ssh/known_hosts'
            echo '  GlobalKnownHostsFile ~/.ssh/known_hosts'
          } > ~/.ssh/config
          chmod 600 ~/.ssh/config ~/.ssh/known_hosts
          {
            echo "SSH_OPTS=-o BatchMode=yes -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=${HOME}/.ssh/known_hosts -o GlobalKnownHostsFile=${HOME}/.ssh/known_hosts"
          } >> "$GITHUB_ENV"

      - name: Sync staging deployment assets
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p deployment-evidence
          target="${SSH_USER}@${STAGING_HOST}"
          read -r -a ssh_opts <<< "${SSH_OPTS}"
          ssh "${ssh_opts[@]}" -p "${SSH_PORT}" "${target}" "mkdir -p '${STAGING_DEPLOY_ROOT}/deployments/prod' '${STAGING_DEPLOY_ROOT}/deployments/staging' '${STAGING_DEPLOY_ROOT}/migrations'"
          tar -cf - deployments/staging deployments/prod/shared migrations | \
            ssh "${ssh_opts[@]}" -p "${SSH_PORT}" "${target}" "tar -xf - -C '${STAGING_DEPLOY_ROOT}'"

      - name: Deploy staging stack on configured host
        id: deploy
        shell: bash
        run: |
          set -Eeuo pipefail
          target="${SSH_USER}@${STAGING_HOST}"
          read -r -a ssh_opts <<< "${SSH_OPTS}"
          ssh "${ssh_opts[@]}" -p "${SSH_PORT}" "${target}" \
            "cd '${STAGING_DEPLOY_ROOT}/deployments/staging' && APP_IMAGE_REF='${APP_IMAGE_REF}' GOOSE_IMAGE_REF='${GOOSE_IMAGE_REF}' SKIP_SMOKE='1' bash 'scripts/deploy_staging.sh'"

      - name: Verify staging health
        id: healthcheck
        shell: bash
        run: |
          set -Eeuo pipefail
          target="${SSH_USER}@${STAGING_HOST}"
          read -r -a ssh_opts <<< "${SSH_OPTS}"
          ssh "${ssh_opts[@]}" -p "${SSH_PORT}" "${target}" \
            "cd '${STAGING_DEPLOY_ROOT}/deployments/staging' && bash 'scripts/healthcheck_staging.sh'"

      - name: Run staging smoke checks
        id: smoke
        shell: bash
        run: |
          set -Eeuo pipefail
          target="${SSH_USER}@${STAGING_HOST}"
          read -r -a ssh_opts <<< "${SSH_OPTS}"
          ssh "${ssh_opts[@]}" -p "${SSH_PORT}" "${target}" \
            "cd '${STAGING_DEPLOY_ROOT}/deployments/staging' && bash 'scripts/smoke_staging.sh'"

      - name: Write staging deployment verdict
        if: always()
        shell: bash
        env:
          ACTOR: ${{ github.actor }}
          DEPLOY_ATTEMPTED: ${{ steps.deploy.outcome != 'skipped' }}
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome || 'skipped' }}
          FINAL_RESULT: ${{ job.status }}
          HEALTHCHECK_OUTCOME: ${{ steps.healthcheck.outcome || 'skipped' }}
          SMOKE_OUTCOME: ${{ steps.smoke.outcome || 'skipped' }}
          MANIFEST_STAGING_BUILD_RUN: ${{ needs.resolve-staging-candidate.outputs.workflow_run_id }}
          WF_STAGING_VERDICT_JSON: |
            import json
            import os
            from pathlib import Path

            def s(k, d=""):
                return os.environ.get(k, d)

            deploy_attempted = s("DEPLOY_ATTEMPTED", "false").lower() == "true"
            deploy_outcome = s("DEPLOY_OUTCOME", "skipped")
            actual_done = deploy_outcome == "success"
            payload = {
                "environment": "staging",
                "workflow_intent": "real-staging-deploy",
                "actual_deploy_attempted": deploy_attempted,
                "actual_deploy_completed": actual_done,
                "verdict": s("STAGING_VERDICT_JSON_VERDICT"),
                "control_status": s("STAGING_VERDICT_CONTROL_STATUS"),
                "summary_of_what_happened": s("STAGING_VERDICT_JSON_SUMMARY"),
                "result": s("FINAL_RESULT"),
                "completed_at_utc": s("STAGING_VERDICT_COMPLETED_AT"),
                "source_commit_sha": s("SOURCE_COMMIT_SHA"),
                "source_branch": "develop",
                "trigger": "workflow_run",
                "actor": s("ACTOR"),
                "build_run_id": s("MANIFEST_STAGING_BUILD_RUN"),
                "app_image_ref": s("APP_IMAGE_REF"),
                "goose_image_ref": s("GOOSE_IMAGE_REF"),
                "release_gate_mode": s("RELEASE_GATE_MODE"),
                "release_gate_verdict": s("RELEASE_GATE_VERDICT"),
                "repo_release_verdict": s("REPO_RELEASE_VERDICT"),
                "security_verdict_age_seconds": s("SECURITY_VERDICT_AGE_SECONDS"),
                "security_workflow_run_id": s("SECURITY_WORKFLOW_RUN_ID"),
                "security_verdict_generated_at_utc": s("SECURITY_VERDICT_GENERATED_AT_UTC"),
                "security_verdict_max_age_hours": s("SECURITY_VERDICT_MAX_AGE_HOURS"),
                "provenance_verdict": s("PROVENANCE_VERDICT"),
                "staging_host": s("STAGING_HOST"),
                "staging_deploy_root": s("STAGING_DEPLOY_ROOT"),
                "staging_remote_env_file": s("STAGING_REMOTE_ENV_FILE"),
                "deploy_outcome": s("DEPLOY_OUTCOME"),
                "healthcheck_outcome": s("HEALTHCHECK_OUTCOME"),
                "smoke_outcome": s("SMOKE_OUTCOME"),
                "run_url": s("STAGING_VERDICT_RUN_URL"),
            }
            Path("deployment-evidence").mkdir(parents=True, exist_ok=True)
            Path("deployment-evidence/staging-deployment-verdict.json").write_text(
                json.dumps(payload, indent=2) + "\n", encoding="utf-8"
            )
        run: |
          set -Eeuo pipefail
          mkdir -p deployment-evidence
          completed_at_utc="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          if [[ "${DEPLOY_ATTEMPTED}" == "true" && "${FINAL_RESULT}" == "success" ]]; then
            staging_verdict="pass"
            staging_summary="staging deployment executed and passed health/smoke verification"
          elif [[ "${DEPLOY_ATTEMPTED}" == "true" ]]; then
            staging_verdict="fail"
            staging_summary="staging deployment started but did not complete successfully"
          else
            staging_verdict="blocked"
            staging_summary="staging deployment never reached the remote deploy step in this job"
          fi
          control_status="unmet"
          [[ "${FINAL_RESULT}" == "success" ]] && control_status="met"
          export STAGING_VERDICT_JSON_VERDICT="${staging_verdict}"
          export STAGING_VERDICT_JSON_SUMMARY="${staging_summary}"
          export STAGING_VERDICT_CONTROL_STATUS="${control_status}"
          export STAGING_VERDICT_COMPLETED_AT="${completed_at_utc}"
          export STAGING_VERDICT_RUN_URL="${run_url}"
          printenv WF_STAGING_VERDICT_JSON | python3 -

          {
            echo "## Staging Deployment Result"
            echo "- environment: \`staging\`"
            echo "- actual deploy attempted: \`${DEPLOY_ATTEMPTED}\`"
            echo "- verdict: \`${staging_verdict}\`"
            echo "- build run id: \`${{ needs.resolve-staging-candidate.outputs.workflow_run_id }}\`"
            echo "- source commit SHA: \`${SOURCE_COMMIT_SHA}\`"
            echo "- staging host: \`${STAGING_HOST}\`"
            echo "- staging deploy root: \`${STAGING_DEPLOY_ROOT}\`"
            echo "- app image: \`${APP_IMAGE_REF}\`"
            echo "- goose image: \`${GOOSE_IMAGE_REF}\`"
            echo "- security release gate artifact: verdict=\`${RELEASE_GATE_VERDICT}\`, mode=\`${RELEASE_GATE_MODE}\`, repo=\`${REPO_RELEASE_VERDICT}\`, workflow_run=\`${SECURITY_WORKFLOW_RUN_ID:-n/a}\`"
            echo "- security verdict generated at (UTC): \`${SECURITY_VERDICT_GENERATED_AT_UTC:-n/a}\`"
            echo "- security freshness policy: max-age=\`${SECURITY_VERDICT_MAX_AGE_HOURS}h\` / observed-age=\`${SECURITY_VERDICT_AGE_SECONDS:-n/a}\`"
            echo "- image provenance verdict: \`${PROVENANCE_VERDICT}\`"
            if [[ "${PROVENANCE_VERDICT}" == "accepted-private-repo-no-github-attestations" ]]; then
              echo "- provenance note: \`GitHub Artifact Attestations are unavailable for this private repository, so this staging run used the explicit private-repo fallback\`"
            fi
            echo "- deploy outcome: \`${DEPLOY_OUTCOME}\`"
            echo "- healthcheck outcome: \`${HEALTHCHECK_OUTCOME}\`"
            echo "- smoke outcome: \`${SMOKE_OUTCOME}\`"
            echo "- final result: \`${FINAL_RESULT}\`"
            echo "- outcome: \`${staging_summary}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload staging deployment verdict
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-deployment-verdict
          path: deployment-evidence/staging-deployment-verdict.json
          if-no-files-found: error
          retention-days: 14
