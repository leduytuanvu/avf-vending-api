name: Deploy Production

# Primary topology: **two app VPS** (`app-node` rolling) plus optional **`data-node`** or **managed**
# Postgres/Redis/NATS/object storage/MQTT — not legacy single-host `docker-compose.prod.yml` as the enterprise path.
# Develop branch automation does **not** deploy here; staging/pre-prod is **deploy-develop.yml** (after Security Release on develop).
#
# Production policy: this workflow is manual-only. Trigger is on.workflow_dispatch (Operators → Actions
# → run workflow) on the main branch. There is no on.push, on.schedule, on.workflow_run, or other
# Release audit: production-release-audit-package (this workflow), release-audit-package (Build and Push),
# security-release-audit-package (Security Release) — see docs/operations/release-evidence-retention.md
# automatic start for production. Operators provide build_run_id, security_release_run_id, digest-pinned
# image refs, staging_evidence_id (run id of Staging Deployment Contract with artifact staging-deploy-evidence),
# and confirmation text per the inputs below. Staging is the default release gate: without allow_missing_staging_evidence
# + reason, the workflow downloads and validates that evidence against production image digests. Security Review /
# Environment protection is configured in the GitHub UI for environment: production; it is not represented as workflow code here.

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    # No other on.* triggers: merge to develop, Security Release completion, and scheduled jobs must not start this file.
    inputs:
      action_mode:
        description: "Production action to run"
        required: true
        default: deploy
        type: choice
        options:
          - deploy
          - rollback
      build_run_id:
        description: "Required for deploy mode: GitHub Actions run id from a successful 'Build and Push Images' run on main (must match security-verdict source_build_run_id)"
        required: false
        type: string
      security_release_run_id:
        description: "Required for deploy mode: run id of the successful Security Release whose security-verdict (passing gates, main) authorizes this production deploy"
        required: false
        type: string
      release_tag:
        description: "Operator label for this production action, for example v1.2.3 or rollback-2026-04-22"
        required: true
        type: string
      source_commit_sha:
        description: "Optional confirmation of the main commit SHA for the selected build run"
        required: false
        type: string
      app_image_ref:
        description: "Deploy mode: required digest-pinned app image (must match build artifacts). Not used in rollback."
        required: false
        type: string
      goose_image_ref:
        description: "Deploy mode: required digest-pinned goose image (must match build artifacts). Not used in rollback."
        required: false
        type: string
      rollback_app_image_ref:
        description: "Required for rollback mode: exact previous app image ref, pinned by digest (ghcr.io/...@sha256:...)"
        required: false
        type: string
      rollback_goose_image_ref:
        description: "Required for rollback mode: exact previous goose image ref, pinned by digest (ghcr.io/...@sha256:...)"
        required: false
        type: string
      deploy_data_node:
        description: "Also deploy the optional data-node fallback stack"
        required: false
        default: false
        type: boolean
      allow_app_node_on_data_node:
        description: "Allow app-node B to run on the same host as the data-node fallback stack"
        required: false
        default: false
        type: boolean
      deploy_production_confirmation:
        description: "Deploy mode: type exactly DEPLOY_PRODUCTION to confirm a production deploy"
        required: false
        default: ""
        type: string
      fleet_scale_target:
        description: "Fleet scale target — storm load-test evidence required for scale-* (see telemetry-production-rollout.md)"
        required: false
        default: pilot
        type: choice
        options:
          - pilot
          - scale-100
          - scale-500
          - scale-1000
      telemetry_storm_evidence_repo_path:
        description: "Optional: repo-relative path to telemetry-storm-result.json (use this or artifact run id for scale deploys)"
        required: false
        default: ""
        type: string
      telemetry_storm_evidence_artifact_run_id:
        description: "Optional: Actions run id containing artifact named telemetry-storm-result (zip must include telemetry-storm-result.json)"
        required: false
        default: ""
        type: string
      allow_scale_gate_bypass:
        description: "Bypass fleet-scale storm evidence gate (requires scale_gate_bypass_reason)"
        required: false
        default: false
        type: boolean
      scale_gate_bypass_reason:
        description: "Mandatory non-empty justification when allow_scale_gate_bypass is true (single-line)"
        required: false
        default: ""
        type: string
      storm_evidence_max_age_days:
        description: "Reject storm evidence when completed_at_utc is older than this many days (maps to STORM_EVIDENCE_MAX_AGE_DAYS)"
        required: false
        default: "7"
        type: string
      run_migration:
        description: "Whether to run the production database migration (goose Up) during this deploy. Default is image-only; do not enable without a confirmed backup."
        required: false
        default: false
        type: boolean
      backup_evidence_id:
        description: "When run_migration is true, required. Must be a GitHub Actions run id (digits only) whose workflow uploaded artifact 'production-db-backup-evidence' (file backup-evidence/backup-evidence.json), or path:RELATIVE/TO/backup-evidence.json in this repo. JSON must pass scripts/ci/validate_backup_evidence.py (docs/contracts/backup-evidence.schema.json). Optional and not validated when run_migration is false (informational if supplied)."
        required: false
        default: ""
        type: string
      staging_evidence_id:
        description: "For deploy: GitHub Actions run id (staging_evidence_run_id) of a successful 'Staging Deployment Contract' run that uploaded artifact 'staging-deploy-evidence' (path staging-evidence/staging-deploy-evidence.json). Required unless allow_missing_staging_evidence (temporary bypass, noisy)."
        required: false
        default: ""
        type: string
      staging_evidence_max_age_hours:
        description: "Reject staging deploy evidence when deployed_at_utc is older than this many hours (default 168 = 7 days)."
        required: false
        default: "168"
        type: string
      allow_missing_staging_evidence:
        description: "TEMPORARY: allow production deploy without staging evidence (use only while staging gate is not enforceable). Requires missing_staging_evidence_reason. Default false — production stays strict for enterprise readiness."
        required: false
        default: false
        type: boolean
      missing_staging_evidence_reason:
        description: "Mandatory non-empty, single-line justification when allow_missing_staging_evidence is true (echoed in summary and production manifest; remove bypass when staging is live)."
        required: false
        default: ""
        type: string
      enable_business_synthetic_smoke:
        description: "Optional: final public smoke also attempts business-safe-synthetic (GET to operator-configured SMOKE_SYNTHETIC_GET_PATH; never real payment or dispense). Skipped with reason if not configured; off by default."
        required: false
        default: false
        type: boolean

# Production actions stay serialized under one stable gate.
# Later runs queue behind the active rollout or rollback instead of canceling it.
concurrency:
  group: production-deployment
  cancel-in-progress: false

permissions:
  actions: read
  attestations: read
  contents: read
  id-token: write
  packages: read

jobs:
  resolve-build-run-id:
    if: github.ref == 'refs/heads/main'
    name: Validate Production Artifact Source
    runs-on: ubuntu-latest
    outputs:
      action_mode: ${{ steps.lookup.outputs.action_mode }}
      build_actor: ${{ steps.lookup.outputs.build_actor }}
      release_tag: ${{ steps.lookup.outputs.release_tag }}
      source_commit_sha: ${{ steps.lookup.outputs.source_commit_sha }}
      source_branch: ${{ steps.lookup.outputs.source_branch }}
      source_event: ${{ steps.lookup.outputs.source_event }}
      trigger_workflow_event: ${{ steps.lookup.outputs.trigger_workflow_event }}
      workflow_run_id: ${{ steps.lookup.outputs.workflow_run_id }}
      staging_release_gate: ${{ steps.lookup.outputs.staging_release_gate }}
      staging_evidence_workflow_run_id: ${{ steps.lookup.outputs.staging_evidence_workflow_run_id }}
      staging_evidence_bypassed: ${{ steps.lookup.outputs.staging_evidence_bypassed }}
      missing_staging_evidence_reason: ${{ steps.lookup.outputs.missing_staging_evidence_reason }}
      staging_digest_cross_check_note: ${{ steps.lookup.outputs.staging_digest_cross_check_note }}
    steps:
      - name: Validate production action inputs
        id: lookup
        shell: bash
        env:
          INPUT_ACTION_MODE: ${{ inputs.action_mode }}
          INPUT_BUILD_RUN_ID: ${{ inputs.build_run_id }}
          INPUT_SECURITY_RELEASE_RUN_ID: ${{ inputs.security_release_run_id }}
          INPUT_APP_IMAGE_REF: ${{ inputs.app_image_ref }}
          INPUT_GOOSE_IMAGE_REF: ${{ inputs.goose_image_ref }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          INPUT_SOURCE_COMMIT_SHA: ${{ inputs.source_commit_sha }}
          INPUT_DEPLOY_PRODUCTION_CONFIRMATION: ${{ inputs.deploy_production_confirmation }}
          INPUT_RUN_MIGRATION: ${{ inputs.run_migration && 'true' || 'false' }}
          INPUT_BACKUP_EVIDENCE_ID: ${{ inputs.backup_evidence_id || '' }}
          INPUT_STAGING_EVIDENCE_ID: ${{ inputs.staging_evidence_id || '' }}
          INPUT_STAGING_EVIDENCE_MAX_AGE_HOURS: ${{ inputs.staging_evidence_max_age_hours || '168' }}
          INPUT_ALLOW_MISSING_STAGING_EVIDENCE: ${{ inputs.allow_missing_staging_evidence && 'true' || 'false' }}
          INPUT_MISSING_STAGING_EVIDENCE_REASON: ${{ inputs.missing_staging_evidence_reason || '' }}
          GH_TOKEN: ${{ github.token }}
          ROLLBACK_APP_IMAGE_REF: ${{ inputs.rollback_app_image_ref }}
          ROLLBACK_GOOSE_IMAGE_REF: ${{ inputs.rollback_goose_image_ref }}
          WF_VALIDATE_DEPLOY_SECURITY_VERDICT: |
            import json
            import os
            import re
            import sys
            from pathlib import Path

            path = Path("security-verdict-bundle/security-verdict.json")
            payload = json.loads(path.read_text(encoding="utf-8"))
            sec_run = os.environ["SECURITY_RELEASE_RUN_ID"]
            expect_build = (os.environ.get("EXPECT_BUILD_ID") or "").strip()
            app_in = (os.environ.get("INPUT_APP_IMAGE_REF") or "").strip()
            goose_in = (os.environ.get("INPUT_GOOSE_IMAGE_REF") or "").strip()

            def need_digest(r, label):
                if not r or "@sha256:" not in r or not re.search(r"sha256:[0-9a-f]{64}", r):
                    print(f"error: {label} must be digest-pinned: {r!r}", file=sys.stderr)
                    sys.exit(1)

            if str(payload.get("workflow_run_id", "")) != str(sec_run):
                print("error: security-verdict workflow_run_id does not match the selected Security Release run", file=sys.stderr)
                sys.exit(1)
            if (payload.get("verdict") or "").lower() != "pass":
                print("error: security-verdict verdict must be pass for production", file=sys.stderr)
                sys.exit(1)
            secv = payload.get("security_verdict")
            if secv is not None and str(secv).lower() != "pass":
                print("error: security_verdict must be pass", file=sys.stderr)
                sys.exit(1)
            if (payload.get("release_gate_verdict") or "") != "pass":
                print("error: security-verdict release_gate_verdict must be pass for production", file=sys.stderr)
                sys.exit(1)
            if (payload.get("release_gate_mode") or "") != "full-security-release-gate":
                print("error: security-verdict release_gate_mode must be full-security-release-gate", file=sys.stderr)
                sys.exit(1)
            br = (payload.get("source_branch") or "").strip()
            if br != "main":
                print(f"error: source_branch in security-verdict must be main, got {br!r}", file=sys.stderr)
                sys.exit(1)
            bid = str(payload.get("source_build_run_id") or "").strip()
            if bid != expect_build:
                print(f"error: security-verdict source_build_run_id ({bid}) does not match build_run_id input ({expect_build})", file=sys.stderr)
                sys.exit(1)
            pub = payload.get("published_images") or {}
            if pub.get("app_image_ref", "").strip() != app_in:
                print("error: security-verdict app_image_ref does not match app_image_ref input", file=sys.stderr)
                sys.exit(1)
            if pub.get("goose_image_ref", "").strip() != goose_in:
                print("error: security-verdict goose_image_ref does not match goose_image_ref input", file=sys.stderr)
                sys.exit(1)
            need_digest(app_in, "app_image_ref")
            need_digest(goose_in, "goose_image_ref")
          WF_VALIDATE_STAGING_DEPLOY_EVIDENCE: |
            import json
            import os
            import re
            import sys
            from datetime import datetime, timezone
            from pathlib import Path

            p = Path(os.environ["STAGING_EVID_PATH"])
            if not p.is_file():
                print("error: staging deploy evidence file missing at", p, file=sys.stderr)
                sys.exit(1)
            payload = json.loads(p.read_text(encoding="utf-8"))

            def need_digest(r: str, label: str) -> str:
                m = re.search(r"@(sha256:[0-9a-f]{64})\s*$", (r or "").strip())
                if not m:
                    print(f"error: {label} is not digest-pinned: {r!r}", file=sys.stderr)
                    sys.exit(1)
                return m.group(1)

            if payload.get("schema_version") != "staging-deploy-evidence-v1":
                print("error: staging-evidence/staging-deploy-evidence.json schema_version must be staging-deploy-evidence-v1", file=sys.stderr)
                sys.exit(1)

            gh_repo = (os.environ.get("GITHUB_REPOSITORY") or "").strip()
            ev_repo = (payload.get("repository") or "").strip()
            if not ev_repo or ev_repo != gh_repo:
                print(
                    f"error: staging evidence repository must match this repository (expected {gh_repo!r}, got {ev_repo!r})",
                    file=sys.stderr,
                )
                sys.exit(1)

            env = (payload.get("environment") or "").strip()
            if env not in ("staging", "preprod"):
                print(
                    f"error: staging evidence environment must be staging or preprod (got {env!r})",
                    file=sys.stderr,
                )
                sys.exit(1)

            if not bool(payload.get("promotion_eligible")):
                rsn = (payload.get("reason") or payload.get("promotion_ineligible_reason") or "").strip()
                print(
                    "error: promotion_eligible must be true for production deploy "
                    f"(reason={rsn!r})",
                    file=sys.stderr,
                )
                sys.exit(1)

            mode = (payload.get("deployment_mode") or "").strip()
            if mode != "real_staging":
                print(
                    f"error: production requires deployment_mode=real_staging in staging-deploy-evidence (got {mode!r})",
                    file=sys.stderr,
                )
                sys.exit(1)

            if int(payload.get("host_count") or 0) < 1:
                print("error: staging host_count must be >= 1 in promotion-eligible evidence", file=sys.stderr)
                sys.exit(1)

            raw_dt = (payload.get("deployed_at_utc") or "").strip()
            if not raw_dt:
                print("error: deployed_at_utc is required in staging deploy evidence", file=sys.stderr)
                sys.exit(1)
            norm = raw_dt.replace("Z", "+00:00") if raw_dt.endswith("Z") else raw_dt
            try:
                dep_dt = datetime.fromisoformat(norm)
                if dep_dt.tzinfo is None:
                    dep_dt = dep_dt.replace(tzinfo=timezone.utc)
                now = datetime.now(timezone.utc)
                max_h = float(os.environ.get("INPUT_STAGING_EVIDENCE_MAX_AGE_HOURS", "168"))
                age_h = (now - dep_dt).total_seconds() / 3600.0
                if age_h > max_h:
                    print(
                        f"error: staging evidence too old: {age_h:.1f}h > max {max_h}h (deployed_at_utc={raw_dt!r})",
                        file=sys.stderr,
                    )
                    sys.exit(1)
                if age_h < -0.01:
                    print("error: deployed_at_utc is in the future", file=sys.stderr)
                    sys.exit(1)
            except Exception as e:
                print(f"error: could not parse deployed_at_utc: {e}", file=sys.stderr)
                sys.exit(1)

            if (payload.get("smoke_result") or "").strip() != "success":
                print("error: staging deploy evidence smoke_result must be success for production", file=sys.stderr)
                sys.exit(1)
            if (payload.get("readiness_result") or "").strip() != "success":
                print("error: staging deploy evidence readiness_result must be success for production", file=sys.stderr)
                sys.exit(1)

            app_in = (os.environ.get("INPUT_APP_IMAGE_REF") or "").strip()
            goose_in = (os.environ.get("INPUT_GOOSE_IMAGE_REF") or "").strip()
            d_app = need_digest(app_in, "operator app_image_ref")
            d_goose = need_digest(goose_in, "operator goose_image_ref")
            ev_d_app = (payload.get("app_digest") or "").strip()
            ev_d_goose = (payload.get("goose_digest") or "").strip()
            if not ev_d_app or not re.fullmatch(r"sha256:[0-9a-f]{64}", ev_d_app):
                ev_d_app = need_digest((payload.get("app_image_ref") or "").strip(), "staging app_image_ref in evidence")
            if not ev_d_goose or not re.fullmatch(r"sha256:[0-9a-f]{64}", ev_d_goose):
                ev_d_goose = need_digest((payload.get("goose_image_ref") or "").strip(), "staging goose_image_ref in evidence")
            if ev_d_app != d_app or ev_d_goose != d_goose:
                print("error: app/goose digests in staging evidence do not match production image inputs", file=sys.stderr)
                sys.exit(1)
        run: |
          set -Eeuo pipefail

          fail() {
            echo "error: $*" >&2
            exit 1
          }

          [[ "${GITHUB_REF_NAME}" == "main" ]] || {
            echo "error: production workflow_dispatch must be run from the main branch" >&2
            exit 1
          }

          ACTION_MODE_IN="${INPUT_ACTION_MODE}"
          RELEASE_TAG_IN="${INPUT_RELEASE_TAG}"
          ACTION_MODE="${ACTION_MODE_IN}"
          BUILD_RUN_ID="${INPUT_BUILD_RUN_ID:-}"
          RELEASE_TAG_COMPUTED="${RELEASE_TAG_IN}"

          [[ "${ACTION_MODE}" == "deploy" || "${ACTION_MODE}" == "rollback" ]] || fail "action_mode must be 'deploy' or 'rollback'"

          if [[ "${ACTION_MODE}" == "rollback" ]]; then
            {
              echo "action_mode=rollback"
              echo "release_tag=${RELEASE_TAG_COMPUTED}"
            } >> "${GITHUB_OUTPUT}"
            [[ -n "${ROLLBACK_APP_IMAGE_REF}" ]] || fail "rollback mode requires rollback_app_image_ref"
            [[ -n "${ROLLBACK_GOOSE_IMAGE_REF}" ]] || fail "rollback mode requires rollback_goose_image_ref"
            [[ "${ROLLBACK_APP_IMAGE_REF}" == *@sha256:* ]] || fail "rollback_app_image_ref must be digest-pinned (...@sha256:...)"
            [[ "${ROLLBACK_GOOSE_IMAGE_REF}" == *@sha256:* ]] || fail "rollback_goose_image_ref must be digest-pinned (...@sha256:...)"
            [[ "${ROLLBACK_APP_IMAGE_REF}" != *":latest" ]] || fail "rollback_app_image_ref must not use latest"
            [[ "${ROLLBACK_GOOSE_IMAGE_REF}" != *":latest" ]] || fail "rollback_goose_image_ref must not use latest"
            [[ -z "${BUILD_RUN_ID}" ]] || fail "build_run_id must be empty in rollback mode"
            [[ -z "${INPUT_APP_IMAGE_REF}" && -z "${INPUT_GOOSE_IMAGE_REF}" ]] || fail "app_image_ref and goose_image_ref confirmation inputs are not used in rollback mode"
            [[ -z "${INPUT_SOURCE_COMMIT_SHA}" ]] || fail "source_commit_sha confirmation is not used in rollback mode"
            [[ -z "${INPUT_SECURITY_RELEASE_RUN_ID}" ]] || fail "security_release_run_id is not used in rollback mode; use digest-pinned rollback refs only"
            [[ -z "${INPUT_DEPLOY_PRODUCTION_CONFIRMATION}" ]] || fail "deploy_production_confirmation is not used in rollback mode"
            {
              echo "build_actor="
              echo "source_commit_sha="
              echo "source_branch="
              echo "source_event="
              echo "trigger_workflow_event="
              echo "workflow_run_id="
              echo "staging_release_gate=skipped_rollback"
              echo "staging_evidence_workflow_run_id="
              echo "staging_evidence_bypassed=false"
              echo "missing_staging_evidence_reason="
              echo "staging_digest_cross_check_note="
            } >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [[ "${ACTION_MODE}" == "deploy" ]]; then
            [[ -n "${INPUT_SECURITY_RELEASE_RUN_ID}" ]] || fail "deploy mode requires security_release_run_id (successful Security Release run that produced the authorizing security-verdict)"
            [[ "${INPUT_SECURITY_RELEASE_RUN_ID}" =~ ^[0-9]+$ ]] || fail "security_release_run_id must be a numeric GitHub Actions run id"
            [[ "${INPUT_DEPLOY_PRODUCTION_CONFIRMATION}" == "DEPLOY_PRODUCTION" ]] || fail "manual deploy requires deploy_production_confirmation input to be exactly DEPLOY_PRODUCTION"
            [[ -n "${INPUT_APP_IMAGE_REF}" ]] || fail "manual deploy requires app_image_ref (digest-pinned ...@sha256:...)"
            [[ -n "${INPUT_GOOSE_IMAGE_REF}" ]] || fail "manual deploy requires goose_image_ref (digest-pinned ...@sha256:...)"
            [[ "${INPUT_APP_IMAGE_REF}" == *@sha256:* ]] || fail "manual deploy app_image_ref must be digest-pinned (...@sha256:...)"
            [[ "${INPUT_GOOSE_IMAGE_REF}" == *@sha256:* ]] || fail "manual deploy goose_image_ref must be digest-pinned (...@sha256:...)"
            [[ "${INPUT_APP_IMAGE_REF}" != *":latest"* ]] || fail "manual deploy app_image_ref must not use the latest tag"
            [[ "${INPUT_GOOSE_IMAGE_REF}" != *":latest"* ]] || fail "manual deploy goose_image_ref must not use the latest tag"
            if [[ "${INPUT_RUN_MIGRATION:-false}" == "true" ]]; then
              [[ -n "${INPUT_BACKUP_EVIDENCE_ID:-}" ]] || fail "backup_evidence_id is required when run_migration=true"
            fi
          fi

          if [[ "${ACTION_MODE}" == "deploy" ]]; then
            sec_meta="$(
              gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${INPUT_SECURITY_RELEASE_RUN_ID}" \
                --jq '[.name // "", .conclusion // "", .head_branch // ""] | @tsv'
            )" || true
            IFS=$'\t' read -r sec_name sec_conc sec_bra <<< "${sec_meta}"
            [[ "${sec_name}" == "Security Release" ]] || fail "security_release_run_id must reference a Security Release workflow (got: ${sec_name})"
            [[ "${sec_conc}" == "success" ]] || fail "Security Release run must be successful (conclusion=${sec_conc})"
            [[ "${sec_bra}" == "main" ]] || fail "Security Release run for production must be on head branch main (got: ${sec_bra})"
            [[ "${BUILD_RUN_ID}" =~ ^[0-9]+$ ]] || fail "build_run_id must be a numeric GitHub Actions run id in deploy mode"
            export SECURITY_RELEASE_RUN_ID="${INPUT_SECURITY_RELEASE_RUN_ID}"
            export EXPECT_BUILD_ID="${BUILD_RUN_ID}"
            rm -rf security-verdict-bundle
            mkdir -p security-verdict-bundle
            artifact_id=""
            artifact_list_attempt=1
            while [[ "${artifact_list_attempt}" -le 6 ]]; do
              artifact_id="$(
                gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${SECURITY_RELEASE_RUN_ID}/artifacts" \
                  --jq '[.artifacts[]? | select(.name == "security-verdict") | .id] | .[0] // empty'
              )" || true
              if [[ -n "${artifact_id}" ]]; then
                break
              fi
              if [[ "${artifact_list_attempt}" -lt 6 ]]; then
                sleep 8
              fi
              artifact_list_attempt=$((artifact_list_attempt + 1))
            done
            [[ -n "${artifact_id}" ]] || fail "no security-verdict artifact on Security Release run ${SECURITY_RELEASE_RUN_ID} (after bounded retries)"
            verdict_zip_attempt=1
            while [[ "${verdict_zip_attempt}" -le 5 ]]; do
              if gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts/${artifact_id}/zip" > security-verdict-bundle/security-verdict.zip; then
                break
              fi
              if [[ "${verdict_zip_attempt}" -lt 5 ]]; then
                sleep 6
              fi
              verdict_zip_attempt=$((verdict_zip_attempt + 1))
            done
            [[ -f security-verdict-bundle/security-verdict.zip ]] || fail "failed to download security-verdict.zip"
            python3 -m zipfile -e security-verdict-bundle/security-verdict.zip security-verdict-bundle
            [[ -f security-verdict-bundle/security-verdict.json ]] || fail "security-verdict.zip did not contain security-verdict.json"
            printenv WF_VALIDATE_DEPLOY_SECURITY_VERDICT | python3 -
          fi

          STAGING_RELEASE_GATE="not_set"
          STAGING_EVIDENCE_WORKFLOW_RUN_ID=""
          STAGING_EVIDENCE_BYPASSED="false"
          MISSING_STAGING_REASON_OUT=""
          STAGING_DIGEST_CROSS_CHECK_NOTE=""

          if [[ "${ACTION_MODE}" == "deploy" ]]; then
            allow_miss="${INPUT_ALLOW_MISSING_STAGING_EVIDENCE:-false}"
            stg_id="${INPUT_STAGING_EVIDENCE_ID:-}"
            stg_id="${stg_id//[[:space:]]/}"
            reason_in="${INPUT_MISSING_STAGING_EVIDENCE_REASON:-}"
            if [[ "${allow_miss}" == "true" ]]; then
              [[ -n "${reason_in//[[:space:]]/}" ]] || fail "missing_staging_evidence_reason is required when allow_missing_staging_evidence is true"
              STAGING_RELEASE_GATE="bypassed_explicit"
              STAGING_EVIDENCE_BYPASSED="true"
              MISSING_STAGING_REASON_OUT="${reason_in}"
              STAGING_DIGEST_CROSS_CHECK_NOTE="BYPASS: staging evidence not validated (allow_missing_staging_evidence)"
              echo "::warning::PRODUCTION STAGING GATE BYPASS (allow_missing_staging_evidence) — reason: ${reason_in}"
              if [[ -n "${stg_id}" ]]; then
                echo "::warning::staging_evidence_id (${stg_id}) was provided but is IGNORED when allow_missing_staging_evidence is true" >&2
              fi
            else
              [[ -n "${stg_id}" ]] || fail "deploy mode requires staging_evidence_id (run id of Staging Deployment Contract with artifact staging-deploy-evidence), or temporary allow_missing_staging_evidence + missing_staging_evidence_reason"
              stg_name="$(
                gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${stg_id}" \
                  --jq '.name // ""'
              )" || true
              [[ "${stg_name}" == "Staging Deployment Contract" ]] || fail "staging_evidence_id must reference workflow 'Staging Deployment Contract' (got: ${stg_name})"
              stg_status="$(
                gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${stg_id}" \
                  --jq '.status // ""'
              )" || true
              [[ "${stg_status}" == "completed" ]] || fail "staging evidence run must be completed (status=${stg_status})"
              stg_conc="$(
                gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${stg_id}" \
                  --jq '.conclusion // ""'
              )" || true
              [[ "${stg_conc}" == "success" ]] || fail "staging evidence run must be successful (conclusion=${stg_conc})"
              rm -rf staging-evidence-bundle
              mkdir -p staging-evidence-bundle
              st_artifact_id=""
              st_attempt=1
              while [[ "${st_attempt}" -le 6 ]]; do
                st_artifact_id="$(
                  gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${stg_id}/artifacts" \
                    --jq '[.artifacts[]? | select(.name == "staging-deploy-evidence") | .id] | .[0] // empty'
                )" || true
                if [[ -n "${st_artifact_id}" ]]; then
                  break
                fi
                if [[ "${st_attempt}" -lt 6 ]]; then
                  sleep 6
                fi
                st_attempt=$((st_attempt + 1))
              done
              [[ -n "${st_artifact_id}" ]] || fail "no artifact named staging-deploy-evidence on Staging run ${stg_id} (pre-prod gate evidence missing)"
              st_z=1
              while [[ "${st_z}" -le 5 ]]; do
                if gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts/${st_artifact_id}/zip" > staging-evidence-bundle/bundle.zip; then
                  break
                fi
                if [[ "${st_z}" -lt 5 ]]; then
                  sleep 6
                fi
                st_z=$((st_z + 1))
              done
              [[ -f staging-evidence-bundle/bundle.zip ]] || fail "failed to download staging-deploy-evidence zip"
              python3 -m zipfile -e staging-evidence-bundle/bundle.zip staging-evidence-bundle
              stg_path="$(
                find staging-evidence-bundle -name "staging-deploy-evidence.json" -print 2>/dev/null | head -1 || true
              )"
              [[ -n "${stg_path}" ]] || fail "staging-deploy-evidence archive did not contain staging-deploy-evidence.json"
              export STAGING_EVID_PATH="${stg_path}"
              export INPUT_STAGING_EVIDENCE_MAX_AGE_HOURS="${INPUT_STAGING_EVIDENCE_MAX_AGE_HOURS:-168}"
              printenv WF_VALIDATE_STAGING_DEPLOY_EVIDENCE | python3 -
              ev_b="$(
                STAGING_EVID_PATH="${stg_path}" python3 -c 'import json, os; p=os.environ["STAGING_EVID_PATH"]; d=json.load(open(p, encoding="utf-8")); print(d.get("build_run_id") or "")'
              )"
              if [[ -n "${ev_b}" && "${ev_b}" == "${BUILD_RUN_ID}" ]]; then
                STAGING_DIGEST_CROSS_CHECK_NOTE="staging evidence build_run_id matches production build_run_id; image digests matched"
              else
                STAGING_DIGEST_CROSS_CHECK_NOTE="staging build_run_id (${ev_b}) differs from production build_run_id (${BUILD_RUN_ID}) — image digests matched (typical: develop build vs main build for same release)"
              fi
              STAGING_RELEASE_GATE="validated"
              STAGING_EVIDENCE_WORKFLOW_RUN_ID="${stg_id}"
            fi
          fi

          [[ "${BUILD_RUN_ID}" =~ ^[0-9]+$ ]] || fail "build_run_id must be a numeric GitHub Actions run id in deploy mode"

          build_run="$(
            gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${BUILD_RUN_ID}" \
              --jq '[.name // "", .head_branch // "", .head_sha // "", .event // "", .status // "", .conclusion // "", .actor.login // ""] | @tsv'
          )"

          [[ -n "${build_run}" ]] || {
            echo "error: could not read workflow run ${BUILD_RUN_ID}" >&2
            exit 1
          }

          IFS=$'\t' read -r workflow_name source_branch source_commit_sha build_trigger_event run_status run_conclusion build_actor <<< "${build_run}"

          # build_trigger_event = Build workflow run's GitHub API `.event` (often workflow_run when CI-chained). Semantic promotion source_event comes from security-verdict.json + promotion-manifest (resolved in _reusable-deploy), not from this field.
          [[ "${workflow_name}" == "Build and Push Images" ]] || fail "build_run_id must reference a 'Build and Push Images' workflow run"
          [[ "${source_branch}" == "main" ]] || fail "build_run_id must come from the main branch"
          [[ "${build_trigger_event}" == "push" || "${build_trigger_event}" == "workflow_dispatch" || "${build_trigger_event}" == "workflow_run" ]] || fail "build_run_id must reference a Build workflow triggered by push, workflow_dispatch, or workflow_run (GitHub API event; semantic source_event is validated against security-verdict and promotion-manifest)"
          [[ "${run_status}" == "completed" ]] || fail "build_run_id must reference a completed build run"
          [[ "${run_conclusion}" == "success" ]] || fail "build_run_id must reference a successful build run"

          image_metadata_artifact_id="$(
            gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${BUILD_RUN_ID}/artifacts" \
              --jq '[.artifacts[]? | select(.name == "image-metadata") | .id] | .[0] // empty'
          )"
          promotion_manifest_artifact_id="$(
            gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${BUILD_RUN_ID}/artifacts" \
              --jq '[.artifacts[]? | select(.name == "promotion-manifest") | .id] | .[0] // empty'
          )"

          [[ -n "${image_metadata_artifact_id}" ]] || fail "selected build run is missing the image-metadata artifact"
          [[ -n "${promotion_manifest_artifact_id}" ]] || fail "selected build run is missing the promotion-manifest artifact"

          workflow_run_id="${BUILD_RUN_ID}"

          semantic_source_event=""
          if [[ "${ACTION_MODE}" == "deploy" ]]; then
            semantic_source_event="$(
              python3 -c 'import json; p=json.load(open("security-verdict-bundle/security-verdict.json",encoding="utf-8")); print((p.get("source_event") or "").strip())'
            )" || fail "could not read semantic source_event from security-verdict.json"
            [[ -n "${semantic_source_event}" ]] || fail "security-verdict.json missing semantic source_event (required for production alignment with promotion-manifest; do not use Build workflow_run wrapper event)"
            [[ "${semantic_source_event}" == "push" || "${semantic_source_event}" == "workflow_dispatch" ]] || fail "semantic source_event must be push or workflow_dispatch for production (got: ${semantic_source_event})"
          fi

          reason_one_line="$(
            printf '%s' "${MISSING_STAGING_REASON_OUT}" | tr '\n' ' ' | tr -d '\r'
          )"
          note_one_line="$(
            printf '%s' "${STAGING_DIGEST_CROSS_CHECK_NOTE}" | tr '\n' ' ' | tr -d '\r'
          )"
          {
            echo "action_mode=deploy"
            echo "release_tag=${RELEASE_TAG_COMPUTED}"
            echo "build_actor=${build_actor}"
            echo "workflow_run_id=${workflow_run_id}"
            echo "source_commit_sha=${source_commit_sha}"
            echo "source_branch=${source_branch}"
            echo "source_event=${semantic_source_event}"
            echo "trigger_workflow_event=${build_trigger_event}"
            echo "staging_release_gate=${STAGING_RELEASE_GATE}"
            echo "staging_evidence_workflow_run_id=${STAGING_EVIDENCE_WORKFLOW_RUN_ID}"
            echo "staging_evidence_bypassed=${STAGING_EVIDENCE_BYPASSED}"
            echo "missing_staging_evidence_reason=${reason_one_line}"
            echo "staging_digest_cross_check_note=${note_one_line}"
          } >> "${GITHUB_OUTPUT}"

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && "${ACTION_MODE}" == "deploy" ]]; then
            {
              echo "## Manual production deployment (workflow_dispatch)"
              echo "This run is an **operator-initiated manual deploy**, not an automatic Security Release candidate."
              echo "- confirmation: \`deploy_production_confirmation=DEPLOY_PRODUCTION\`"
              echo "- build run id: \`${workflow_run_id}\`"
              echo "- **staging / pre-prod gate**: \`${STAGING_RELEASE_GATE}\` (staging workflow run: \`${STAGING_EVIDENCE_WORKFLOW_RUN_ID:-n/a}\`)"
              if [[ "${STAGING_EVIDENCE_BYPASSED}" == "true" ]]; then
                echo "- **\`STAGING GATE BYPASS\`**: \`allow_missing_staging_evidence\` with reason: \`${MISSING_STAGING_REASON_OUT}\`"
              else
                echo "- staging digest / build id note: \`${STAGING_DIGEST_CROSS_CHECK_NOTE}\`"
              fi
              echo "- security release run: \`${INPUT_SECURITY_RELEASE_RUN_ID}\`"
              echo "- digest-pinned refs were supplied and must match artifact resolution in later jobs."
            } >> "${GITHUB_STEP_SUMMARY}"
          fi

  resolve-previous-production-deployment:
    if: github.ref == 'refs/heads/main'
    name: Resolve Previous Production Deployment
    runs-on: ubuntu-latest
    needs:
      - resolve-build-run-id
    outputs:
      previous_action_mode: ${{ steps.lookup.outputs.previous_action_mode }}
      previous_actor: ${{ steps.lookup.outputs.previous_actor }}
      previous_app_digest: ${{ steps.lookup.outputs.previous_app_digest }}
      previous_app_image_ref: ${{ steps.lookup.outputs.previous_app_image_ref }}
      previous_deployed_at_utc: ${{ steps.lookup.outputs.previous_deployed_at_utc }}
      previous_goose_digest: ${{ steps.lookup.outputs.previous_goose_digest }}
      previous_goose_image_ref: ${{ steps.lookup.outputs.previous_goose_image_ref }}
      previous_run_id: ${{ steps.lookup.outputs.previous_run_id }}
      previous_run_number: ${{ steps.lookup.outputs.previous_run_number }}
      previous_run_url: ${{ steps.lookup.outputs.previous_run_url }}
      previous_source_branch: ${{ steps.lookup.outputs.previous_source_branch }}
      previous_source_commit_sha: ${{ steps.lookup.outputs.previous_source_commit_sha }}
      rollback_available: ${{ steps.lookup.outputs.rollback_available }}
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Load previous successful production deployment metadata
        id: lookup
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail

          out="${RUNNER_TEMP}/resolve-previous-outputs.txt"
          emit() { printf '%s=%s\n' "$1" "$2" >> "${out}"; }

          write_empty_state() {
            : > "${out}"
            emit rollback_available false
            emit previous_action_mode ""
            emit previous_actor ""
            emit previous_app_digest ""
            emit previous_app_image_ref ""
            emit previous_deployed_at_utc ""
            emit previous_goose_digest ""
            emit previous_goose_image_ref ""
            emit previous_run_id ""
            emit previous_run_number ""
            emit previous_run_url ""
            emit previous_source_branch ""
            emit previous_source_commit_sha ""
          }

          finalize() {
            cp "${out}" "${GITHUB_OUTPUT}"
          }

          mapfile -t candidate_runs < <(
            gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/deploy-prod.yml/runs?event=workflow_dispatch&status=completed&per_page=30" \
              --jq '.workflow_runs[]? | select(.id != '"${GITHUB_RUN_ID}"' and .conclusion == "success" and ((.name // "") == "Deploy Production" or (.name // "") == "")) | (.id|tostring) + "\t" + (.run_number|tostring) + "\t" + (.html_url // "")' \
              || true
          )

          if [[ "${#candidate_runs[@]}" -eq 0 ]]; then
            write_empty_state
            {
              echo "### Previous production last-known-good"
              echo "- rollback_available: \`false\`"
              echo "- reason: \`no prior successful **Deploy Production** workflow_dispatch runs found\`"
            } >> "${GITHUB_STEP_SUMMARY}"
            finalize
            exit 0
          fi

          manifest_tmp="${RUNNER_TEMP}/prev-manifest-unpack"
          rm -rf "${manifest_tmp}"
          mkdir -p "${manifest_tmp}"

          found_manifest="false"
          for row in "${candidate_runs[@]}"; do
            IFS=$'\t' read -r previous_run_id previous_run_number previous_run_url <<< "${row}"
            [[ -n "${previous_run_id}" ]] || continue

            artifact_id="$(
              gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${previous_run_id}/artifacts" \
                --jq '[.artifacts[]? | select(.name == "production-deployment-manifest") | .id] | .[0] // empty'
            )"

            [[ -n "${artifact_id}" ]] || continue

            gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts/${artifact_id}/zip" > "${manifest_tmp}/manifest.zip"
            rm -rf "${manifest_tmp}/extracted"
            mkdir -p "${manifest_tmp}/extracted"
            python3 -m zipfile -e "${manifest_tmp}/manifest.zip" "${manifest_tmp}/extracted"
            manifest_json="$(find "${manifest_tmp}/extracted" -name 'production-deployment-manifest.json' -print | head -1 || true)"
            [[ -n "${manifest_json}" ]] || continue

            : > "${out}"
            emit previous_run_id "${previous_run_id}"
            emit previous_run_number "${previous_run_number}"
            emit previous_run_url "${previous_run_url}"
            python3 deployments/prod/shared/scripts/emit_previous_production_manifest_outputs.py "${manifest_json}" >> "${out}"

            found_manifest="true"
            rb="$(
              grep '^rollback_available=' "${out}" | tail -n1 | cut -d= -f2- || true
            )"
            prev_app="$(
              grep '^previous_app_image_ref=' "${out}" | tail -n1 | cut -d= -f2- || true
            )"
            prev_goose="$(
              grep '^previous_goose_image_ref=' "${out}" | tail -n1 | cut -d= -f2- || true
            )"
            {
              echo "### Previous production last-known-good"
              echo "- rollback_available: \`${rb:-false}\`"
              echo "- resolved from workflow run: [#${previous_run_number}](${previous_run_url})"
              echo "- manual **rollback** workflow_dispatch — copy exactly (digest-pinned):"
              echo '```'
              echo "rollback_app_image_ref: ${prev_app}"
              echo "rollback_goose_image_ref: ${prev_goose}"
              echo '```'
            } >> "${GITHUB_STEP_SUMMARY}"
            break
          done

          if [[ "${found_manifest}" != "true" ]]; then
            write_empty_state
            {
              echo "### Previous production last-known-good"
              echo "- rollback_available: \`false\`"
              echo "- reason: \`no **production-deployment-manifest** artifact found on recent successful runs (expired retention, or run predates manifest uploads)\`"
              echo "- hint: \`restore digest-pinned APP_IMAGE_REF and GOOSE_IMAGE_REF from your external release registry or an archived manifest; automatic rollback after a failed deploy requires this artifact\`"
            } >> "${GITHUB_STEP_SUMMARY}"
          fi

          finalize

  resolve-image-refs:
    if: github.ref == 'refs/heads/main'
    name: Resolve Production Image Refs
    uses: ./.github/workflows/_reusable-deploy.yml
    needs: resolve-build-run-id
    with:
      # _reusable-deploy "workflow_run" mode: load immutable refs from the operator-selected build run id (artifacts via gh API). Not a GitHub on.workflow_run trigger.
      resolution_mode: ${{ needs.resolve-build-run-id.outputs.action_mode == 'rollback' && 'manual' || 'workflow_run' }}
      target_environment: production
      workflow_run_id: ${{ needs.resolve-build-run-id.outputs.workflow_run_id }}
      app_image_ref: ${{ needs.resolve-build-run-id.outputs.action_mode == 'rollback' && inputs.rollback_app_image_ref || '' }}
      goose_image_ref: ${{ needs.resolve-build-run-id.outputs.action_mode == 'rollback' && inputs.rollback_goose_image_ref || '' }}
    secrets:
      gh_api_token: ${{ secrets.GITHUB_TOKEN }}

  validate-promotion-selection:
    if: github.ref == 'refs/heads/main'
    name: Validate Production Promotion Selection
    runs-on: ubuntu-latest
    needs:
      - resolve-build-run-id
      - resolve-image-refs
    outputs:
      app_digest: ${{ steps.validate.outputs.app_digest }}
      goose_digest: ${{ steps.validate.outputs.goose_digest }}
    steps:
      - name: Validate selected immutable artifact
        id: validate
        shell: bash
        env:
          ACTION_MODE: ${{ needs.resolve-build-run-id.outputs.action_mode }}
          EXPECTED_SOURCE_BRANCH: ${{ needs.resolve-build-run-id.outputs.source_branch }}
          EXPECTED_SOURCE_COMMIT_SHA: ${{ needs.resolve-build-run-id.outputs.source_commit_sha }}
          INPUT_APP_IMAGE_REF: ${{ inputs.app_image_ref }}
          INPUT_GOOSE_IMAGE_REF: ${{ inputs.goose_image_ref }}
          INPUT_SOURCE_COMMIT_SHA: ${{ inputs.source_commit_sha }}
          INPUT_ROLLBACK_APP_IMAGE_REF: ${{ inputs.rollback_app_image_ref }}
          INPUT_ROLLBACK_GOOSE_IMAGE_REF: ${{ inputs.rollback_goose_image_ref }}
          RESOLVED_APP_IMAGE_REF: ${{ needs.resolve-image-refs.outputs.app_image_ref }}
          RESOLVED_GOOSE_IMAGE_REF: ${{ needs.resolve-image-refs.outputs.goose_image_ref }}
        run: |
          set -Eeuo pipefail

          fail() {
            echo "error: $*" >&2
            exit 1
          }

          [[ -n "${RESOLVED_APP_IMAGE_REF}" ]] || fail "resolved app image ref is empty"
          [[ -n "${RESOLVED_GOOSE_IMAGE_REF}" ]] || fail "resolved goose image ref is empty"
          [[ "${RESOLVED_APP_IMAGE_REF}" == *@sha256:* ]] || fail "resolved app image ref must be digest-pinned"
          [[ "${RESOLVED_GOOSE_IMAGE_REF}" == *@sha256:* ]] || fail "resolved goose image ref must be digest-pinned"
          [[ "${RESOLVED_APP_IMAGE_REF}" != *":latest" ]] || fail "resolved app image ref must not use latest"
          [[ "${RESOLVED_GOOSE_IMAGE_REF}" != *":latest" ]] || fail "resolved goose image ref must not use latest"

          app_digest="${RESOLVED_APP_IMAGE_REF##*@}"
          goose_digest="${RESOLVED_GOOSE_IMAGE_REF##*@}"
          [[ "${app_digest}" == sha256:* ]] || fail "resolved app digest is malformed"
          [[ "${goose_digest}" == sha256:* ]] || fail "resolved goose digest is malformed"

          if [[ "${ACTION_MODE}" == "deploy" ]]; then
            [[ "${EXPECTED_SOURCE_BRANCH}" == "main" ]] || fail "selected build run must resolve to the main branch"
          fi

          if [[ "${ACTION_MODE}" == "deploy" && -n "${INPUT_APP_IMAGE_REF}" ]]; then
            [[ "${INPUT_APP_IMAGE_REF}" == *@sha256:* ]] || fail "app_image_ref input must be digest-pinned"
            [[ "${INPUT_APP_IMAGE_REF}" == "${RESOLVED_APP_IMAGE_REF}" ]] || fail "app_image_ref input does not match the selected build artifact"
          fi

          if [[ "${ACTION_MODE}" == "deploy" && -n "${INPUT_GOOSE_IMAGE_REF}" ]]; then
            [[ "${INPUT_GOOSE_IMAGE_REF}" == *@sha256:* ]] || fail "goose_image_ref input must be digest-pinned"
            [[ "${INPUT_GOOSE_IMAGE_REF}" == "${RESOLVED_GOOSE_IMAGE_REF}" ]] || fail "goose_image_ref input does not match the selected build artifact"
          fi

          if [[ "${ACTION_MODE}" == "deploy" && -n "${INPUT_SOURCE_COMMIT_SHA}" && "${INPUT_SOURCE_COMMIT_SHA}" != "${EXPECTED_SOURCE_COMMIT_SHA}" ]]; then
            fail "source_commit_sha input does not match the selected build run"
          fi

          if [[ "${ACTION_MODE}" == "rollback" ]]; then
            [[ -n "${INPUT_ROLLBACK_APP_IMAGE_REF}" ]] || fail "rollback mode requires rollback_app_image_ref"
            [[ -n "${INPUT_ROLLBACK_GOOSE_IMAGE_REF}" ]] || fail "rollback mode requires rollback_goose_image_ref"
            [[ "${INPUT_ROLLBACK_APP_IMAGE_REF}" == "${RESOLVED_APP_IMAGE_REF}" ]] || fail "rollback_app_image_ref does not match the resolved rollback target"
            [[ "${INPUT_ROLLBACK_GOOSE_IMAGE_REF}" == "${RESOLVED_GOOSE_IMAGE_REF}" ]] || fail "rollback_goose_image_ref does not match the resolved rollback target"
          fi

          echo "app_digest=${app_digest}" >> "${GITHUB_OUTPUT}"
          echo "goose_digest=${goose_digest}" >> "${GITHUB_OUTPUT}"

  validate-production-action-safety:
    if: github.ref == 'refs/heads/main'
    name: Validate Production Action Safety
    runs-on: ubuntu-latest
    needs:
      - resolve-build-run-id
      - resolve-previous-production-deployment
      - validate-promotion-selection
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Reject obvious duplicate production action
        shell: bash
        env:
          ACTION_MODE: ${{ needs.resolve-build-run-id.outputs.action_mode }}
          ROLLBACK_AVAILABLE: ${{ needs.resolve-previous-production-deployment.outputs.rollback_available }}
          PREVIOUS_APP_DIGEST: ${{ needs.resolve-previous-production-deployment.outputs.previous_app_digest }}
          PREVIOUS_GOOSE_DIGEST: ${{ needs.resolve-previous-production-deployment.outputs.previous_goose_digest }}
          PREVIOUS_RUN_URL: ${{ needs.resolve-previous-production-deployment.outputs.previous_run_url }}
          PREVIOUS_RUN_NUMBER: ${{ needs.resolve-previous-production-deployment.outputs.previous_run_number }}
          TARGET_APP_DIGEST: ${{ needs.validate-promotion-selection.outputs.app_digest }}
          TARGET_GOOSE_DIGEST: ${{ needs.validate-promotion-selection.outputs.goose_digest }}
        run: |
          set -Eeuo pipefail

          fail() {
            echo "error: $*" >&2
            exit 1
          }

          {
            echo "### Production Action Safety"
            echo "- concurrency: one production run at a time; later runs queue and do not cancel an active rollout"
            echo "- action mode: \`${ACTION_MODE}\`"
            echo "- automatic rollback after a failed deploy: refs available = \`${ROLLBACK_AVAILABLE:-false}\`"
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "${ACTION_MODE}" == "deploy" && "${ROLLBACK_AVAILABLE:-false}" != "true" ]]; then
            {
              echo "- rollback readiness: \`warn — no digest-pinned last-known-good image pair was resolved from a prior successful production run\`"
              echo "- impact: \`if this deploy mutates live nodes and then fails, automatic rollback cannot repin containers to the prior release\`"
              echo "- mitigation: \`archive production-deployment-manifest artifacts externally, or complete one clean production deploy to publish a new manifest\`"
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::warning:: rollback_available=false — failed deploys cannot auto-revert without a prior production-deployment-manifest; see job summary"
          fi

          if [[ -z "${PREVIOUS_APP_DIGEST}" || -z "${PREVIOUS_GOOSE_DIGEST}" ]]; then
            echo "- duplicate check: no previous successful production manifest found" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # Compare targets to last successful production; equality means redeploy/rollback to same digests (intentional duplicate guard).
          target_matches_previous_app="false"
          if [[ -n "${TARGET_APP_DIGEST}" && -n "${PREVIOUS_APP_DIGEST}" && "${TARGET_APP_DIGEST}" == "${PREVIOUS_APP_DIGEST}" ]]; then
            target_matches_previous_app="true"
          fi
          target_matches_previous_goose="false"
          if [[ -n "${TARGET_GOOSE_DIGEST}" && -n "${PREVIOUS_GOOSE_DIGEST}" && "${TARGET_GOOSE_DIGEST}" == "${PREVIOUS_GOOSE_DIGEST}" ]]; then
            target_matches_previous_goose="true"
          fi
          if [[ "${target_matches_previous_app}" == "true" && "${target_matches_previous_goose}" == "true" ]]; then
            if [[ "${ACTION_MODE}" == "rollback" ]]; then
              fail "rollback target already matches the latest successful production deployment; no rollback is needed"
            fi

            if [[ -n "${PREVIOUS_RUN_URL}" ]]; then
              fail "target digests already match the latest successful production deployment (run #${PREVIOUS_RUN_NUMBER}: ${PREVIOUS_RUN_URL})"
            fi

            fail "target digests already match the latest successful production deployment"
          fi

          echo "- duplicate check: target digests differ from the latest successful production deployment" >> "$GITHUB_STEP_SUMMARY"

  validate-production-topology-assets:
    if: github.ref == 'refs/heads/main'
    name: Validate Production Topology Assets
    runs-on: ubuntu-latest
    needs:
      - resolve-build-run-id
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate app-node compose
        shell: bash
        run: |
          set -Eeuo pipefail
          test -d migrations
          docker compose --env-file deployments/prod/app-node/.env.app-node.example -f deployments/prod/app-node/docker-compose.app-node.yml config >/dev/null
          docker compose --env-file deployments/prod/app-node/.env.app-node.example -f deployments/prod/app-node/docker-compose.app-node.yml --profile migration config >/dev/null
          docker compose --env-file deployments/prod/app-node/.env.app-node.example -f deployments/prod/app-node/docker-compose.app-node.yml --profile temporal config >/dev/null

      - name: Validate data-node compose
        shell: bash
        run: |
          set -Eeuo pipefail
          docker compose --env-file deployments/prod/data-node/.env.data-node.example -f deployments/prod/data-node/docker-compose.data-node.yml config >/dev/null

      - name: Validate deployment shell scripts
        shell: bash
        run: |
          set -Eeuo pipefail
          bash -n deployments/prod/scripts/smoke_prod.sh
          bash -n deployments/prod/shared/scripts/check_managed_services.sh
          bash -n deployments/prod/shared/scripts/bootstrap_prereqs.sh
          bash -n deployments/prod/shared/scripts/lib_release.sh
          bash -n deployments/prod/shared/scripts/traffic_drain_hook.sh
          bash -n deployments/prod/shared/scripts/release_app_cluster.sh
          bash -n deployments/prod/shared/scripts/healthcheck_app_node.sh
          bash -n deployments/prod/shared/scripts/release_data_node.sh
          bash -n deployments/prod/shared/scripts/healthcheck_data_node.sh
          bash -n deployments/prod/shared/scripts/validate_production_scale_storm_gate.sh
          bash -n deployments/prod/shared/scripts/validate_digest_pinned_image_refs.sh
          bash -n deployments/prod/app-node/scripts/release_app_node.sh
          bash -n deployments/prod/app-node/scripts/release_app_cluster.sh
          bash -n deployments/prod/app-node/scripts/rollback_app_node.sh
          bash -n deployments/prod/app-node/scripts/rollback_app_cluster.sh
          bash -n deployments/prod/app-node/scripts/healthcheck_app_node.sh
          bash -n deployments/prod/data-node/scripts/release_data_node.sh
          bash -n deployments/prod/data-node/scripts/rollback_data_node.sh
          bash -n deployments/prod/data-node/scripts/healthcheck_data_node.sh
          bash -n deployments/prod/data-node/scripts/bootstrap_emqx_data_node.sh
          bash -n scripts/monitoring/collect_deploy_slo_evidence.sh
          python3 -m py_compile scripts/smoke/emit_production_smoke_json.py
          python3 -m py_compile scripts/release/build_release_evidence_package.py
          python3 scripts/release/build_release_evidence_package.py --help >/dev/null
          bash deployments/prod/scripts/smoke_prod.sh --help >/dev/null
          python3 -m py_compile deployments/prod/shared/scripts/validate_production_scale_storm_evidence.py
          python3 -m py_compile deployments/prod/shared/scripts/render_storm_evidence_manifest_fragment.py

      - name: Reject legacy single-host production assumption
        shell: bash
        run: |
          set -Eeuo pipefail
          legacy_pattern='VPS''_HOST'
          ! grep -n "${legacy_pattern}" .github/workflows/deploy-prod.yml

  prepare-promotion-context:
    if: github.ref == 'refs/heads/main'
    name: Prepare Production Promotion Context
    runs-on: ubuntu-latest
    needs:
      - resolve-build-run-id
      - resolve-previous-production-deployment
      - resolve-image-refs
      - validate-promotion-selection
      - validate-production-action-safety
    outputs:
      action_mode: ${{ steps.context.outputs.action_mode }}
      build_actor: ${{ steps.context.outputs.build_actor }}
      build_run_id: ${{ steps.context.outputs.build_run_id }}
      auth_mode: ${{ steps.context.outputs.auth_mode }}
      deploy_transport: ${{ steps.context.outputs.deploy_transport }}
      previous_action_mode: ${{ steps.context.outputs.previous_action_mode }}
      previous_actor: ${{ steps.context.outputs.previous_actor }}
      previous_app_digest: ${{ steps.context.outputs.previous_app_digest }}
      previous_app_image_ref: ${{ steps.context.outputs.previous_app_image_ref }}
      previous_deployed_at_utc: ${{ steps.context.outputs.previous_deployed_at_utc }}
      previous_goose_digest: ${{ steps.context.outputs.previous_goose_digest }}
      previous_goose_image_ref: ${{ steps.context.outputs.previous_goose_image_ref }}
      previous_run_id: ${{ steps.context.outputs.previous_run_id }}
      previous_run_number: ${{ steps.context.outputs.previous_run_number }}
      previous_run_url: ${{ steps.context.outputs.previous_run_url }}
      provenance_trust_class: ${{ steps.context.outputs.provenance_trust_class }}
      provenance_verdict: ${{ steps.context.outputs.provenance_verdict }}
      provenance_verification_mode: ${{ steps.context.outputs.provenance_verification_mode }}
      provenance_verification_status: ${{ steps.context.outputs.provenance_verification_status }}
      source_branch: ${{ steps.context.outputs.source_branch }}
      source_commit_sha: ${{ steps.context.outputs.source_commit_sha }}
    steps:
      - name: Select active deploy/auth mode
        id: context
        shell: bash
        env:
          RESOLVED_PROVENANCE_VERDICT: ${{ needs.resolve-image-refs.outputs.provenance_verdict }}
        run: |
          set -Eeuo pipefail
          provenance_verdict="${RESOLVED_PROVENANCE_VERDICT}"
          provenance_trust_class="verified-attestation"
          provenance_verification_mode="gh-attestation-verify"
          provenance_verification_status="${provenance_verdict}"

          if [[ "${provenance_verdict}" == "accepted-manual" ]]; then
            provenance_trust_class="manual-trust-exception"
            provenance_verification_mode="manual-digest-trust-exception"
            provenance_verification_status="accepted-manual-trust-exception"
          elif [[ "${provenance_verdict}" == "accepted-private-repo-no-github-attestations" ]]; then
            provenance_trust_class="private-repo-no-github-attestations"
            provenance_verification_mode="github-attestation-unavailable-private-repo"
            provenance_verification_status="accepted-private-repo-no-github-attestations"
          fi

          {
            echo "action_mode=${{ needs.resolve-build-run-id.outputs.action_mode }}"
            echo "build_actor=${{ needs.resolve-build-run-id.outputs.build_actor }}"
            echo "build_run_id=${{ needs.resolve-build-run-id.outputs.workflow_run_id }}"
            echo "deploy_transport=vps-ssh"
            echo "auth_mode=static-ssh-key"
            echo "previous_action_mode=${{ needs.resolve-previous-production-deployment.outputs.previous_action_mode }}"
            echo "previous_actor=${{ needs.resolve-previous-production-deployment.outputs.previous_actor }}"
            echo "previous_app_digest=${{ needs.resolve-previous-production-deployment.outputs.previous_app_digest }}"
            echo "previous_app_image_ref=${{ needs.resolve-previous-production-deployment.outputs.previous_app_image_ref }}"
            echo "previous_deployed_at_utc=${{ needs.resolve-previous-production-deployment.outputs.previous_deployed_at_utc }}"
            echo "previous_goose_digest=${{ needs.resolve-previous-production-deployment.outputs.previous_goose_digest }}"
            echo "previous_goose_image_ref=${{ needs.resolve-previous-production-deployment.outputs.previous_goose_image_ref }}"
            echo "previous_run_id=${{ needs.resolve-previous-production-deployment.outputs.previous_run_id }}"
            echo "previous_run_number=${{ needs.resolve-previous-production-deployment.outputs.previous_run_number }}"
            echo "previous_run_url=${{ needs.resolve-previous-production-deployment.outputs.previous_run_url }}"
            echo "provenance_trust_class=${provenance_trust_class}"
            echo "provenance_verdict=${provenance_verdict}"
            echo "provenance_verification_mode=${provenance_verification_mode}"
            echo "provenance_verification_status=${provenance_verification_status}"
            echo "source_branch=${{ needs.resolve-build-run-id.outputs.source_branch }}"
            echo "source_commit_sha=${{ needs.resolve-build-run-id.outputs.source_commit_sha }}"
          } >> "$GITHUB_OUTPUT"

      - name: Record provenance verification result
        shell: bash
        env:
          APP_IMAGE_REF: ${{ needs.resolve-image-refs.outputs.app_image_ref }}
          GOOSE_IMAGE_REF: ${{ needs.resolve-image-refs.outputs.goose_image_ref }}
          VERDICT: ${{ needs.resolve-image-refs.outputs.provenance_verdict }}
          MODE: ${{ steps.context.outputs.provenance_verification_mode }}
          STATUS: ${{ steps.context.outputs.provenance_verification_status }}
          TRUST_CLASS: ${{ steps.context.outputs.provenance_trust_class }}
        run: |
          set -Eeuo pipefail
          [[ "${APP_IMAGE_REF}" == *@sha256:* ]] || { echo "error: app image ref must remain digest-pinned" >&2; exit 1; }
          [[ "${GOOSE_IMAGE_REF}" == *@sha256:* ]] || { echo "error: goose image ref must remain digest-pinned" >&2; exit 1; }

          {
            echo "## Production Promotion Context"
            echo "- action mode: \`${{ needs.resolve-build-run-id.outputs.action_mode }}\`"
            echo "- selected build run: \`${{ needs.resolve-build-run-id.outputs.workflow_run_id }}\`"
            echo "- selected build actor: \`${{ needs.resolve-build-run-id.outputs.build_actor }}\`"
            echo "- selected source branch: \`${{ needs.resolve-build-run-id.outputs.source_branch }}\`"
            echo "- selected source commit: \`${{ needs.resolve-build-run-id.outputs.source_commit_sha }}\`"
            echo "- semantic source_event (security-verdict): \`${{ needs.resolve-build-run-id.outputs.source_event }}\`"
            echo "- Build workflow API event (diagnostic): \`${{ needs.resolve-build-run-id.outputs.trigger_workflow_event }}\`"
            echo "- app digest: \`${{ needs.validate-promotion-selection.outputs.app_digest }}\`"
            echo "- goose digest: \`${{ needs.validate-promotion-selection.outputs.goose_digest }}\`"
            echo "- previous app digest: \`${{ needs.resolve-previous-production-deployment.outputs.previous_app_digest || 'unknown' }}\`"
            echo "- previous goose digest: \`${{ needs.resolve-previous-production-deployment.outputs.previous_goose_digest || 'unknown' }}\`"
            echo "- deploy transport: \`vps-ssh\`"
            echo "- auth mode: \`static-ssh-key\`"
            echo "- image provenance verdict: \`${VERDICT}\`"
            echo "- provenance trust class: \`${TRUST_CLASS}\`"
            echo "- provenance verification mode: \`${MODE}\`"
            echo "- provenance verification status: \`${STATUS}\`"
            if [[ "${TRUST_CLASS}" == "manual-trust-exception" ]]; then
              echo "- trust note: \`manual digest trust exception; attestation was not re-verified in this path\`"
            elif [[ "${TRUST_CLASS}" == "private-repo-no-github-attestations" ]]; then
              echo "- trust note: \`GitHub Artifact Attestations are unavailable for this private repository, so production uses the explicit private-repo fallback with digest-pinned images and the remaining security checks\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  validate-production-security-verdict:
    if: github.ref == 'refs/heads/main'
    name: Validate Production Security Verdict
    runs-on: ubuntu-latest
    needs:
      - resolve-build-run-id
      - resolve-image-refs
      - validate-promotion-selection
      - validate-production-action-safety
    outputs:
      security_verdict_age_seconds: ${{ steps.gate.outputs.security_verdict_age_seconds }}
      security_verdict_max_age_hours: ${{ steps.gate.outputs.security_verdict_max_age_hours }}
      release_gate_mode: ${{ steps.gate.outputs.release_gate_mode }}
      release_gate_verdict: ${{ steps.gate.outputs.release_gate_verdict }}
      repo_release_verdict: ${{ steps.gate.outputs.repo_release_verdict }}
      provenance_release_verdict: ${{ steps.gate.outputs.provenance_release_verdict }}
      security_workflow_run_id: ${{ steps.gate.outputs.security_workflow_run_id }}
      security_verdict_generated_at_utc: ${{ steps.gate.outputs.security_verdict_generated_at_utc }}
      security_source_build_run_id: ${{ steps.gate.outputs.security_source_build_run_id }}
      security_source_sha: ${{ steps.gate.outputs.security_source_sha }}
    steps:
      - name: Resolve matching security verdict
        id: gate
        shell: bash
        env:
          ACTION_MODE: ${{ needs.resolve-build-run-id.outputs.action_mode }}
          EXPECTED_APP_IMAGE_REF: ${{ needs.resolve-image-refs.outputs.app_image_ref }}
          EXPECTED_BUILD_RUN_ID: ${{ needs.resolve-build-run-id.outputs.workflow_run_id }}
          EXPECTED_GOOSE_IMAGE_REF: ${{ needs.resolve-image-refs.outputs.goose_image_ref }}
          EXPECTED_SOURCE_SHA: ${{ needs.resolve-build-run-id.outputs.source_commit_sha }}
          EXPECTED_SOURCE_EVENT: ${{ needs.resolve-build-run-id.outputs.source_event }}
          TRIGGER_WORKFLOW_EVENT_BUILD_API: ${{ needs.resolve-build-run-id.outputs.trigger_workflow_event }}
          EXPECTED_SOURCE_WORKFLOW_NAME: ${{ needs.resolve-image-refs.outputs.artifact_source_workflow_name }}
          RESOLVED_ARTIFACT_BUILD_RUN_ID: ${{ needs.resolve-image-refs.outputs.artifact_build_run_id }}
          RESOLVED_ARTIFACT_SOURCE_SHA: ${{ needs.resolve-image-refs.outputs.artifact_source_sha }}
          RESOLVED_ARTIFACT_SOURCE_WORKFLOW_NAME: ${{ needs.resolve-image-refs.outputs.artifact_source_workflow_name }}
          RESOLVED_ARTIFACT_BRANCH: ${{ needs.resolve-image-refs.outputs.artifact_source_branch }}
          RESOLVED_ARTIFACT_EVENT: ${{ needs.resolve-image-refs.outputs.artifact_source_event }}
          SECURITY_VERDICT_MAX_AGE_HOURS: ${{ secrets.PRODUCTION_SECURITY_VERDICT_MAX_AGE_HOURS || vars.PRODUCTION_SECURITY_VERDICT_MAX_AGE_HOURS || secrets.SECURITY_VERDICT_MAX_AGE_HOURS || vars.SECURITY_VERDICT_MAX_AGE_HOURS || '24' }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          mkdir -p security-gate

          {
            echo "## Production Security Gate"
            echo "- action mode: \`${ACTION_MODE}\`"
            echo "- source of truth: \`security-verdict\` artifact from the **Security Release** workflow (\`security-release.yml\`)"
            echo "- immutable alignment: \`source_commit_sha\` / **semantic** \`source_event\` from security-verdict must match \`_reusable-deploy\` promotion-manifest \`artifact_source_event\` (Build GitHub API wrapper event is diagnostic only)"
            echo "- scope: \`full Security Release gate: repo checks plus published-image and provenance evidence; rollout execution is validated separately in this workflow\`"
          } >> "$GITHUB_STEP_SUMMARY"

          fail() {
            echo "error: $*" >&2
            echo "- result: \`fail\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- reason: $*" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          }

          if [[ "${ACTION_MODE}" == "rollback" ]]; then
            {
              echo "security_verdict_age_seconds="
              echo "security_verdict_max_age_hours=not-required"
              echo "release_gate_mode=not-required-for-rollback"
              echo "release_gate_verdict=not-required"
              echo "repo_release_verdict=not-required"
              echo "provenance_release_verdict=not-required"
              echo "security_workflow_run_id="
              echo "security_verdict_generated_at_utc="
              echo "security_source_build_run_id="
              echo "security_source_sha="
            } >> "$GITHUB_OUTPUT"
            {
              echo "- result: \`not-required for rollback\`"
              echo "- freshness policy: \`security release verdict freshness is not evaluated in rollback mode\`"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          [[ "${SECURITY_VERDICT_MAX_AGE_HOURS}" =~ ^[0-9]+$ ]] || fail "SECURITY_VERDICT_MAX_AGE_HOURS must be numeric"
          [[ -n "${EXPECTED_BUILD_RUN_ID}" ]] || fail "missing expected build run id for production security gate"
          [[ -n "${EXPECTED_APP_IMAGE_REF}" ]] || fail "missing expected app image ref for production security gate"
          [[ -n "${EXPECTED_GOOSE_IMAGE_REF}" ]] || fail "missing expected goose image ref for production security gate"
          [[ -n "${EXPECTED_SOURCE_SHA}" ]] || fail "missing expected source SHA for production security gate"
          [[ "${EXPECTED_BUILD_RUN_ID}" == "${RESOLVED_ARTIFACT_BUILD_RUN_ID}" ]] || fail "resolved artifact build run id does not match the selected build run"
          [[ "${EXPECTED_SOURCE_SHA}" == "${RESOLVED_ARTIFACT_SOURCE_SHA}" ]] || fail "resolved artifact source SHA does not match security-verdict source_commit_sha"
          [[ -n "${EXPECTED_SOURCE_EVENT}" ]] || fail "missing semantic source_event from security-verdict (resolve-build-run-id)"
          [[ "${RESOLVED_ARTIFACT_BRANCH}" == "main" ]] || fail "artifact_source_branch must be main for production, got ${RESOLVED_ARTIFACT_BRANCH:-empty}"
          [[ "${RESOLVED_ARTIFACT_EVENT}" == "${EXPECTED_SOURCE_EVENT}" ]] || fail "artifact_source_event (${RESOLVED_ARTIFACT_EVENT:-empty}) does not match security-verdict semantic source_event (${EXPECTED_SOURCE_EVENT})"

          {
            echo "- expected semantic source_event (security-verdict / promotion-manifest): \`${EXPECTED_SOURCE_EVENT}\`"
            echo "- Build workflow GitHub API event (diagnostic, often workflow_run): \`${TRIGGER_WORKFLOW_EVENT_BUILD_API:-}\`"
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ -n "${EXPECTED_SOURCE_WORKFLOW_NAME}" ]]; then
            [[ "${EXPECTED_SOURCE_WORKFLOW_NAME}" == "${RESOLVED_ARTIFACT_SOURCE_WORKFLOW_NAME}" ]] || fail "resolved artifact source workflow name does not match the selected build metadata"
          fi

          {
            echo "- expected build run id: \`${EXPECTED_BUILD_RUN_ID}\`"
            echo "- expected source SHA: \`${EXPECTED_SOURCE_SHA}\`"
            echo "- maximum verdict age: \`${SECURITY_VERDICT_MAX_AGE_HOURS}h\`"
            if [[ -n "${EXPECTED_SOURCE_WORKFLOW_NAME}" ]]; then
              echo "- expected source workflow: \`${EXPECTED_SOURCE_WORKFLOW_NAME}\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          SEC_IN="${{ inputs.security_release_run_id }}"
          [[ -n "${SEC_IN}" ]] || fail "security_release_run_id is required (the Security Release run whose security-verdict authorizes this deploy)"
          sec_name="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${SEC_IN}" --jq '.name // ""')"
          sec_conc="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${SEC_IN}" --jq '.conclusion // ""')"
          [[ "${sec_name}" == "Security Release" ]] || fail "security_release_run_id must be a Security Release workflow (got: ${sec_name})"
          candidate_runs="$(printf '%s\t%s\n' "${SEC_IN}" "${sec_conc}")"

          matched_run_id=""
          matched_generated_at=""
          matched_source_build_run_id=""
          matched_source_sha=""

          while IFS=$'\t' read -r run_id run_conclusion; do
            [[ -n "${run_id}" ]] || continue

            artifact_id="$(
              gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/artifacts" \
                --jq '[.artifacts[]? | select(.name == "security-verdict") | .id] | .[0] // empty'
            )"
            [[ -n "${artifact_id}" ]] || continue

            extract_dir="security-gate/run-${run_id}"
            rm -rf "${extract_dir}"
            mkdir -p "${extract_dir}"
            gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts/${artifact_id}/zip" > "${extract_dir}/security-verdict.zip"
            python3 -m zipfile -e "${extract_dir}/security-verdict.zip" "${extract_dir}"
            verdict_file="${extract_dir}/security-verdict.json"
            [[ -f "${verdict_file}" ]] || fail "security-verdict artifact from run ${run_id} is missing security-verdict.json"

            verdict_check_script="${extract_dir}/validate-security-verdict.py"
            printf '%s\n' \
              'import json' \
              'import sys' \
              'from datetime import datetime, timezone' \
              'from pathlib import Path' \
              '' \
              'verdict_path = Path(sys.argv[1])' \
              'expected_build_run_id = sys.argv[2]' \
              'expected_source_sha = sys.argv[3]' \
              'expected_source_workflow_name = sys.argv[4]' \
              'run_id = sys.argv[5]' \
              'run_conclusion = sys.argv[6]' \
              'expected_app_image_ref = sys.argv[7]' \
              'expected_goose_image_ref = sys.argv[8]' \
              'max_age_hours = int(sys.argv[9])' \
              '' \
              'payload = json.loads(verdict_path.read_text(encoding="utf-8"))' \
              'required_keys = ("schema_version", "event_name", "verdict", "source_build_run_id", "source_sha", "workflow_run_id", "generated_at_utc", "scanner_summary", "published_images", "release_gate_verdict", "release_gate_mode", "release_gate", "repo_level_checks", "image_level_checks", "provenance_release_checks")' \
              'missing = [key for key in required_keys if key not in payload]' \
              'if missing:' \
              '    print(f"reason=security-verdict.json is missing required keys: {missing}")' \
              '    raise SystemExit(3)' \
              '' \
              'if payload.get("schema_version", "") != "v1":' \
              '    print("reason=security-verdict schema_version is unsupported: {}".format(payload.get("schema_version", "")))' \
              '    raise SystemExit(3)' \
              '' \
              'if payload.get("event_name") not in ("workflow_run", "workflow_dispatch"):' \
              '    print("reason=production release gate requires workflow_run or workflow_dispatch security evidence, found event_name={}".format(payload.get("event_name", "")))' \
              '    raise SystemExit(4)' \
              '' \
              'if str(payload.get("workflow_run_id", "")) != run_id:' \
              '    print("reason=security-verdict workflow_run_id does not match the artifact owner run")' \
              '    raise SystemExit(3)' \
              '' \
              'if str(payload.get("source_build_run_id", "")) != expected_build_run_id:' \
              '    raise SystemExit(2)' \
              '' \
              'if payload.get("source_sha", "") != expected_source_sha:' \
              '    print("reason=matching security verdict has a different source SHA than the selected build")' \
              '    raise SystemExit(4)' \
              '' \
              'source_workflow_name = payload.get("source_workflow_name", "")' \
              'if expected_source_workflow_name and source_workflow_name and source_workflow_name != expected_source_workflow_name:' \
              '    print("reason=matching security verdict has a different source workflow linkage than the selected build")' \
              '    raise SystemExit(4)' \
              '' \
              'published_images = payload.get("published_images") or {}' \
              'if not isinstance(published_images, dict):' \
              '    print("reason=security-verdict published_images payload is malformed")' \
              '    raise SystemExit(3)' \
              '' \
              'if payload.get("release_gate_mode", "") != "full-security-release-gate":' \
              '    print("reason=production release gate requires full-security-release-gate mode, found {}".format(payload.get("release_gate_mode", "")))' \
              '    raise SystemExit(4)' \
              '' \
              'if payload.get("release_gate_verdict", "") != "pass":' \
              '    print("reason=production release gate is {} with required_evidence={}".format(payload.get("release_gate_verdict"), (payload.get("release_gate") or {}).get("required_evidence", {})))' \
              '    raise SystemExit(5)' \
              '' \
              'repo_release_verdict = (((payload.get("repo_level_checks") or {}).get("release_evidence") or {}).get("required_for_release_verdict", ""))' \
              'if repo_release_verdict != "pass":' \
              '    print(f"reason=production release gate is missing passing repo-level release evidence: {repo_release_verdict}")' \
              '    raise SystemExit(5)' \
              '' \
              'image_release_verdict = ((payload.get("image_level_checks") or {}).get("required_for_release_verdict", ""))' \
              'if image_release_verdict != "pass":' \
              '    print(f"reason=production release gate image-level evidence is not pass: {image_release_verdict}")' \
              '    raise SystemExit(5)' \
              '' \
              'private_repo_provenance_fallback = "accepted-private-repo-no-github-attestations"' \
              'provenance_release_verdict = ((payload.get("provenance_release_checks") or {}).get("required_for_release_verdict", ""))' \
              'if provenance_release_verdict not in ("pass", private_repo_provenance_fallback):' \
              '    print(f"reason=production release gate provenance evidence is not acceptable: {provenance_release_verdict}")' \
              '    raise SystemExit(5)' \
              '' \
              'if published_images.get("app_image_ref", "") != expected_app_image_ref:' \
              '    print("reason=matching security verdict app image ref does not match the selected immutable artifact")' \
              '    raise SystemExit(4)' \
              '' \
              'if published_images.get("goose_image_ref", "") != expected_goose_image_ref:' \
              '    print("reason=matching security verdict goose image ref does not match the selected immutable artifact")' \
              '    raise SystemExit(4)' \
              '' \
              'expected_app_digest = expected_app_image_ref.split("@", 1)[1]' \
              'expected_goose_digest = expected_goose_image_ref.split("@", 1)[1]' \
              'app_digest = published_images.get("app_digest", "")' \
              'goose_digest = published_images.get("goose_digest", "")' \
              'if app_digest and app_digest != expected_app_digest:' \
              '    print("reason=matching security verdict app digest does not match the selected immutable artifact")' \
              '    raise SystemExit(4)' \
              '' \
              'if goose_digest and goose_digest != expected_goose_digest:' \
              '    print("reason=matching security verdict goose digest does not match the selected immutable artifact")' \
              '    raise SystemExit(4)' \
              '' \
              'generated_at_raw = payload.get("generated_at_utc", "")' \
              'try:' \
              '    generated_at = datetime.strptime(generated_at_raw, "%Y-%m-%dT%H:%M:%SZ").replace(tzinfo=timezone.utc)' \
              'except ValueError:' \
              '    print(f"reason=security-verdict generated_at_utc is malformed: {generated_at_raw}")' \
              '    raise SystemExit(3)' \
              '' \
              'age_seconds = int((datetime.now(timezone.utc) - generated_at).total_seconds())' \
              'if age_seconds < 0:' \
              '    print("reason=matching security verdict timestamp is in the future")' \
              '    raise SystemExit(6)' \
              '' \
              'if age_seconds > max_age_hours * 3600:' \
              '    print(f"reason=matching security verdict is stale for production release hygiene ({age_seconds}s old, max {max_age_hours}h); rerun Security Release for this build or set PRODUCTION_SECURITY_VERDICT_MAX_AGE_HOURS / SECURITY_VERDICT_MAX_AGE_HOURS to an explicitly approved override")' \
              '    print(f"generated_at_utc={generated_at_raw}")' \
              '    raise SystemExit(6)' \
              '' \
              'if run_conclusion != "success":' \
              '    print(f"reason=matching security workflow run conclusion is {run_conclusion}")' \
              '    print(f"generated_at_utc={generated_at_raw}")' \
              '    raise SystemExit(5)' \
              '' \
              'print("release_gate_mode={}".format(payload.get("release_gate_mode", "")))' \
              'print("release_gate_verdict={}".format(payload.get("release_gate_verdict", "")))' \
              'print(f"repo_release_verdict={repo_release_verdict}")' \
              'print(f"provenance_release_verdict={provenance_release_verdict}")' \
              'print(f"security_verdict_age_seconds={age_seconds}")' \
              'print(f"security_workflow_run_id={run_id}")' \
              'print(f"security_verdict_generated_at_utc={generated_at_raw}")' \
              'print("security_source_build_run_id={}".format(payload.get("source_build_run_id", "")))' \
              'print("security_source_sha={}".format(payload.get("source_sha", "")))' \
              'raise SystemExit(0)' \
              > "${verdict_check_script}"

            set +e
            python3 "${verdict_check_script}" "${verdict_file}" "${EXPECTED_BUILD_RUN_ID}" "${EXPECTED_SOURCE_SHA}" "${EXPECTED_SOURCE_WORKFLOW_NAME}" "${run_id}" "${run_conclusion}" "${EXPECTED_APP_IMAGE_REF}" "${EXPECTED_GOOSE_IMAGE_REF}" "${SECURITY_VERDICT_MAX_AGE_HOURS}" > "${extract_dir}/verdict-check.txt"
            check_rc=$?
            set -e
            verdict_check="$(python3 -c 'import pathlib,sys; print(pathlib.Path(sys.argv[1]).read_text(encoding="utf-8"), end="")' "${extract_dir}/verdict-check.txt")"

            case "${check_rc}" in
              0)
                while IFS='=' read -r key value; do
                  case "${key}" in
                    security_verdict_age_seconds) security_verdict_age_seconds="${value}" ;;
                    release_gate_mode) release_gate_mode="${value}" ;;
                    release_gate_verdict) release_gate_verdict="${value}" ;;
                    repo_release_verdict) repo_release_verdict="${value}" ;;
                    provenance_release_verdict) provenance_release_verdict="${value}" ;;
                    security_workflow_run_id) matched_run_id="${value}" ;;
                    security_verdict_generated_at_utc) matched_generated_at="${value}" ;;
                    security_source_build_run_id) matched_source_build_run_id="${value}" ;;
                    security_source_sha) matched_source_sha="${value}" ;;
                  esac
                done <<< "${verdict_check}"
                break
                ;;
              2)
                continue
                ;;
              3 | 4 | 5 | 6)
                reason="$(printf '%s\n' "${verdict_check}" | python3 -c 'import sys; lines=[line.strip() for line in sys.stdin if line.strip()]; print(next((line.split("=",1)[1] for line in lines if line.startswith("reason=")), "matching security verdict is malformed or failed"))')"
                fail "${reason}"
                ;;
              *)
                fail "unexpected error while validating security-verdict artifact from run ${run_id}"
                ;;
            esac
          done <<< "${candidate_runs}"

          [[ -n "${matched_run_id}" ]] || fail "no matching security-verdict artifact found for build run ${EXPECTED_BUILD_RUN_ID} and SHA ${EXPECTED_SOURCE_SHA}"

          {
            echo "security_verdict_age_seconds=${security_verdict_age_seconds}"
            echo "security_verdict_max_age_hours=${SECURITY_VERDICT_MAX_AGE_HOURS}"
            echo "release_gate_mode=${release_gate_mode}"
            echo "release_gate_verdict=${release_gate_verdict}"
            echo "repo_release_verdict=${repo_release_verdict}"
            echo "provenance_release_verdict=${provenance_release_verdict}"
            echo "security_workflow_run_id=${matched_run_id}"
            echo "security_verdict_generated_at_utc=${matched_generated_at}"
            echo "security_source_build_run_id=${matched_source_build_run_id}"
            echo "security_source_sha=${matched_source_sha}"
          } >> "$GITHUB_OUTPUT"

          {
            echo "- result: \`pass\`"
            echo "- matched security workflow run: \`${matched_run_id}\`"
            echo "- freshness window: \`${SECURITY_VERDICT_MAX_AGE_HOURS}h\`"
            echo "- verdict age at evaluation: \`${security_verdict_age_seconds}s\`"
            echo "- release gate mode: \`${release_gate_mode}\`"
            echo "- release gate verdict: \`${release_gate_verdict}\`"
            echo "- repo release verdict: \`${repo_release_verdict}\`"
            echo "- provenance release verdict: \`${provenance_release_verdict}\`"
            echo "- verdict generated at (UTC): \`${matched_generated_at}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  validate-production-scale-storm-gate:
    if: github.ref == 'refs/heads/main'
    name: Validate fleet scale storm evidence
    runs-on: ubuntu-latest
    needs:
      - resolve-build-run-id
    outputs:
      fleet_scale_target: ${{ steps.gate.outputs.fleet_scale_target }}
      storm_gate_required: ${{ steps.gate.outputs.storm_gate_required }}
      storm_gate_result: ${{ steps.gate.outputs.storm_gate_result }}
      storm_gate_evidence_path: ${{ steps.gate.outputs.storm_gate_evidence_path }}
      storm_gate_bypassed: ${{ steps.gate.outputs.storm_gate_bypassed }}
      storm_gate_bypass_reason: ${{ steps.gate.outputs.storm_gate_bypass_reason }}
      storm_evidence_scenario: ${{ steps.gate.outputs.storm_evidence_scenario }}
      storm_evidence_completed_at_utc: ${{ steps.gate.outputs.storm_evidence_completed_at_utc }}
      storm_evidence_machine_count: ${{ steps.gate.outputs.storm_evidence_machine_count }}
      storm_evidence_events_per_machine: ${{ steps.gate.outputs.storm_evidence_events_per_machine }}
      storm_evidence_final_result: ${{ steps.gate.outputs.storm_evidence_final_result }}
      storm_evidence_critical_lost: ${{ steps.gate.outputs.storm_evidence_critical_lost }}
      storm_evidence_duplicate_critical_effects: ${{ steps.gate.outputs.storm_evidence_duplicate_critical_effects }}
      storm_evidence_db_pool_result: ${{ steps.gate.outputs.storm_evidence_db_pool_result }}
      storm_evidence_health_result: ${{ steps.gate.outputs.storm_evidence_health_result }}
      storm_evidence_restart_result: ${{ steps.gate.outputs.storm_evidence_restart_result }}
      storm_evidence_max_age_days_applied: ${{ steps.gate.outputs.storm_evidence_max_age_days_applied }}
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate fleet scale / storm evidence
        id: gate
        shell: bash
        env:
          ACTION_MODE: ${{ needs.resolve-build-run-id.outputs.action_mode }}
          FLEET_SCALE_TARGET: ${{ inputs.fleet_scale_target }}
          ALLOW_SCALE_GATE_BYPASS: ${{ inputs.allow_scale_gate_bypass }}
          SCALE_GATE_BYPASS_REASON: ${{ inputs.scale_gate_bypass_reason }}
          BYPASS_REASON: ${{ inputs.scale_gate_bypass_reason }}
          TELEMETRY_STORM_EVIDENCE_REPO_PATH: ${{ inputs.telemetry_storm_evidence_repo_path }}
          TELEMETRY_STORM_EVIDENCE_ARTIFACT_RUN_ID: ${{ inputs.telemetry_storm_evidence_artifact_run_id }}
          STORM_EVIDENCE_MAX_AGE_DAYS: ${{ inputs.storm_evidence_max_age_days }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail

          {
            echo "## Fleet scale storm gate"
            echo "- action mode: \`${ACTION_MODE}\`"
            echo "- fleet_scale_target: \`${FLEET_SCALE_TARGET}\`"
            echo "- storm evidence max age (days): \`${STORM_EVIDENCE_MAX_AGE_DAYS}\`"
          } >> "$GITHUB_STEP_SUMMARY"

          _bypass_lc="$(printf '%s' "${ALLOW_SCALE_GATE_BYPASS:-false}" | tr '[:upper:]' '[:lower:]')"
          if [[ "${_bypass_lc}" == "true" ]]; then
            if [[ "${SCALE_GATE_BYPASS_REASON}" == *$'\n'* ]]; then
              echo "error: scale_gate_bypass_reason must be a single line" >&2
              exit 1
            fi
            if [[ "${#SCALE_GATE_BYPASS_REASON}" -gt 2000 ]]; then
              echo "error: scale_gate_bypass_reason exceeds 2000 characters" >&2
              exit 1
            fi
          fi

          export TELEMETRY_STORM_EVIDENCE_FILE=""
          repo_path="${TELEMETRY_STORM_EVIDENCE_REPO_PATH:-}"
          art_id="${TELEMETRY_STORM_EVIDENCE_ARTIFACT_RUN_ID:-}"

          if [[ -n "${repo_path}" && -n "${art_id}" ]]; then
            echo "error: set only one of telemetry_storm_evidence_repo_path or telemetry_storm_evidence_artifact_run_id" >&2
            exit 1
          fi

          if [[ -n "${art_id}" ]]; then
            [[ "${art_id}" =~ ^[0-9]+$ ]] || { echo "error: telemetry_storm_evidence_artifact_run_id must be numeric" >&2; exit 1; }
            mkdir -p storm-gate-download
            aid="$(
              gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${art_id}/artifacts" \
                --jq '[.artifacts[]? | select(.name == "telemetry-storm-result") | .id] | .[0] // empty'
            )"
            [[ -n "${aid}" ]] || { echo "error: no artifact named telemetry-storm-result on workflow run ${art_id}" >&2; exit 1; }
            gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts/${aid}/zip" > storm-gate-download/storm.zip
            python3 -m zipfile -e storm-gate-download/storm.zip storm-gate-download/out
            found="$(find storm-gate-download/out -type f -name 'telemetry-storm-result.json' -print 2>/dev/null | head -1 || true)"
            if [[ -z "${found}" ]]; then
              found="$(find storm-gate-download/out -type f -name '*.json' -print 2>/dev/null | head -1 || true)"
            fi
            [[ -n "${found}" ]] || { echo "error: telemetry-storm-result artifact zip did not contain a JSON file" >&2; exit 1; }
            export TELEMETRY_STORM_EVIDENCE_FILE="${found}"
          fi

          if [[ -n "${repo_path}" ]]; then
            export TELEMETRY_STORM_EVIDENCE_FILE="${GITHUB_WORKSPACE}/${repo_path}"
          fi

          bash deployments/prod/shared/scripts/validate_production_scale_storm_gate.sh
          rc=$?
          fleet_lc="$(printf '%s' "${FLEET_SCALE_TARGET:-pilot}" | tr '[:upper:]' '[:lower:]')"
          if [[ "${_bypass_lc}" == "true" && -n "${SCALE_GATE_BYPASS_REASON}" && "${fleet_lc}" != "pilot" ]]; then
            echo "::warning:: Fleet scale storm gate BYPASSED — ${SCALE_GATE_BYPASS_REASON}"
            {
              echo ""
              echo "### ⚠️ OPERATOR BYPASS — fleet scale storm gate"
              echo ""
              echo "**ALLOW_SCALE_GATE_BYPASS=true** — telemetry storm evidence was **not** validated for this deploy."
              echo ""
              echo "**fleet_scale_target:** \`${FLEET_SCALE_TARGET}\`"
              echo ""
              echo "**BYPASS_REASON / scale_gate_bypass_reason:** ${SCALE_GATE_BYPASS_REASON}"
              echo ""
              echo "The production deployment manifest records **storm_gate_bypassed=true** and the reason. "
              echo "Security, provenance, and health gates are unchanged."
              echo ""
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          if [[ "${rc}" -ne 0 ]]; then
            echo "- storm gate: \`fail\`" >> "$GITHUB_STEP_SUMMARY"
            exit "${rc}"
          fi
          echo "- storm gate: completed (see job outputs)" >> "$GITHUB_STEP_SUMMARY"
          exit 0

  deploy-prod:
    if: github.ref == 'refs/heads/main'
    name: Deploy production release
    runs-on: ubuntu-latest
    needs:
      - resolve-build-run-id
      - resolve-previous-production-deployment
      - resolve-image-refs
      - validate-production-topology-assets
      - validate-promotion-selection
      - validate-production-action-safety
      - validate-production-security-verdict
      - validate-production-scale-storm-gate
      - prepare-promotion-context
    environment: production
    env:
      ACTION_MODE: ${{ needs.resolve-build-run-id.outputs.action_mode }}
      APP_IMAGE_REF: ${{ needs.resolve-image-refs.outputs.app_image_ref }}
      GOOSE_IMAGE_REF: ${{ needs.resolve-image-refs.outputs.goose_image_ref }}
      RELEASE_TAG: ${{ needs.resolve-build-run-id.outputs.release_tag }}
      SOURCE_BRANCH: ${{ needs.resolve-build-run-id.outputs.source_branch }}
      SOURCE_COMMIT_SHA: ${{ needs.resolve-build-run-id.outputs.source_commit_sha }}
      SOURCE_COMMIT_SHA_NOTE: ${{ inputs.source_commit_sha != '' && 'operator-confirmed' || 'selected-build-run' }}
      SELECTED_BUILD_ACTOR: ${{ needs.resolve-build-run-id.outputs.build_actor }}
      SELECTED_BUILD_RUN_ID: ${{ needs.resolve-build-run-id.outputs.workflow_run_id }}
      STAGING_RELEASE_GATE: ${{ needs.resolve-build-run-id.outputs.staging_release_gate }}
      STAGING_EVIDENCE_WORKFLOW_RUN_ID: ${{ needs.resolve-build-run-id.outputs.staging_evidence_workflow_run_id }}
      STAGING_EVIDENCE_BYPASSED: ${{ needs.resolve-build-run-id.outputs.staging_evidence_bypassed }}
      MISSING_STAGING_EVIDENCE_REASON: ${{ needs.resolve-build-run-id.outputs.missing_staging_evidence_reason }}
      STAGING_DIGEST_CROSS_CHECK_NOTE: ${{ needs.resolve-build-run-id.outputs.staging_digest_cross_check_note }}
      PREVIOUS_ACTION_MODE: ${{ needs.resolve-previous-production-deployment.outputs.previous_action_mode }}
      PREVIOUS_ACTOR: ${{ needs.resolve-previous-production-deployment.outputs.previous_actor }}
      PREVIOUS_APP_DIGEST: ${{ needs.resolve-previous-production-deployment.outputs.previous_app_digest }}
      PREVIOUS_APP_IMAGE_REF: ${{ needs.resolve-previous-production-deployment.outputs.previous_app_image_ref }}
      PREVIOUS_DEPLOYED_AT_UTC: ${{ needs.resolve-previous-production-deployment.outputs.previous_deployed_at_utc }}
      PREVIOUS_GOOSE_DIGEST: ${{ needs.resolve-previous-production-deployment.outputs.previous_goose_digest }}
      PREVIOUS_GOOSE_IMAGE_REF: ${{ needs.resolve-previous-production-deployment.outputs.previous_goose_image_ref }}
      PREVIOUS_RUN_ID: ${{ needs.resolve-previous-production-deployment.outputs.previous_run_id }}
      PREVIOUS_RUN_NUMBER: ${{ needs.resolve-previous-production-deployment.outputs.previous_run_number }}
      PREVIOUS_RUN_URL: ${{ needs.resolve-previous-production-deployment.outputs.previous_run_url }}
      ROLLBACK_AVAILABLE_BEFORE_DEPLOY: ${{ needs.resolve-previous-production-deployment.outputs.rollback_available }}
      INPUT_RUN_MIGRATION: ${{ inputs.run_migration && 'true' || 'false' }}
      INPUT_BACKUP_EVIDENCE_ID: ${{ inputs.backup_evidence_id || '' }}
      DEPLOY_DATA_NODE: ${{ inputs.deploy_data_node && 'true' || 'false' }}
      ALLOW_APP_NODE_ON_DATA_NODE: ${{ inputs.allow_app_node_on_data_node && 'true' || 'false' }}
      ENABLE_TEMPORAL_PROFILE: ${{ vars.PRODUCTION_ENABLE_TEMPORAL_PROFILE || 'false' }}
      PRODUCTION_DEPLOY_ROOT: ${{ secrets.PRODUCTION_DEPLOY_ROOT || secrets.DEPLOY_PATH || vars.PRODUCTION_DEPLOY_ROOT || vars.PROD_DEPLOY_PATH || vars.DEPLOY_PATH || '/opt/avf-vending-api' }}
      APP_NODE_A_HOST: ${{ secrets.PRODUCTION_APP_NODE_A_HOST || secrets.PROD_APP_A_HOST || secrets.APP_A_HOST || vars.PRODUCTION_APP_NODE_A_HOST || vars.PROD_APP_A_HOST || vars.APP_A_HOST }}
      APP_NODE_B_HOST: ${{ secrets.PRODUCTION_APP_NODE_B_HOST || secrets.PROD_APP_B_HOST || secrets.APP_B_HOST || vars.PRODUCTION_APP_NODE_B_HOST || vars.PROD_APP_B_HOST || vars.APP_B_HOST }}
      DATA_NODE_HOST: ${{ secrets.PRODUCTION_DATA_NODE_HOST || secrets.PROD_DATA_NODE_HOST || secrets.DATA_HOST || vars.PRODUCTION_DATA_NODE_HOST || vars.PROD_DATA_NODE_HOST || vars.DATA_HOST }}
      PROVENANCE_VERDICT: ${{ needs.resolve-image-refs.outputs.provenance_verdict }}
      RESOLVED_RELEASE_LABEL: ${{ needs.resolve-image-refs.outputs.release_label }}
      RELEASE_GATE_MODE: ${{ needs.validate-production-security-verdict.outputs.release_gate_mode }}
      RELEASE_GATE_VERDICT: ${{ needs.validate-production-security-verdict.outputs.release_gate_verdict }}
      REPO_RELEASE_VERDICT: ${{ needs.validate-production-security-verdict.outputs.repo_release_verdict }}
      PROVENANCE_RELEASE_VERDICT: ${{ needs.validate-production-security-verdict.outputs.provenance_release_verdict }}
      PROVENANCE_TRUST_CLASS: ${{ needs.prepare-promotion-context.outputs.provenance_trust_class }}
      SECURITY_VERDICT_AGE_SECONDS: ${{ needs.validate-production-security-verdict.outputs.security_verdict_age_seconds }}
      SECURITY_WORKFLOW_RUN_ID: ${{ needs.validate-production-security-verdict.outputs.security_workflow_run_id }}
      SECURITY_VERDICT_GENERATED_AT_UTC: ${{ needs.validate-production-security-verdict.outputs.security_verdict_generated_at_utc }}
      SECURITY_VERDICT_MAX_AGE_HOURS: ${{ needs.validate-production-security-verdict.outputs.security_verdict_max_age_hours }}
      PRODUCTION_API_DOMAIN: ${{ secrets.PRODUCTION_API_DOMAIN || vars.PRODUCTION_API_DOMAIN || secrets.PROD_API_DOMAIN || vars.PROD_API_DOMAIN || secrets.API_DOMAIN || vars.API_DOMAIN || '' }}
      PRODUCTION_PUBLIC_BASE_URL: ${{ secrets.PRODUCTION_PUBLIC_BASE_URL || vars.PRODUCTION_PUBLIC_BASE_URL || secrets.PROD_PUBLIC_BASE_URL || vars.PROD_PUBLIC_BASE_URL || secrets.PUBLIC_BASE_URL || vars.PUBLIC_BASE_URL || '' }}
      PRODUCTION_SMOKE_DB_READ_PATH: ${{ secrets.PRODUCTION_SMOKE_DB_READ_PATH || vars.PRODUCTION_SMOKE_DB_READ_PATH || secrets.PROD_SMOKE_DB_READ_PATH || vars.PROD_SMOKE_DB_READ_PATH || secrets.SMOKE_DB_READ_PATH || vars.SMOKE_DB_READ_PATH || '' }}
      PRODUCTION_SMOKE_DB_READ_MATCH_REGEX: ${{ secrets.PRODUCTION_SMOKE_DB_READ_MATCH_REGEX || vars.PRODUCTION_SMOKE_DB_READ_MATCH_REGEX || secrets.PROD_SMOKE_DB_READ_MATCH_REGEX || vars.PROD_SMOKE_DB_READ_MATCH_REGEX || secrets.SMOKE_DB_READ_MATCH_REGEX || vars.SMOKE_DB_READ_MATCH_REGEX || '' }}
      # Enterprise smoke tiers: docs/operations/production-smoke-tests.md
      PRODUCTION_SMOKE_BUSINESS_READONLY_SPECS: ${{ vars.PRODUCTION_SMOKE_BUSINESS_READONLY_SPECS || '' }}
      PRODUCTION_SMOKE_SYNTHETIC_GET_PATH: ${{ vars.PRODUCTION_SMOKE_SYNTHETIC_GET_PATH || '' }}
      PRODUCTION_SMOKE_SYNTHETIC_MATCH_REGEX: ${{ vars.PRODUCTION_SMOKE_SYNTHETIC_MATCH_REGEX || '' }}
      PRODUCTION_SMOKE_BUSINESS_READONLY_BEARER_TOKEN: ${{ secrets.PRODUCTION_SMOKE_BUSINESS_READONLY_BEARER_TOKEN || '' }}
      PRODUCTION_SMOKE_SYNTHETIC_BEARER_TOKEN: ${{ secrets.PRODUCTION_SMOKE_SYNTHETIC_BEARER_TOKEN || '' }}
      SSH_PORT: ${{ secrets.PRODUCTION_SSH_PORT || vars.PRODUCTION_SSH_PORT || secrets.PROD_SSH_PORT || vars.PROD_SSH_PORT || secrets.SSH_PORT || vars.SSH_PORT || '22' }}
      SSH_USER: ${{ secrets.PRODUCTION_SSH_USER || vars.PRODUCTION_SSH_USER || secrets.PROD_SSH_USER || vars.PROD_SSH_USER || secrets.SSH_USER || vars.SSH_USER }}
      # Traffic drain: none (no global/LB claim) | caddy (node caddy stop is the in-compose drain) | external-lb (requires operator hook on the VPS; fail-fast if not configured)
      TRAFFIC_DRAIN_MODE: ${{ vars.TRAFFIC_DRAIN_MODE || 'none' }}
      TRAFFIC_DRAIN_WAIT_SECONDS: ${{ vars.TRAFFIC_DRAIN_WAIT_SECONDS || '0' }}
      # Set PRODUCTION_ALLOW_SINGLE_APP_NODE=1 only for single app-node; default requires two distinct hosts for rolling deploy
      PRODUCTION_ALLOW_SINGLE_APP_NODE: ${{ vars.PRODUCTION_ALLOW_SINGLE_APP_NODE || '0' }}
      ALLOW_IDENTICAL_PRODUCTION_APP_NODES: ${{ vars.ALLOW_IDENTICAL_PRODUCTION_APP_NODES || '0' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate production deploy inputs
        id: validate_deploy_inputs
        shell: bash
        env:
          SSH_KNOWN_HOSTS_CONTENT: ${{ secrets.PRODUCTION_SSH_KNOWN_HOSTS || vars.PRODUCTION_SSH_KNOWN_HOSTS || secrets.PROD_SSH_KNOWN_HOSTS || vars.PROD_SSH_KNOWN_HOSTS || secrets.SSH_KNOWN_HOSTS || vars.SSH_KNOWN_HOSTS }}
          SSH_PRIVATE_KEY: ${{ secrets.PRODUCTION_SSH_PRIVATE_KEY || secrets.PROD_SSH_KEY || secrets.SSH_KEY }}
          PRODUCTION_ALLOW_SINGLE_APP_NODE: ${{ vars.PRODUCTION_ALLOW_SINGLE_APP_NODE || '0' }}
          ALLOW_IDENTICAL_PRODUCTION_APP_NODES: ${{ vars.ALLOW_IDENTICAL_PRODUCTION_APP_NODES || '0' }}
        run: |
          set -Eeuo pipefail

          fail() {
            echo "error: $*" >&2
            exit 1
          }

          [[ "${ACTION_MODE}" == "deploy" || "${ACTION_MODE}" == "rollback" ]] || fail "ACTION_MODE must be deploy or rollback"
          [[ -n "${APP_IMAGE_REF}" ]] || fail "missing APP_IMAGE_REF"
          [[ -n "${GOOSE_IMAGE_REF}" ]] || fail "missing GOOSE_IMAGE_REF"
          if [[ "${ACTION_MODE}" == "deploy" ]]; then
            [[ "${SOURCE_BRANCH}" == "main" ]] || fail "production deploys must come from a main build artifact"
          fi
          [[ "${APP_IMAGE_REF}" == *@sha256:* ]] || fail "APP_IMAGE_REF must be digest-pinned"
          [[ "${GOOSE_IMAGE_REF}" == *@sha256:* ]] || fail "GOOSE_IMAGE_REF must be digest-pinned"
          [[ "${APP_IMAGE_REF}" != *":latest" ]] || fail "APP_IMAGE_REF must not use latest"
          [[ "${GOOSE_IMAGE_REF}" != *":latest" ]] || fail "GOOSE_IMAGE_REF must not use latest"
          bash deployments/prod/shared/scripts/validate_digest_pinned_image_refs.sh "${APP_IMAGE_REF}" "${GOOSE_IMAGE_REF}"

          [[ -n "${RELEASE_TAG}" ]] || fail "release tag label is empty"
          if [[ -n "${SOURCE_COMMIT_SHA:-}" ]] && [[ ! "${SOURCE_COMMIT_SHA}" =~ ^[0-9a-f]{40}$ ]]; then
            fail "source_commit_sha must be a full 40-character lowercase git SHA when provided"
          fi
          if [[ -z "${PRODUCTION_PUBLIC_BASE_URL}" && -n "${PRODUCTION_API_DOMAIN}" ]]; then
            PRODUCTION_PUBLIC_BASE_URL="https://${PRODUCTION_API_DOMAIN}"
          fi

          [[ -n "${PRODUCTION_DEPLOY_ROOT}" ]] || fail "missing production deploy root (PRODUCTION_DEPLOY_ROOT or PROD_DEPLOY_PATH)"
          [[ -n "${APP_NODE_A_HOST}" ]] || fail "missing production app node A host"
          [[ "${ALLOW_APP_NODE_ON_DATA_NODE}" == "true" || "${ALLOW_APP_NODE_ON_DATA_NODE}" == "false" ]] || fail "ALLOW_APP_NODE_ON_DATA_NODE must be true or false"
          if [[ -n "${APP_NODE_B_HOST}" ]] && [[ "${APP_NODE_A_HOST}" == "${APP_NODE_B_HOST}" ]]; then
            fail "app node A and B hosts must differ"
          fi
          [[ -n "${SSH_USER}" ]] || fail "missing production SSH user"
          [[ -n "${SSH_PORT}" ]] || fail "missing production SSH port"
          [[ -n "${SSH_KNOWN_HOSTS_CONTENT}" ]] || fail "missing pinned production SSH known_hosts content"
          [[ -n "${SSH_PRIVATE_KEY}" ]] || fail "missing production SSH private key"
          [[ "${SSH_PORT}" =~ ^[0-9]+$ ]] || fail "SSH_PORT must be numeric"
          (( SSH_PORT >= 1 && SSH_PORT <= 65535 )) || fail "SSH_PORT must be between 1 and 65535"
          if [[ "${ACTION_MODE}" == "deploy" ]]; then
            [[ -n "${PRODUCTION_PUBLIC_BASE_URL}" ]] || fail "deploy mode requires PUBLIC_BASE_URL or API_DOMAIN for blackbox smoke"
            if [[ "${INPUT_RUN_MIGRATION:-false}" == "true" ]]; then
              [[ -n "${INPUT_BACKUP_EVIDENCE_ID:-}" ]] || fail "backup_evidence_id is required when run_migration=true"
            fi
          fi

          if [[ "${DEPLOY_DATA_NODE}" == "true" ]]; then
            [[ -n "${DATA_NODE_HOST}" ]] || fail "deploy_data_node=true requires DATA_NODE_HOST"
          fi

          deploy_app_node_b="true"
          app_node_b_warning=""
          if [[ -z "${APP_NODE_B_HOST}" ]]; then
            deploy_app_node_b="false"
            app_node_b_warning="Skipping app-node-b because APP_NODE_B_HOST is not configured."
          elif [[ -n "${DATA_NODE_HOST}" ]] && [[ "${APP_NODE_B_HOST}" == "${DATA_NODE_HOST}" ]]; then
            if [[ "${ALLOW_APP_NODE_ON_DATA_NODE}" == "true" ]]; then
              app_node_b_warning="Running app-node-b on the data-node host may exhaust managed Postgres pool connections."
            else
              deploy_app_node_b="false"
              app_node_b_warning="Skipping app-node-b because it shares the data-node host and ALLOW_APP_NODE_ON_DATA_NODE is not true."
            fi
          fi

          {
            echo "DEPLOY_APP_NODE_B=${deploy_app_node_b}"
            echo "APP_NODE_B_WARNING=${app_node_b_warning}"
          } >> "$GITHUB_ENV"
          {
            echo "deploy_app_node_b=${deploy_app_node_b}"
            echo "app_node_b_warning=${app_node_b_warning}"
          } >> "$GITHUB_OUTPUT"

          if [[ -n "${app_node_b_warning}" ]]; then
            echo "${app_node_b_warning}"
            echo "- topology note: \`${app_node_b_warning}\`" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [[ "${ACTION_MODE}" == "deploy" && "${PRODUCTION_ALLOW_SINGLE_APP_NODE:-0}" != "1" ]]; then
            [[ -n "${APP_NODE_B_HOST:-}" ]] || fail "two-VPS rolling production requires app node B host (PRODUCTION_APP_NODE_B_HOST or equivalent); set org var PRODUCTION_ALLOW_SINGLE_APP_NODE=1 for single app-node only. See docs/operations/two-vps-rolling-production-deploy.md"
            if [[ -n "${APP_NODE_A_HOST:-}" && -n "${APP_NODE_B_HOST:-}" && "${APP_NODE_A_HOST}" == "${APP_NODE_B_HOST}" ]]; then
              if [[ "${ALLOW_IDENTICAL_PRODUCTION_APP_NODES:-0}" != "1" ]]; then
                fail "APP_NODE_A_HOST and APP_NODE_B_HOST must be different for sequential rolling deploy (or set var ALLOW_IDENTICAL_PRODUCTION_APP_NODES=1 for documented dry-runs only). See docs/operations/two-vps-rolling-production-deploy.md"
              fi
            fi
          fi

      - name: Fetch and validate production backup evidence (run_migration only)
        if: inputs.action_mode == 'deploy' && inputs.run_migration
        shell: bash
        env:
          INPUT_BACKUP_EVIDENCE_ID: ${{ inputs.backup_evidence_id || '' }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -Eeuo pipefail
          fail() {
            echo "error: $*" >&2
            exit 1
          }

          ref_raw="${INPUT_BACKUP_EVIDENCE_ID:-}"
          ref_raw="${ref_raw#"${ref_raw%%[![:space:]]*}"}"
          ref_raw="${ref_raw%"${ref_raw##*[![:space:]]}"}"
          [[ -n "${ref_raw}" ]] || fail "backup_evidence_id is required and non-empty when run_migration=true (use a workflow run id or path:...; see docs/operations/production-backup-restore-drill.md)"

          ev_file=""
          if [[ "${ref_raw}" == path:* ]]; then
            rel_path="${ref_raw#path:}"
            rel_path="${rel_path#./}"
            while [[ "${rel_path}" == /* ]]; do
              rel_path="${rel_path#/}"
            done
            [[ -n "${rel_path}" ]] || fail "backup_evidence_id path: prefix requires a non-empty relative path"
            if [[ -n "${GITHUB_WORKSPACE:-}" ]]; then
              ev_file="${GITHUB_WORKSPACE}/${rel_path}"
            else
              ev_file="$(pwd -P)/${rel_path}"
            fi
            if [[ -f "${ev_file}" ]]; then
              : ok
            elif [[ -f "${rel_path}" ]]; then
              ev_file="${rel_path}"
            else
              fail "backup evidence not found: ${ev_file} (and not ./${rel_path})"
            fi
          elif [[ "${ref_raw}" =~ ^[0-9]+$ ]]; then
            stg_id="${ref_raw}"
            st_name="$(
              gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${stg_id}" --jq '.name // ""' 2>/dev/null || true
            )"
            st_conc="$(
              gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${stg_id}" --jq '.conclusion // ""' 2>/dev/null || true
            )"
            [[ -n "${st_name}" ]] || fail "could not read GitHub Actions run ${stg_id} (check run id and token permissions)"
            [[ "${st_conc}" == "success" ]] || fail "backup evidence run ${stg_id} must be successful (conclusion=${st_conc})"
            rm -rf backup-evidence-bundle
            mkdir -p backup-evidence-bundle
            st_artifact_id=""
            st_attempt=1
            while [[ "${st_attempt}" -le 6 ]]; do
              st_artifact_id="$(
                gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${stg_id}/artifacts" \
                  --jq '[.artifacts[]? | select(.name == "production-db-backup-evidence") | .id] | .[0] // empty' 2>/dev/null || true
              )" || true
              if [[ -n "${st_artifact_id}" ]]; then
                break
              fi
              if [[ "${st_attempt}" -lt 6 ]]; then
                sleep 6
              fi
              st_attempt=$((st_attempt + 1))
            done
            [[ -n "${st_artifact_id}" ]] || \
              fail "no artifact named production-db-backup-evidence on run ${stg_id} (see docs/operations/production-backup-restore-drill.md)"
            st_z=1
            while [[ "${st_z}" -le 5 ]]; do
              if gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts/${st_artifact_id}/zip" > backup-evidence-bundle/bundle.zip; then
                break
              fi
              if [[ "${st_z}" -lt 5 ]]; then
                sleep 6
              fi
              st_z=$((st_z + 1))
            done
            [[ -f backup-evidence-bundle/bundle.zip ]] || fail "failed to download production-db-backup-evidence zip"
            python3 -m zipfile -e backup-evidence-bundle/bundle.zip backup-evidence-bundle
            found="$(
              find backup-evidence-bundle -type f -path '*/backup-evidence/backup-evidence.json' -print 2>/dev/null | head -1 || true
            )"
            if [[ -z "${found}" ]]; then
              found="$(
                find backup-evidence-bundle -type f -name 'backup-evidence.json' -print 2>/dev/null | head -1 || true
              )"
            fi
            [[ -n "${found}" ]] || fail "archive did not contain backup-evidence/backup-evidence.json (or backup-evidence.json)"
            ev_file="${found}"
          else
            fail "backup_evidence_id must be only digits (GitHub Actions run id) or path:relative/path/backup-evidence.json — got unsupported value (see docs/operations/production-backup-restore-drill.md)"
          fi

          python3 scripts/ci/validate_backup_evidence.py --for-production-migration --expect-repository "${GITHUB_REPOSITORY}" "${ev_file}"
          {
            echo ""
            echo "## Production database backup evidence"
            echo "- path validated: \`${ev_file}\`"
            echo "- policy: \`--for-production-migration\` (source_environment=production, schema_validation_result=pass, restore drill rules, expiry)"
            echo "- contract: \`docs/contracts/backup-evidence.schema.json\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Gate production release before SSH
        shell: bash
        run: |
          set -Eeuo pipefail
          fail() {
            echo "error: $*" >&2
            exit 1
          }

          case "${ACTION_MODE}" in
            deploy)
              [[ "${RELEASE_GATE_MODE}" == "full-security-release-gate" ]] || fail "refusing production deploy; security release gate mode is not full-security-release-gate: ${RELEASE_GATE_MODE}"
              [[ "${RELEASE_GATE_VERDICT}" == "pass" ]] || fail "refusing production deploy; release gate verdict is not pass: ${RELEASE_GATE_VERDICT}"
              [[ "${REPO_RELEASE_VERDICT}" == "pass" ]] || fail "refusing production deploy; repo-level release evidence is not pass: ${REPO_RELEASE_VERDICT}"
              [[ "${PROVENANCE_RELEASE_VERDICT}" == "pass" || "${PROVENANCE_RELEASE_VERDICT}" == "accepted-private-repo-no-github-attestations" ]] || fail "refusing production deploy; provenance release evidence is not acceptable: ${PROVENANCE_RELEASE_VERDICT}"
              [[ -n "${SECURITY_WORKFLOW_RUN_ID}" ]] || fail "refusing production deploy; matching security workflow run id is missing"
              [[ "${PROVENANCE_VERDICT}" == "verified" || "${PROVENANCE_VERDICT}" == "accepted-private-repo-no-github-attestations" ]] || fail "refusing production deploy; provenance verdict is not acceptable: ${PROVENANCE_VERDICT}"
              if [[ "${PROVENANCE_VERDICT}" == "accepted-private-repo-no-github-attestations" ]]; then
                {
                  echo "- deploy trust boundary: \`private-repo-no-github-attestations\`"
                  echo "- deploy note: \`GitHub Artifact Attestations are unavailable for this private repository; production is proceeding on the explicit private-repo fallback with digest-pinned images and the remaining security gate evidence\`"
                } >> "$GITHUB_STEP_SUMMARY"
              fi
              ;;
            rollback)
              [[ "${PROVENANCE_VERDICT}" == "verified" || "${PROVENANCE_VERDICT}" == "accepted-manual" ]] || fail "refusing production rollback; provenance verdict is not acceptable: ${PROVENANCE_VERDICT}"
              if [[ "${PROVENANCE_VERDICT}" == "accepted-manual" ]]; then
                {
                  echo "- rollback trust boundary: \`manual-trust-exception\`"
                  echo "- rollback note: \`accepted-manual provenance is allowed only for rollback mode with operator-supplied digest-pinned rollback refs\`"
                  echo "- rollback action required: \`confirm the rollback digests and previous successful production record before approving this run\`"
                } >> "$GITHUB_STEP_SUMMARY"
              else
                echo "- rollback trust boundary: \`verified-attestation\`" >> "$GITHUB_STEP_SUMMARY"
              fi
              ;;
            *)
              fail "unsupported production action mode: ${ACTION_MODE}"
              ;;
          esac

      - name: Show production rollout plan
        shell: bash
        env:
          DEPLOY_APP_NODE_B: ${{ steps.validate_deploy_inputs.outputs.deploy_app_node_b || 'true' }}
          APP_NODE_B_WARNING: ${{ steps.validate_deploy_inputs.outputs.app_node_b_warning }}
        run: |
          freshness_window_display="${SECURITY_VERDICT_MAX_AGE_HOURS}"
          if [[ "${SECURITY_VERDICT_MAX_AGE_HOURS}" =~ ^[0-9]+$ ]]; then
            freshness_window_display="${SECURITY_VERDICT_MAX_AGE_HOURS}h"
          fi
          {
            echo "## Production Action Plan"
            echo "- action mode: \`${ACTION_MODE}\`"
            echo "- concurrency policy: \`production-deployment\` queue; in-flight production runs are not canceled"
            if [[ "${ACTION_MODE}" == "deploy" ]]; then
              echo "- selected build run: \`${SELECTED_BUILD_RUN_ID}\`"
              echo "- selected build actor: \`${SELECTED_BUILD_ACTOR}\`"
              echo "- source branch: \`${SOURCE_BRANCH}\`"
              echo "- source commit SHA: \`${SOURCE_COMMIT_SHA}\`"
              echo "- run_migration (workflow input): \`${INPUT_RUN_MIGRATION:-false}\`"
              if [[ "${INPUT_RUN_MIGRATION:-false}" == "true" ]]; then
                echo "- backup_evidence_id (validated in migration gate step): \`${INPUT_BACKUP_EVIDENCE_ID:-}\`"
              elif [[ -n "${INPUT_BACKUP_EVIDENCE_ID:-}" ]]; then
                echo "- backup_evidence_id (informational; run_migration is false, not schema-validated): \`${INPUT_BACKUP_EVIDENCE_ID}\`"
              else
                echo "- backup_evidence_id: \`(not set; optional when run_migration is false)\`"
              fi
            fi
            echo "- app image: \`${APP_IMAGE_REF}\`"
            echo "- app digest: \`${{ needs.validate-promotion-selection.outputs.app_digest }}\`"
            echo "- goose image: \`${GOOSE_IMAGE_REF}\`"
            echo "- goose digest: \`${{ needs.validate-promotion-selection.outputs.goose_digest }}\`"
            echo "- previous app digest: \`${PREVIOUS_APP_DIGEST:-unknown}\`"
            echo "- previous goose digest: \`${PREVIOUS_GOOSE_DIGEST:-unknown}\`"
            echo "- rollback_available_before_deploy: \`${ROLLBACK_AVAILABLE_BEFORE_DEPLOY:-false}\` (digest-pinned refs from last successful production-deployment-manifest)"
            echo "- security release gate artifact: verdict=\`${RELEASE_GATE_VERDICT}\`, mode=\`${RELEASE_GATE_MODE}\`, repo=\`${REPO_RELEASE_VERDICT}\`"
            if [[ -n "${SECURITY_WORKFLOW_RUN_ID}" ]]; then
              echo "- matched security workflow run: \`${SECURITY_WORKFLOW_RUN_ID}\`"
            fi
            echo "- security verdict freshness window: \`${freshness_window_display}\`"
            echo "- security verdict generated at (UTC): \`${SECURITY_VERDICT_GENERATED_AT_UTC:-n/a}\`"
            echo "- security verdict age at gate: \`${SECURITY_VERDICT_AGE_SECONDS:-n/a}\`"
            echo "- provenance release verdict: \`${PROVENANCE_RELEASE_VERDICT}\`"
            echo "- image provenance verdict: \`${PROVENANCE_VERDICT}\`"
            echo "- provenance trust class: \`${PROVENANCE_TRUST_CLASS}\`"
            if [[ "${PROVENANCE_VERDICT}" == "accepted-private-repo-no-github-attestations" ]]; then
              echo "- provenance note: \`GitHub Artifact Attestations are unavailable for this private repository, so this plan uses the explicit private-repo fallback\`"
            fi
            echo "- SSH host trust: \`pinned known_hosts entries from GitHub secrets/vars\`"
            echo "- release label: \`${RELEASE_TAG}\`"
            if [[ "${DEPLOY_APP_NODE_B}" == "true" ]]; then
              echo "- smoke gates: \`public node-A smoke after readiness\` then \`final cluster smoke after node-B readiness\`"
            else
              echo "- smoke gates: \`public node-A smoke after readiness\` then \`final cluster smoke after the selected rollout scope\`"
            fi
            echo "- app node A: \`${APP_NODE_A_HOST}\`"
            if [[ "${DEPLOY_APP_NODE_B}" == "true" ]]; then
              echo "- app node B: \`${APP_NODE_B_HOST}\`"
            else
              echo "- app node B: \`skipped\`"
            fi
            echo "- deploy data-node fallback: \`${DEPLOY_DATA_NODE}\`"
            echo "- data node host: \`${DATA_NODE_HOST:-not-requested}\`"
            echo "- enable temporal profile: \`${ENABLE_TEMPORAL_PROFILE}\`"
            echo "- deploy root: \`${PRODUCTION_DEPLOY_ROOT}\`"
            if [[ -n "${APP_NODE_B_WARNING}" ]]; then
              echo "- topology note: \`${APP_NODE_B_WARNING}\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Validate SSH reachability for production hosts
        shell: bash
        env:
          DEPLOY_APP_NODE_B: ${{ steps.validate_deploy_inputs.outputs.deploy_app_node_b || 'true' }}
        run: |
          set -Eeuo pipefail

          check_host() {
            local host="$1"
            [[ -n "${host}" ]] || return 0
            echo "==> SSH TCP preflight: ${host}:${SSH_PORT} (from GitHub Actions runner)"
            if ! python3 -c "import socket,sys; socket.getaddrinfo(sys.argv[1], None)" "${host}"; then
              echo "deploy-prod: error: DNS resolution failed for host '${host}'" >&2
              exit 1
            fi
            # Allow slow paths; failure here is almost always firewall/security group or wrong host/port.
            if ! python3 -c "import socket,sys; s=socket.create_connection((sys.argv[1], int(sys.argv[2])), timeout=30); s.close()" "${host}" "${SSH_PORT}"; then
              echo "deploy-prod: error: TCP connect to ${host}:${SSH_PORT} timed out or was refused." >&2
              echo "deploy-prod: hint: Ensure this runner can reach SSH on the VPS (public IP, listen address, ufw/iptables, cloud security group). GitHub-hosted runner IPs change; allow SSH broadly or use a self-hosted runner in your network." >&2
              exit 1
            fi
          }

          check_host "${APP_NODE_A_HOST}"
          if [[ "${DEPLOY_APP_NODE_B}" == "true" ]]; then
            check_host "${APP_NODE_B_HOST}"
          fi
          if [[ "${DEPLOY_DATA_NODE}" == "true" ]]; then
            check_host "${DATA_NODE_HOST}"
          fi

      - name: Install production SSH credentials and trust
        shell: bash
        env:
          SSH_KNOWN_HOSTS_CONTENT: ${{ secrets.PRODUCTION_SSH_KNOWN_HOSTS || vars.PRODUCTION_SSH_KNOWN_HOSTS || secrets.PROD_SSH_KNOWN_HOSTS || vars.PROD_SSH_KNOWN_HOSTS || secrets.SSH_KNOWN_HOSTS || vars.SSH_KNOWN_HOSTS }}
          SSH_PRIVATE_KEY: ${{ secrets.PRODUCTION_SSH_PRIVATE_KEY || secrets.PROD_SSH_KEY || secrets.SSH_KEY }}
        run: |
          set -Eeuo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          identity_file="${HOME}/.ssh/production_deploy_key"
          printf '%s\n' "${SSH_PRIVATE_KEY}" > "${identity_file}"
          chmod 600 "${identity_file}"
          printf '%s\n' "${SSH_KNOWN_HOSTS_CONTENT}" > ~/.ssh/known_hosts
          {
            echo 'Host *'
            echo '  BatchMode yes'
            echo '  IdentitiesOnly yes'
            echo "  IdentityFile ${identity_file}"
            echo '  StrictHostKeyChecking yes'
            echo '  UserKnownHostsFile ~/.ssh/known_hosts'
            echo '  GlobalKnownHostsFile ~/.ssh/known_hosts'
          } > ~/.ssh/config
          chmod 600 ~/.ssh/config ~/.ssh/known_hosts
          {
            echo "SSH_IDENTITY_FILE=${identity_file}"
            echo "SSH_OPTS=-o BatchMode=yes -o IdentitiesOnly=yes -i ${identity_file} -o StrictHostKeyChecking=yes -o UserKnownHostsFile=${HOME}/.ssh/known_hosts -o GlobalKnownHostsFile=${HOME}/.ssh/known_hosts"
            echo "SCP_OPTS=-o BatchMode=yes -o IdentitiesOnly=yes -i ${identity_file} -o StrictHostKeyChecking=yes -o UserKnownHostsFile=${HOME}/.ssh/known_hosts -o GlobalKnownHostsFile=${HOME}/.ssh/known_hosts"
          } >> "$GITHUB_ENV"

      - name: Validate pinned SSH host identities
        shell: bash
        env:
          DEPLOY_APP_NODE_B: ${{ steps.validate_deploy_inputs.outputs.deploy_app_node_b || 'true' }}
        run: |
          set -Eeuo pipefail

          fail() {
            echo "error: $*" >&2
            exit 1
          }

          require_known_host() {
            local host="$1"
            [[ -n "${host}" ]] || return 0

            if ssh-keygen -F "${host}" -f "${HOME}/.ssh/known_hosts" >/dev/null; then
              return 0
            fi

            if ssh-keygen -F "[${host}]:${SSH_PORT}" -f "${HOME}/.ssh/known_hosts" >/dev/null; then
              return 0
            fi

            fail "known_hosts does not contain a pinned SSH identity for ${host}:${SSH_PORT}"
          }

          require_known_host "${APP_NODE_A_HOST}"
          if [[ "${DEPLOY_APP_NODE_B}" == "true" ]]; then
            require_known_host "${APP_NODE_B_HOST}"
          fi
          if [[ "${DEPLOY_DATA_NODE}" == "true" ]]; then
            require_known_host "${DATA_NODE_HOST}"
          fi

      - name: Record resolved production SSH context
        shell: bash
        env:
          DEPLOY_APP_NODE_B: ${{ steps.validate_deploy_inputs.outputs.deploy_app_node_b || 'true' }}
        run: |
          set -Eeuo pipefail
          mkdir -p deployment-evidence
          key_fingerprint="$({ ssh-keygen -lf "${SSH_IDENTITY_FILE}" || true; } 2>&1)"
          {
            echo "## Production SSH Context"
            echo "- ssh user: \`${SSH_USER}\`"
            echo "- ssh port: \`${SSH_PORT}\`"
            echo "- app node A: \`${APP_NODE_A_HOST}\`"
            if [[ "${DEPLOY_APP_NODE_B}" == "true" ]]; then
              echo "- app node B: \`${APP_NODE_B_HOST}\`"
            else
              echo "- app node B: \`skipped\`"
            fi
            if [[ "${DEPLOY_DATA_NODE}" == "true" ]]; then
              echo "- data node: \`${DATA_NODE_HOST}\`"
            fi
            echo "- ssh identity file: \`${SSH_IDENTITY_FILE}\`"
            echo "- ssh identity fingerprint:"
            printf '%s\n' "${key_fingerprint}"
          } | tee deployment-evidence/ssh-debug-context.txt >> "$GITHUB_STEP_SUMMARY"

      - name: Probe production SSH authentication
        shell: bash
        env:
          DEPLOY_APP_NODE_B: ${{ steps.validate_deploy_inputs.outputs.deploy_app_node_b || 'true' }}
        run: |
          set -Eeuo pipefail

          fail() {
            echo "error: $*" >&2
            exit 1
          }

          probe_host() {
            local label="$1"
            local host="$2"
            [[ -n "${host}" ]] || return 0
            local target="${SSH_USER}@${host}"
            local output_file="deployment-evidence/ssh-probe-${label}.txt"
            read -r -a ssh_opts <<< "${SSH_OPTS}"

            set +e
            ssh "${ssh_opts[@]}" -p "${SSH_PORT}" "${target}" "printf 'connected\n'" >"${output_file}" 2>&1
            probe_rc=$?
            set -e

            if [[ "${probe_rc}" -ne 0 ]]; then
              {
                echo "### SSH probe failure: ${label}"
                echo "- target: \`${target}\`"
                echo "- ssh identity file: \`${SSH_IDENTITY_FILE}\`"
                echo "- ssh identity fingerprint:"
                ssh-keygen -lf "${SSH_IDENTITY_FILE}" || true
                echo "- probe output:"
                sed 's/^/    /' "${output_file}"
              } >> "$GITHUB_STEP_SUMMARY" 2>&1
              fail "SSH authentication probe failed for ${target}; verify PRODUCTION_SSH_USER, PRODUCTION_SSH_PRIVATE_KEY, and authorized_keys on the target node"
            fi
          }

          mkdir -p deployment-evidence
          probe_host "app-node-a" "${APP_NODE_A_HOST}"
          if [[ "${DEPLOY_APP_NODE_B}" == "true" ]]; then
            probe_host "app-node-b" "${APP_NODE_B_HOST}"
          fi
          if [[ "${DEPLOY_DATA_NODE}" == "true" ]]; then
            probe_host "data-node" "${DATA_NODE_HOST}"
          fi

      - name: Sync app-node assets to node A
        shell: bash
        run: |
          set -Eeuo pipefail
          target="${SSH_USER}@${APP_NODE_A_HOST}"
          read -r -a ssh_opts <<< "${SSH_OPTS}"
          ssh "${ssh_opts[@]}" -p "${SSH_PORT}" "${target}" "mkdir -p '${PRODUCTION_DEPLOY_ROOT}'"
          tar -cf - deployments/prod/app-node deployments/prod/shared deployments/prod/README.md migrations | \
            ssh "${ssh_opts[@]}" -p "${SSH_PORT}" "${target}" "tar -xf - -C '${PRODUCTION_DEPLOY_ROOT}'"

      - name: Sync app-node assets to node B
        if: success() && steps.validate_deploy_inputs.outputs.deploy_app_node_b == 'true'
        shell: bash
        run: |
          set -Eeuo pipefail
          target="${SSH_USER}@${APP_NODE_B_HOST}"
          read -r -a ssh_opts <<< "${SSH_OPTS}"
          ssh "${ssh_opts[@]}" -p "${SSH_PORT}" "${target}" "mkdir -p '${PRODUCTION_DEPLOY_ROOT}'"
          tar -cf - deployments/prod/app-node deployments/prod/shared deployments/prod/README.md migrations | \
            ssh "${ssh_opts[@]}" -p "${SSH_PORT}" "${target}" "tar -xf - -C '${PRODUCTION_DEPLOY_ROOT}'"

      - name: Sync data-node fallback assets
        if: env.DEPLOY_DATA_NODE == 'true'
        shell: bash
        run: |
          set -Eeuo pipefail
          target="${SSH_USER}@${DATA_NODE_HOST}"
          read -r -a ssh_opts <<< "${SSH_OPTS}"
          ssh "${ssh_opts[@]}" -p "${SSH_PORT}" "${target}" "mkdir -p '${PRODUCTION_DEPLOY_ROOT}'"
          tar -cf - deployments/prod/data-node deployments/prod/shared deployments/prod/emqx deployments/prod/README.md | \
            ssh "${ssh_opts[@]}" -p "${SSH_PORT}" "${target}" "tar -xf - -C '${PRODUCTION_DEPLOY_ROOT}'"

      - name: Mark production release start
        if: env.ACTION_MODE == 'deploy'
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p deployment-evidence
          printf 'started\n' > deployment-evidence/release-started

      - name: Collect pre-deploy SLO evidence
        if: env.ACTION_MODE == 'deploy'
        shell: bash
        env:
          BASE_URL: ${{ env.PRODUCTION_PUBLIC_BASE_URL }}
          DEPLOY_SLO_CRITICAL: "1"
          APP_NODE_A_HOST: ${{ env.APP_NODE_A_HOST }}
          APP_NODE_B_HOST: ${{ env.APP_NODE_B_HOST }}
          DEPLOY_APP_NODE_B: ${{ steps.validate_deploy_inputs.outputs.deploy_app_node_b || 'true' }}
          PRODUCTION_DEPLOY_ROOT: ${{ env.PRODUCTION_DEPLOY_ROOT }}
          SSH_USER: ${{ env.SSH_USER }}
          SSH_PORT: ${{ env.SSH_PORT }}
          SSH_OPTS: ${{ env.SSH_OPTS }}
        run: |
          set -Eeuo pipefail
          mkdir -p deployment-evidence
          bash scripts/monitoring/collect_deploy_slo_evidence.sh --json --phase pre_deploy --out deployment-evidence/slo-pre-deploy.json

      - name: Optionally deploy data-node fallback stack
        if: env.DEPLOY_DATA_NODE == 'true'
        id: deploy_data_node
        shell: bash
        env:
          DATA_NODE_HOST: ${{ env.DATA_NODE_HOST }}
          RELEASE_EVIDENCE_FILE: deployment-evidence/release-events.jsonl
        run: |
          set -Eeuo pipefail
          bash deployments/prod/shared/scripts/release_data_node.sh

      - name: Roll out app node A with smoke gate
        id: deploy_app_node_a
        shell: bash
        env:
          GHCR_PULL_USERNAME: ${{ github.repository_owner }}
          GHCR_PULL_TOKEN: ${{ github.token }}
          APP_NODE_HOSTS: ${{ env.APP_NODE_A_HOST }}
          APP_NODE_ENABLE_TEMPORAL_PROFILE: ${{ env.ENABLE_TEMPORAL_PROFILE }}
          TRAFFIC_DRAIN_MODE: ${{ env.TRAFFIC_DRAIN_MODE }}
          TRAFFIC_DRAIN_WAIT_SECONDS: ${{ env.TRAFFIC_DRAIN_WAIT_SECONDS }}
          APP_NODE_RUN_SMOKE_AFTER_READY: ${{ env.ACTION_MODE == 'deploy' && '1' || '0' }}
          APP_NODE_SMOKE_JSON_FILE: deployment-evidence/smoke-app-node-a.json
          APP_NODE_SMOKE_LABEL_PREFIX: app-node-a
          RELEASE_EVIDENCE_FILE: deployment-evidence/release-events.jsonl
          RUN_MIGRATION_ON_FIRST_NODE: ${{ inputs.action_mode == 'deploy' && inputs.run_migration && '1' || '0' }}
          SMOKE_API_DOMAIN: ${{ env.PRODUCTION_API_DOMAIN }}
          SMOKE_BASE_URL: ${{ env.PRODUCTION_PUBLIC_BASE_URL }}
          SMOKE_CONNECT_TO_HOST: ${{ env.APP_NODE_A_HOST }}
          SMOKE_DB_READ_PATH: ${{ env.PRODUCTION_SMOKE_DB_READ_PATH }}
          SMOKE_DB_READ_MATCH_REGEX: ${{ env.PRODUCTION_SMOKE_DB_READ_MATCH_REGEX }}
          SMOKE_LEVEL: business-readonly
          SMOKE_ENABLE_BUSINESS_SYNTHETIC: "0"
          SMOKE_BUSINESS_READONLY_SPECS: ${{ env.PRODUCTION_SMOKE_BUSINESS_READONLY_SPECS }}
          SMOKE_BUSINESS_READONLY_BEARER_TOKEN: ${{ env.PRODUCTION_SMOKE_BUSINESS_READONLY_BEARER_TOKEN }}
        run: |
          set -Eeuo pipefail
          mkdir -p deployment-evidence
          export TRAFFIC_DRAIN_MODE="${TRAFFIC_DRAIN_MODE:-none}"
          export TRAFFIC_DRAIN_WAIT_SECONDS="${TRAFFIC_DRAIN_WAIT_SECONDS:-0}"
          bash deployments/prod/shared/scripts/release_app_cluster.sh "${APP_IMAGE_REF}" "${GOOSE_IMAGE_REF}"

      - name: Collect post-node-A SLO evidence
        if: always() && env.ACTION_MODE == 'deploy'
        shell: bash
        env:
          BASE_URL: ${{ env.PRODUCTION_PUBLIC_BASE_URL }}
          DEPLOY_SLO_CRITICAL: "0"
          APP_NODE_A_HOST: ${{ env.APP_NODE_A_HOST }}
          APP_NODE_B_HOST: ${{ env.APP_NODE_B_HOST }}
          DEPLOY_APP_NODE_B: ${{ steps.validate_deploy_inputs.outputs.deploy_app_node_b || 'true' }}
          PRODUCTION_DEPLOY_ROOT: ${{ env.PRODUCTION_DEPLOY_ROOT }}
          SSH_USER: ${{ env.SSH_USER }}
          SSH_PORT: ${{ env.SSH_PORT }}
          SSH_OPTS: ${{ env.SSH_OPTS }}
        run: |
          set -Eeuo pipefail
          mkdir -p deployment-evidence
          bash scripts/monitoring/collect_deploy_slo_evidence.sh --json --phase post_node_a --out deployment-evidence/slo-post-node-a.json

      - name: Roll out app node B with smoke gate
        id: deploy_app_node_b
        if: success() && steps.validate_deploy_inputs.outputs.deploy_app_node_b == 'true'
        shell: bash
        env:
          GHCR_PULL_USERNAME: ${{ github.repository_owner }}
          GHCR_PULL_TOKEN: ${{ github.token }}
          APP_NODE_HOSTS: ${{ env.APP_NODE_B_HOST }}
          APP_NODE_ENABLE_TEMPORAL_PROFILE: ${{ env.ENABLE_TEMPORAL_PROFILE }}
          TRAFFIC_DRAIN_MODE: ${{ env.TRAFFIC_DRAIN_MODE }}
          TRAFFIC_DRAIN_WAIT_SECONDS: ${{ env.TRAFFIC_DRAIN_WAIT_SECONDS }}
          APP_NODE_RUN_SMOKE_AFTER_READY: ${{ env.ACTION_MODE == 'deploy' && '1' || '0' }}
          APP_NODE_SMOKE_JSON_FILE: deployment-evidence/smoke-app-node-b.json
          APP_NODE_SMOKE_LABEL_PREFIX: app-node-b
          RELEASE_EVIDENCE_FILE: deployment-evidence/release-events.jsonl
          RUN_MIGRATION_ON_FIRST_NODE: "0"
          SMOKE_API_DOMAIN: ${{ env.PRODUCTION_API_DOMAIN }}
          SMOKE_BASE_URL: ${{ env.PRODUCTION_PUBLIC_BASE_URL }}
          SMOKE_CONNECT_TO_HOST: ${{ env.APP_NODE_B_HOST }}
          SMOKE_DB_READ_PATH: ${{ env.PRODUCTION_SMOKE_DB_READ_PATH }}
          SMOKE_DB_READ_MATCH_REGEX: ${{ env.PRODUCTION_SMOKE_DB_READ_MATCH_REGEX }}
          SMOKE_LEVEL: business-readonly
          SMOKE_ENABLE_BUSINESS_SYNTHETIC: "0"
          SMOKE_BUSINESS_READONLY_SPECS: ${{ env.PRODUCTION_SMOKE_BUSINESS_READONLY_SPECS }}
          SMOKE_BUSINESS_READONLY_BEARER_TOKEN: ${{ env.PRODUCTION_SMOKE_BUSINESS_READONLY_BEARER_TOKEN }}
        run: |
          set -Eeuo pipefail
          export TRAFFIC_DRAIN_MODE="${TRAFFIC_DRAIN_MODE:-none}"
          export TRAFFIC_DRAIN_WAIT_SECONDS="${TRAFFIC_DRAIN_WAIT_SECONDS:-0}"
          bash deployments/prod/shared/scripts/release_app_cluster.sh "${APP_IMAGE_REF}" "${GOOSE_IMAGE_REF}"

      - name: Run final public smoke after app node B
        if: env.ACTION_MODE == 'deploy'
        id: smoke_cluster_final
        shell: bash
        env:
          SMOKE_API_DOMAIN: ${{ env.PRODUCTION_API_DOMAIN }}
          SMOKE_BASE_URL: ${{ env.PRODUCTION_PUBLIC_BASE_URL }}
          SMOKE_DB_READ_PATH: ${{ env.PRODUCTION_SMOKE_DB_READ_PATH }}
          SMOKE_DB_READ_MATCH_REGEX: ${{ env.PRODUCTION_SMOKE_DB_READ_MATCH_REGEX }}
          SMOKE_LEVEL: ${{ inputs.enable_business_synthetic_smoke && 'business-safe-synthetic' || 'business-readonly' }}
          SMOKE_ENABLE_BUSINESS_SYNTHETIC: ${{ inputs.enable_business_synthetic_smoke && '1' || '0' }}
          SMOKE_BUSINESS_READONLY_SPECS: ${{ env.PRODUCTION_SMOKE_BUSINESS_READONLY_SPECS }}
          SMOKE_BUSINESS_READONLY_BEARER_TOKEN: ${{ env.PRODUCTION_SMOKE_BUSINESS_READONLY_BEARER_TOKEN }}
          SMOKE_SYNTHETIC_GET_PATH: ${{ env.PRODUCTION_SMOKE_SYNTHETIC_GET_PATH }}
          SMOKE_SYNTHETIC_BEARER_TOKEN: ${{ env.PRODUCTION_SMOKE_SYNTHETIC_BEARER_TOKEN }}
          SMOKE_SYNTHETIC_MATCH_REGEX: ${{ env.PRODUCTION_SMOKE_SYNTHETIC_MATCH_REGEX }}
        run: |
          set -Eeuo pipefail
          mkdir -p deployment-evidence
          write_final_smoke_meta() {
            echo "FINAL_SMOKE_EVIDENCE_VALID=$1" > deployment-evidence/final-smoke-meta.env
            echo "FINAL_SMOKE_FAILURE_KIND=$2" >> deployment-evidence/final-smoke-meta.env
          }
          set +e
          bash deployments/prod/scripts/smoke_prod.sh --json \
            > deployment-evidence/smoke-cluster-final.json \
            2> deployment-evidence/smoke-cluster-final.log
          smoke_rc=$?
          set -e
          if ! python3 -m json.tool deployment-evidence/smoke-cluster-final.json >/dev/null 2>&1; then
            echo "error: deployment-evidence/smoke-cluster-final.json is not valid JSON after final public smoke" >&2
            echo "error: first lines of smoke stderr log:" >&2
            head -n 40 deployment-evidence/smoke-cluster-final.log >&2 || true
            echo "error: first lines of captured stdout (intended JSON path):" >&2
            head -n 40 deployment-evidence/smoke-cluster-final.json >&2 || true
            printf '{"ts":"%s","component":"app-cluster","target":"final-cluster","phase":"evidence","status":"fail","detail":"final smoke JSON invalid / evidence_format_failure"}\n' \
              "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> deployment-evidence/release-events.jsonl
            write_final_smoke_meta 0 evidence_format_failure
            exit 2
          fi
          cat deployment-evidence/smoke-cluster-final.json
          smoke_status="$(python3 -c 'import json, pathlib, sys; payload = json.loads(pathlib.Path(sys.argv[1]).read_text(encoding="utf-8")); print(payload.get("overall_status", "unknown"))' deployment-evidence/smoke-cluster-final.json)"
          smoke_detail="final cluster smoke failed"
          if [[ "${smoke_status}" == "pass" ]]; then
            smoke_detail="final cluster smoke passed"
          fi
          printf '{"ts":"%s","component":"app-cluster","target":"final-cluster","phase":"smoke","status":"%s","detail":"%s"}\n' \
            "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" "${smoke_status}" "${smoke_detail}" >> deployment-evidence/release-events.jsonl
          read -r FINAL_SMOKE_CLASSIFIED_KIND FINAL_SMOKE_JOB_EXIT < <(python3 - "${smoke_rc}" deployment-evidence/smoke-cluster-final.json <<'PY'
import json
import pathlib
import sys

smoke_rc = int(sys.argv[1])
path = pathlib.Path(sys.argv[2])
payload = json.loads(path.read_text(encoding="utf-8"))
failed = payload.get("failed_checks") or []
failed_n = len(failed) if isinstance(failed, list) else 0
overall = (payload.get("overall_status") or "").strip().lower()


def tier_ok(val: object) -> bool:
    t = str(val or "").strip().lower()
    return t in ("pass", "passed", "ok")


core_ok = (
    tier_ok(payload.get("health_result"))
    and tier_ok(payload.get("critical_read_result"))
    and tier_ok(payload.get("base_url_result"))
)
kind = "none"
job_exit = 0
if overall == "pass" and smoke_rc == 0:
    kind = "none"
    job_exit = 0
elif failed_n > 0 or not core_ok:
    kind = "runtime_smoke_failure"
    job_exit = smoke_rc if smoke_rc != 0 else 31
elif overall != "pass" or smoke_rc != 0:
    kind = "smoke_semantics_failure"
    job_exit = smoke_rc if smoke_rc != 0 else 1
else:
    kind = "none"
    job_exit = 0
print(kind)
print(job_exit)
PY
)
          write_final_smoke_meta 1 "${FINAL_SMOKE_CLASSIFIED_KIND}"
          exit "${FINAL_SMOKE_JOB_EXIT}"

      - name: Collect final post-deploy SLO evidence
        if: always() && env.ACTION_MODE == 'deploy'
        shell: bash
        env:
          BASE_URL: ${{ env.PRODUCTION_PUBLIC_BASE_URL }}
          DEPLOY_SLO_CRITICAL: "0"
          APP_NODE_A_HOST: ${{ env.APP_NODE_A_HOST }}
          APP_NODE_B_HOST: ${{ env.APP_NODE_B_HOST }}
          DEPLOY_APP_NODE_B: ${{ steps.validate_deploy_inputs.outputs.deploy_app_node_b || 'true' }}
          PRODUCTION_DEPLOY_ROOT: ${{ env.PRODUCTION_DEPLOY_ROOT }}
          SSH_USER: ${{ env.SSH_USER }}
          SSH_PORT: ${{ env.SSH_PORT }}
          SSH_OPTS: ${{ env.SSH_OPTS }}
        run: |
          set -Eeuo pipefail
          mkdir -p deployment-evidence
          bash scripts/monitoring/collect_deploy_slo_evidence.sh --json --phase post_final --out deployment-evidence/slo-post-final.json

      - name: Attempt automatic rollback after failed production release
        if: failure() && env.ACTION_MODE == 'deploy'
        id: auto_rollback
        continue-on-error: true
        shell: bash
        env:
          DEPLOY_APP_NODE_B: ${{ steps.validate_deploy_inputs.outputs.deploy_app_node_b || 'true' }}
          GHCR_PULL_USERNAME: ${{ github.repository_owner }}
          GHCR_PULL_TOKEN: ${{ github.token }}
          APP_NODE_A_ROLLOUT_OUTCOME: ${{ steps.deploy_app_node_a.outcome }}
          APP_NODE_B_ROLLOUT_OUTCOME: ${{ steps.deploy_app_node_b.outcome }}
          FINAL_SMOKE_OUTCOME: ${{ steps.smoke_cluster_final.outcome }}
          DATA_NODE_DEPLOY_OUTCOME: ${{ steps.deploy_data_node.outcome }}
        run: |
          set -Eeuo pipefail
          mkdir -p deployment-evidence
          rollback_attempted="false"
          rollback_result_out="not-attempted"
          rollback_rc=0
          if [[ -f deployment-evidence/final-smoke-meta.env ]]; then
            # shellcheck disable=SC1091
            source deployment-evidence/final-smoke-meta.env
          fi

          smoke_skip_auto_rollback=0
          if [[ "${FINAL_SMOKE_FAILURE_KIND:-}" == "evidence_format_failure" && "${FINAL_SMOKE_EVIDENCE_VALID:-1}" == "0" ]]; then
            smoke_skip_auto_rollback=1
          fi
          if [[ "${FINAL_SMOKE_FAILURE_KIND:-}" == "smoke_semantics_failure" ]]; then
            smoke_skip_auto_rollback=1
          fi

          write_rollback_outputs() {
            {
              echo "rollback_attempted=${rollback_attempted}"
              echo "rollback_result=${rollback_result_out}"
            } >> "$GITHUB_OUTPUT"
          }

          if [[ ! -f deployment-evidence/release-started ]]; then
            rollback_result_out="not-started"
            write_rollback_outputs
            printf '{"ts":"%s","component":"app-cluster","target":"rollback","phase":"rollback","status":"skipped","detail":"automatic rollback skipped because release never started"}\n' \
              "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> deployment-evidence/release-events.jsonl
            exit 0
          fi

          a_o="${APP_NODE_A_ROLLOUT_OUTCOME:-skipped}"
          b_o="${APP_NODE_B_ROLLOUT_OUTCOME:-skipped}"
          fs_o="${FINAL_SMOKE_OUTCOME:-skipped}"
          # Selective automatic rollback: do not touch a healthy node. Node B is not rolled back if only node A failed (B never received the new release).
          need_a=0
          need_b=0
          if [[ "${a_o}" == "failure" ]]; then
            need_a=1
            printf '{"ts":"%s","component":"app-cluster","target":"rollback","phase":"decision","status":"info","detail":"targeting app node A only: node A rollout failed; node B left unchanged"}\n' \
              "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> deployment-evidence/release-events.jsonl
          elif [[ "${a_o}" == "success" && "${b_o}" == "failure" ]]; then
            need_b=1
            printf '{"ts":"%s","component":"app-cluster","target":"rollback","phase":"decision","status":"info","detail":"targeting app node B only: node A passed; B rollout failed"}\n' \
              "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> deployment-evidence/release-events.jsonl
          elif [[ "${a_o}" == "success" && "${b_o}" == "success" && "${fs_o}" == "failure" ]]; then
            if [[ "${smoke_skip_auto_rollback}" -eq 1 ]]; then
              if [[ "${FINAL_SMOKE_FAILURE_KIND:-}" == "smoke_semantics_failure" ]]; then
                printf '{"ts":"%s","component":"app-cluster","target":"rollback","phase":"rollback","status":"skipped","detail":"automatic rollback skipped because final smoke had no failed checks and only optional skips (smoke_semantics_failure)"}\n' \
                  "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> deployment-evidence/release-events.jsonl
              else
                printf '{"ts":"%s","component":"app-cluster","target":"rollback","phase":"rollback","status":"skipped","detail":"automatic rollback skipped because failure was evidence_format_failure after healthy rollout"}\n' \
                  "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> deployment-evidence/release-events.jsonl
              fi
            else
              need_a=1
              need_b=1
              printf '{"ts":"%s","component":"app-cluster","target":"rollback","phase":"decision","status":"info","detail":"targeting both app nodes: final public smoke failed; revert cluster to prior digests"}\n' \
                "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> deployment-evidence/release-events.jsonl
            fi
          elif [[ "${a_o}" == "success" && "${b_o}" == "skipped" && "${fs_o}" == "failure" ]]; then
            if [[ "${smoke_skip_auto_rollback}" -eq 1 ]]; then
              if [[ "${FINAL_SMOKE_FAILURE_KIND:-}" == "smoke_semantics_failure" ]]; then
                printf '{"ts":"%s","component":"app-cluster","target":"rollback","phase":"rollback","status":"skipped","detail":"automatic rollback skipped because final smoke had no failed checks and only optional skips (smoke_semantics_failure)"}\n' \
                  "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> deployment-evidence/release-events.jsonl
              else
                printf '{"ts":"%s","component":"app-cluster","target":"rollback","phase":"rollback","status":"skipped","detail":"automatic rollback skipped because failure was evidence_format_failure after healthy rollout"}\n' \
                  "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> deployment-evidence/release-events.jsonl
              fi
            else
              need_a=1
              printf '{"ts":"%s","component":"app-cluster","target":"rollback","phase":"decision","status":"info","detail":"targeting app node A only: single-node or B not deployed; final public smoke failed"}\n' \
                "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> deployment-evidence/release-events.jsonl
            fi
          fi
          INCOMPAT_BLOCK_DIGEST="90154f32ffe0f0feabe5bd0f2bb81355ddbae7cec53c42169ab1764138171011"
          if [[ "${need_a}" -eq 1 || "${need_b}" -eq 1 ]]; then
            if [[ "${PREVIOUS_APP_IMAGE_REF:-}" == *"sha256:${INCOMPAT_BLOCK_DIGEST}"* ]] && [[ "${a_o}" != "failure" && "${b_o}" != "failure" ]]; then
              printf '{"ts":"%s","component":"app-cluster","target":"rollback","phase":"rollback","status":"skipped","detail":"automatic rollback skipped: previous app image is a known runtime-incompatible LKG digest for current production env (sha256:%s)"}\n' \
                "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" "${INCOMPAT_BLOCK_DIGEST}" >> deployment-evidence/release-events.jsonl
              need_a=0
              need_b=0
            fi
          fi
          if [[ "${need_a}" -eq 0 && "${need_b}" -eq 0 ]]; then
            printf '{"ts":"%s","component":"app-cluster","target":"rollback","phase":"decision","status":"info","detail":"no scoped app-node rollback from outcomes; may still rollback data node below"}\n' \
              "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> deployment-evidence/release-events.jsonl
          fi
          app_nodes_need_rollback="false"
          if [[ "${need_a}" -eq 1 || "${need_b}" -eq 1 ]]; then
            app_nodes_need_rollback="true"
          fi

          if [[ "${app_nodes_need_rollback}" == "true" && ( -z "${PREVIOUS_APP_IMAGE_REF}" || -z "${PREVIOUS_GOOSE_IMAGE_REF}" ) ]]; then
            rollback_result_out="no-previous-release"
            write_rollback_outputs
            printf '{"ts":"%s","component":"app-cluster","target":"rollback","phase":"rollback","status":"fail","detail":"automatic rollback unavailable because no previous successful production image refs were recorded"}\n' \
              "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> deployment-evidence/release-events.jsonl
            echo "error: release failed after live rollout started, but no digest-pinned last-known-good app/goose refs are available for automatic rollback." >&2
            echo "error: recover using a archived production-deployment-manifest, or run workflow_dispatch rollback mode with explicit refs (no migration down is performed)." >&2
            exit 1
          fi

          rollback_app_node() {
            local host="$1"
            local target="${SSH_USER}@${host}"
            ssh "${ssh_opts[@]}" -p "${SSH_PORT}" "${target}" \
              "cd '${PRODUCTION_DEPLOY_ROOT}/deployments/prod/app-node' && GHCR_PULL_USERNAME='${GHCR_PULL_USERNAME}' GHCR_PULL_TOKEN='${GHCR_PULL_TOKEN}' APP_NODE_ENABLE_TEMPORAL_PROFILE='${ENABLE_TEMPORAL_PROFILE}' RUN_MIGRATION='0' bash 'scripts/rollback_app_node.sh' '${PREVIOUS_APP_IMAGE_REF}' '${PREVIOUS_GOOSE_IMAGE_REF}'"
            ssh "${ssh_opts[@]}" -p "${SSH_PORT}" "${target}" \
              "cd '${PRODUCTION_DEPLOY_ROOT}/deployments/prod/app-node' && APP_NODE_ENABLE_TEMPORAL_PROFILE='${ENABLE_TEMPORAL_PROFILE}' bash 'scripts/healthcheck_app_node.sh'"
          }

          read -r -a ssh_opts <<< "${SSH_OPTS}"

          if [[ "${app_nodes_need_rollback}" == "true" ]]; then
            rollback_attempted="true"
            rollbacked_hosts=0
            if [[ "${need_a}" -eq 1 ]]; then
              if ! rollback_app_node "${APP_NODE_A_HOST}"; then
                rollback_rc=1
              fi
              rollbacked_hosts=$((rollbacked_hosts + 1))
            fi
            if [[ "${need_b}" -eq 1 ]]; then
              if ! rollback_app_node "${APP_NODE_B_HOST}"; then
                rollback_rc=1
              fi
              rollbacked_hosts=$((rollbacked_hosts + 1))
            fi
            if [[ "${rollback_rc}" -eq 0 ]]; then
              printf '{"ts":"%s","component":"app-cluster","target":"rollback","phase":"rollback","status":"pass","detail":"automatic rollback completed for %s app node(s) (selective; prior digest-pinned images; no migration down)"}\n' \
                "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" "${rollbacked_hosts}" >> deployment-evidence/release-events.jsonl
            else
              printf '{"ts":"%s","component":"app-cluster","target":"rollback","phase":"rollback","status":"fail","detail":"automatic rollback failed during selective app-node redeploy (hosts=%s)"}\n' \
                "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" "${rollbacked_hosts}" >> deployment-evidence/release-events.jsonl
            fi
          fi

          if [[ "${DEPLOY_DATA_NODE}" == "true" && -n "${DATA_NODE_DEPLOY_OUTCOME}" && "${DATA_NODE_DEPLOY_OUTCOME}" != "skipped" ]]; then
            rollback_attempted="true"
            target="${SSH_USER}@${DATA_NODE_HOST}"
            if ! ssh "${ssh_opts[@]}" -p "${SSH_PORT}" "${target}" \
              "cd '${PRODUCTION_DEPLOY_ROOT}/deployments/prod/data-node' && bash 'scripts/rollback_data_node.sh'"; then
              rollback_rc=1
              printf '{"ts":"%s","component":"data-node","target":"rollback","phase":"rollback","status":"fail","detail":"automatic data-node rollback command failed"}\n' \
                "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> deployment-evidence/release-events.jsonl
            else
              printf '{"ts":"%s","component":"data-node","target":"rollback","phase":"rollback","status":"pass","detail":"automatic rollback completed for data-node"}\n' \
                "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> deployment-evidence/release-events.jsonl
            fi
          fi

          if [[ "${rollback_attempted}" == "true" ]]; then
            if [[ "${rollback_rc}" -eq 0 ]]; then
              rollback_result_out="completed"
            else
              rollback_result_out="failed"
            fi
          else
            rollback_result_out="nothing-to-rollback"
            printf '{"ts":"%s","component":"app-cluster","target":"rollback","phase":"rollback","status":"skipped","detail":"automatic rollback was not required for this failure mode"}\n' \
              "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> deployment-evidence/release-events.jsonl
          fi

          write_rollback_outputs

          if [[ "${rollback_attempted}" == "true" && "${rollback_rc}" -ne 0 ]]; then
            echo "error: automatic rollback did not complete successfully (rollback_result=failed); verify cluster state and runbooks — do not assume production was restored." >&2
            exit 1
          fi

          if [[ "${rollback_attempted}" == "true" && "${rollback_rc}" -eq 0 ]]; then
            exit 0
          fi
          exit 0

      - name: Write production deployment summary
        if: always()
        shell: bash
        env:
          ACTOR: ${{ github.actor }}
          DEPLOY_APP_NODE_B: ${{ steps.validate_deploy_inputs.outputs.deploy_app_node_b || 'true' }}
          APP_NODE_B_WARNING: ${{ steps.validate_deploy_inputs.outputs.app_node_b_warning }}
          FINAL_RESULT: ${{ job.status }}
          AUTH_MODE: ${{ needs.prepare-promotion-context.outputs.auth_mode }}
          DEPLOY_TRANSPORT: ${{ needs.prepare-promotion-context.outputs.deploy_transport }}
          PROVENANCE_MODE: ${{ needs.prepare-promotion-context.outputs.provenance_verification_mode }}
          PROVENANCE_STATUS: ${{ needs.prepare-promotion-context.outputs.provenance_verification_status }}
          PROVENANCE_TRUST_CLASS: ${{ needs.prepare-promotion-context.outputs.provenance_trust_class }}
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_REF_SHA: ${{ github.sha }}
          DATA_NODE_OUTCOME: ${{ steps.deploy_data_node.outcome || 'skipped' }}
          APP_NODE_A_ROLLOUT_OUTCOME: ${{ steps.deploy_app_node_a.outcome || 'skipped' }}
          APP_NODE_B_ROLLOUT_OUTCOME: ${{ steps.deploy_app_node_b.outcome || 'skipped' }}
          FINAL_CLUSTER_SMOKE_STEP_OUTCOME: ${{ steps.smoke_cluster_final.outcome || 'skipped' }}
          PROVENANCE_VERDICT: ${{ needs.prepare-promotion-context.outputs.provenance_verdict }}
          RESOLVED_RELEASE_LABEL: ${{ needs.resolve-image-refs.outputs.release_label }}
          ROLLBACK_ATTEMPTED: ${{ steps.auto_rollback.outputs.rollback_attempted || 'false' }}
