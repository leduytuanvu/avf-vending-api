name: Deploy Production

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_run:
    workflows:
      - Build and Push Images
    types:
      - completed
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag for this deploy, for example v1.2.3"
        required: true
        type: string
      source_commit_sha:
        description: "Optional source commit SHA that produced the selected image refs"
        required: false
        type: string
      app_image_ref:
        description: "Exact app image reference to deploy, preferably ghcr.io/...@sha256:..."
        required: true
        type: string
      goose_image_ref:
        description: "Exact goose image reference to deploy, preferably ghcr.io/...@sha256:..."
        required: true
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  actions: read
  contents: read
  id-token: write
  packages: read

jobs:
  resolve-image-refs:
    name: Resolve Production Image Refs
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      )
    uses: ./.github/workflows/_reusable-deploy.yml
    with:
      resolution_mode: ${{ github.event_name == 'workflow_run' && 'workflow_run' || 'manual' }}
      workflow_run_id: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.id || '' }}
      app_image_ref: ${{ github.event_name == 'workflow_dispatch' && inputs.app_image_ref || '' }}
      goose_image_ref: ${{ github.event_name == 'workflow_dispatch' && inputs.goose_image_ref || '' }}
    secrets:
      gh_api_token: ${{ secrets.GITHUB_TOKEN }}

  prepare-promotion-context:
    name: Prepare Production Promotion Context
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest
    needs: resolve-image-refs
    outputs:
      auth_mode: ${{ steps.context.outputs.auth_mode }}
      deploy_transport: ${{ steps.context.outputs.deploy_transport }}
      provenance_verification_mode: ${{ steps.context.outputs.provenance_verification_mode }}
      provenance_verification_status: ${{ steps.context.outputs.provenance_verification_status }}

    steps:
      - name: Select active deploy/auth mode
        id: context
        shell: bash
        run: |
          {
            echo "deploy_transport=vps-ssh"
            echo "auth_mode=static-ssh-key"
            echo "provenance_verification_mode=report-only-extension-point"
            echo "provenance_verification_status=not-configured-currently-non-blocking"
          } >> "$GITHUB_OUTPUT"

      - name: Future provenance verification hook
        shell: bash
        env:
          APP_IMAGE_REF: ${{ needs.resolve-image-refs.outputs.app_image_ref }}
          GOOSE_IMAGE_REF: ${{ needs.resolve-image-refs.outputs.goose_image_ref }}
          MODE: ${{ steps.context.outputs.provenance_verification_mode }}
          STATUS: ${{ steps.context.outputs.provenance_verification_status }}
        run: |
          [[ "${APP_IMAGE_REF}" == *@sha256:* ]] || { echo "error: app image ref must remain digest-pinned" >&2; exit 1; }
          [[ "${GOOSE_IMAGE_REF}" == *@sha256:* ]] || { echo "error: goose image ref must remain digest-pinned" >&2; exit 1; }

          {
            echo "## Production Promotion Context"
            echo "- deploy transport: \`vps-ssh\`"
            echo "- auth mode: \`static-ssh-key\`"
            echo "- provenance verification mode: \`${MODE}\`"
            echo "- provenance verification status: \`${STATUS}\`"
            echo "- future hook target: \`insert attestation / provenance verification before Sync production runtime assets\`"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-prod:
    name: Deploy production release
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest
    needs:
      - resolve-image-refs
      - prepare-promotion-context
    environment: production
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate production deploy inputs
        shell: bash
        env:
          APP_IMAGE_REF: ${{ needs.resolve-image-refs.outputs.app_image_ref }}
          GOOSE_IMAGE_REF: ${{ needs.resolve-image-refs.outputs.goose_image_ref }}
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_run' && needs.resolve-image-refs.outputs.app_image_tag || inputs.release_tag }}
          SOURCE_COMMIT_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || inputs.source_commit_sha }}
          EMQX_API_KEY: ${{ secrets.EMQX_API_KEY }}
          EMQX_API_SECRET: ${{ secrets.EMQX_API_SECRET }}
          GHCR_PULL_USERNAME: ${{ secrets.GHCR_PULL_USERNAME }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
        run: |
          set -Eeuo pipefail

          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            [[ "${RELEASE_TAG}" =~ ^v[0-9A-Za-z._-]+$ ]] || {
              echo "error: release_tag must look like a release tag (for example v1.2.3)" >&2
              exit 1
            }
          else
            [[ -n "${RELEASE_TAG}" ]] || {
              echo "error: resolved production release label is empty" >&2
              exit 1
            }
          fi

          if [[ -n "${SOURCE_COMMIT_SHA:-}" ]] && [[ ! "${SOURCE_COMMIT_SHA}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "error: source_commit_sha must be a full 40-character lowercase git SHA when provided" >&2
            exit 1
          fi

          [[ "${APP_IMAGE_REF}" == *@sha256:* ]] || {
            echo "error: app_image_ref must be digest-pinned (...@sha256:...)" >&2
            exit 1
          }

          [[ "${GOOSE_IMAGE_REF}" == *@sha256:* ]] || {
            echo "error: goose_image_ref must be digest-pinned (...@sha256:...)" >&2
            exit 1
          }

          [[ "${APP_IMAGE_REF}" != *":latest" ]] || {
            echo "error: app_image_ref must not use latest" >&2
            exit 1
          }

          [[ "${GOOSE_IMAGE_REF}" != *":latest" ]] || {
            echo "error: goose_image_ref must not use latest" >&2
            exit 1
          }

          if [[ -z "${VPS_DEPLOY_PATH}" ]]; then
            echo "error: VPS_DEPLOY_PATH is empty" >&2
            exit 1
          fi

          if [[ -n "${EMQX_API_KEY:-}" ]] && [[ -n "${EMQX_API_SECRET:-}" ]]; then
            :
          elif [[ -n "${EMQX_API_KEY:-}" ]] || [[ -n "${EMQX_API_SECRET:-}" ]]; then
            echo "error: set both EMQX_API_KEY and EMQX_API_SECRET, or neither" >&2
            exit 1
          else
            echo "error: production deploy requires both EMQX_API_KEY and EMQX_API_SECRET secrets" >&2
            exit 1
          fi

          if [[ -n "${GHCR_PULL_USERNAME:-}" ]] && [[ -n "${GHCR_PULL_TOKEN:-}" ]]; then
            :
          elif [[ -n "${GHCR_PULL_USERNAME:-}" ]] || [[ -n "${GHCR_PULL_TOKEN:-}" ]]; then
            echo "error: set both GHCR_PULL_USERNAME and GHCR_PULL_TOKEN together for production GHCR pulls" >&2
            exit 1
          else
            echo "error: production deploy requires GHCR_PULL_USERNAME and GHCR_PULL_TOKEN because ghcr.io/leduytuanvu/avf-vending-api and ghcr.io/leduytuanvu/avf-vending-api-goose are private packages" >&2
            exit 1
          fi

      - name: Validate production SSH configuration
        if: needs.prepare-promotion-context.outputs.deploy_transport == 'vps-ssh'
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT }}
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set -Eeuo pipefail

          fail() {
            echo "error: $*" >&2
            exit 1
          }

          [[ -n "${VPS_HOST:-}" ]] || fail "missing production secret VPS_HOST"
          [[ -n "${VPS_SSH_PORT:-}" ]] || fail "missing production secret VPS_SSH_PORT"
          [[ -n "${VPS_USER:-}" ]] || fail "missing production secret VPS_USER"
          [[ -n "${VPS_SSH_PRIVATE_KEY:-}" ]] || fail "missing production secret VPS_SSH_PRIVATE_KEY"

          [[ "${VPS_SSH_PORT}" =~ ^[0-9]+$ ]] || fail "VPS_SSH_PORT must be numeric"
          (( VPS_SSH_PORT >= 1 && VPS_SSH_PORT <= 65535 )) || fail "VPS_SSH_PORT must be between 1 and 65535"

          [[ "${VPS_HOST}" != *$'\n'* && "${VPS_HOST}" != *$'\r'* && "${VPS_HOST}" != *" "* ]] || {
            fail "VPS_HOST must be a single hostname or IP without whitespace"
          }

          [[ "${VPS_USER}" != *$'\n'* && "${VPS_USER}" != *$'\r'* && "${VPS_USER}" != *" "* ]] || {
            fail "VPS_USER must be a single SSH username without whitespace"
          }

          [[ "${VPS_SSH_PRIVATE_KEY}" == *"BEGIN "* && "${VPS_SSH_PRIVATE_KEY}" == *"PRIVATE KEY"* ]] || {
            fail "VPS_SSH_PRIVATE_KEY must contain the full private key PEM/OpenSSH block, not a .pub key or truncated value"
          }

          python3 -c "import socket,sys; socket.getaddrinfo(sys.argv[1], None)" "${VPS_HOST}" || {
            fail "VPS_HOST must resolve from GitHub-hosted runners; use a public DNS name or IP"
          }

          python3 -c "import socket,sys; s=socket.create_connection((sys.argv[1], int(sys.argv[2])), timeout=10); s.close()" "${VPS_HOST}" "${VPS_SSH_PORT}" || {
            fail "cannot reach ${VPS_HOST}:${VPS_SSH_PORT} from this GitHub-hosted runner; check SSH port, firewall, security groups, and provider ACLs before SCP/SSH deploy"
          }

      - name: Confirm active production deploy path
        if: needs.prepare-promotion-context.outputs.deploy_transport == 'vps-ssh'
        shell: bash
        env:
          AUTH_MODE: ${{ needs.prepare-promotion-context.outputs.auth_mode }}
          DEPLOY_TRANSPORT: ${{ needs.prepare-promotion-context.outputs.deploy_transport }}
          PROVENANCE_MODE: ${{ needs.prepare-promotion-context.outputs.provenance_verification_mode }}
          PROVENANCE_STATUS: ${{ needs.prepare-promotion-context.outputs.provenance_verification_status }}
        run: |
          {
            echo "### Active production deploy path"
            echo "- deploy transport: \`${DEPLOY_TRANSPORT}\`"
            echo "- auth mode: \`${AUTH_MODE}\`"
            echo "- provenance verification: \`${PROVENANCE_MODE}\` / \`${PROVENANCE_STATUS}\`"
            echo "- current supported mode: \`VPS over SSH\`"
            echo "- GHCR package visibility: \`private\`"
            echo "- GHCR auth requirement: \`GHCR_PULL_USERNAME\` + \`GHCR_PULL_TOKEN\` with package read access"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Sync production runtime assets
        if: needs.prepare-promotion-context.outputs.deploy_transport == 'vps-ssh'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_SSH_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          timeout: 60s
          command_timeout: 60m
          overwrite: true
          source: deployments/prod/docker-compose.prod.yml,deployments/prod/emqx/base.hocon,deployments/prod/scripts/*,deployments/prod/caddy/Caddyfile,deployments/prod/.env.production.example,deployments/prod/README.md
          target: ${{ secrets.VPS_DEPLOY_PATH }}

      - name: Deploy over SSH
        if: needs.prepare-promotion-context.outputs.deploy_transport == 'vps-ssh'
        id: deploy_production
        continue-on-error: true
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_IMAGE_REF: ${{ needs.resolve-image-refs.outputs.app_image_ref }}
          GOOSE_IMAGE_REF: ${{ needs.resolve-image-refs.outputs.goose_image_ref }}
          RELEASE_LABEL: ${{ github.event_name == 'workflow_run' && needs.resolve-image-refs.outputs.app_image_tag || inputs.release_tag }}
          GHCR_PULL_USERNAME: ${{ secrets.GHCR_PULL_USERNAME }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          EMQX_API_KEY: ${{ secrets.EMQX_API_KEY }}
          EMQX_API_SECRET: ${{ secrets.EMQX_API_SECRET }}
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_SSH_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          timeout: 60s
          command_timeout: 60m
          script_stop: true
          envs: APP_IMAGE_REF,GOOSE_IMAGE_REF,RELEASE_LABEL,GHCR_PULL_USERNAME,GHCR_PULL_TOKEN,EMQX_API_KEY,EMQX_API_SECRET,VPS_DEPLOY_PATH
          script: |
            set -Eeuo pipefail

            export APP_IMAGE_REF="${APP_IMAGE_REF}"
            export GOOSE_IMAGE_REF="${GOOSE_IMAGE_REF}"
            export RELEASE_LABEL="${RELEASE_LABEL}"
            export EMQX_API_KEY="${EMQX_API_KEY}"
            export EMQX_API_SECRET="${EMQX_API_SECRET}"

            if [[ -z "${VPS_DEPLOY_PATH}" ]]; then
              echo "error: VPS_DEPLOY_PATH is empty" >&2
              exit 1
            fi

            if [[ -n "${EMQX_API_KEY:-}" ]] && [[ -n "${EMQX_API_SECRET:-}" ]]; then
              :
            else
              echo "error: production deploy requires both EMQX_API_KEY and EMQX_API_SECRET" >&2
              exit 1
            fi

            if [[ -n "${GHCR_PULL_USERNAME:-}" ]] && [[ -n "${GHCR_PULL_TOKEN:-}" ]]; then
              if ! printf '%s' "${GHCR_PULL_TOKEN}" | docker login ghcr.io -u "${GHCR_PULL_USERNAME}" --password-stdin; then
                echo "error: docker login ghcr.io failed for private production packages. Verify GHCR_PULL_USERNAME matches the GitHub account that can read the package and GHCR_PULL_TOKEN has read:packages access." >&2
                exit 1
              fi
            elif [[ -n "${GHCR_PULL_USERNAME:-}" ]] || [[ -n "${GHCR_PULL_TOKEN:-}" ]]; then
              echo "error: set both GHCR_PULL_USERNAME and GHCR_PULL_TOKEN together for production GHCR pulls" >&2
              exit 1
            else
              echo "error: production deploy requires GHCR_PULL_USERNAME and GHCR_PULL_TOKEN because the production GHCR packages are private" >&2
              exit 1
            fi

            set +e
            bash "${VPS_DEPLOY_PATH}/deployments/prod/scripts/release.sh" deploy "${APP_IMAGE_REF}" "${GOOSE_IMAGE_REF}"
            deploy_rc=$?
            set -e
            if [[ "${deploy_rc}" -eq 0 ]]; then
              exit 0
            fi

            if [[ "${deploy_rc}" -eq 42 ]]; then
              echo "post-deploy verification failed; attempting one automatic rollback" >&2
              if ! bash "${VPS_DEPLOY_PATH}/deployments/prod/scripts/rollback_prod.sh"; then
                echo "automatic rollback failed" >&2
              fi
            fi

            exit 1

      - name: Write production deployment summary
        if: always()
        shell: bash
        env:
          ACTOR: ${{ github.actor }}
          APP_IMAGE_REF: ${{ needs.resolve-image-refs.outputs.app_image_ref }}
          DEPLOY_STEP_OUTCOME: ${{ steps.deploy_production.outcome }}
          EVENT_NAME: ${{ github.event_name }}
          GOOSE_IMAGE_REF: ${{ needs.resolve-image-refs.outputs.goose_image_ref }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_run' && needs.resolve-image-refs.outputs.app_image_tag || inputs.release_tag }}
          SOURCE_COMMIT_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || inputs.source_commit_sha }}
          TRIGGER_NAME: ${{ github.event_name }}
          AUTH_MODE: ${{ needs.prepare-promotion-context.outputs.auth_mode }}
          DEPLOY_TRANSPORT: ${{ needs.prepare-promotion-context.outputs.deploy_transport }}
          PROVENANCE_MODE: ${{ needs.prepare-promotion-context.outputs.provenance_verification_mode }}
          PROVENANCE_STATUS: ${{ needs.prepare-promotion-context.outputs.provenance_verification_status }}
          WORKFLOW_REF_SHA: ${{ github.sha }}
        run: |
          mkdir -p deployment-evidence

          if [[ "${EVENT_NAME}" == "workflow_run" ]]; then
            deploy_source_sha="${SOURCE_COMMIT_SHA}"
            deploy_source_sha_note="workflow-run-head-sha"
          elif [[ -n "${SOURCE_COMMIT_SHA:-}" ]]; then
            deploy_source_sha="${SOURCE_COMMIT_SHA}"
            deploy_source_sha_note="operator-supplied"
          else
            deploy_source_sha="${WORKFLOW_REF_SHA}"
            deploy_source_sha_note="workflow-ref-fallback"
          fi

          if [[ "${DEPLOY_STEP_OUTCOME}" == "success" ]]; then
            healthcheck_result="passed"
            rollback_status="not-triggered"
          else
            healthcheck_result="failed-or-not-reached"
            rollback_status="see-deploy-step-logs"
          fi

          cat > deployment-evidence/production-deployment-manifest.json <<EOF
          {
            "environment": "production",
            "source_commit_sha": "${deploy_source_sha}",
            "source_commit_sha_note": "${deploy_source_sha_note}",
            "release_tag": "${RELEASE_TAG}",
            "app_image_ref": "${APP_IMAGE_REF}",
            "goose_image_ref": "${GOOSE_IMAGE_REF}",
            "actor": "${ACTOR}",
            "trigger": "${TRIGGER_NAME}",
            "deploy_transport": "${DEPLOY_TRANSPORT}",
            "auth_mode": "${AUTH_MODE}",
            "provenance_verification_mode": "${PROVENANCE_MODE}",
            "provenance_verification_status": "${PROVENANCE_STATUS}",
            "healthcheck_result": "${healthcheck_result}",
            "rollback_status": "${rollback_status}"
          }
          EOF

          {
            echo "## Production Deployment"
            echo "- environment: \`production\`"
            echo "- source commit SHA: \`${deploy_source_sha}\`"
            echo "- source commit note: \`${deploy_source_sha_note}\`"
            echo "- release tag: \`${RELEASE_TAG}\`"
            echo "- app image: \`${APP_IMAGE_REF}\`"
            echo "- goose image: \`${GOOSE_IMAGE_REF}\`"
            echo "- actor: \`${ACTOR}\`"
            echo "- trigger: \`${TRIGGER_NAME}\`"
            echo "- deploy transport: \`${DEPLOY_TRANSPORT}\`"
            echo "- auth mode: \`${AUTH_MODE}\`"
            echo "- provenance verification: \`${PROVENANCE_MODE}\` / \`${PROVENANCE_STATUS}\`"
            echo "- healthcheck result: \`${healthcheck_result}\`"
            echo "- rollback status: \`${rollback_status}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload production deployment manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-deployment-manifest
          path: deployment-evidence/production-deployment-manifest.json
          if-no-files-found: error
          retention-days: 14

      - name: Fail if production deployment failed
        if: steps.deploy_production.outcome == 'failure'
        shell: bash
        run: exit 1
