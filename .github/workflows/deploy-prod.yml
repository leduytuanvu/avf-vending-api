          WF_ROLLOUT_DERIVED_PY: |
            import json
            import os
            from pathlib import Path

            events = []
            events_path = Path("deployment-evidence/release-events.jsonl")
            if events_path.exists():
                for line in events_path.read_text(encoding="utf-8").splitlines():
                    if line.strip():
                        events.append(json.loads(line))

            def latest_phase_status(component, target, phase, default):
                for event in reversed(events):
                    if event.get("component") == component and event.get("target") == target and event.get("phase") == phase:
                        return event.get("status", default)
                return default

            def normalize_step_outcome(value, default="not-run"):
                mapping = {
                    "success": "pass",
                    "failure": "fail",
                    "cancelled": "cancelled",
                    "skipped": "skipped",
                }
                return mapping.get(value, default)

            def smoke_status(path_str, default):
                path = Path(path_str)
                if not path.exists():
                    return default
                try:
                    payload = json.loads(path.read_text(encoding="utf-8"))
                except Exception:
                    return "malformed"
                return payload.get("overall_status", default)

            action_mode = os.environ.get("ACTION_MODE", "")
            deploy_data_node = os.environ.get("DEPLOY_DATA_NODE", "false")
            app_node_a_host = os.environ.get("APP_NODE_A_HOST", "")
            app_node_b_host = os.environ.get("APP_NODE_B_HOST", "")

            derived = {
                "data_node_result": normalize_step_outcome(os.environ.get("DATA_NODE_OUTCOME", "skipped"), "skipped"),
                "app_node_a_result": normalize_step_outcome(os.environ.get("APP_NODE_A_ROLLOUT_OUTCOME", "skipped"), "skipped"),
                "app_node_a_readiness_result": latest_phase_status("app-node", app_node_a_host, "readiness", "not-run"),
                "app_node_a_smoke_result": smoke_status("deployment-evidence/smoke-app-node-a.json", "skipped" if action_mode != "deploy" else "not-run"),
                "app_node_b_result": normalize_step_outcome(os.environ.get("APP_NODE_B_ROLLOUT_OUTCOME", "skipped"), "skipped"),
                "app_node_b_readiness_result": latest_phase_status("app-node", app_node_b_host, "readiness", "not-run"),
                "app_node_b_smoke_result": smoke_status("deployment-evidence/smoke-app-node-b.json", "skipped" if action_mode != "deploy" else "not-run"),
                "final_cluster_smoke_result": smoke_status("deployment-evidence/smoke-cluster-final.json", "skipped" if action_mode != "deploy" else normalize_step_outcome(os.environ.get("FINAL_CLUSTER_SMOKE_STEP_OUTCOME", "skipped"), "not-run")),
                "rollback_attempted": os.environ.get("ROLLBACK_ATTEMPTED", "false"),
                "rollback_result": os.environ.get("ROLLBACK_RESULT", "not-attempted"),
                "final_deployment_verdict": "pass" if os.environ.get("FINAL_RESULT") == "success" else "fail",
                "release_events_path": str(events_path if events_path.exists() else Path("deployment-evidence/release-events.jsonl")),
            }
            if deploy_data_node != "true":
                derived["data_node_result"] = "skipped"
            tdm = os.environ.get("TRAFFIC_DRAIN_MODE", "none")
            derived["traffic_drain_mode"] = tdm
            derived["zero_downtime_claim"] = "true" if tdm == "caddy" else "false"
            derived["migration_node"] = "app_node_a" if os.environ.get("INPUT_RUN_MIGRATION", "false") == "true" else "none"
            derived["node_a_deploy_result"] = derived["app_node_a_result"]
            derived["node_b_deploy_result"] = derived["app_node_b_result"]
            derived["node_a_smoke_result"] = derived["app_node_a_smoke_result"]
            derived["node_b_smoke_result"] = derived["app_node_b_smoke_result"]
            derived["final_public_smoke_result"] = derived["final_cluster_smoke_result"]
            derived["rollback_available_before_deploy"] = "true" if os.environ.get("ROLLBACK_AVAILABLE_BEFORE_DEPLOY", "false") == "true" else "false"
            fr = os.environ.get("FINAL_RESULT", "")
            fa = derived["app_node_a_result"]
            fb = derived["app_node_b_result"]
            fcs = derived["final_cluster_smoke_result"]
            if fr == "success" and fcs in ("pass",) and fa == "pass" and fb in ("pass", "skipped"):
                derived["rollout_outcome_summary"] = "success_sequential_rolling_2vps" if fb == "pass" else "success_single_app_node"
            elif fa == "fail":
                derived["rollout_outcome_summary"] = "failed_at_node_A_partial_cluster"
            elif fa == "pass" and fb == "fail":
                derived["rollout_outcome_summary"] = "failed_at_node_B_node_A_on_new_rollback_B_eligible"
            elif fcs == "fail" and fa == "pass":
                derived["rollout_outcome_summary"] = "failed_final_public_smoke_rollback_both_or_single_per_auto"
            else:
                derived["rollout_outcome_summary"] = "partial_or_cancelled"
            out_tl = Path("deployment-evidence/rollout-timeline.json")
            out_tl.parent.mkdir(parents=True, exist_ok=True)
            out_tl.write_text(json.dumps(events, indent=2) + "\n", encoding="utf-8")
            derived["rollout_timeline_path"] = str(out_tl)
            for key, value in derived.items():
                print(f"{key}={value}")
          WF_PRODUCTION_MANIFESTS_WRITER: |
            import json
