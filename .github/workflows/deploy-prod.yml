        run: |
          set -Eeuo pipefail
          mkdir -p deployment-evidence
          completed_at_utc="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          rollback_available_before_deploy_json="false"
          [[ "${ROLLBACK_AVAILABLE_BEFORE_DEPLOY:-}" == "true" ]] && rollback_available_before_deploy_json="true"
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          freshness_window_display="${SECURITY_VERDICT_MAX_AGE_HOURS}"
          if [[ "${SECURITY_VERDICT_MAX_AGE_HOURS}" =~ ^[0-9]+$ ]]; then
            freshness_window_display="${SECURITY_VERDICT_MAX_AGE_HOURS}h"
          fi

          storm_gate_bypass_reason_json="$(
            python3 -c 'import json,os; print(json.dumps(os.environ.get("STORM_GATE_BYPASS_REASON") or None))'
          )"
          storm_gate_evidence_path_json="$(
