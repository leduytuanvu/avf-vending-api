name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  go-ci:
    name: Go CI Gates
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.9"
          cache: true
          cache-dependency-path: go.sum

      - name: Install CI tools
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.29.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Verify gofmt cleanliness
        run: make fmt-check

      - name: Verify go.mod/go.sum are tidy
        run: |
          make tidy
          git diff --exit-code -- go.mod go.sum

      - name: Run go vet
        run: make vet

      - name: Validate generated specs and repository invariants
        run: make check-placeholders check-wiring check-migrations sqlc-check swagger-check

      - name: Run short Go test suite
        run: make test-short

  compose-config:
    name: Docker Compose Config Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate local Docker Compose config
        run: docker compose -f deployments/docker/docker-compose.yml config
