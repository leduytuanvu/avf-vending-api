name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install CI tools
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.29.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Run canonical CI gates
        run: make ci-gates

      - name: Validate local Docker Compose config
        run: docker compose -f deployments/docker/docker-compose.yml config
