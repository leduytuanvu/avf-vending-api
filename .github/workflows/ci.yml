name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  workflow-script-quality:
    name: Workflow and Script Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Enterprise release chain (CI position)
        shell: bash
        run: |
          set -Eeuo pipefail
          ev="${{ github.event_name }}"
          {
            echo "## Enterprise release chain — **CI** (this run)"
            echo ""
            echo "\`\`\`"
            if [[ "${ev}" == "pull_request" ]]; then
              echo "PR  →  CI  →  Security  →  (no image build; merge to develop/main to continue)"
            else
              echo "Push to develop/main  →  CI  →  Security  →  Build and Push Images  →  Security Release  →  Deploy (Staging|Production) [verdict+gates]"
            fi
            echo "\`\`\`"
            echo ""
            echo "- This workflow: **CI** (lint, contract checks, build/tests)."
            echo "- **No deploy** and **no images** from this workflow alone; images run only from **Build and Push Images** after successful push CI, then **Security Release**."
            echo "- **Security** (\`security.yml\`) is separate from **Security Release** (release gate after Build)."
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25.9"
          cache: true

      - name: Install workflow and shell lint tools
        shell: bash
        run: |
          set -Eeuo pipefail
          sudo apt-get update
          sudo apt-get install -y shellcheck yamllint
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          go install mvdan.cc/sh/v3/cmd/shfmt@v3.13.1
          echo "$(go env GOPATH)/bin" >> "${GITHUB_PATH}"

      - name: Lint GitHub Actions workflows with actionlint
        shell: bash
        run: |
          set -Eeuo pipefail
          actionlint

      - name: Verify CI/CD workflow contracts
        shell: bash
        # verify_workflow_contracts.sh: supply chain + deploy secrets/vars contract
        # (verify_deployment_config_contract.py) + static guards + tools/verify_github_workflow_cicd_contract.py.
        run: |
          set -Eeuo pipefail
          chmod +x scripts/ci/verify_workflow_contracts.sh
          bash scripts/ci/verify_workflow_contracts.sh

      - name: Lint workflow YAML with yamllint
        shell: bash
        run: |
          set -Eeuo pipefail
          yamllint -d '{extends: default, rules: {document-start: disable, line-length: disable, truthy: disable}}' .github/workflows

      - name: Lint shared production Bash scripts with shellcheck
        shell: bash
        run: |
          set -Eeuo pipefail
          shellcheck -x -P SCRIPTDIR -e SC2016,SC2029,SC2155 \
            deployments/prod/shared/scripts/*.sh

      - name: Enforce shfmt on shared production Bash scripts
        shell: bash
        run: |
          set -Eeuo pipefail
          shfmt -d \
            deployments/prod/shared/scripts/*.sh

  github-governance:
    name: GitHub repository governance
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Skip governance for fork pull requests
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork
        shell: bash
        run: |
          set -Eeuo pipefail
          {
            echo "## GitHub repository governance"
            echo "- **GOVERNANCE_CHECK**: \`SKIPPED\` — **pull_request** from a **fork**. The governance script calls the GitHub API for the **base** repository; fork PRs skip this job so contributor PRs are not blocked by org token or environment API quirks."
            echo "- **When it runs**: pushes to \`main\` / \`develop\`, **same-repo** pull requests, and **workflow_dispatch**."
            echo "- **Docs**: [docs/operations/github-governance.md](../../docs/operations/github-governance.md)"
          } >> "${GITHUB_STEP_SUMMARY}"
          echo "GOVERNANCE_CHECK: SKIPPED (fork pull_request)"

      - name: Check out repository
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install GitHub CLI if missing
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
        shell: bash
        run: |
          set -Eeuo pipefail
          if ! command -v gh >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y gh
          fi
          gh --version

      - name: Verify branch protection and production environment
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
        shell: bash
        env:
          # When set, shell + verifier prefer this for rulesets/branch/protection/environment reads. Empty when the secret is not defined.
          GOVERNANCE_AUDIT_TOKEN: ${{ secrets.GOVERNANCE_AUDIT_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GOVERNANCE_AUDIT_TOKEN || github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          ENFORCE_GITHUB_GOVERNANCE: "true"
        run: |
          set -Eeuo pipefail
          chmod +x scripts/ci/verify_github_governance.sh
          bash scripts/ci/verify_github_governance.sh
          {
            echo "## GitHub repository governance"
            echo "- **Script**: \`scripts/ci/verify_github_governance.sh\` (uses \`gh api\` via \`tools/verify_github_governance.py\`)."
            echo "- **Result line**: \`GOVERNANCE_CHECK: PASS\` / \`FAIL\` / \`SKIPPED\` / (same-repo **pull_request** only) \`MANUAL_REVIEW_REQUIRED\` when the token still cannot read admin APIs — not a passing audit. Prefer repository secret \`GOVERNANCE_AUDIT_TOKEN\` (read-only; see docs) so CI can verify settings."
            echo "- **Full runbook**: [docs/runbooks/github-governance.md](../../docs/runbooks/github-governance.md)"
            echo "- **Configure GitHub** (branches + \`production\` environment): [docs/operations/github-governance.md](../../docs/operations/github-governance.md)"
          } >> "${GITHUB_STEP_SUMMARY}"

  go-ci:
    name: Go CI Gates
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25.9"
          cache: true
          cache-dependency-path: go.sum

      - name: Install CI tools
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Verify gofmt cleanliness
        run: make fmt-check

      - name: Verify go.mod/go.sum are tidy
        run: |
          make tidy
          git diff --exit-code -- go.mod go.sum

      - name: Run go vet
        run: make vet

      - name: Validate generated specs and repository invariants
        run: make check-placeholders check-wiring sqlc-check swagger-check postman-check

      - name: Run short Go test suite
        run: make test-short

  migration-safety:
    name: Migration Safety Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      actions: write

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Verify goose migrations (layout + destructive SQL heuristics)
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p ci-reports
          DEPLOY_TARGET=ci bash scripts/ci/verify_migrations.sh --report ci-reports/migration-safety-report.json

      - name: Upload migration safety report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: migration-safety-report
          path: ci-reports/migration-safety-report.json
          if-no-files-found: warn
          retention-days: 30

  compose-config:
    name: Docker Compose Config Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate local Docker Compose config
        run: docker compose -f deployments/docker/docker-compose.yml config

      - name: Validate production app-node Compose configs
        run: |
          docker compose --env-file deployments/prod/app-node/.env.app-node.example -f deployments/prod/app-node/docker-compose.app-node.yml config
          docker compose --env-file deployments/prod/app-node/.env.app-node.example -f deployments/prod/app-node/docker-compose.app-node.yml --profile temporal config
          docker compose --env-file deployments/prod/app-node/.env.app-node.example -f deployments/prod/app-node/docker-compose.app-node.yml --profile migration config

      - name: Validate production data-node Compose config
        run: docker compose --env-file deployments/prod/data-node/.env.data-node.example -f deployments/prod/data-node/docker-compose.data-node.yml config

      - name: Validate develop deployment Docker Compose config
        run: STAGING_ENV_FILE=.env.staging.example docker compose --env-file deployments/staging/.env.staging.example -f deployments/staging/docker-compose.staging.yml config

      - name: Validate deployment smoke scripts
        shell: bash
        run: |
          set -Eeuo pipefail
          bash -n deployments/prod/shared/scripts/smoke_http.sh
          bash -n deployments/prod/shared/scripts/verify_runtime_assets.sh
          bash -n deployments/prod/shared/scripts/check_restore_readiness.sh
          bash -n deployments/staging/scripts/deploy_staging.sh
          bash -n deployments/staging/scripts/healthcheck_staging.sh
          bash -n deployments/staging/scripts/smoke_staging.sh

  legacy-prod-asset-contract:
    name: Legacy Production Asset Contract
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      actions: write

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate legacy wrapper guards
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p ci-reports

          check_guard() {
            local script_path="$1"
            local script_name
            local output_file
            script_name="$(basename "${script_path}")"
            output_file="ci-reports/${script_name}.guard.txt"

            if ALLOW_LEGACY_SINGLE_HOST=0 bash "${script_path}" >"${output_file}" 2>&1; then
              echo "error: ${script_name} unexpectedly succeeded without ALLOW_LEGACY_SINGLE_HOST=1" >&2
              exit 1
            fi

            grep -q "LEGACY SINGLE-HOST PRODUCTION PATH" "${output_file}" || {
              echo "error: ${script_name} did not print the legacy-path banner" >&2
              exit 1
            }
            grep -q "NOT THE PRIMARY 2-VPS RELEASE PATH" "${output_file}" || {
              echo "error: ${script_name} did not print the 2-VPS warning" >&2
              exit 1
            }
            grep -q "ALLOW_LEGACY_SINGLE_HOST=1" "${output_file}" || {
              echo "error: ${script_name} did not require explicit legacy opt-in" >&2
              exit 1
            }
          }

          check_guard deployments/prod/scripts/deploy_prod.sh
          check_guard deployments/prod/scripts/update_prod.sh
          check_guard deployments/prod/scripts/rollback_prod.sh

      - name: Run deterministic legacy release asset validation
        shell: bash
        run: |
          set -Eeuo pipefail
          ALLOW_LEGACY_SINGLE_HOST=1 bash deployments/prod/scripts/validate_release_assets.sh deployments/prod/.env.production.example | tee ci-reports/legacy-release-assets-validation.txt

      - name: Assert machine-readable legacy release contracts
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          checks = {
              "release.sh": {
                  "path": Path("deployments/prod/scripts/release.sh"),
                  "required_markers": [
                      "last_release_summary.json",
                      "last_backup_manifest_path",
                      "last_backup_timestamp",
                      "last_verify_result",
                      "AUTO_ROLLBACK_ON_VERIFY_FAIL",
                  ],
              },
              "backup_postgres.sh": {
                  "path": Path("deployments/prod/scripts/backup_postgres.sh"),
                  "required_markers": [
                      ".manifest.json",
                      "BACKUP_MANIFEST_POINTER_FILE",
                      "BACKUP_TIMESTAMP_POINTER_FILE",
                      "sha256_value",
                  ],
              },
              "healthcheck_prod.sh": {
                  "path": Path("deployments/prod/scripts/healthcheck_prod.sh"),
                  "required_markers": [
                      "HEALTHCHECK_JSON",
                      "overall_status",
                      "failed_checks",
                      "key_container_states",
                      "public_https_result",
                      "metrics_result",
                      "smoke_result",
                      "EXIT_CODE_RUNTIME_FAILURE",
                      "EXIT_CODE_READINESS_FAILURE",
                      "EXIT_CODE_PUBLIC_EDGE_FAILURE",
                      "EXIT_CODE_SMOKE_FAILURE",
                  ],
              },
          }

          report = {}
          for label, spec in checks.items():
              content = spec["path"].read_text(encoding="utf-8")
              missing = [marker for marker in spec["required_markers"] if marker not in content]
              if missing:
                  raise SystemExit(f"{label} missing contract markers: {missing}")
              report[label] = {
                  "path": str(spec["path"]),
                  "validated_markers": spec["required_markers"],
              }

          output_path = Path("ci-reports/legacy-machine-readable-contract.json")
          output_path.write_text(json.dumps(report, indent=2) + "\n", encoding="utf-8")
          PY

          {
            echo "### Legacy Production Asset Contract"
            echo "- validated legacy wrapper opt-in guards and warning banners"
            echo "- ran \`validate_release_assets.sh\` against \`deployments/prod/.env.production.example\` with explicit legacy opt-in"
            echo "- asserted machine-readable legacy release markers for summary, backup manifest, and JSON healthcheck outputs"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload legacy production asset contract report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ci-legacy-production-asset-contract
          path: ci-reports
          if-no-files-found: error
          retention-days: 30
