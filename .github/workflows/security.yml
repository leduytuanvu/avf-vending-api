name: Security

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

concurrency:
  group: security-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request' && vars.ENABLE_DEPENDENCY_REVIEW == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Review dependency changes
        uses: actions/dependency-review-action@v4

  govulncheck-pr:
    name: Go Vulnerability Scan
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.9"
          cache: true
          cache-dependency-path: go.sum

      - name: Run govulncheck
        shell: bash
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  govulncheck-nightly:
    name: Go Vulnerability Report
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.9"
          cache: true
          cache-dependency-path: go.sum

      - name: Generate govulncheck report
        shell: bash
        run: |
          set -o pipefail
          mkdir -p security-reports
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./... 2>&1 | tee security-reports/govulncheck.txt

      - name: Upload govulncheck report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: govulncheck-report
          path: security-reports/govulncheck.txt
          if-no-files-found: error
          retention-days: 14

  dependency-snapshot:
    name: Dependency Update Snapshot
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.9"
          cache: true
          cache-dependency-path: go.sum

      - name: Generate dependency update snapshot
        shell: bash
        run: |
          mkdir -p security-reports
          go list -u -m -json all > security-reports/go-module-updates.json
          {
            echo "### Nightly security summary"
            echo "- govulncheck runs as a blocking report job in this workflow."
            echo "- go module update inventory written to \`go-module-updates.json\`."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload dependency snapshot
        uses: actions/upload-artifact@v4
        with:
          name: dependency-update-snapshot
          path: security-reports/go-module-updates.json
          if-no-files-found: error
          retention-days: 14
