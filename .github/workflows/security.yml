name: Security

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main
  workflow_run:
    workflows:
      - Build and Push Images
    types:
      - completed
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

concurrency:
  group: security-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  packages: read
  security-events: write

jobs:
  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request' && vars.ENABLE_DEPENDENCY_REVIEW == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Review dependency changes
        uses: actions/dependency-review-action@v4

  govulncheck-pr:
    name: Go Vulnerability Scan
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.9"
          cache: true
          cache-dependency-path: go.sum

      - name: Run govulncheck
        shell: bash
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  secret-scan:
    name: Secret Scan
    if: github.event_name != 'workflow_run'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.9"
          cache: true
          cache-dependency-path: go.sum

      - name: Run gitleaks
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p security-reports
          go install github.com/zricethezav/gitleaks/v8@v8.24.2
          "$(go env GOPATH)/bin/gitleaks" dir \
            --config .gitleaks.toml \
            --report-format sarif \
            --report-path security-reports/gitleaks.sarif \
            --redact \
            --no-banner \
            .

      - name: Upload gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: security-reports/gitleaks.sarif
          if-no-files-found: error
          retention-days: 14

      - name: Upload gitleaks SARIF to code scanning
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: security-reports/gitleaks.sarif
          category: gitleaks

  config-scan:
    name: Deployment and Config Scan
    if: github.event_name != 'workflow_run'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run Trivy config scan
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p security-reports
          : > security-reports/trivy-config.txt
          for target in \
            deployments/prod/app-node \
            deployments/prod/data-node \
            deployments/prod/shared \
            deployments/staging \
            .github/workflows/ci.yml \
            .github/workflows/security.yml \
            .github/workflows/build-push.yml \
            .github/workflows/deploy-develop.yml \
            .github/workflows/deploy-prod.yml
          do
            echo "### Trivy config scan target: ${target}" | tee -a security-reports/trivy-config.txt
            docker run --rm \
              -v "${PWD}:/workdir" \
              -w /workdir \
              aquasec/trivy:0.57.1 \
              config \
              --config trivy.yaml \
              --ignorefile .trivyignore \
              "${target}" | tee -a security-reports/trivy-config.txt
          done

      - name: Upload Trivy config report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-config-report
          path: security-reports/trivy-config.txt
          if-no-files-found: error
          retention-days: 14

  resolve-build-run-id:
    name: Resolve Published Build For Image Scan
    if: |
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      workflow_run_id: ${{ steps.lookup.outputs.workflow_run_id }}
    steps:
      - name: Resolve build workflow run id
        id: lookup
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail

          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            echo "workflow_run_id=${{ github.event.workflow_run.id }}" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          workflow_run_id="$(
            gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/build-push.yml/runs?branch=main&status=completed&per_page=20" \
              --jq '[.workflow_runs[]? | select(.conclusion == "success") | .id] | .[0] // empty'
          )"

          [[ -n "${workflow_run_id}" ]] || {
            echo "error: no successful Build and Push Images run found on main" >&2
            exit 1
          }

          echo "workflow_run_id=${workflow_run_id}" >> "${GITHUB_OUTPUT}"

  resolve-image-refs:
    name: Resolve Published Image Refs
    if: |
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    needs: resolve-build-run-id
    uses: ./.github/workflows/_reusable-deploy.yml
    with:
      resolution_mode: workflow_run
      workflow_run_id: ${{ needs.resolve-build-run-id.outputs.workflow_run_id }}
    secrets:
      gh_api_token: ${{ secrets.GITHUB_TOKEN }}

  image-vulnerability-scan:
    name: Published Image Vulnerability Scan
    if: |
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: resolve-image-refs

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Show image scan policy
        shell: bash
        env:
          APP_IMAGE_REF: ${{ needs.resolve-image-refs.outputs.app_image_ref }}
          GOOSE_IMAGE_REF: ${{ needs.resolve-image-refs.outputs.goose_image_ref }}
        run: |
          {
            echo "## Security Scan Policy"
            echo "- secret scan: fail on any detected secret in repo-scoped content scan"
            echo "- Go vulnerability scan: fail on govulncheck findings in reachable code"
            echo "- config scan: fail on \`HIGH\` and \`CRITICAL\` misconfigurations"
            echo "- image scan: fail on \`HIGH\` and \`CRITICAL\` vulnerabilities with \`ignore-unfixed=true\`"
            echo "- app image: \`${APP_IMAGE_REF}\`"
            echo "- goose image: \`${GOOSE_IMAGE_REF}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Scan published app image
        shell: bash
        env:
          APP_IMAGE_REF: ${{ needs.resolve-image-refs.outputs.app_image_ref }}
        run: |
          set -Eeuo pipefail
          mkdir -p security-reports
          docker run --rm \
            -v "${HOME}/.docker:/root/.docker:ro" \
            -v "${PWD}:/workdir" \
            -w /workdir \
            aquasec/trivy:0.57.1 \
            image \
            --config trivy.yaml \
            --ignorefile .trivyignore \
            --scanners vuln \
            "${APP_IMAGE_REF}" | tee security-reports/trivy-image-app.txt

      - name: Scan published goose image
        shell: bash
        env:
          GOOSE_IMAGE_REF: ${{ needs.resolve-image-refs.outputs.goose_image_ref }}
        run: |
          set -Eeuo pipefail
          mkdir -p security-reports
          docker run --rm \
            -v "${HOME}/.docker:/root/.docker:ro" \
            -v "${PWD}:/workdir" \
            -w /workdir \
            aquasec/trivy:0.57.1 \
            image \
            --config trivy.yaml \
            --ignorefile .trivyignore \
            --scanners vuln \
            "${GOOSE_IMAGE_REF}" | tee security-reports/trivy-image-goose.txt

      - name: Upload Trivy image reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-reports
          path: |
            security-reports/trivy-image-app.txt
            security-reports/trivy-image-goose.txt
          if-no-files-found: error
          retention-days: 14

  govulncheck-nightly:
    name: Go Vulnerability Report
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.9"
          cache: true
          cache-dependency-path: go.sum

      - name: Generate govulncheck report
        shell: bash
        run: |
          set -o pipefail
          mkdir -p security-reports
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./... 2>&1 | tee security-reports/govulncheck.txt

      - name: Upload govulncheck report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: govulncheck-report
          path: security-reports/govulncheck.txt
          if-no-files-found: error
          retention-days: 14

  dependency-snapshot:
    name: Dependency Update Snapshot
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.9"
          cache: true
          cache-dependency-path: go.sum

      - name: Generate dependency update snapshot
        shell: bash
        run: |
          mkdir -p security-reports
          go list -u -m -json all > security-reports/go-module-updates.json
          {
            echo "### Nightly security summary"
            echo "- govulncheck runs as a blocking report job in this workflow."
            echo "- go module update inventory written to \`go-module-updates.json\`."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload dependency snapshot
        uses: actions/upload-artifact@v4
        with:
          name: dependency-update-snapshot
          path: security-reports/go-module-updates.json
          if-no-files-found: error
          retention-days: 14

  security-release-signal:
    name: Security Release Signal
    if: always()
    runs-on: ubuntu-latest
    needs:
      - dependency-review
      - govulncheck-pr
      - secret-scan
      - config-scan
      - resolve-build-run-id
      - resolve-image-refs
      - image-vulnerability-scan
      - govulncheck-nightly
      - dependency-snapshot
    outputs:
      release_gate_verdict: ${{ steps.signal.outputs.release_gate_verdict }}
      repo_security_verdict: ${{ steps.signal.outputs.repo_security_verdict }}
      published_image_verdict: ${{ steps.signal.outputs.published_image_verdict }}
    steps:
      - name: Write structured security release signal
        id: signal
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          DEPENDENCY_REVIEW_RESULT: ${{ needs.dependency-review.result }}
          GOVULNCHECK_PR_RESULT: ${{ needs.govulncheck-pr.result }}
          SECRET_SCAN_RESULT: ${{ needs.secret-scan.result }}
          CONFIG_SCAN_RESULT: ${{ needs.config-scan.result }}
          RESOLVE_BUILD_RUN_RESULT: ${{ needs.resolve-build-run-id.result }}
          RESOLVE_IMAGE_REFS_RESULT: ${{ needs.resolve-image-refs.result }}
          IMAGE_SCAN_RESULT: ${{ needs.image-vulnerability-scan.result }}
          GOVULNCHECK_NIGHTLY_RESULT: ${{ needs.govulncheck-nightly.result }}
          DEPENDENCY_SNAPSHOT_RESULT: ${{ needs.dependency-snapshot.result }}
          APP_IMAGE_REF: ${{ needs.resolve-image-refs.outputs.app_image_ref }}
          GOOSE_IMAGE_REF: ${{ needs.resolve-image-refs.outputs.goose_image_ref }}
          PROVENANCE_VERDICT: ${{ needs.resolve-image-refs.outputs.provenance_verdict }}
        run: |
          set -Eeuo pipefail
          mkdir -p security-reports
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          event_name = os.environ["EVENT_NAME"]
          results = {
              "dependency_review": os.environ["DEPENDENCY_REVIEW_RESULT"] or "not_applicable",
              "govulncheck_pr": os.environ["GOVULNCHECK_PR_RESULT"] or "not_applicable",
              "secret_scan": os.environ["SECRET_SCAN_RESULT"] or "not_applicable",
              "config_scan": os.environ["CONFIG_SCAN_RESULT"] or "not_applicable",
              "resolve_build_run": os.environ["RESOLVE_BUILD_RUN_RESULT"] or "not_applicable",
              "resolve_image_refs": os.environ["RESOLVE_IMAGE_REFS_RESULT"] or "not_applicable",
              "image_vulnerability_scan": os.environ["IMAGE_SCAN_RESULT"] or "not_applicable",
              "govulncheck_nightly": os.environ["GOVULNCHECK_NIGHTLY_RESULT"] or "not_applicable",
              "dependency_snapshot": os.environ["DEPENDENCY_SNAPSHOT_RESULT"] or "not_applicable",
          }

          def verdict_for(job_names):
              relevant = [results[name] for name in job_names if results[name] != "skipped"]
              if not relevant:
                  return "not_applicable"
              if all(result == "success" for result in relevant):
                  return "pass"
              return "fail"

          repo_security_verdict = verdict_for([
              "dependency_review",
              "govulncheck_pr",
              "secret_scan",
              "config_scan",
          ])
          published_image_verdict = verdict_for([
              "resolve_build_run",
              "resolve_image_refs",
              "image_vulnerability_scan",
          ])
          nightly_security_verdict = verdict_for([
              "govulncheck_nightly",
              "dependency_snapshot",
          ])

          applicable = [v for v in [repo_security_verdict, published_image_verdict, nightly_security_verdict] if v != "not_applicable"]
          release_gate_verdict = "pass" if applicable and all(v == "pass" for v in applicable) else ("not_applicable" if not applicable else "fail")

          payload = {
              "event_name": event_name,
              "release_gate_verdict": release_gate_verdict,
              "repo_security_verdict": repo_security_verdict,
              "published_image_verdict": published_image_verdict,
              "nightly_security_verdict": nightly_security_verdict,
              "published_images": {
                  "app_image_ref": os.environ.get("APP_IMAGE_REF", ""),
                  "goose_image_ref": os.environ.get("GOOSE_IMAGE_REF", ""),
                  "provenance_verdict": os.environ.get("PROVENANCE_VERDICT", ""),
              },
              "job_results": results,
          }
          Path("security-reports/security-release-verdict.json").write_text(json.dumps(payload, indent=2) + "\n", encoding="utf-8")
          print(f"release_gate_verdict={release_gate_verdict}")
          print(f"repo_security_verdict={repo_security_verdict}")
          print(f"published_image_verdict={published_image_verdict}")
          PY
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          payload = json.loads(Path("security-reports/security-release-verdict.json").read_text(encoding="utf-8"))
          for key in ("release_gate_verdict", "repo_security_verdict", "published_image_verdict"):
              print(f"{key}={payload[key]}")
          PY
          python3 - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path

          payload = json.loads(Path("security-reports/security-release-verdict.json").read_text(encoding="utf-8"))
          print("## Security Release Signal")
          print(f"- event: `{payload['event_name']}`")
          print(f"- release gate verdict: `{payload['release_gate_verdict']}`")
          print(f"- repo security verdict: `{payload['repo_security_verdict']}`")
          print(f"- published image verdict: `{payload['published_image_verdict']}`")
          if payload["published_images"]["app_image_ref"]:
              print(f"- app image: `{payload['published_images']['app_image_ref']}`")
          if payload["published_images"]["goose_image_ref"]:
              print(f"- goose image: `{payload['published_images']['goose_image_ref']}`")
          if payload["published_images"]["provenance_verdict"]:
              print(f"- published image provenance verdict: `{payload['published_images']['provenance_verdict']}`")
          PY

      - name: Upload security release verdict
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-release-verdict
          path: security-reports/security-release-verdict.json
          if-no-files-found: error
          retention-days: 14
