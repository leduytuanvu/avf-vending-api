# Repo-level checks (govulncheck, dependency review, etc.). Display name must stay "Security" — do not
# rename to "Security Release"; that name is reserved for security-release.yml (release gate after Build).
name: Security

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

concurrency:
  group: security-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  attestations: read
  contents: read
  packages: read
  security-events: write

jobs:
  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request' && vars.ENABLE_DEPENDENCY_REVIEW == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Review dependency changes
        uses: actions/dependency-review-action@v4

  govulncheck-pr:
    name: Go Vulnerability Scan
    if: github.event_name == 'pull_request' || github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.9"
          cache: true
          cache-dependency-path: go.sum

      - name: Run govulncheck
        shell: bash
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.9"
          cache: true
          cache-dependency-path: go.sum

      - name: Run gitleaks
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p security-reports
          go install github.com/zricethezav/gitleaks/v8@v8.24.2
          "$(go env GOPATH)/bin/gitleaks" dir \
            --config .gitleaks.toml \
            --report-format sarif \
            --report-path security-reports/gitleaks.sarif \
            --redact \
            --no-banner \
            .

      - name: Upload gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: security-reports/gitleaks.sarif
          if-no-files-found: error
          retention-days: 14

      - name: Upload gitleaks SARIF to code scanning
        if: always() && vars.ENABLE_CODE_SCANNING == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: security-reports/gitleaks.sarif
          category: gitleaks

  config-scan:
    name: Deployment and Config Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run Trivy config scan
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p security-reports
          trivy_image="aquasec/trivy:0.57.1"

          pull_trivy_image() {
            local attempt
            for attempt in 1 2 3 4 5; do
              if docker pull "${trivy_image}"; then
                return 0
              fi
              if [[ "${attempt}" -lt 5 ]]; then
                echo "Trivy image pull failed; retrying (${attempt}/5)" >&2
                sleep 10
              fi
            done
            echo "error: failed to pull ${trivy_image} after retries" >&2
            exit 1
          }

          pull_trivy_image
          : > security-reports/trivy-config.txt
          for target in \
            deployments/prod/app-node \
            deployments/prod/data-node \
            deployments/prod/shared \
            deployments/staging \
            .github/workflows/ci.yml \
            .github/workflows/security.yml \
            .github/workflows/security-release.yml \
            .github/workflows/build-push.yml \
            .github/workflows/deploy-develop.yml \
            .github/workflows/deploy-prod.yml
          do
            echo "### Trivy config scan target: ${target}" | tee -a security-reports/trivy-config.txt
            docker run --rm \
              -v "${PWD}:/workdir" \
              -w /workdir \
              "${trivy_image}" \
              config \
              --config trivy.yaml \
              --ignorefile .trivyignore \
              "${target}" | tee -a security-reports/trivy-config.txt
          done

      - name: Upload Trivy config report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-config-report
          path: security-reports/trivy-config.txt
          if-no-files-found: error
          retention-days: 14

  govulncheck-nightly:
    name: Go Vulnerability Report
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.9"
          cache: true
          cache-dependency-path: go.sum

      - name: Generate govulncheck report
        shell: bash
        run: |
          set -o pipefail
          mkdir -p security-reports
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./... 2>&1 | tee security-reports/govulncheck.txt

      - name: Upload govulncheck report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: govulncheck-report
          path: security-reports/govulncheck.txt
          if-no-files-found: error
          retention-days: 14

  dependency-snapshot:
    name: Dependency Update Snapshot
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.9"
          cache: true
          cache-dependency-path: go.sum

      - name: Generate dependency update snapshot
        shell: bash
        run: |
          mkdir -p security-reports
          go list -u -m -json all > security-reports/go-module-updates.json
          {
            echo "### Nightly security summary"
            echo "- govulncheck runs as a blocking report job in the Security (repo) workflow."
            echo "- go module update inventory written to \`go-module-updates.json\`."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload dependency snapshot
        uses: actions/upload-artifact@v4
        with:
          name: dependency-update-snapshot
          path: security-reports/go-module-updates.json
          if-no-files-found: error
          retention-days: 14
