name: Deploy Staging

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_run:
    workflows:
      - Build and Push Images
    types:
      - completed
  workflow_dispatch:
    inputs:
      app_image_ref:
        description: "Exact app image reference to deploy, preferably ghcr.io/...@sha256:..."
        required: false
        type: string
      goose_image_ref:
        description: "Exact goose image reference to deploy, preferably ghcr.io/...@sha256:..."
        required: false
        type: string

permissions:
  actions: read
  contents: read
  packages: read

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  resolve-image-refs:
    name: Resolve Staging Image Refs
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      )
    uses: ./.github/workflows/_reusable-deploy.yml
    with:
      resolution_mode: ${{ github.event_name == 'workflow_run' && 'workflow_run' || 'manual' }}
      workflow_run_id: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.id || '' }}
      app_image_ref: ${{ github.event_name == 'workflow_dispatch' && inputs.app_image_ref || '' }}
      goose_image_ref: ${{ github.event_name == 'workflow_dispatch' && inputs.goose_image_ref || '' }}
    secrets:
      gh_api_token: ${{ github.token }}

  deploy:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      )
    name: Deploy to staging VPS
    runs-on: ubuntu-latest
    needs: resolve-image-refs
    environment: staging

    steps:
      - name: Deploy staging over SSH
        id: deploy_staging
        continue-on-error: true
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_DIR: /opt/avf-vending/avf-vending-api
          EVENT_NAME: ${{ github.event_name }}
          APP_IMAGE_REF: ${{ needs.resolve-image-refs.outputs.app_image_ref }}
          APP_IMAGE_TAG: ${{ needs.resolve-image-refs.outputs.app_image_tag }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
          GOOSE_IMAGE_REF: ${{ needs.resolve-image-refs.outputs.goose_image_ref }}
          GOOSE_IMAGE_TAG: ${{ needs.resolve-image-refs.outputs.goose_image_tag }}
        with:
          host: ${{ secrets.STAGING_HOST }}
          port: ${{ secrets.STAGING_PORT }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script_stop: true
          envs: APP_DIR,EVENT_NAME,APP_IMAGE_REF,APP_IMAGE_TAG,GHCR_USER,GHCR_TOKEN,GOOSE_IMAGE_REF,GOOSE_IMAGE_TAG
          script: |
            set -euo pipefail

            STAGING_DIR="${APP_DIR}/deployments/staging"
            ENV_FILE="${STAGING_DIR}/.env.staging"
            DEPLOY_SCRIPT="${STAGING_DIR}/scripts/deploy_staging.sh"
            HEALTHCHECK_SCRIPT="${STAGING_DIR}/scripts/healthcheck_staging.sh"

            fail() {
              echo "error: $*" >&2
              exit 1
            }

            set_env_value() {
              local key="$1"
              local value="$2"
              local file="$3"

              if grep -q "^${key}=" "${file}"; then
                sed -i "s|^${key}=.*|${key}=${value}|" "${file}"
              else
                printf '%s=%s\n' "${key}" "${value}" >> "${file}"
              fi
            }

            [[ -n "${APP_IMAGE_REF}" ]] || fail "missing APP_IMAGE_REF"
            [[ -n "${GOOSE_IMAGE_REF}" ]] || fail "missing GOOSE_IMAGE_REF"

            [[ -d "${STAGING_DIR}" ]] || fail "missing staging directory: ${STAGING_DIR}"
            [[ -f "${ENV_FILE}" ]] || fail "missing env file: ${ENV_FILE}"
            [[ -f "${DEPLOY_SCRIPT}" ]] || fail "missing deploy script: ${DEPLOY_SCRIPT}"
            [[ -f "${HEALTHCHECK_SCRIPT}" ]] || fail "missing healthcheck script: ${HEALTHCHECK_SCRIPT}"

            printf '%s' "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin

            set_env_value "APP_IMAGE_REF" "${APP_IMAGE_REF}" "${ENV_FILE}"
            set_env_value "GOOSE_IMAGE_REF" "${GOOSE_IMAGE_REF}" "${ENV_FILE}"

            if [[ -n "${APP_IMAGE_TAG}" ]]; then
              set_env_value "APP_IMAGE_TAG" "${APP_IMAGE_TAG}" "${ENV_FILE}"
            fi

            if [[ -n "${GOOSE_IMAGE_TAG}" ]]; then
              set_env_value "GOOSE_IMAGE_TAG" "${GOOSE_IMAGE_TAG}" "${ENV_FILE}"
            fi

            if [[ -n "${APP_IMAGE_TAG}" && "${APP_IMAGE_TAG}" == "${GOOSE_IMAGE_TAG}" ]]; then
              set_env_value "IMAGE_TAG" "${APP_IMAGE_TAG}" "${ENV_FILE}"
            fi

            cd "${STAGING_DIR}"
            bash "${DEPLOY_SCRIPT}"
            bash "${HEALTHCHECK_SCRIPT}"

      - name: Write staging deployment summary
        if: always()
        shell: bash
        env:
          ACTOR: ${{ github.actor }}
          APP_IMAGE_REF: ${{ needs.resolve-image-refs.outputs.app_image_ref }}
          DEPLOY_COMMIT_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          DEPLOY_STEP_OUTCOME: ${{ steps.deploy_staging.outcome }}
          GOOSE_IMAGE_REF: ${{ needs.resolve-image-refs.outputs.goose_image_ref }}
          TRIGGER_NAME: ${{ github.event_name }}
        run: |
          mkdir -p deployment-evidence

          if [[ "${DEPLOY_STEP_OUTCOME}" == "success" ]]; then
            healthcheck_result="passed"
          else
            healthcheck_result="failed-or-not-reached"
          fi

          cat > deployment-evidence/staging-deployment-manifest.json <<EOF
          {
            "environment": "staging",
            "commit_sha": "${DEPLOY_COMMIT_SHA}",
            "app_image_ref": "${APP_IMAGE_REF}",
            "goose_image_ref": "${GOOSE_IMAGE_REF}",
            "actor": "${ACTOR}",
            "trigger": "${TRIGGER_NAME}",
            "healthcheck_result": "${healthcheck_result}",
            "rollback_status": "not-applicable"
          }
          EOF

          {
            echo "## Staging Deployment"
            echo "- environment: \`staging\`"
            echo "- commit SHA: \`${DEPLOY_COMMIT_SHA}\`"
            echo "- app image: \`${APP_IMAGE_REF}\`"
            echo "- goose image: \`${GOOSE_IMAGE_REF}\`"
            echo "- actor: \`${ACTOR}\`"
            echo "- trigger: \`${TRIGGER_NAME}\`"
            echo "- healthcheck result: \`${healthcheck_result}\`"
            echo "- rollback status: \`not-applicable\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload staging deployment manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-deployment-manifest
          path: deployment-evidence/staging-deployment-manifest.json
          if-no-files-found: error
          retention-days: 14

      - name: Fail if staging deployment failed
        if: steps.deploy_staging.outcome == 'failure'
        shell: bash
        run: exit 1
