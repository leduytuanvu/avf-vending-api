# Release gate after "Build and Push Images" (image scan, security-verdict). Display name must stay
# "Security Release" — distinct from repo-level "Security" (security.yml). Action pins: see
# docs/runbooks/supply-chain-security.md#github-actions-version-pins (ENFORCE_ACTION_SHA_PINNING in contract verifier). Downstream **Deploy** workflows trigger
# only on **this** workflow (not on repo Security). Source SHA / branch / image refs for the release gate must come
# from **Build** artifacts (promotion-manifest + image-metadata via _reusable-deploy), not from `github.sha` of this run.
# Post-release CVE discovery: nightly-security.yml (no deploy).
name: Security Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_run:
    workflows:
      - "Build and Push Images"
    types:
      - completed
    branches:
      - develop
      - main
  workflow_dispatch:
    inputs:
      target_branch:
        description: "Branch whose latest successful Build and Push Images run to verify (develop or main only)"
        type: choice
        required: true
        default: develop
        options:
          - develop
          - main
      build_workflow_run_id:
        description: "Recommended: exact Build and Push Images run id (deterministic). If empty, latest success on the target branch (less deterministic when builds race)."
        type: string
        required: false
        default: ""

concurrency:
  group: security-release-${{ github.event_name == 'workflow_run' && format('b-{0}', github.event.workflow_run.head_branch) || format('d-{0}', github.event.inputs.target_branch) || github.run_id }}
  cancel-in-progress: true

permissions:
  actions: write
  attestations: read
  contents: read
  packages: read
  security-events: write

jobs:
  skip-when-build-incomplete:
    name: Skipped — no release gate without successful Build
    if: |
      github.event_name == 'workflow_run' && (
        github.event.workflow_run.conclusion != 'success' ||
        github.event.workflow_run.name != 'Build and Push Images' ||
        (github.event.workflow_run.head_branch != 'develop' && github.event.workflow_run.head_branch != 'main') ||
        (github.event.workflow_run.event != 'push' && github.event.workflow_run.event != 'workflow_dispatch')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Record skip
        run: |
          {
            echo "## Security Release (non-release candidate — will emit skipped verdict)"
            echo "- Chain: \`CI → Security → Build → *Security Release* → Deploy\` (this run stops early; not deployable)."
            echo "- The triggering **Build and Push Images** run is **not** a direct **push**/**workflow_dispatch** success on \`develop\`/\`main\`, so the full image scan + release gate does not run here (indirect \`workflow_run\`-triggered builds are excluded)."
            echo "- conclusion: \`${{ github.event.workflow_run.conclusion }}\` (required: \`success\`); GHA \`event\` must be \`push\` or \`workflow_dispatch\` (not a chain-only \`workflow_run\`); \`head_branch\` must be \`develop\` or \`main\`."
            echo "- Downstream \`Security Release — outcome\` step uploads a \`security-verdict\` with \`verdict: skipped\` or \`no-candidate\` when ineligible — **never** an empty \`verdict\` field."
          } >> "$GITHUB_STEP_SUMMARY"

  resolve-build-run-id:
    name: Resolve Published Build For Image Scan
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.name == 'Build and Push Images' &&
        (github.event.workflow_run.head_branch == 'develop' || github.event.workflow_run.head_branch == 'main') &&
        (github.event.workflow_run.event == 'push' || github.event.workflow_run.event == 'workflow_dispatch'))
    runs-on: ubuntu-latest
    outputs:
      workflow_run_id: ${{ steps.lookup.outputs.workflow_run_id }}
    steps:
      - name: Resolve build workflow run id
        id: lookup
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          INPUT_BUILD_RUN: ${{ github.event.inputs.build_workflow_run_id || '' }}
          TARGET_BRANCH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target_branch || '' }}
        run: |
          set -Eeuo pipefail

          {
            echo "## Enterprise release chain — **Security Release** (this job)"
            echo ""
            echo "\`\`\`"
            echo "…  →  Build and Push Images  →  *this run*  →  Deploy (Staging|Production) if verdict=pass [+ env approval on prod]"
            echo "\`\`\`"
            echo ""
            if [[ "${EVENT_NAME}" == "workflow_run" ]]; then
              echo "- **Build run id (deterministic)**: \`${{ github.event.workflow_run.id }}\` — the completed **Build and Push Images** run that triggered this Security Release. Artifacts are read from that run only (no latest-\`head_sha\` race for the automatic path)."
            else
              echo "- **Manual dispatch**: set \`build_workflow_run_id\` to the **Build and Push Images** run id to verify, or the workflow resolves the latest success on the target branch (less deterministic if builds race)."
            fi
            echo "- **promotion-manifest** and **image-metadata** from that Build run are the source of truth for commit SHA, branch, and digest-pinned image refs (see \`_reusable-deploy\` resolution)."
          } >> "${GITHUB_STEP_SUMMARY}"

          if [[ "${EVENT_NAME}" == "workflow_run" ]]; then
            # Triggering run is the Build and Push Images workflow; use its id for artifacts.
            echo "workflow_run_id=${{ github.event.workflow_run.id }}" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [[ -n "${INPUT_BUILD_RUN// }" ]]; then
            if [[ ! "${INPUT_BUILD_RUN// }" =~ ^[0-9]+$ ]]; then
              echo "error: build_workflow_run_id must be a numeric GitHub Actions run id" >&2
              exit 1
            fi
            echo "workflow_run_id=${INPUT_BUILD_RUN// }" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          branch="${TARGET_BRANCH:-develop}"
          [[ "${branch}" == "develop" || "${branch}" == "main" ]] || {
            echo "error: target_branch must be develop or main" >&2
            exit 1
          }

          workflow_run_id="$(
            gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/build-push.yml/runs" \
              -f "branch=${branch}" \
              -f "status=completed" \
              -f "per_page=20" \
              --jq '[.workflow_runs[]? | select(.conclusion == "success" and (.name // "") == "Build and Push Images") | .id] | .[0] // empty'
          )"

          if [[ -z "${workflow_run_id}" ]]; then
            echo "error: no successful Build and Push Images run found for branch ${branch} (workflow name must be Build and Push Images)" >&2
            exit 1
          fi
          echo "workflow_run_id=${workflow_run_id}" >> "${GITHUB_OUTPUT}"

      - name: Required Build run artifacts (fail closed for release chain)
        id: require_build_artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ steps.lookup.outputs.workflow_run_id }}
        run: |
          set -Eeuo pipefail
          [[ -n "${RUN_ID}" ]]
          need=(image-metadata promotion-manifest immutable-image-contract sbom-reports cosign-signing-evidence release-candidate)
          for a in "${need[@]}"; do
            if ! gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}/artifacts" \
              --jq ".artifacts[]? | select(.name==\"${a}\") | .id" | grep -q .; then
              echo "error: Build and Push Images run ${RUN_ID} is missing required artifact \"${a}\" (release candidate chain requires image-metadata, promotion-manifest, immutable-image-contract, sbom-reports, cosign-signing-evidence, and release-candidate from github.event.workflow_run.id)" >&2
              exit 1
            fi
          done
          {
            echo "## Build artifact preflight"
            echo "- run id: \`${RUN_ID}\` (github.event.workflow_run.id for automatic runs)"
            echo "- found: \`image-metadata\`, \`promotion-manifest\`, \`immutable-image-contract\`, \`sbom-reports\`, \`cosign-signing-evidence\`, \`release-candidate\`"
          } >> "${GITHUB_STEP_SUMMARY}"

  resolve-image-refs:
    name: Resolve Published Image Refs
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.name == 'Build and Push Images' &&
        (github.event.workflow_run.head_branch == 'develop' || github.event.workflow_run.head_branch == 'main') &&
        (github.event.workflow_run.event == 'push' || github.event.workflow_run.event == 'workflow_dispatch'))
    needs: resolve-build-run-id
    uses: ./.github/workflows/_reusable-deploy.yml
    with:
      resolution_mode: workflow_run
      workflow_run_id: ${{ needs.resolve-build-run-id.outputs.workflow_run_id }}
      provenance_enforcement: ${{ vars.PROVENANCE_ENFORCEMENT || 'warn' }}
      allow_private_repo_provenance_fallback: ${{ vars.ALLOW_PRIVATE_REPO_PROVENANCE_FALLBACK || 'true' }}
    secrets:
      gh_api_token: ${{ secrets.GITHUB_TOKEN }}

  image-vulnerability-scan:
    name: Published Image Vulnerability Scan
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.name == 'Build and Push Images' &&
        (github.event.workflow_run.head_branch == 'develop' || github.event.workflow_run.head_branch == 'main') &&
        (github.event.workflow_run.event == 'push' || github.event.workflow_run.event == 'workflow_dispatch'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: resolve-image-refs
    outputs:
      trivy_app_result: ${{ steps.trivy_outcomes.outputs.trivy_app_result }}
      trivy_goose_result: ${{ steps.trivy_outcomes.outputs.trivy_goose_result }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Show image scan policy
        shell: bash
        env:
          APP_IMAGE_REF: ${{ needs.resolve-image-refs.outputs.app_image_ref }}
          GOOSE_IMAGE_REF: ${{ needs.resolve-image-refs.outputs.goose_image_ref }}
        run: |
          {
            echo "## Security Scan Policy"
            echo "- secret scan: fail on any detected secret in repo-scoped content scan"
            echo "- Go vulnerability scan: fail on govulncheck findings in reachable code"
            echo "- config scan: fail on \`HIGH\` and \`CRITICAL\` misconfigurations"
            echo "- image scan: fail on \`HIGH\` and \`CRITICAL\` vulnerabilities with \`ignore-unfixed=true\`"
            echo "- cosign verify: \`certificate-oidc-issuer\` = GitHub Actions (\`token.actions.githubusercontent.com\`); identity must match this repo; \`SIGNING_ENFORCEMENT\` repo variable: \`warn\` (default) or \`enforce\`"
            echo "- provenance: \`PROVENANCE_ENFORCEMENT\` (\`warn\` | \`enforce\`) and \`ALLOW_PRIVATE_REPO_PROVENANCE_FALLBACK\` (\`true\` | \`false\`) — see \`docs/runbooks/supply-chain-security.md\`"
            echo "- app image: \`${APP_IMAGE_REF}\`"
            echo "- goose image: \`${GOOSE_IMAGE_REF}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Scan published app image
        id: trivy_app
        shell: bash
        env:
          APP_IMAGE_REF: ${{ needs.resolve-image-refs.outputs.app_image_ref }}
        run: |
          set -Eeuo pipefail
          mkdir -p security-reports
          trivy_image="aquasec/trivy:0.57.1"

          pull_trivy_image() {
            local attempt
            for attempt in 1 2 3 4 5; do
              if docker pull "${trivy_image}"; then
                return 0
              fi
              if [[ "${attempt}" -lt 5 ]]; then
                echo "Trivy image pull failed; retrying (${attempt}/5)" >&2
                sleep 10
              fi
            done
            echo "error: failed to pull ${trivy_image} after retries" >&2
            return 1
          }

          if ! pull_trivy_image; then
            echo 127 > security-reports/trivy-app.exitcode
          else
            set +e
            set -o pipefail
            docker run --rm \
              -v "${HOME}/.docker:/root/.docker:ro" \
              -v "${PWD}:/workdir" \
              -w /workdir \
              "${trivy_image}" \
              image \
              --config trivy.yaml \
              --ignorefile .trivyignore \
              --scanners vuln \
              "${APP_IMAGE_REF}" 2>&1 | tee security-reports/trivy-image-app.txt
            rc_app="${PIPESTATUS[0]}"
            set +o pipefail
            set -e
            echo "${rc_app}" > security-reports/trivy-app.exitcode
          fi
          exit 0

      - name: Scan published goose image
        if: always()
        id: trivy_goose
        shell: bash
        env:
          GOOSE_IMAGE_REF: ${{ needs.resolve-image-refs.outputs.goose_image_ref }}
        run: |
          set -Eeuo pipefail
          mkdir -p security-reports
          trivy_image="aquasec/trivy:0.57.1"

          pull_trivy_image() {
            local attempt
            for attempt in 1 2 3 4 5; do
              if docker pull "${trivy_image}"; then
                return 0
              fi
              if [[ "${attempt}" -lt 5 ]]; then
                echo "Trivy image pull failed; retrying (${attempt}/5)" >&2
                sleep 10
              fi
            done
            echo "error: failed to pull ${trivy_image} after retries" >&2
            return 1
          }

          if ! pull_trivy_image; then
            echo 127 > security-reports/trivy-goose.exitcode
          else
            set +e
            set -o pipefail
            docker run --rm \
              -v "${HOME}/.docker:/root/.docker:ro" \
              -v "${PWD}:/workdir" \
              -w /workdir \
              "${trivy_image}" \
              image \
              --config trivy.yaml \
              --ignorefile .trivyignore \
              --scanners vuln \
              "${GOOSE_IMAGE_REF}" 2>&1 | tee security-reports/trivy-image-goose.txt
            rc_goose="${PIPESTATUS[0]}"
            set +o pipefail
            set -e
            echo "${rc_goose}" > security-reports/trivy-goose.exitcode
          fi
          exit 0

      - name: Record Trivy per-image results and fail if policy violated
        if: always()
        id: trivy_outcomes
        shell: bash
        run: |
          set -Eeuo pipefail
          rc_a="1"
          rc_g="1"
          [[ -f security-reports/trivy-app.exitcode ]] && rc_a="$(tr -d '[:space:]' < security-reports/trivy-app.exitcode || echo 1)"
          [[ -f security-reports/trivy-goose.exitcode ]] && rc_g="$(tr -d '[:space:]' < security-reports/trivy-goose.exitcode || echo 1)"
          if [[ "${rc_a}" -eq 0 ]]; then
            trivy_app_result="success"
          else
            trivy_app_result="failure"
          fi
          if [[ "${rc_g}" -eq 0 ]]; then
            trivy_goose_result="success"
          else
            trivy_goose_result="failure"
          fi
          {
            echo "trivy_app_result=${trivy_app_result}"
            echo "trivy_goose_result=${trivy_goose_result}"
            echo "trivy_app_exit_code=${rc_a}"
            echo "trivy_goose_exit_code=${rc_g}"
          } >> "${GITHUB_OUTPUT}"
          if [[ "${trivy_app_result}" != "success" || "${trivy_goose_result}" != "success" ]]; then
            echo "error: Trivy image scan policy: app scan=${trivy_app_result} (exit ${rc_a}), goose scan=${trivy_goose_result} (exit ${rc_g}) (rc 0 = pass)" >&2
            exit 1
          fi

      - name: Upload Trivy image reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-reports
          path: |
            security-reports/trivy-image-app.txt
            security-reports/trivy-image-goose.txt
            security-reports/trivy-app.exitcode
            security-reports/trivy-goose.exitcode
          if-no-files-found: warn
          retention-days: 14

  image-cosign-verify:
    name: Published Image Cosign Verification
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.name == 'Build and Push Images' &&
        (github.event.workflow_run.head_branch == 'develop' || github.event.workflow_run.head_branch == 'main') &&
        (github.event.workflow_run.event == 'push' || github.event.workflow_run.event == 'workflow_dispatch'))
    runs-on: ubuntu-latest
    needs: resolve-image-refs
    permissions:
      contents: read
      packages: read
    outputs:
      cosign_app_result: ${{ steps.cosign_verify.outputs.cosign_app_result }}
      cosign_goose_result: ${{ steps.cosign_verify.outputs.cosign_goose_result }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.7.0

      - name: Verify image signatures (GitHub OIDC policy)
        id: cosign_verify
        shell: bash
        env:
          SIGNING_ENFORCEMENT: ${{ vars.SIGNING_ENFORCEMENT || 'warn' }}
          APP_IMAGE_REF: ${{ needs.resolve-image-refs.outputs.app_image_ref }}
          GOOSE_IMAGE_REF: ${{ needs.resolve-image-refs.outputs.goose_image_ref }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -Eeuo pipefail
          mkdir -p security-reports
          mode="$(echo "${SIGNING_ENFORCEMENT:-warn}" | tr '[:upper:]' '[:lower:]')"
          if [[ "${mode}" != "warn" && "${mode}" != "enforce" ]]; then
            mode="warn"
          fi
          issuer='^https://token.actions.githubusercontent.com$'
          identity="^https://github.com/${GITHUB_REPOSITORY}/"
          {
            echo "## Cosign signature verification"
            echo "- \`SIGNING_ENFORCEMENT\` (repo variable): \`${mode}\`"
            echo "- \`certificate-oidc-issuer-regexp\`: \`${issuer}\`"
            echo "- \`certificate-identity-regexp\`: \`${identity}\`"
            echo "- app: \`${APP_IMAGE_REF}\`"
            echo "- goose: \`${GOOSE_IMAGE_REF}\`"
          } >> "$GITHUB_STEP_SUMMARY"
          rc_a=1
          rc_g=1
          set +e
          cosign verify \
            --certificate-identity-regexp "${identity}" \
            --certificate-oidc-issuer-regexp "${issuer}" \
            "${APP_IMAGE_REF}" 2>&1 | tee security-reports/cosign-verify-app.log
          rc_a="${PIPESTATUS[0]}"
          cosign verify \
            --certificate-identity-regexp "${identity}" \
            --certificate-oidc-issuer-regexp "${issuer}" \
            "${GOOSE_IMAGE_REF}" 2>&1 | tee security-reports/cosign-verify-goose.log
          rc_g="${PIPESTATUS[0]}"
          set -e
          ca="failure"
          cg="failure"
          [[ "${rc_a}" -eq 0 ]] && ca="success"
          [[ "${rc_g}" -eq 0 ]] && cg="success"
          {
            echo "cosign_app_result=${ca}"
            echo "cosign_goose_result=${cg}"
          } >> "${GITHUB_OUTPUT}"
          if [[ "${ca}" != "success" && "${mode}" == "warn" ]]; then
            echo "::warning::Cosign verify failed for app image (rc=${rc_a}); SIGNING_ENFORCEMENT=warn — not failing the workflow."
          fi
          if [[ "${cg}" != "success" && "${mode}" == "warn" ]]; then
            echo "::warning::Cosign verify failed for goose image (rc=${rc_g}); SIGNING_ENFORCEMENT=warn — not failing the workflow."
          fi
          if [[ "${mode}" == "enforce" ]]; then
            if [[ "${ca}" != "success" || "${cg}" != "success" ]]; then
              echo "error: SIGNING_ENFORCEMENT=enforce and cosign verify failed (app=${ca} rc=${rc_a}, goose=${cg} rc=${rc_g})" >&2
              exit 1
            fi
          fi

      - name: Upload Cosign verify logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cosign-verify-logs
          path: |
            security-reports/cosign-verify-app.log
            security-reports/cosign-verify-goose.log
          if-no-files-found: warn
          retention-days: 14

  security-release-signal:
    name: Security Release Signal
    if: always()
    runs-on: ubuntu-latest
    needs:
      - skip-when-build-incomplete
      - resolve-build-run-id
      - resolve-image-refs
      - image-vulnerability-scan
      - image-cosign-verify
    outputs:
      security_verdict: ${{ steps.signal.outputs.security_verdict }}
      SECURITY_VERDICT: ${{ steps.signal.outputs.SECURITY_VERDICT }}
      source_build_run_id: ${{ steps.signal.outputs.source_build_run_id }}
      source_sha: ${{ steps.signal.outputs.source_sha }}
      source_branch: ${{ steps.signal.outputs.source_branch }}
      source_workflow_name: ${{ steps.signal.outputs.source_workflow_name }}
      security_workflow_run_id: ${{ steps.signal.outputs.security_workflow_run_id }}
      release_gate_verdict: ${{ steps.signal.outputs.release_gate_verdict }}
      release_gate_mode: ${{ steps.signal.outputs.release_gate_mode }}
      repo_security_verdict: ${{ steps.signal.outputs.repo_security_verdict }}
      repo_release_verdict: ${{ steps.signal.outputs.repo_release_verdict }}
      published_image_verdict: ${{ steps.signal.outputs.published_image_verdict }}
      provenance_release_verdict: ${{ steps.signal.outputs.provenance_release_verdict }}
      app_image_ref: ${{ steps.signal.outputs.app_image_ref }}
      goose_image_ref: ${{ steps.signal.outputs.goose_image_ref }}
      generated_at_utc: ${{ steps.signal.outputs.generated_at_utc }}
    steps:
      - name: Check out repository (verdict scripts)
        uses: actions/checkout@v4

      # CONTRACT(verify_workflow_contracts.sh): each write_security_verdict path here must reach emit_verdict_outputs_and_summary before any exit 0 (see scripts/ci/verify_workflow_contracts.sh).
      - name: Write structured security release signal
        id: signal
        shell: bash
        env:
          SKIP_JOB_RESULT: ${{ needs.skip-when-build-incomplete.result }}
          EVENT_NAME: ${{ github.event_name }}
          DEPENDENCY_REVIEW_RESULT: skipped
          GOVULNCHECK_PR_RESULT: skipped
          SECRET_SCAN_RESULT: skipped
          CONFIG_SCAN_RESULT: skipped
          RESOLVE_BUILD_RUN_RESULT: ${{ needs.resolve-build-run-id.result }}
          RESOLVE_IMAGE_REFS_RESULT: ${{ needs.resolve-image-refs.result }}
          IMAGE_SCAN_RESULT: ${{ needs.image-vulnerability-scan.result }}
          COSIGN_APP_RESULT: ${{ needs.image-cosign-verify.outputs.cosign_app_result }}
          COSIGN_GOOSE_RESULT: ${{ needs.image-cosign-verify.outputs.cosign_goose_result }}
          SIGNING_ENFORCEMENT: ${{ vars.SIGNING_ENFORCEMENT || 'warn' }}
          PROVENANCE_ENFORCEMENT: ${{ vars.PROVENANCE_ENFORCEMENT || 'warn' }}
          ALLOW_PRIVATE_REPO_PROVENANCE_FALLBACK: ${{ vars.ALLOW_PRIVATE_REPO_PROVENANCE_FALLBACK || 'true' }}
          IMAGE_COSIGN_VERIFY_JOB_RESULT: ${{ needs.image-cosign-verify.result }}
          GOVULNCHECK_NIGHTLY_RESULT: skipped
          DEPENDENCY_SNAPSHOT_RESULT: skipped
          APP_IMAGE_REF: ${{ needs.resolve-image-refs.outputs.app_image_ref }}
          BUILD_RUN_ID: ${{ needs.resolve-image-refs.outputs.artifact_build_run_id }}
          GOOSE_IMAGE_REF: ${{ needs.resolve-image-refs.outputs.goose_image_ref }}
          PROVENANCE_VERDICT: ${{ needs.resolve-image-refs.outputs.provenance_verdict }}
          RESOLVED_SOURCE_SHA: ${{ needs.resolve-image-refs.outputs.artifact_source_sha }}
          RESOLVED_SOURCE_WORKFLOW_NAME: ${{ needs.resolve-image-refs.outputs.artifact_source_workflow_name }}
          RESOLVED_SOURCE_BRANCH: ${{ needs.resolve-image-refs.outputs.artifact_source_branch }}
          ARTIFACT_SOURCE_EVENT: ${{ needs.resolve-image-refs.outputs.artifact_source_event }}
          TRIGGER_WORKFLOW_RUN_NAME: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.name || '' }}
          TRIGGER_WORKFLOW_RUN_SOURCE_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || '' }}
          BUILD_HEAD_BRANCH: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || '' }}
          TRIGGER_WORKFLOW_EVENT: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.event || (github.event_name == 'workflow_dispatch' && 'workflow_dispatch' || github.event_name) }}
          MANUAL_TARGET_BRANCH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target_branch || '' }}
          WORKFLOW_NAME: ${{ github.workflow }}
          WORKFLOW_RUN_ID: ${{ github.run_id }}
          WORKFLOW_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GH_TOKEN: ${{ github.token }}
          TRIVY_APP_RESULT: ${{ needs.image-vulnerability-scan.outputs.trivy_app_result }}
          TRIVY_GOOSE_RESULT: ${{ needs.image-vulnerability-scan.outputs.trivy_goose_result }}
          TRIGGERING_BUILD_CONCLUSION: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.conclusion || '' }}
          TRIGGERING_BUILD_HEAD_BRANCH: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || '' }}
          TRIGGERING_BUILD_HEAD_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || '' }}
          TRIGGERING_BUILD_WF_NAME: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.name || '' }}
          TRIGGERING_BUILD_ID: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.id || '' }}
          TRIGGERING_BUILD_EVENT: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.event || '' }}
          PROMOTION_MANIFEST_ALLOW_SHA_MISMATCH: ${{ vars.PROMOTION_MANIFEST_ALLOW_SHA_MISMATCH || '' }}
          SBOM_POLICY: ${{ vars.SBOM_POLICY || 'warn' }}
          SKIP_BUILD_CONC: ${{ github.event.workflow_run.conclusion }}
          SKIP_BUILD_HB: ${{ github.event.workflow_run.head_branch }}
          SKIP_BUILD_ID: ${{ github.event.workflow_run.id }}
          SKIP_BUILD_EVENT: ${{ github.event.workflow_run.event }}
          SKIP_BUILD_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          SKIP_WF_NAME: ${{ github.event.workflow_run.name }}
        run: bash scripts/release/security_release_signal.sh

      - name: Security release signal — decision observability
        if: always()
        shell: bash
        env:
          OUT_VERDICT: ${{ steps.signal.outputs.security_verdict }}
          OUT_SOURCE_SHA: ${{ steps.signal.outputs.source_sha }}
          OUT_SOURCE_BRANCH: ${{ steps.signal.outputs.source_branch }}
          OUT_SOURCE_WF: ${{ steps.signal.outputs.source_workflow_name }}
          OUT_SOURCE_BUILD: ${{ steps.signal.outputs.source_build_run_id }}
          OUT_SEC_RUN: ${{ steps.signal.outputs.security_workflow_run_id }}
          OUT_RG_VERDICT: ${{ steps.signal.outputs.release_gate_verdict }}
          OUT_RG_MODE: ${{ steps.signal.outputs.release_gate_mode }}
          OUT_REPO_SEC: ${{ steps.signal.outputs.repo_security_verdict }}
          OUT_REPO_REL: ${{ steps.signal.outputs.repo_release_verdict }}
          OUT_PUB: ${{ steps.signal.outputs.published_image_verdict }}
          OUT_PROV: ${{ steps.signal.outputs.provenance_release_verdict }}
          OUT_APP: ${{ steps.signal.outputs.app_image_ref }}
          OUT_GOOSE: ${{ steps.signal.outputs.goose_image_ref }}
          OUT_GENERATED: ${{ steps.signal.outputs.generated_at_utc }}
        run: |
          set -Eeuo pipefail
          f="security-reports/security-verdict.json"
          {
            echo "## Security release signal — decision details"
            echo ""
            echo "Outputs from the signal step (also in \`security-verdict.json\` when present):"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| \`security_verdict\` (blocking) | \`${OUT_VERDICT:-<missing>}\` |"
            echo "| \`release_gate_verdict\` | \`${OUT_RG_VERDICT:-<missing>}\` |"
            echo "| \`release_gate_mode\` | \`${OUT_RG_MODE:-<missing>}\` |"
            echo "| \`repo_security_verdict\` | \`${OUT_REPO_SEC:-<missing>}\` |"
            echo "| \`repo_release_verdict\` | \`${OUT_REPO_REL:-<missing>}\` |"
            echo "| \`published_image_verdict\` | \`${OUT_PUB:-<missing>}\` |"
            echo "| \`provenance_release_verdict\` | \`${OUT_PROV:-<missing>}\` |"
            echo "| \`source_sha\` | \`${OUT_SOURCE_SHA:-<missing>}\` |"
            echo "| \`source_branch\` | \`${OUT_SOURCE_BRANCH:-<missing>}\` |"
            echo "| \`source_workflow_name\` | \`${OUT_SOURCE_WF:-<missing>}\` |"
            echo "| \`source_build_run_id\` | \`${OUT_SOURCE_BUILD:-<missing>}\` |"
            echo "| \`security_workflow_run_id\` (this run) | \`${OUT_SEC_RUN:-<missing>}\` |"
            echo "| \`generated_at_utc\` | \`${OUT_GENERATED:-<missing>}\` |"
            echo "| \`app_image_ref\` | \`${OUT_APP:-<missing>}\` |"
            echo "| \`goose_image_ref\` | \`${OUT_GOOSE:-<missing>}\` |"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
          if [[ ! -f "$f" ]]; then
            {
              echo "### Payload file missing"
              echo "Expected \`security-reports/security-verdict.json\` for full \`job_results\` and drill-down; the write step may have failed before producing the file."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::warning::security-verdict.json is missing; see earlier steps."
            exit 0
          fi
          set +e
          python3 scripts/security/emit_security_verdict_summary.py --section observability >> "$GITHUB_STEP_SUMMARY"
          _obs=$?
          set -e
          if [[ "${_obs}" -ne 0 ]]; then
            echo "::warning::emit_security_verdict_summary observability section failed (non-fatal)" >&2
          fi
          {
            echo ""
            echo "---"
            echo ""
            echo "Full JSON: \`security-reports/security-verdict.json\` (also uploaded as artifact \`security-verdict\`)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce blocking security verdict
        if: always()
        shell: bash
        env:
          SECURITY_VERDICT: ${{ steps.signal.outputs.SECURITY_VERDICT }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
        run: |
          set -Eeuo pipefail
          if [[ ! -f security-reports/security-verdict.json ]]; then
            mkdir -p security-reports
            export GENERATED_AT_UTC="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            echo "::error::security-reports/security-verdict.json missing before enforce; writing emergency-fail verdict" >&2
            python3 scripts/security/write_security_verdict.py emergency --emergency-reason "security-reports/security-verdict.json was missing before enforce step (unexpected; signal step should always emit verdict JSON)"
          fi
          if [[ -f security-reports/security-verdict.json ]]; then
            echo "### failure_reasons (blocking)" >> "${GITHUB_STEP_SUMMARY}"
            {
              set +e
              mapfile -t _fr < <(python3 -c 'import json,sys; p=json.load(open("security-reports/security-verdict.json","r",encoding="utf-8")); [print(x) for x in (p.get("failure_reasons") or [])]' 2>/dev/null) || true
              set -e
              if [[ ${#_fr[@]} -gt 0 ]]; then
                for line in "${_fr[@]}"; do
                  echo "- ${line}"
                done
              else
                echo "- (no structured failure_reasons; see security-verdict.json and job_results)"
              fi
            } >> "${GITHUB_STEP_SUMMARY}" 2>/dev/null || {
              echo "- (failed to list failure_reasons; open security-reports/security-verdict.json)" >> "${GITHUB_STEP_SUMMARY}" || true
            }
            echo "" >&2
            echo "--- failure_reasons (stderr) ---" >&2
            python3 -c "import json,sys; p=json.load(open('security-reports/security-verdict.json','r',encoding='utf-8')); fr=p.get('failure_reasons') or []; [print('failure_reason:',r,file=sys.stderr) for r in fr]" || true
            echo "----------------" >&2
          fi
          V="${SECURITY_VERDICT:-}"
          if [[ -f security-reports/security-verdict.json ]]; then
            V2="$(python3 -c "import json;print(json.load(open('security-reports/security-verdict.json',encoding='utf-8')).get('verdict','') or '')" 2>/dev/null || true)"
            if [[ -n "${V2// }" ]]; then
              V="${V2}"
            fi
          fi
          if [[ -z "${V// }" ]]; then
            echo "error: blocking security verdict is empty; expected pass, fail, skipped, or no-candidate" >&2
            exit 1
          fi
          if [[ "${V}" == "pass" || "${V}" == "skipped" || "${V}" == "no-candidate" ]]; then
            if [[ "${V}" == "pass" ]]; then
              :
            elif [[ "${V}" == "skipped" ]]; then
              echo "Security Release outcome: **skipped** (ineligible run — not deployable; see verdict JSON \`failure_reasons\`)." >> "${GITHUB_STEP_SUMMARY}"
            else
              echo "Security Release outcome: **no-candidate** (no valid release candidate — not deployable; see verdict JSON \`failure_reasons\`)." >> "${GITHUB_STEP_SUMMARY}"
            fi
            exit 0
          fi
          if [[ "${V}" == "fail" ]]; then
            echo "error: blocking security verdict is ${V} (verdict=fail required investigation)" >&2
            echo "error: see job summary: **Security release signal — decision observability** and **failure_reasons (blocking)** above." >&2
            exit 1
          fi
          echo "error: unexpected security verdict: ${V}" >&2
          exit 1

      - name: Generate release manifest (main branch candidates)
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_BUILD_RUN_ID: ${{ steps.signal.outputs.source_build_run_id }}
        run: |
          set -Eeuo pipefail
          mkdir -p release-reports
          if [[ ! -f security-reports/security-verdict.json ]]; then
            echo "Skipping release manifest: security-verdict.json missing"
            exit 0
          fi
          branch="$(python3 -c "import json;print(json.load(open('security-reports/security-verdict.json',encoding='utf-8')).get('source_branch','') or '')")"
          if [[ "${branch}" != "main" ]]; then
            echo "Skipping release manifest: source_branch=${branch} (not main)"
            exit 0
          fi
          sha="$(python3 -c "import json;print(json.load(open('security-reports/security-verdict.json',encoding='utf-8')).get('source_sha','') or '')")"
          export SOURCE_COMMIT_MESSAGE=""
          if [[ -n "${sha}" ]]; then
            SOURCE_COMMIT_MESSAGE="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${sha}" --jq -r '.commit.message // ""' 2>/dev/null | head -n 1 | head -c 500 || true)"
          fi
          export SOURCE_COMMIT_MESSAGE
          export MIGRATION_SAFETY_VERDICT="unknown"
          if [[ -n "${sha}" ]]; then
            run_id="$(
              gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/ci.yml/runs" \
                -f head_sha="${sha}" -f per_page=20 \
                --jq '.workflow_runs[] | select(.name=="CI" and .conclusion=="success") | .id' 2>/dev/null | head -n1 || true
            )"
            if [[ -n "${run_id}" ]]; then
              mig="$(
                gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/jobs" --paginate \
                  --jq '.jobs[] | select(.name=="Migration Safety Check") | .conclusion' 2>/dev/null | head -n1 || true
              )"
              if [[ "${mig}" == "success" ]]; then
                export MIGRATION_SAFETY_VERDICT="pass"
              elif [[ "${mig}" == "failure" ]]; then
                export MIGRATION_SAFETY_VERDICT="fail"
              elif [[ -n "${mig}" ]]; then
                export MIGRATION_SAFETY_VERDICT="${mig}"
              fi
            fi
          fi
          prom_arg=()
          if [[ -n "${SOURCE_BUILD_RUN_ID:-}" ]] && [[ "${SOURCE_BUILD_RUN_ID}" =~ ^[0-9]+$ ]]; then
            _pd="$(mktemp -d)"
            if gh run download "${SOURCE_BUILD_RUN_ID}" -n promotion-manifest -D "${_pd}" 2>/dev/null; then
              if [[ -f "${_pd}/promotion-manifest.json" ]]; then
                prom_arg=(--promotion-manifest "${_pd}/promotion-manifest.json")
              fi
            fi
          fi
          python3 tools/generate_release_manifest.py generate \
            --verdict security-reports/security-verdict.json \
            "${prom_arg[@]}" \
            --environment-target production-candidate
          if [[ -f release-reports/release-manifest.json ]]; then
            {
              echo ""
              echo "### Release manifest (main)"
              echo ""
              echo "| Artifact | Files |"
              echo "|---|---|"
              echo "| **\`release-manifest\`** (this run) | \`release-reports/release-manifest.json\`, \`release-reports/release-summary.md\` |"
              echo "| **\`security-verdict\`** (this run) | \`security-reports/security-verdict.json\` |"
              echo "| **\`sbom-reports\`** (Build run \`${SOURCE_BUILD_RUN_ID:-n/a}\`) | CycloneDX SBOMs from **Build and Push Images** |"
              echo "| **\`promotion-manifest\`** (Build run \`${SOURCE_BUILD_RUN_ID:-n/a}\`) | Build coordinates + SBOM metadata |"
              echo ""
              echo "Pre-deploy snapshot only; production deploy appends results to **\`release-manifest-post-deploy\`** when that workflow runs."
            } >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Release dashboard (concise)
        if: always()
        shell: bash
        run: |
          set -Eeuo pipefail
          bash scripts/deploy/emit_release_dashboard_summary.sh security-release

      - name: Upload security verdict
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-verdict
          path: security-reports/security-verdict.json
          if-no-files-found: warn
          retention-days: 14

      - name: Upload release manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-manifest
          path: |
            release-reports/release-manifest.json
            release-reports/release-summary.md
          if-no-files-found: ignore
          retention-days: 90

  optional-notify-on-security-release-failure:
    name: Optional webhook (Security Release failure)
    if: always()
    needs: [security-release-signal]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Optional failure notification
        if: always()
        env:
          NOTIFY_WEBHOOK_URL: ${{ vars.NOTIFY_WEBHOOK_URL }}
        run: |
          set +e
          r="${{ needs.security-release-signal.result }}"
          if [[ "${r}" != "failure" ]]; then
            echo "optional notify: skipped (Security Release job result is not failure: ${r})"
            exit 0
          fi
          bash scripts/deploy/notify_deployment_status.sh \
            --status failure \
            --environment security-release \
            --source-sha "${{ needs.security-release-signal.outputs.source_sha }}" \
            --source-branch "${{ needs.security-release-signal.outputs.source_branch }}" \
            --workflow-run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --message "Security Release job failed (verdict, enforce, image gate, or signal; see job summary and security-verdict artifact when present)" \
            --event "security-release"
