# Release gate after "Build and Push Images" (image scan, security-verdict). Display name must stay
# "Security Release" — distinct from repo-level "Security" (security.yml). Downstream staging listens here.
name: Security Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_run:
    workflows:
      - "Build and Push Images"
    types:
      - completed
    branches:
      - develop
      - main
  workflow_dispatch:
    inputs:
      target_branch:
        description: "Branch whose latest successful Build and Push Images run to verify (develop or main only)"
        type: choice
        required: true
        default: develop
        options:
          - develop
          - main
      build_workflow_run_id:
        description: "Optional exact Build and Push Images workflow run id; leave empty to use the latest success on the target branch"
        type: string
        required: false
        default: ""

concurrency:
  group: security-release-${{ github.event_name == 'workflow_run' && format('b-{0}', github.event.workflow_run.head_branch) || format('d-{0}', github.event.inputs.target_branch) || github.run_id }}
  cancel-in-progress: true

permissions:
  actions: read
  attestations: read
  contents: read
  packages: read
  security-events: write

jobs:
  skip-when-build-incomplete:
    name: Skipped — no release gate without successful Build
    if: |
      github.event_name == 'workflow_run' && (
        github.event.workflow_run.conclusion != 'success' ||
        github.event.workflow_run.name != 'Build and Push Images' ||
        (github.event.workflow_run.head_branch != 'develop' && github.event.workflow_run.head_branch != 'main')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Record skip
        run: |
          {
            echo "## Security Release (non-release candidate — will emit skipped verdict)"
            echo "- The triggering **Build and Push Images** run is **not** a develop/main **success** release candidate, so the full image scan + release gate does not run here."
            echo "- conclusion: \`${{ github.event.workflow_run.conclusion }}\` (required: \`success\` for gating) or name/branch ineligible (see \`on.workflow_run\` in this file)."
            echo "- Downstream \`Security Release — outcome\` step uploads a \`security-verdict\` with \`verdict: skipped\` and **never** an empty \`verdict\` field."
          } >> "$GITHUB_STEP_SUMMARY"

  resolve-build-run-id:
    name: Resolve Published Build For Image Scan
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.name == 'Build and Push Images' &&
        (github.event.workflow_run.head_branch == 'develop' || github.event.workflow_run.head_branch == 'main'))
    runs-on: ubuntu-latest
    outputs:
      workflow_run_id: ${{ steps.lookup.outputs.workflow_run_id }}
    steps:
      - name: Resolve build workflow run id
        id: lookup
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          INPUT_BUILD_RUN: ${{ github.event.inputs.build_workflow_run_id || '' }}
          TARGET_BRANCH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target_branch || '' }}
        run: |
          set -Eeuo pipefail

          if [[ "${EVENT_NAME}" == "workflow_run" ]]; then
            # Triggering run is the Build and Push Images workflow; use its id for artifacts.
            echo "workflow_run_id=${{ github.event.workflow_run.id }}" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [[ -n "${INPUT_BUILD_RUN// }" ]]; then
            if [[ ! "${INPUT_BUILD_RUN// }" =~ ^[0-9]+$ ]]; then
              echo "error: build_workflow_run_id must be a numeric GitHub Actions run id" >&2
              exit 1
            fi
            echo "workflow_run_id=${INPUT_BUILD_RUN// }" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          branch="${TARGET_BRANCH:-develop}"
          [[ "${branch}" == "develop" || "${branch}" == "main" ]] || {
            echo "error: target_branch must be develop or main" >&2
            exit 1
          }

          workflow_run_id="$(
            gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/build-push.yml/runs" \
              -f "branch=${branch}" \
              -f "status=completed" \
              -f "per_page=20" \
              --jq '[.workflow_runs[]? | select(.conclusion == "success" and (.name // "") == "Build and Push Images") | .id] | .[0] // empty'
          )"

          if [[ -z "${workflow_run_id}" ]]; then
            echo "error: no successful Build and Push Images run found for branch ${branch} (workflow name must be Build and Push Images)" >&2
            exit 1
          fi
          echo "workflow_run_id=${workflow_run_id}" >> "${GITHUB_OUTPUT}"

      - name: Required Build run artifacts (fail closed for release chain)
        id: require_build_artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ steps.lookup.outputs.workflow_run_id }}
        run: |
          set -Eeuo pipefail
          [[ -n "${RUN_ID}" ]]
          need=(image-metadata promotion-manifest immutable-image-contract)
          for a in "${need[@]}"; do
            if ! gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}/artifacts" \
              --jq ".artifacts[]? | select(.name==\"${a}\") | .id" | grep -q .; then
              echo "error: Build and Push Images run ${RUN_ID} is missing required artifact \"${a}\" (release candidate chain requires image-metadata, promotion-manifest, and immutable-image-contract from github.event.workflow_run.id)" >&2
              exit 1
            fi
          done
          {
            echo "## Build artifact preflight"
            echo "- run id: \`${RUN_ID}\` (github.event.workflow_run.id for automatic runs)"
            echo "- found: \`image-metadata\`, \`promotion-manifest\`, \`immutable-image-contract\`"
          } >> "${GITHUB_STEP_SUMMARY}"

  resolve-image-refs:
    name: Resolve Published Image Refs
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.name == 'Build and Push Images' &&
        (github.event.workflow_run.head_branch == 'develop' || github.event.workflow_run.head_branch == 'main'))
    needs: resolve-build-run-id
    uses: ./.github/workflows/_reusable-deploy.yml
    with:
      resolution_mode: workflow_run
      workflow_run_id: ${{ needs.resolve-build-run-id.outputs.workflow_run_id }}
    secrets:
      gh_api_token: ${{ secrets.GITHUB_TOKEN }}

  image-vulnerability-scan:
    name: Published Image Vulnerability Scan
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.name == 'Build and Push Images' &&
        (github.event.workflow_run.head_branch == 'develop' || github.event.workflow_run.head_branch == 'main'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: resolve-image-refs
    outputs:
      trivy_app_result: ${{ steps.trivy_outcomes.outputs.trivy_app_result }}
      trivy_goose_result: ${{ steps.trivy_outcomes.outputs.trivy_goose_result }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Show image scan policy
        shell: bash
        env:
          APP_IMAGE_REF: ${{ needs.resolve-image-refs.outputs.app_image_ref }}
          GOOSE_IMAGE_REF: ${{ needs.resolve-image-refs.outputs.goose_image_ref }}
        run: |
          {
            echo "## Security Scan Policy"
            echo "- secret scan: fail on any detected secret in repo-scoped content scan"
            echo "- Go vulnerability scan: fail on govulncheck findings in reachable code"
            echo "- config scan: fail on \`HIGH\` and \`CRITICAL\` misconfigurations"
            echo "- image scan: fail on \`HIGH\` and \`CRITICAL\` vulnerabilities with \`ignore-unfixed=true\`"
            echo "- app image: \`${APP_IMAGE_REF}\`"
            echo "- goose image: \`${GOOSE_IMAGE_REF}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Scan published app image
        id: trivy_app
        shell: bash
        env:
          APP_IMAGE_REF: ${{ needs.resolve-image-refs.outputs.app_image_ref }}
        run: |
          set -Eeuo pipefail
          mkdir -p security-reports
          trivy_image="aquasec/trivy:0.57.1"

          pull_trivy_image() {
            local attempt
            for attempt in 1 2 3 4 5; do
              if docker pull "${trivy_image}"; then
                return 0
              fi
              if [[ "${attempt}" -lt 5 ]]; then
                echo "Trivy image pull failed; retrying (${attempt}/5)" >&2
                sleep 10
              fi
            done
            echo "error: failed to pull ${trivy_image} after retries" >&2
            return 1
          }

          if ! pull_trivy_image; then
            echo 127 > security-reports/trivy-app.exitcode
          else
            set +e
            set -o pipefail
            docker run --rm \
              -v "${HOME}/.docker:/root/.docker:ro" \
              -v "${PWD}:/workdir" \
              -w /workdir \
              "${trivy_image}" \
              image \
              --config trivy.yaml \
              --ignorefile .trivyignore \
              --scanners vuln \
              "${APP_IMAGE_REF}" 2>&1 | tee security-reports/trivy-image-app.txt
            rc_app="${PIPESTATUS[0]}"
            set +o pipefail
            set -e
            echo "${rc_app}" > security-reports/trivy-app.exitcode
          fi
          exit 0

      - name: Scan published goose image
        if: always()
        id: trivy_goose
        shell: bash
        env:
          GOOSE_IMAGE_REF: ${{ needs.resolve-image-refs.outputs.goose_image_ref }}
        run: |
          set -Eeuo pipefail
          mkdir -p security-reports
          trivy_image="aquasec/trivy:0.57.1"

          pull_trivy_image() {
            local attempt
            for attempt in 1 2 3 4 5; do
              if docker pull "${trivy_image}"; then
                return 0
              fi
              if [[ "${attempt}" -lt 5 ]]; then
                echo "Trivy image pull failed; retrying (${attempt}/5)" >&2
                sleep 10
              fi
            done
            echo "error: failed to pull ${trivy_image} after retries" >&2
            return 1
          }

          if ! pull_trivy_image; then
            echo 127 > security-reports/trivy-goose.exitcode
          else
            set +e
            set -o pipefail
            docker run --rm \
              -v "${HOME}/.docker:/root/.docker:ro" \
              -v "${PWD}:/workdir" \
              -w /workdir \
              "${trivy_image}" \
              image \
              --config trivy.yaml \
              --ignorefile .trivyignore \
              --scanners vuln \
              "${GOOSE_IMAGE_REF}" 2>&1 | tee security-reports/trivy-image-goose.txt
            rc_goose="${PIPESTATUS[0]}"
            set +o pipefail
            set -e
            echo "${rc_goose}" > security-reports/trivy-goose.exitcode
          fi
          exit 0

      - name: Record Trivy per-image results and fail if policy violated
        if: always()
        id: trivy_outcomes
        shell: bash
        run: |
          set -Eeuo pipefail
          rc_a="1"
          rc_g="1"
          [[ -f security-reports/trivy-app.exitcode ]] && rc_a="$(tr -d '[:space:]' < security-reports/trivy-app.exitcode || echo 1)"
          [[ -f security-reports/trivy-goose.exitcode ]] && rc_g="$(tr -d '[:space:]' < security-reports/trivy-goose.exitcode || echo 1)"
          if [[ "${rc_a}" -eq 0 ]]; then
            trivy_app_result="success"
          else
            trivy_app_result="failure"
          fi
          if [[ "${rc_g}" -eq 0 ]]; then
            trivy_goose_result="success"
          else
            trivy_goose_result="failure"
          fi
          {
            echo "trivy_app_result=${trivy_app_result}"
            echo "trivy_goose_result=${trivy_goose_result}"
            echo "trivy_app_exit_code=${rc_a}"
            echo "trivy_goose_exit_code=${rc_g}"
          } >> "${GITHUB_OUTPUT}"
          if [[ "${trivy_app_result}" != "success" || "${trivy_goose_result}" != "success" ]]; then
            echo "error: Trivy image scan policy: app scan=${trivy_app_result} (exit ${rc_a}), goose scan=${trivy_goose_result} (exit ${rc_g}) (rc 0 = pass)" >&2
            exit 1
          fi

      - name: Upload Trivy image reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-reports
          path: |
            security-reports/trivy-image-app.txt
            security-reports/trivy-image-goose.txt
            security-reports/trivy-app.exitcode
            security-reports/trivy-goose.exitcode
          if-no-files-found: warn
          retention-days: 14

  security-release-signal:
    name: Security Release Signal
    if: always()
    runs-on: ubuntu-latest
    needs:
      - skip-when-build-incomplete
      - resolve-build-run-id
      - resolve-image-refs
      - image-vulnerability-scan
    outputs:
      security_verdict: ${{ steps.signal.outputs.security_verdict }}
      source_build_run_id: ${{ steps.signal.outputs.source_build_run_id }}
      source_sha: ${{ steps.signal.outputs.source_sha }}
      source_workflow_name: ${{ steps.signal.outputs.source_workflow_name }}
      security_workflow_run_id: ${{ steps.signal.outputs.security_workflow_run_id }}
      release_gate_verdict: ${{ steps.signal.outputs.release_gate_verdict }}
      release_gate_mode: ${{ steps.signal.outputs.release_gate_mode }}
      repo_security_verdict: ${{ steps.signal.outputs.repo_security_verdict }}
      repo_release_verdict: ${{ steps.signal.outputs.repo_release_verdict }}
      published_image_verdict: ${{ steps.signal.outputs.published_image_verdict }}
      provenance_release_verdict: ${{ steps.signal.outputs.provenance_release_verdict }}
    steps:
      - name: Write structured security release signal
        id: signal
        shell: bash
        env:
          # skip-when-build-incomplete: "success" when the upstream Build was ineligible; other jobs are skipped and we emit verdict=skipped
          SKIP_JOB_RESULT: ${{ needs.skip-when-build-incomplete.result }}
          EVENT_NAME: ${{ github.event_name }}
          DEPENDENCY_REVIEW_RESULT: skipped
          GOVULNCHECK_PR_RESULT: skipped
          SECRET_SCAN_RESULT: skipped
          CONFIG_SCAN_RESULT: skipped
          RESOLVE_BUILD_RUN_RESULT: ${{ needs.resolve-build-run-id.result }}
          RESOLVE_IMAGE_REFS_RESULT: ${{ needs.resolve-image-refs.result }}
          IMAGE_SCAN_RESULT: ${{ needs.image-vulnerability-scan.result }}
          GOVULNCHECK_NIGHTLY_RESULT: skipped
          DEPENDENCY_SNAPSHOT_RESULT: skipped
          APP_IMAGE_REF: ${{ needs.resolve-image-refs.outputs.app_image_ref }}
          BUILD_RUN_ID: ${{ needs.resolve-image-refs.outputs.artifact_build_run_id }}
          GOOSE_IMAGE_REF: ${{ needs.resolve-image-refs.outputs.goose_image_ref }}
          PROVENANCE_VERDICT: ${{ needs.resolve-image-refs.outputs.provenance_verdict }}
          RESOLVED_SOURCE_SHA: ${{ needs.resolve-image-refs.outputs.artifact_source_sha }}
          RESOLVED_SOURCE_WORKFLOW_NAME: ${{ needs.resolve-image-refs.outputs.artifact_source_workflow_name }}
          RESOLVED_SOURCE_BRANCH: ${{ needs.resolve-image-refs.outputs.artifact_source_branch }}
          ARTIFACT_SOURCE_EVENT: ${{ needs.resolve-image-refs.outputs.artifact_source_event }}
          TRIGGER_WORKFLOW_RUN_NAME: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.name || '' }}
          TRIGGER_WORKFLOW_RUN_SOURCE_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || '' }}
          BUILD_HEAD_BRANCH: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || '' }}
          # Build workflow’s literal GitHub event when this run was started by workflow_run; otherwise this Security run’s event (e.g. workflow_dispatch). Do not use as semantic source_event (use build artifacts for that).
          TRIGGER_WORKFLOW_EVENT: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.event || (github.event_name == 'workflow_dispatch' && 'workflow_dispatch' || github.event_name) }}
          MANUAL_TARGET_BRANCH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target_branch || '' }}
          WORKFLOW_NAME: ${{ github.workflow }}
          WORKFLOW_RUN_ID: ${{ github.run_id }}
          WORKFLOW_SHA: ${{ github.sha }}
          GH_TOKEN: ${{ github.token }}
          TRIVY_APP_RESULT: ${{ needs.image-vulnerability-scan.outputs.trivy_app_result }}
          TRIVY_GOOSE_RESULT: ${{ needs.image-vulnerability-scan.outputs.trivy_goose_result }}
          # Triggering Build run (only when this Security run was started by workflow_run; used for no-releasable-candidate detection)
          TRIGGERING_BUILD_CONCLUSION: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.conclusion || '' }}
          TRIGGERING_BUILD_HEAD_BRANCH: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || '' }}
          TRIGGERING_BUILD_WF_NAME: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.name || '' }}
          TRIGGERING_BUILD_ID: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.id || '' }}
          TRIGGERING_BUILD_EVENT: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.event || '' }}
          WF_WRITE_SKIPPED_VERDICT: |
            import json
            import os
            from pathlib import Path
            gen = os.environ.get("GENERATED_AT_UTC", "")
            ev = os.environ.get("EVENT_NAME", "")
            wrid = os.environ.get("WORKFLOW_RUN_ID", "")
            wn = os.environ.get("WORKFLOW_NAME", "Security Release")
            conc = os.environ.get("SKIP_BUILD_CONC", "")
            hb = os.environ.get("SKIP_BUILD_HB", "")
            bid = os.environ.get("SKIP_BUILD_ID", "")
            b_ev = os.environ.get("SKIP_BUILD_EVENT", "")
            b_sha = os.environ.get("SKIP_BUILD_HEAD_SHA", "")
            b_wn = os.environ.get("SKIP_WF_NAME", "Build and Push Images")
            reasons = []
            if hb and hb not in ("develop", "main"):
                reasons.append(
                    "Non-release candidate: triggering Build head_branch is not develop or main; full Security Release gate was not evaluated."
                )
            elif conc and conc != "success":
                reasons.append(
                    f"Non-release candidate: triggering Build and Push Images workflow_run conclusion was {conc!r} (required success for gating); no image scan or artifact-driven gate was run."
                )
            elif b_wn and b_wn != "Build and Push Images":
                reasons.append(
                    f"Non-release candidate: upstream workflow name was {b_wn!r} (expected Build and Push Images)."
                )
            else:
                reasons.append(
                    "Security Release skipped: upstream Build run was ineligible for develop/main release gating (see workflow filters)."
                )
            jr = {
                "skip_job": "success",
                "resolve_build_run": "skipped",
                "resolve_image_refs": "skipped",
                "image_vulnerability_scan": "skipped",
            }
            payload = {
                "schema_version": "v1",
                "verdict": "skipped",
                "security_verdict": "skipped",
                "canonical_security_artifact": "security-verdict",
                "nightly_security_verdict": "not_applicable",
                "event_name": ev,
                "workflow_name": wn,
                "workflow_run_id": wrid,
                "generated_at_utc": gen,
                "source_build_run_id": bid or "",
                "source_sha": b_sha or "",
                "source_branch": hb or "",
                "source_event": "",
                "trigger_workflow_event": b_ev or "",
                "source_workflow_name": b_wn,
                "release_gate_verdict": "skipped",
                "release_gate_mode": "skipped-non-candidate",
                "repo_security_verdict": "skipped",
                "repo_release_verdict": "skipped",
                "published_image_verdict": "skipped",
                "provenance_release_verdict": "skipped",
                "published_images": {
                    "app_image_ref": "",
                    "app_digest": "",
                    "goose_image_ref": "",
                    "goose_digest": "",
                    "provenance_verdict": "",
                    "provenance_verdict_source": "not_applicable",
                },
                "failure_reasons": reasons,
                "decision_reasons": list(reasons),
                "job_results": jr,
                "repo_level_checks": {
                    "current_event_verdict": "skipped",
                    "release_evidence": {
                        "evidence_source": "skipped",
                        "source_event_name": "",
                        "matched_workflow_run_id": "",
                        "matched_workflow_conclusion": "",
                        "required_for_release_verdict": "skipped",
                        "summary": "Security Release was skipped before matching repo **Security** (Build was not a develop/main success candidate).",
                    },
                    "checks": {},
                },
                "release_gate": {
                    "mode": "skipped-non-candidate",
                    "verdict": "skipped",
                    "generated_at_utc": gen,
                    "trust_model": "not-applicable",
                    "required_evidence": {
                        "repo_level_checks": "skipped",
                        "image_level_checks": "skipped",
                        "provenance_release_checks": "skipped",
                    },
                    "summary": "Upstream **Build and Push Images** was not a release candidate for this run; the full image scan and repo **Security** gate were not executed.",
                },
            }
            Path("security-reports").mkdir(parents=True, exist_ok=True)
            Path("security-reports/security-verdict.json").write_text(json.dumps(payload, indent=2) + "\n", encoding="utf-8")
          WF_WRITE_NO_CANDIDATE_VERDICT: |
            import json
            import os
            from pathlib import Path
            # Chain incomplete or upstream Build did not yield digest-pinned image refs: neutral skipped outcome (not a fail verdict).
            gen = os.environ.get("GENERATED_AT_UTC", "")
            ev = os.environ.get("EVENT_NAME", "")
            wrid = os.environ.get("WORKFLOW_RUN_ID", "")
            wn = os.environ.get("WORKFLOW_NAME", "Security Release")
            reasons = []
            if ev == "workflow_run":
                tconc = (os.environ.get("TRIGGERING_BUILD_CONCLUSION") or "").strip()
                tname = (os.environ.get("TRIGGERING_BUILD_WF_NAME") or "").strip()
                thb = (os.environ.get("TRIGGERING_BUILD_HEAD_BRANCH") or "").strip()
                if tconc and tconc != "success":
                    reasons.append(
                        f"Triggering Build and Push Images workflow_run conclusion was {tconc!r} (required: success to produce a releasable candidate)."
                    )
                if tname and tname != "Build and Push Images":
                    reasons.append(
                        f"Triggering workflow name was {tname!r} (expected Build and Push Images)."
                    )
                if thb and thb not in ("develop", "main"):
                    reasons.append(
                        f"Triggering head_branch was {thb!r} (expected develop or main for release gating)."
                    )
            rbr = (os.environ.get("RESOLVE_BUILD_RUN_RESULT") or "").strip()
            rir = (os.environ.get("RESOLVE_IMAGE_REFS_RESULT") or "").strip()
            ris = (os.environ.get("IMAGE_SCAN_RESULT") or "").strip()
            if rbr != "success":
                reasons.append(
                    f"resolve-build-run-id did not succeed (result={rbr!r}); required build artifacts (image-metadata, promotion-manifest, immutable-image-contract) were not available for the release chain."
                )
            if rir != "success":
                reasons.append(
                    f"resolve-image-refs did not succeed (result={rir!r}); digest-pinned app and goose image refs were not established from build artifacts."
                )
            if not reasons:
                reasons.append(
                    "Triggering Build and Push Images run did not produce a releasable candidate"
                )
            # Semantic source fields stay empty: no digests / promotion manifest to release (chain broke upstream).
            tw_ev = (os.environ.get("TRIGGERING_BUILD_EVENT") or "workflow_run").strip() or "workflow_run"
            jr = {
                "resolve_build_run": rbr,
                "resolve_image_refs": rir,
                "image_vulnerability_scan": ris,
            }
            release_summary = "No releasable candidate. Security release gate skipped."
            payload = {
                "schema_version": "v1",
                "verdict": "skipped",
                "security_verdict": "skipped",
                "canonical_security_artifact": "security-verdict",
                "nightly_security_verdict": "not_applicable",
                "event_name": ev,
                "workflow_name": wn,
                "workflow_run_id": wrid,
                "generated_at_utc": gen,
                "source_build_run_id": "",
                "source_sha": "",
                "source_branch": "",
                "source_event": "",
                "trigger_workflow_event": tw_ev,
