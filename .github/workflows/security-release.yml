# Release gate after "Build and Push Images" (image scan, security-verdict). Display name must stay
# "Security Release" — distinct from repo-level "Security" (security.yml). Downstream staging listens here.
# Does **not** deploy to production; production is **workflow_dispatch Deploy Production** (`deploy-prod.yml`, `main` only).
# CONTRACT(verify_workflow_contracts): `write_security_verdict.py unsupported-trigger` remains for `scripts/release/security_release_signal.sh`; automatic eligibility uses artifact semantic `source_event`, not Build `workflow_run` wrapper rejection.
name: Security Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_run:
    workflows:
      - "Build and Push Images"
    types:
      - completed
    branches:
      - develop
      - main
  workflow_dispatch:
    inputs:
      target_branch:
        description: "Branch whose latest successful Build and Push Images run to verify (develop or main only)"
        type: choice
        required: true
        default: develop
        options:
          - develop
          - main
      build_workflow_run_id:
        description: "Optional exact Build and Push Images workflow run id; leave empty to use the latest success on the target branch"
        type: string
        required: false
        default: ""

concurrency:
  group: security-release-${{ github.event_name == 'workflow_run' && format('b-{0}', github.event.workflow_run.head_branch) || format('d-{0}', github.event.inputs.target_branch) || github.run_id }}
  cancel-in-progress: true

permissions:
  actions: read
  attestations: read
  contents: read
  packages: read
  security-events: write

jobs:
  skip-when-build-incomplete:
    name: Skipped — no release gate without successful Build
    if: |
      github.event_name == 'workflow_run' && (
        github.event.workflow_run.conclusion != 'success' ||
        github.event.workflow_run.name != 'Build and Push Images' ||
        (github.event.workflow_run.head_branch != 'develop' && github.event.workflow_run.head_branch != 'main')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Record skip
        run: |
          {
            echo "## Security Release (non-release candidate — will emit skipped verdict)"
            echo "- The triggering **Build and Push Images** run failed basic eligibility (workflow success, correct workflow name, \`develop\`/\`main\` \`head_branch\`)."
            echo "- **Semantic promotion eligibility** (\`push\` vs \`workflow_dispatch\`) is decided from **promotion-manifest** / **immutable-image-contract** after artifacts resolve — **not** from whether the Build was started via CI \`workflow_run\` chain."
            echo "- Diagnostic: conclusion=\`${{ github.event.workflow_run.conclusion }}\`, workflow=\`${{ github.event.workflow_run.name }}\`, \`head_branch\`=\`${{ github.event.workflow_run.head_branch }}\`, GHA \`event\`=\`${{ github.event.workflow_run.event }}\`."
            echo "- Downstream \`Security Release — outcome\` uploads \`security-verdict\` with \`verdict: skipped\`."
          } >> "$GITHUB_STEP_SUMMARY"

  # Semantic promotion eligibility uses promotion-manifest / immutable-image-contract (not github.event.workflow_run.event).
  resolve-build-run-id:
    name: Resolve Published Build For Image Scan
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.name == 'Build and Push Images' &&
        (github.event.workflow_run.head_branch == 'develop' || github.event.workflow_run.head_branch == 'main'))
    runs-on: ubuntu-latest
    outputs:
      workflow_run_id: ${{ steps.lookup.outputs.workflow_run_id }}
    steps:
      - name: Resolve build workflow run id
        id: lookup
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          INPUT_BUILD_RUN: ${{ github.event.inputs.build_workflow_run_id || '' }}
          TARGET_BRANCH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target_branch || '' }}
        run: |
          set -Eeuo pipefail

          if [[ "${EVENT_NAME}" == "workflow_run" ]]; then
            # Triggering run is the Build and Push Images workflow; use its id for artifacts.
            echo "workflow_run_id=${{ github.event.workflow_run.id }}" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [[ -n "${INPUT_BUILD_RUN// }" ]]; then
            if [[ ! "${INPUT_BUILD_RUN// }" =~ ^[0-9]+$ ]]; then
              echo "error: build_workflow_run_id must be a numeric GitHub Actions run id" >&2
              exit 1
            fi
            echo "workflow_run_id=${INPUT_BUILD_RUN// }" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          branch="${TARGET_BRANCH:-develop}"
          [[ "${branch}" == "develop" || "${branch}" == "main" ]] || {
            echo "error: target_branch must be develop or main" >&2
            exit 1
          }

          workflow_run_id="$(
            gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/build-push.yml/runs" \
              -f "branch=${branch}" \
              -f "status=completed" \
              -f "per_page=20" \
              --jq '[.workflow_runs[]? | select(.conclusion == "success" and (.name // "") == "Build and Push Images") | .id] | .[0] // empty'
          )"

          if [[ -z "${workflow_run_id}" ]]; then
            echo "error: no successful Build and Push Images run found for branch ${branch} (workflow name must be Build and Push Images)" >&2
            exit 1
          fi
          echo "workflow_run_id=${workflow_run_id}" >> "${GITHUB_OUTPUT}"

      - name: Required Build run artifacts (fail closed for release chain)
        id: require_build_artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ steps.lookup.outputs.workflow_run_id }}
        run: |
          set -Eeuo pipefail
          [[ -n "${RUN_ID}" ]]
          need=(image-metadata promotion-manifest immutable-image-contract)
          for a in "${need[@]}"; do
            if ! gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}/artifacts" \
              --jq ".artifacts[]? | select(.name==\"${a}\") | .id" | grep -q .; then
              echo "error: Build and Push Images run ${RUN_ID} is missing required artifact \"${a}\" (release candidate chain requires image-metadata, promotion-manifest, and immutable-image-contract from github.event.workflow_run.id)" >&2
              exit 1
            fi
          done
          {
            echo "## Build artifact preflight"
            echo "- run id: \`${RUN_ID}\` (github.event.workflow_run.id for automatic runs)"
            echo "- found: \`image-metadata\`, \`promotion-manifest\`, \`immutable-image-contract\`"
          } >> "${GITHUB_STEP_SUMMARY}"

  resolve-image-refs:
    name: Resolve Published Image Refs
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.name == 'Build and Push Images' &&
        (github.event.workflow_run.head_branch == 'develop' || github.event.workflow_run.head_branch == 'main'))
    needs: resolve-build-run-id
    uses: ./.github/workflows/_reusable-deploy.yml
    with:
      resolution_mode: workflow_run
      workflow_run_id: ${{ needs.resolve-build-run-id.outputs.workflow_run_id }}
    secrets:
      gh_api_token: ${{ secrets.GITHUB_TOKEN }}

  image-vulnerability-scan:
    name: Published Image Vulnerability Scan
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.name == 'Build and Push Images' &&
        (github.event.workflow_run.head_branch == 'develop' || github.event.workflow_run.head_branch == 'main'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: resolve-image-refs
    outputs:
      trivy_app_result: ${{ steps.trivy_outcomes.outputs.trivy_app_result }}
      trivy_goose_result: ${{ steps.trivy_outcomes.outputs.trivy_goose_result }}

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Show image scan policy
        shell: bash
        env:
          APP_IMAGE_REF: ${{ needs.resolve-image-refs.outputs.app_image_ref }}
          GOOSE_IMAGE_REF: ${{ needs.resolve-image-refs.outputs.goose_image_ref }}
        run: |
          {
            echo "## Security Scan Policy"
            echo "- secret scan: fail on any detected secret in repo-scoped content scan"
            echo "- Go vulnerability scan: fail on govulncheck findings in reachable code"
            echo "- config scan: fail on \`HIGH\` and \`CRITICAL\` misconfigurations"
            echo "- image scan: fail on \`HIGH\` and \`CRITICAL\` vulnerabilities with \`ignore-unfixed=true\`"
            echo "- app image: \`${APP_IMAGE_REF}\`"
            echo "- goose image: \`${GOOSE_IMAGE_REF}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Scan published app image
        id: trivy_app
        shell: bash
        env:
          APP_IMAGE_REF: ${{ needs.resolve-image-refs.outputs.app_image_ref }}
        run: |
          set -Eeuo pipefail
          mkdir -p security-reports
          trivy_image="aquasec/trivy:0.57.1"

          pull_trivy_image() {
            local attempt
            for attempt in 1 2 3 4 5; do
              if docker pull "${trivy_image}"; then
                return 0
              fi
              if [[ "${attempt}" -lt 5 ]]; then
                echo "Trivy image pull failed; retrying (${attempt}/5)" >&2
                sleep 10
              fi
            done
            echo "error: failed to pull ${trivy_image} after retries" >&2
            return 1
          }

          if ! pull_trivy_image; then
            echo 127 > security-reports/trivy-app.exitcode
          else
            set +e
            set -o pipefail
            docker run --rm \
              -v "${HOME}/.docker:/root/.docker:ro" \
              -v "${PWD}:/workdir" \
              -w /workdir \
              "${trivy_image}" \
              image \
              --config trivy.yaml \
              --ignorefile .trivyignore \
              --scanners vuln \
              "${APP_IMAGE_REF}" 2>&1 | tee security-reports/trivy-image-app.txt
            rc_app="${PIPESTATUS[0]}"
            set +o pipefail
            set -e
            echo "${rc_app}" > security-reports/trivy-app.exitcode
          fi
          exit 0

      - name: Scan published goose image
        if: always()
        id: trivy_goose
        shell: bash
        env:
          GOOSE_IMAGE_REF: ${{ needs.resolve-image-refs.outputs.goose_image_ref }}
        run: |
          set -Eeuo pipefail
          mkdir -p security-reports
          trivy_image="aquasec/trivy:0.57.1"

          pull_trivy_image() {
            local attempt
            for attempt in 1 2 3 4 5; do
              if docker pull "${trivy_image}"; then
                return 0
              fi
              if [[ "${attempt}" -lt 5 ]]; then
                echo "Trivy image pull failed; retrying (${attempt}/5)" >&2
                sleep 10
              fi
            done
            echo "error: failed to pull ${trivy_image} after retries" >&2
            return 1
          }

          if ! pull_trivy_image; then
            echo 127 > security-reports/trivy-goose.exitcode
          else
            set +e
            set -o pipefail
            docker run --rm \
              -v "${HOME}/.docker:/root/.docker:ro" \
              -v "${PWD}:/workdir" \
              -w /workdir \
              "${trivy_image}" \
              image \
              --config trivy.yaml \
              --ignorefile .trivyignore \
              --scanners vuln \
              "${GOOSE_IMAGE_REF}" 2>&1 | tee security-reports/trivy-image-goose.txt
            rc_goose="${PIPESTATUS[0]}"
            set +o pipefail
            set -e
            echo "${rc_goose}" > security-reports/trivy-goose.exitcode
          fi
          exit 0

      - name: Record Trivy per-image results and fail if policy violated
        if: always()
        id: trivy_outcomes
        shell: bash
        run: |
          set -Eeuo pipefail
          rc_a="1"
          rc_g="1"
          [[ -f security-reports/trivy-app.exitcode ]] && rc_a="$(tr -d '[:space:]' < security-reports/trivy-app.exitcode || echo 1)"
          [[ -f security-reports/trivy-goose.exitcode ]] && rc_g="$(tr -d '[:space:]' < security-reports/trivy-goose.exitcode || echo 1)"
          if [[ "${rc_a}" -eq 0 ]]; then
            trivy_app_result="success"
          else
            trivy_app_result="failure"
          fi
          if [[ "${rc_g}" -eq 0 ]]; then
            trivy_goose_result="success"
          else
            trivy_goose_result="failure"
          fi
          {
            echo "trivy_app_result=${trivy_app_result}"
            echo "trivy_goose_result=${trivy_goose_result}"
            echo "trivy_app_exit_code=${rc_a}"
            echo "trivy_goose_exit_code=${rc_g}"
          } >> "${GITHUB_OUTPUT}"
          if [[ "${trivy_app_result}" != "success" || "${trivy_goose_result}" != "success" ]]; then
            echo "error: Trivy image scan policy: app scan=${trivy_app_result} (exit ${rc_a}), goose scan=${trivy_goose_result} (exit ${rc_g}) (rc 0 = pass)" >&2
            exit 1
          fi

      - name: Upload Trivy image reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: trivy-image-reports
          path: |
            security-reports/trivy-image-app.txt
            security-reports/trivy-image-goose.txt
            security-reports/trivy-app.exitcode
            security-reports/trivy-goose.exitcode
          if-no-files-found: warn
          retention-days: 180

  security-release-signal:
    name: Security Release Signal
    if: always()
    runs-on: ubuntu-latest
    needs:
      - skip-when-build-incomplete
      - resolve-build-run-id
      - resolve-image-refs
      - image-vulnerability-scan
    outputs:
      security_verdict: ${{ steps.signal.outputs.security_verdict }}
      source_build_run_id: ${{ steps.signal.outputs.source_build_run_id }}
      source_sha: ${{ steps.signal.outputs.source_sha }}
      source_workflow_name: ${{ steps.signal.outputs.source_workflow_name }}
      security_workflow_run_id: ${{ steps.signal.outputs.security_workflow_run_id }}
      release_gate_verdict: ${{ steps.signal.outputs.release_gate_verdict }}
      release_gate_mode: ${{ steps.signal.outputs.release_gate_mode }}
      repo_security_verdict: ${{ steps.signal.outputs.repo_security_verdict }}
      repo_release_verdict: ${{ steps.signal.outputs.repo_release_verdict }}
      published_image_verdict: ${{ steps.signal.outputs.published_image_verdict }}
      provenance_release_verdict: ${{ steps.signal.outputs.provenance_release_verdict }}
      source_branch: ${{ steps.signal.outputs.source_branch }}
    steps:
      - name: Check out repository (verdict scripts)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # CONTRACT(verify_workflow_contracts.sh): each write_security_verdict path here must reach emit_verdict_outputs_and_summary before any exit 0 (see scripts/ci/verify_workflow_contracts.sh).
      - name: Write structured security release signal
        id: signal
        shell: bash
        env:
          SKIP_JOB_RESULT: ${{ needs.skip-when-build-incomplete.result }}
          EVENT_NAME: ${{ github.event_name }}
          DEPENDENCY_REVIEW_RESULT: skipped
          GOVULNCHECK_PR_RESULT: skipped
          SECRET_SCAN_RESULT: skipped
          CONFIG_SCAN_RESULT: skipped
          RESOLVE_BUILD_RUN_RESULT: ${{ needs.resolve-build-run-id.result }}
          RESOLVE_IMAGE_REFS_RESULT: ${{ needs.resolve-image-refs.result }}
          IMAGE_SCAN_RESULT: ${{ needs.image-vulnerability-scan.result }}
          GOVULNCHECK_NIGHTLY_RESULT: skipped
          DEPENDENCY_SNAPSHOT_RESULT: skipped
          APP_IMAGE_REF: ${{ needs.resolve-image-refs.outputs.app_image_ref }}
          BUILD_RUN_ID: ${{ needs.resolve-image-refs.outputs.artifact_build_run_id }}
          GOOSE_IMAGE_REF: ${{ needs.resolve-image-refs.outputs.goose_image_ref }}
          PROVENANCE_VERDICT: ${{ needs.resolve-image-refs.outputs.provenance_verdict }}
          RESOLVED_SOURCE_SHA: ${{ needs.resolve-image-refs.outputs.artifact_source_sha }}
          RESOLVED_SOURCE_WORKFLOW_NAME: ${{ needs.resolve-image-refs.outputs.artifact_source_workflow_name }}
          RESOLVED_SOURCE_BRANCH: ${{ needs.resolve-image-refs.outputs.artifact_source_branch }}
          ARTIFACT_SOURCE_EVENT: ${{ needs.resolve-image-refs.outputs.artifact_source_event }}
          TRIGGER_WORKFLOW_RUN_NAME: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.name || '' }}
          TRIGGER_WORKFLOW_RUN_SOURCE_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || '' }}
          BUILD_HEAD_BRANCH: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || '' }}
          TRIGGER_WORKFLOW_EVENT: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.event || (github.event_name == 'workflow_dispatch' && 'workflow_dispatch' || github.event_name) }}
          MANUAL_TARGET_BRANCH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target_branch || '' }}
          WORKFLOW_NAME: ${{ github.workflow }}
          WORKFLOW_RUN_ID: ${{ github.run_id }}
          WORKFLOW_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GH_TOKEN: ${{ github.token }}
          TRIVY_APP_RESULT: ${{ needs.image-vulnerability-scan.outputs.trivy_app_result }}
          TRIVY_GOOSE_RESULT: ${{ needs.image-vulnerability-scan.outputs.trivy_goose_result }}
          TRIGGERING_BUILD_CONCLUSION: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.conclusion || '' }}
          TRIGGERING_BUILD_HEAD_BRANCH: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || '' }}
          TRIGGERING_BUILD_HEAD_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || '' }}
          TRIGGERING_BUILD_WF_NAME: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.name || '' }}
          TRIGGERING_BUILD_ID: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.id || '' }}
          TRIGGERING_BUILD_EVENT: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.event || '' }}
          PROMOTION_MANIFEST_ALLOW_SHA_MISMATCH: ${{ vars.PROMOTION_MANIFEST_ALLOW_SHA_MISMATCH || '' }}
          SKIP_BUILD_CONC: ${{ github.event.workflow_run.conclusion }}
          SKIP_BUILD_HB: ${{ github.event.workflow_run.head_branch }}
          SKIP_BUILD_ID: ${{ github.event.workflow_run.id }}
          SKIP_BUILD_EVENT: ${{ github.event.workflow_run.event }}
          SKIP_BUILD_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          SKIP_WF_NAME: ${{ github.event.workflow_run.name }}
        run: |
          set -Eeuo pipefail
          mkdir -p security-reports
          generated_at_utc="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          export GENERATED_AT_UTC="${generated_at_utc}"
          emergency_on_missing() {
            if [[ -f security-reports/security-verdict.json ]]; then
              return 0
            fi
            export GENERATED_AT_UTC="${generated_at_utc}"
            echo "::error::security-reports/security-verdict.json was not written; emitting emergency fail verdict" >&2
            python3 scripts/security/write_security_verdict.py emergency --emergency-reason "Exit trap: verdict missing (Security Release signal step ended before a successful write)"
            return 0
          }
          trap 'emergency_on_missing' EXIT
          if [[ ! -f scripts/security/write_security_verdict.py ]]; then
            echo "::error::expected scripts/security/write_security_verdict.py from checkout" >&2
            exit 1
          fi
          emit_verdict_outputs_and_summary() {
            set +e
            python3 scripts/security/emit_security_verdict_outputs.py >> "$GITHUB_OUTPUT"
            _eo=$?
            python3 scripts/security/emit_security_verdict_summary.py --section main >> "$GITHUB_STEP_SUMMARY"
            _es=$?
            set -e
            if [[ "${_eo}" -ne 0 ]]; then
              echo "::warning::emit_security_verdict_outputs failed (non-fatal after verdict JSON write)" >&2
            fi
            if [[ "${_es}" -ne 0 ]]; then
              echo "::warning::emit_security_verdict_summary failed (non-fatal after verdict JSON write)" >&2
            fi
          }
          emit_source_debug_table_safe() {
            set +e
            python3 scripts/security/emit_release_signal_debug_table.py
            _ed=$?
            set -e
            if [[ "${_ed}" -ne 0 ]]; then
              echo "::warning::emit_release_signal_debug_table failed (non-fatal after verdict write)" >&2
            fi
          }
          # skip-when-build-incomplete: skip job succeeded => upstream Build failed basic eligibility (never reach full gate)
          SKIP_R="${SKIP_JOB_RESULT:-}"
          if [[ "${SKIP_R}" == "success" ]]; then
            {
              echo ""
              echo "## Security Release skipped (ineligible **Build and Push Images** run)"
              echo "- Requires **success**, workflow name **Build and Push Images**, and \`develop\`/\`main\` \`head_branch\`."
              echo "- **Semantic** promotion source (\`push\` vs \`workflow_dispatch\`) is enforced from **promotion-manifest** / **immutable-image-contract**, not from the Build workflow's outer GHA \`event\` (\`workflow_run\` chain triggers are allowed when artifacts prove an eligible semantic source)."
            } >> "$GITHUB_STEP_SUMMARY"
            python3 scripts/security/write_security_verdict.py skipped
            emit_verdict_outputs_and_summary
            trap - EXIT
            exit 0
          fi
          RBR_RES="${RESOLVE_BUILD_RUN_RESULT:-}"
          RIR_RES="${RESOLVE_IMAGE_REFS_RESULT:-}"
          NO_RC=0
          if [[ "${RBR_RES}" != "success" ]]; then
            NO_RC=1
          fi
          if [[ "${RIR_RES}" != "success" ]]; then
            NO_RC=1
          fi
          if [[ "${EVENT_NAME}" == "workflow_run" ]]; then
            TCONC="${TRIGGERING_BUILD_CONCLUSION:-}"
            TNAME="${TRIGGERING_BUILD_WF_NAME:-}"
            if [[ -n "${TCONC}" && "${TCONC}" != "success" ]]; then
              NO_RC=1
            fi
            if [[ -n "${TNAME}" && "${TNAME}" != "Build and Push Images" ]]; then
              NO_RC=1
            fi
            # Do not use triggering Build head_branch for release-candidate identity (may differ from promotion-manifest when workflow_run chains).
          fi
          if [[ "${NO_RC}" -eq 1 ]]; then
            python3 scripts/security/write_security_verdict.py no-candidate
            emit_verdict_outputs_and_summary
            {
              echo ""
              echo "## No releasable candidate. Security release gate skipped."
            } >> "$GITHUB_STEP_SUMMARY"
            trap - EXIT
            exit 0
          fi
          # Repo Security (push) — candidate identity: promotion-manifest / image-metadata only. Never prefer BUILD_HEAD_* over RESOLVED_*.
          A_EV="${ARTIFACT_SOURCE_EVENT:-}"
          # Primary SHA: RESOLVED (promotion-manifest / image-metadata). If empty: explicit Security run SHA only (workflow_dispatch / ref checkout). Never use triggering workflow_run head_sha.
          release_source_sha="${RESOLVED_SOURCE_SHA:-}"
          if [[ -z "${release_source_sha// }" ]]; then
            release_source_sha="${WORKFLOW_SHA:-}"
          fi
          # Primary branch: RESOLVED, then manual dispatch target, then ref — never BUILD_HEAD_BRANCH / TRIGGERING_BUILD_HEAD_BRANCH for candidate identity.
          want_branch="${RESOLVED_SOURCE_BRANCH:-${MANUAL_TARGET_BRANCH:-${GITHUB_REF_NAME:-}}}"
          c_ev=""
          if [[ "${A_EV}" == "manual" ]]; then
            c_ev="workflow_dispatch"
          elif [[ -n "${A_EV// }" && "${A_EV}" != "manual" ]]; then
            c_ev="${A_EV}"
          fi
          export CANONICAL_SOURCE_SHA="${release_source_sha}"
          export CANONICAL_SOURCE_BRANCH="${want_branch}"
          export CANONICAL_SOURCE_EVENT="${c_ev}"
          META_CONFLICT=""
          if [[ "${EVENT_NAME}" == "workflow_run" ]]; then
            _tname="${TRIGGERING_BUILD_WF_NAME:-}"
            _tconc="${TRIGGERING_BUILD_CONCLUSION:-}"
            _tev="${TRIGGERING_BUILD_EVENT:-}"
            _thb="${TRIGGERING_BUILD_HEAD_BRANCH:-}"
            _tsha="${TRIGGERING_BUILD_HEAD_SHA:-}"
            _tid="${TRIGGERING_BUILD_ID:-}"
            _bid="${BUILD_RUN_ID:-}"
            _abr="${RESOLVED_SOURCE_BRANCH:-}"
            _asha="${RESOLVED_SOURCE_SHA:-}"
            _aev="${ARTIFACT_SOURCE_EVENT:-}"
            if [[ -n "${_tname}" && "${_tname}" != "Build and Push Images" ]]; then
              META_CONFLICT="Triggering workflow name is ${_tname} (expected Build and Push Images)."
            fi
            if [[ -z "${META_CONFLICT// }" && -n "${_tconc}" && "${_tconc}" != "success" ]]; then
              META_CONFLICT="Triggering workflow conclusion is ${_tconc} (expected success)."
            fi
            if [[ -z "${META_CONFLICT// }" && -n "${_thb}" && "${_thb}" != "develop" && "${_thb}" != "main" ]]; then
              META_CONFLICT="Triggering head_branch is ${_thb} (expected develop or main)."
            fi
            if [[ -z "${META_CONFLICT// }" && -n "${_tid}" && -n "${_bid}" && "${_tid}" != "${_bid}" ]]; then
              META_CONFLICT="Build run id mismatch: triggering workflow run id is ${_tid} but artifact build_run_id is ${_bid} (must be the same Build and Push Images run for this Security Release)."
            fi
            if [[ -z "${META_CONFLICT// }" && "${_tev}" == "push" && "${_aev}" == "push" ]]; then
              if [[ -n "${_thb}" && -n "${_abr}" && "${_thb}" != "${_abr}" ]]; then
                META_CONFLICT="Branch mismatch: triggering Build head_branch is ${_thb} but promotion-manifest resolved source_branch is ${_abr} (direct push must be self-consistent)."
              elif [[ -n "${_tsha}" && -n "${_asha}" && "${#_tsha}" -ge 4 && "${#_asha}" -ge 4 && "${_tsha}" != "${_asha}" && "${PROMOTION_MANIFEST_ALLOW_SHA_MISMATCH:-}" != "1" ]]; then
                META_CONFLICT="SHA mismatch: triggering Build head_sha and promotion-manifest RESOLVED source_sha differ. Set repository variable PROMOTION_MANIFEST_ALLOW_SHA_MISMATCH=1 only for a documented promotion-manifest exception (retarget/rebase policy)."
              fi
            fi
            if [[ -z "${META_CONFLICT// }" && "${_tev}" == "workflow_dispatch" ]]; then
              if [[ ( "${_aev}" == "workflow_dispatch" || "${_aev}" == "manual" ) && -n "${_thb}" && -n "${_abr}" && "${_thb}" != "${_abr}" ]]; then
                META_CONFLICT="Branch mismatch: dispatch Build head_branch is ${_thb} but resolved source_branch is ${_abr}."
              elif [[ ( "${_aev}" == "workflow_dispatch" || "${_aev}" == "manual" ) && -n "${_tsha}" && -n "${_asha}" && "${#_tsha}" -ge 4 && "${#_asha}" -ge 4 && "${_tsha}" != "${_asha}" && "${PROMOTION_MANIFEST_ALLOW_SHA_MISMATCH:-}" != "1" ]]; then
                META_CONFLICT="SHA mismatch for manual/dispatch build: set PROMOTION_MANIFEST_ALLOW_SHA_MISMATCH=1 only for a documented manifest exception."
              fi
            fi
          fi
          if [[ -n "${META_CONFLICT// }" ]]; then
            export METADATA_CONFLICT_REASON="${META_CONFLICT}"
            {
              echo ""
              echo "## Security Release skipped: artifact / triggering metadata mismatch"
              echo "- **decision**: \`skipped\` (full release gate not run; this is not an emergency-fail)"
              echo ""
              echo "| Field | Value |"
              echo "|---|---|"
              echo "| \`triggering_build_run_id\` | \`${TRIGGERING_BUILD_ID:-}\` |"
              echo "| \`build_run_id_from_artifacts\` | \`${BUILD_RUN_ID:-}\` |"
              echo "| \`triggering_build_event\` | \`${TRIGGERING_BUILD_EVENT:-}\` |"
              echo "| \`triggering_build_head_branch\` | \`${TRIGGERING_BUILD_HEAD_BRANCH:-}\` |"
              echo "| \`triggering_build_head_sha\` | \`${TRIGGERING_BUILD_HEAD_SHA:-}\` |"
              echo "| \`triggering_workflow_name\` | \`${TRIGGERING_BUILD_WF_NAME:-}\` |"
              echo "| \`triggering_workflow_conclusion\` | \`${TRIGGERING_BUILD_CONCLUSION:-}\` |"
              echo "| \`artifact_source_event\` (semantic, promotion-manifest) | \`${ARTIFACT_SOURCE_EVENT:-}\` |"
              echo "| \`resolved_source_branch\` | \`${RESOLVED_SOURCE_BRANCH:-}\` |"
              echo "| \`resolved_source_sha\` | \`${RESOLVED_SOURCE_SHA:-}\` |"
            } >> "$GITHUB_STEP_SUMMARY"
            python3 scripts/security/write_security_verdict.py metadata-mismatch
            emit_verdict_outputs_and_summary
            trap - EXIT
            exit 0
          fi
          {
            echo "- canonical source sha: ${release_source_sha}"
            echo "- canonical source branch: ${want_branch}"
            echo "- semantic artifact source_event (promotion-manifest): ${A_EV:-unknown}"
            echo "- Build vs artifact metadata (defensive check): \`ok\` — proceeding to full gate (see **metadata_validation** in JSON)"
            echo "- triggering \`build_run_id\` (GHA): \`${TRIGGERING_BUILD_ID:-}\`  artifact \`build_run_id\`: \`${BUILD_RUN_ID:-}\`"
            echo "- triggering \`head_branch\` (diagnostic): \`${TRIGGERING_BUILD_HEAD_BRANCH:-unknown}\`"
            echo "- resolved source workflow: ${RESOLVED_SOURCE_WORKFLOW_NAME:-}  (artifact)"
            echo "- diagnostic triggering GHA \`event\` (Build): \`${TRIGGERING_BUILD_EVENT:-unknown}\`"
          } >> "$GITHUB_STEP_SUMMARY"
          {
            echo ""
            echo "### Build vs artifact — observability (pre-gate)"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| \`triggering_build_run_id\` | \`${TRIGGERING_BUILD_ID:-}\` |"
            echo "| \`build_run_id_from_artifacts\` | \`${BUILD_RUN_ID:-}\` |"
            echo "| \`triggering_build_event\` | \`${TRIGGERING_BUILD_EVENT:-}\` |"
            echo "| \`triggering_build_head_branch\` | \`${TRIGGERING_BUILD_HEAD_BRANCH:-}\` |"
            echo "| \`artifact_source_event\` (semantic, promotion-manifest) | \`${A_EV:-}\` |"
            echo "| \`resolved_source_branch\` | \`${RESOLVED_SOURCE_BRANCH:-}\` |"
            echo "| \`resolved_source_sha\` | \`${RESOLVED_SOURCE_SHA:-}\` |"
            echo "| \`decision\` (this stage) | \`proceed\` to repo **Security** run match and full verdict writer |"
          } >> "$GITHUB_STEP_SUMMARY"
          # Semantic source_event is authoritative from promotion-manifest (must be push / workflow_dispatch / manual); Build may be CI workflow_run-wrapped.
          if [[ -n "${A_EV// }" && "${A_EV}" != "push" && "${A_EV}" != "workflow_dispatch" && "${A_EV}" != "manual" ]]; then
            python3 scripts/security/write_security_verdict.py unsupported-artifact-source-event
            emit_verdict_outputs_and_summary
            trap - EXIT
            exit 0
          fi
          if [[ -z "${want_branch// }" || ( "${want_branch}" != "develop" && "${want_branch}" != "main" ) ]]; then
            python3 scripts/security/write_security_verdict.py ineligible-branch
            emit_verdict_outputs_and_summary
            trap - EXIT
            exit 0
          fi
          if [[ -z "${release_source_sha// }" ]]; then
            {
              echo ""
              echo "## Security Release skipped: empty canonical source SHA"
              echo "- **Why skipped / no-candidate**: \`RESOLVED_SOURCE_SHA\` (artifacts) and checkout fallback were empty; cannot evaluate the release gate (expected promotion-manifest / image-metadata or \`WORKFLOW_SHA\` for dispatch)."
            } >> "$GITHUB_STEP_SUMMARY"
            export ARTIFACT_CONSISTENCY_NOTE="empty canonical source SHA: RESOLVED_SOURCE_SHA and WORKFLOW_SHA fallback both empty (artifact chain incomplete)."
            python3 scripts/security/write_security_verdict.py no-candidate
            emit_verdict_outputs_and_summary
            trap - EXIT
            exit 0
          fi
          repo_release_evidence_source="api-security-workflow"
          repo_release_source_event="push"
          repo_release_matched_run_id=""
          repo_release_matched_run_conclusion=""
          repo_release_verdict=""
          repo_release_dependency_review="not_applicable"
          repo_release_govulncheck_repo="not_applicable"
          repo_release_secret_scan="not_applicable"
          repo_release_trivy_config="not_applicable"
          repo_release_summary="(pending) API lookup for **Security** repo workflow run"
          release_resolution_error=""

          if [[ "${EVENT_NAME}" == "workflow_run" ]]; then
            if [[ -z "${release_source_sha// }" || -z "${want_branch// }" ]]; then
              release_resolution_error="workflow_run: could not determine canonical source SHA/branch (artifact + fallbacks) for the repo **Security** workflow match. Check promotion-manifest / image-metadata and Build trigger fields."
            fi
            if [[ -n "${release_resolution_error}" ]]; then
              repo_release_evidence_source="workflow-resolution-failed"
              repo_release_verdict="unavailable"
              repo_release_summary="${release_resolution_error}"
            else
            repo_release_verdict="unavailable"
            max_attempts=20
            for (( attempt=1; attempt<=max_attempts; attempt++ )); do
              latest_json=""
              set +e
              latest_json="$(
                gh api --method GET "repos/${GITHUB_REPOSITORY}/actions/workflows/security.yml/runs" \
                  -f "head_sha=${release_source_sha}" \
                  -f "branch=${want_branch}" \
                  -f "event=push" \
                  -f "per_page=30" 2>/dev/null || true
              )"
              set -e
              # Safe under set -e: gh empty, jq empty, or read must not abort (optional Security run lookup).
              most_recent_id=""
              most_recent_concl=""
              security_run_row=""
              if [[ -n "${latest_json// }" ]]; then
                set +e
                security_run_row="$(
                  { echo "${latest_json}" | jq -r --arg b "${want_branch}" '
                    [.workflow_runs[]?
                      | select(
                          (.name // "") == "Security"
                          and ((.head_branch // "") == $b)
                        )
                    ]
                    | sort_by(.created_at)
                    | reverse
                    | (if length > 0 then .[0] | [((.id|tostring), (.conclusion // ""))] | @tsv else empty end)
                  ' 2>/dev/null | head -n 1; } || true
                )"
                set -e
              fi
              if [[ -n "${security_run_row// }" ]]; then
                IFS=$'\t' read -r most_recent_id most_recent_concl <<< "${security_run_row}" || true
              fi
              most_recent_id="${most_recent_id//[[:space:]]/}"
              most_recent_concl="${most_recent_concl//[[:space:]]/}"
              if [[ -n "${most_recent_id}" && "${most_recent_id}" =~ ^[0-9]+$ ]]; then
                if [[ "${most_recent_concl}" == "success" ]]; then
                  repo_release_matched_run_id="${most_recent_id}"
                  repo_release_matched_run_conclusion="success"
                  repo_release_verdict="pass"
                  repo_release_evidence_source="security-workflow-run-success"
                  repo_release_summary="Security (repo) push run ${most_recent_id} completed successfully for head_sha=${release_source_sha} branch=${want_branch} (matches Build candidate)."
                  break
                fi
                if [[ -n "${most_recent_concl}" && "${most_recent_concl}" != "success" && "${most_recent_concl}" != "null" ]]; then
                  repo_release_evidence_source="security-workflow-run-not-successful"
                  repo_release_matched_run_id="${most_recent_id}"
                  repo_release_matched_run_conclusion="${most_recent_concl}"
                  repo_release_verdict="fail"
                  repo_release_summary="Security (repo) push run ${most_recent_id} for head_sha=${release_source_sha} branch=${want_branch} has conclusion=${most_recent_concl} (required: success)."
                  break
                fi
              fi
              if [[ "${attempt}" -lt "${max_attempts}" ]]; then
                {
                  echo "- **Poll ${attempt}/${max_attempts}**: waiting for a completed **Security** (repo) **push** run for \`head_sha=${release_source_sha}\` on branch \`${want_branch}\` …"
                } >> "${GITHUB_STEP_SUMMARY}" 2>/dev/null || true
                sleep 20 || true
              fi
            done
            if [[ "${repo_release_verdict}" != "pass" && "${repo_release_verdict}" != "fail" ]]; then
              repo_release_evidence_source="security-workflow-not-found-or-not-successful"
              repo_release_verdict="unavailable"
              repo_release_matched_run_id=""
              repo_release_matched_run_conclusion=""
              repo_release_summary="No successful **Security** (repo) **push** run found for head_sha=${release_source_sha} branch=${want_branch} after ${max_attempts} attempts (~$(( max_attempts * 20 ))s). A push to develop/main that starts **Security** must exist for the same commit."
            fi
            fi
          fi

          export RELEASE_RESOLUTION_ERROR="${release_resolution_error:-}"
          export RELEASE_SOURCE_SHA="${release_source_sha}"
          export REPO_RELEASE_EVIDENCE_SOURCE="${repo_release_evidence_source}"
          export REPO_RELEASE_SOURCE_EVENT="${repo_release_source_event}"
          export REPO_RELEASE_MATCHED_RUN_ID="${repo_release_matched_run_id}"
          export REPO_RELEASE_MATCHED_RUN_CONCLUSION="${repo_release_matched_run_conclusion}"
          export REPO_RELEASE_VERDICT="${repo_release_verdict}"
          export REPO_RELEASE_DEPENDENCY_REVIEW="${repo_release_dependency_review}"
          export REPO_RELEASE_GOVULNCHECK_REPO="${repo_release_govulncheck_repo}"
          export REPO_RELEASE_SECRET_SCAN="${repo_release_secret_scan}"
          export REPO_RELEASE_TRIVY_CONFIG="${repo_release_trivy_config}"
          export REPO_RELEASE_SUMMARY="${repo_release_summary}"
          set +e
          python3 scripts/security/write_security_verdict.py full
          _vw=$?
          set -e
          if [[ "${_vw}" -ne 0 ]]; then
            echo "::error::write_security_verdict.py full mode failed; writing emergency fail verdict" >&2
            set +e
            python3 scripts/security/write_security_verdict.py emergency --emergency-reason "write_security_verdict.py full exited with code ${_vw}"
            set -e
          fi
          REPO_RELEASE_MATCHED_RUN_ID="${repo_release_matched_run_id:-}"
          export REPO_RELEASE_MATCHED_RUN_ID
          emit_verdict_outputs_and_summary
          emit_source_debug_table_safe
          trap - EXIT

      - name: Upload security verdict
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: security-verdict
          path: security-reports/security-verdict.json
          if-no-files-found: warn
          retention-days: 180

      - name: Generate production deploy candidate
        id: production_deploy_candidate
        if: >-
          steps.signal.outputs.security_verdict == 'pass' &&
          steps.signal.outputs.release_gate_verdict == 'pass' &&
          steps.signal.outputs.release_gate_mode == 'full-security-release-gate' &&
          steps.signal.outputs.source_branch == 'main'
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 scripts/release/write_production_deploy_candidate_package.py \
            --security-verdict security-reports/security-verdict.json \
            --out-dir production-deploy-candidate

      - name: Upload production deploy candidate
        if: steps.production_deploy_candidate.outcome == 'success'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: production-deploy-candidate
          path: production-deploy-candidate
          if-no-files-found: error
          retention-days: 30

      - name: Production deploy candidate — summary
        if: always()
        shell: bash
        env:
          VERDICT: ${{ steps.signal.outputs.security_verdict }}
          SRC_BR: ${{ steps.signal.outputs.source_branch }}
          RG_VERDICT: ${{ steps.signal.outputs.release_gate_verdict }}
          RG_MODE: ${{ steps.signal.outputs.release_gate_mode }}
          PDC_OUTCOME: ${{ steps.production_deploy_candidate.outcome }}
          SRC_BUILD: ${{ steps.signal.outputs.source_build_run_id }}
          SRC_SHA: ${{ steps.signal.outputs.source_sha }}
          SEC_RUN: ${{ steps.signal.outputs.security_workflow_run_id }}
          APP_REF: ${{ needs.resolve-image-refs.outputs.app_image_ref }}
          GOOSE_REF: ${{ needs.resolve-image-refs.outputs.goose_image_ref }}
        run: |
          set -Eeuo pipefail
          {
            echo ""
            echo "## Production deploy candidate (\`production-deploy-candidate\` artifact)"
          } >> "$GITHUB_STEP_SUMMARY"
          if [[ "${VERDICT}" != "pass" ]]; then
            echo "- **Status**: no artifact — verdict is **not** \`pass\` (\`${VERDICT}\`). Only passing Security Release runs may emit this bundle." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          if [[ "${SRC_BR}" != "main" ]]; then
            echo "- **Status**: no artifact — \`source_branch\` is \`${SRC_BR}\` (**main-only**; develop passes never publish production-deploy-candidate)." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          if [[ "${RG_VERDICT}" != "pass" || "${RG_MODE}" != "full-security-release-gate" ]]; then
            echo "- **Status**: no artifact — release gate not eligible for candidate bundle (\`release_gate_verdict=${RG_VERDICT}\`, \`release_gate_mode=${RG_MODE}\`)." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          if [[ "${PDC_OUTCOME}" != "success" ]]; then
            echo "- **Status**: no artifact — generator step outcome \`${PDC_OUTCOME}\` (pass on \`main\` expected a bundle; inspect **Generate production deploy candidate** logs)." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          {
            echo "- **Status**: artifact **production-deploy-candidate** uploaded (manual review required; **no auto-deploy**)."
            echo "- **Bundle**: \`production-deploy-inputs.json\`, \`production-deploy-candidate-metadata.json\` (semantic \`source_event\` vs \`trigger_workflow_event\`), \`deploy-production-gh-command.sh\`, README."
            echo "- **build_run_id**: \`${SRC_BUILD}\`"
            echo "- **security_release_run_id**: \`${SEC_RUN}\`"
            echo "- **source_commit_sha**: \`${SRC_SHA}\`"
            echo "- **app_image_ref**: \`${APP_REF}\`"
            echo "- **goose_image_ref**: \`${GOOSE_REF}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      # security-release-audit-package: see docs/operations/release-evidence-retention.md
      - name: Build release audit package (security phase)
        if: always()
        shell: bash
        run: |
          set -Eeuo pipefail
          if [[ -f security-reports/security-verdict.json ]]; then
            python3 scripts/release/build_release_evidence_package.py --out release-evidence --phase security --root . --strict-phase security
          else
            echo "::warning::security-reports/security-verdict.json not present; building non-strict audit manifest only"
            python3 scripts/release/build_release_evidence_package.py --out release-evidence --phase security --root .
          fi
      - name: Upload release audit package
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: security-release-audit-package
          path: release-evidence
          if-no-files-found: warn
          retention-days: 90

      - name: Security release signal — decision observability
        if: always()
        shell: bash
        env:
          OUT_VERDICT: ${{ steps.signal.outputs.security_verdict }}
          OUT_SOURCE_SHA: ${{ steps.signal.outputs.source_sha }}
          OUT_SOURCE_BUILD: ${{ steps.signal.outputs.source_build_run_id }}
          OUT_SEC_RUN: ${{ steps.signal.outputs.security_workflow_run_id }}
          OUT_RG_VERDICT: ${{ steps.signal.outputs.release_gate_verdict }}
          OUT_RG_MODE: ${{ steps.signal.outputs.release_gate_mode }}
          OUT_REPO_SEC: ${{ steps.signal.outputs.repo_security_verdict }}
          OUT_REPO_REL: ${{ steps.signal.outputs.repo_release_verdict }}
          OUT_PUB: ${{ steps.signal.outputs.published_image_verdict }}
          OUT_PROV: ${{ steps.signal.outputs.provenance_release_verdict }}
        run: |
          set -Eeuo pipefail
          f="security-reports/security-verdict.json"
          {
            echo "## Security release signal — decision details"
            echo ""
            echo "Outputs from the signal step (also in \`security-verdict.json\` when present):"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| \`security_verdict\` (blocking) | \`${OUT_VERDICT:-<missing>}\` |"
            echo "| \`release_gate_verdict\` | \`${OUT_RG_VERDICT:-<missing>}\` |"
            echo "| \`release_gate_mode\` | \`${OUT_RG_MODE:-<missing>}\` |"
            echo "| \`repo_security_verdict\` | \`${OUT_REPO_SEC:-<missing>}\` |"
            echo "| \`repo_release_verdict\` | \`${OUT_REPO_REL:-<missing>}\` |"
            echo "| \`published_image_verdict\` | \`${OUT_PUB:-<missing>}\` |"
            echo "| \`provenance_release_verdict\` | \`${OUT_PROV:-<missing>}\` |"
            echo "| \`source_sha\` | \`${OUT_SOURCE_SHA:-<missing>}\` |"
            echo "| \`source_build_run_id\` | \`${OUT_SOURCE_BUILD:-<missing>}\` |"
            echo "| \`security_workflow_run_id\` (this run) | \`${OUT_SEC_RUN:-<missing>}\` |"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
          if [[ ! -f "$f" ]]; then
            {
              echo "### Payload file missing"
              echo "Expected \`security-reports/security-verdict.json\` for full \`job_results\` and drill-down; the write step may have failed before producing the file."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::warning::security-verdict.json is missing; see earlier steps."
            exit 0
          fi
          set +e
          python3 scripts/security/emit_security_verdict_summary.py --section observability >> "$GITHUB_STEP_SUMMARY"
          _obs=$?
          set -e
          if [[ "${_obs}" -ne 0 ]]; then
            echo "::warning::emit_security_verdict_summary observability section failed (non-fatal)" >&2
          fi
          {
            echo ""
            echo "---"
            echo ""
            echo "Full JSON: \`security-reports/security-verdict.json\` (also uploaded as artifact \`security-verdict\`)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce blocking security verdict
        if: always()
        shell: bash
        env:
          SECURITY_VERDICT: ${{ steps.signal.outputs.security_verdict }}
        run: |
          set -Eeuo pipefail
          if [[ -f security-reports/security-verdict.json ]]; then
            echo "### failure_reasons (blocking)" >> "${GITHUB_STEP_SUMMARY}"
            {
              set +e
              mapfile -t _fr < <(python3 -c 'import json,sys; p=json.load(open("security-reports/security-verdict.json","r",encoding="utf-8")); [print(x) for x in (p.get("failure_reasons") or [])]' 2>/dev/null) || true
              set -e
              if [[ ${#_fr[@]} -gt 0 ]]; then
                for line in "${_fr[@]}"; do
                  echo "- ${line}"
                done
              else
                echo "- (no structured failure_reasons; see security-verdict.json and job_results)"
              fi
            } >> "${GITHUB_STEP_SUMMARY}" 2>/dev/null || {
              echo "- (failed to list failure_reasons; open security-reports/security-verdict.json)" >> "${GITHUB_STEP_SUMMARY}" || true
            }
            echo "" >&2
            echo "--- failure_reasons (stderr) ---" >&2
            python3 -c "import json,sys; p=json.load(open('security-reports/security-verdict.json','r',encoding='utf-8')); fr=p.get('failure_reasons') or []; [print('failure_reason:',r,file=sys.stderr) for r in fr]" || true
            echo "----------------" >&2
          fi
          V="${SECURITY_VERDICT:-}"
          if [[ -f security-reports/security-verdict.json ]]; then
            V2="$(python3 -c "import json;print(json.load(open('security-reports/security-verdict.json',encoding='utf-8')).get('verdict','') or '')" 2>/dev/null || true)"
            if [[ -n "${V2// }" ]]; then
              V="${V2}"
            fi
          fi
          if [[ -z "${V// }" ]]; then
            echo "error: blocking security verdict is empty; expected pass, fail, or skipped" >&2
            exit 1
          fi
          if [[ "${V}" == "pass" || "${V}" == "skipped" ]]; then
            [[ "${V}" == "pass" ]] || { echo "Security Release outcome: **skipped** (not a develop/main success release candidate); workflow succeeds without blocking." >> "${GITHUB_STEP_SUMMARY}"; }
            exit 0
          fi
          if [[ "${V}" == "fail" ]]; then
            echo "error: blocking security verdict is ${V} (verdict=fail required investigation)" >&2
            echo "error: see job summary: **Security release signal — decision observability** and **failure_reasons (blocking)** above." >&2
            exit 1
          fi
          echo "error: unexpected security verdict: ${V}" >&2
          exit 1
