# CodeQL static analysis for Go.
#
# Triggers (enterprise):
#   - pull_request → develop, main
#   - push → develop, main
#   - schedule (weekly)
#
# Intentional skip (not a silent omission; skipped job is NOT a successful CodeQL run):
#   The analyze job runs only when repository variable ENABLE_CODE_SCANNING is exactly the string 'true'
#   (see jobs.analyze: if: vars.ENABLE_CODE_SCANNING == 'true').
#   When unset or not 'true', GitHub shows the job as skipped — see docs/runbooks/github-governance.md
#   (Security matrix: org-gated / not merge-blocking on its own when skipped).
#   Enable when the org/repo has GitHub Code Scanning (Advanced Security) available.
#   Fork PRs: GitHub may skip or restrict CodeQL on public fork PRs per platform policy; base-branch
#   protection still relies on blocking jobs in security.yml (secret scan, govulncheck, config scan).
name: CodeQL

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main
  schedule:
    - cron: "19 4 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze Go with CodeQL
    if: vars.ENABLE_CODE_SCANNING == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        language:
          - go

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a # v3
        with:
          languages: ${{ matrix.language }}
          build-mode: autobuild

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25.9"
          cache: true
          cache-dependency-path: go.sum

      - name: Autobuild
        uses: github/codeql-action/autobuild@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a # v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a # v3
