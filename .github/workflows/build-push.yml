name: Build and Push Images

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    # Only when CI ran on a branch named develop or main (e.g. push after merge). Pull_request CI
    # runs on the PR head (feature/*), so this workflow is not scheduled (no all-skipped 1s runs).
    branches:
      - develop
      - main
  workflow_dispatch:
    inputs:
      build_target_branch:
        description: "Target branch to check out and build (only develop or main)"
        type: choice
        required: true
        default: develop
        options:
          - develop
          - main

concurrency:
  group: build-push-${{ github.event_name == 'workflow_run' && format('wr-{0}', github.event.workflow_run.head_branch) || format('wd-{0}', github.event.inputs.build_target_branch) || github.run_id }}
  cancel-in-progress: true

permissions:
  attestations: write
  contents: read
  id-token: write
  packages: write

# Contract anchors (see scripts/ci/verify_workflow_contracts.sh; enforced in job upstream-ci-release-gate):
# - github.event.workflow_run.name == 'CI'
# - github.event.workflow_run.conclusion == 'success'
# - github.event.workflow_run.event == 'push'
# - (github.event.workflow_run.head_branch == 'develop' || github.event.workflow_run.head_branch == 'main')

jobs:
  # Must always run a concrete pass/fail first. If upstream "CI" is push@develop/main but *failed*, the build job
  # is skipped; without this gate, *all* jobs can be skipped and the workflow still goes green in ~1s.
  upstream-ci-release-gate:
    name: Upstream CI release gate
    runs-on: ubuntu-latest
    steps:
      - name: Enforce real release-candidate (push CI) or allow manual dispatch
        shell: bash
        run: |
          set -Eeuo pipefail
          {
            echo "## Upstream / trigger gate"
            echo "- this workflow event: \`${{ github.event_name }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            {
              echo "- **not** a release candidate from a CI \`push\` chain — **manual** \`workflow_dispatch\` (operational build to develop or main only)."
              echo "- **Not a release candidate** in the *automatic merge/push* sense: source_event for manifests is \`workflow_dispatch\`."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          if [[ "${{ github.event_name }}" != "workflow_run" ]]; then
            echo "error: unexpected event for Build and Push Images: ${{ github.event_name }}" >&2
            exit 1
          fi
          wn="${{ github.event.workflow_run.name }}"
          ev="${{ github.event.workflow_run.event }}"
          conc="${{ github.event.workflow_run.conclusion }}"
          hb="${{ github.event.workflow_run.head_branch }}"
          {
            echo "- upstream \`name\` (must be \`CI\`): \`${wn}\`"
            echo "- upstream \`event\` (must be \`push\` for auto release candidates): \`${ev}\`"
            echo "- upstream \`conclusion\` (must be \`success\` to build images): \`${conc}\`"
            echo "- upstream \`head_branch\` (must be \`develop\` or \`main\`): \`${hb}\`"
          } >> "$GITHUB_STEP_SUMMARY"
          if [[ "${wn}" != "CI" ]]; then
            {
              echo "## Not a release candidate"
              echo "- Upstream workflow is not named \`CI\` (got \`${wn}\`); this workflow does not build or push."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "error: only workflow_run from **CI** can trigger image build; got: ${wn}" >&2
            exit 1
          fi
          if [[ "${ev}" != "push" ]]; then
            {
              echo "## Not a release candidate"
              echo "- \`pull_request\` and other non-**push** CI runs must **not** produce GHCR images or release artifacts (no promotion-manifest / image-metadata / immutable-image-contract for this path)."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "error: only **push** CI (merge to develop/main) is a release candidate; event was: ${ev}" >&2
            exit 1
          fi
          if [[ "${conc}" != "success" ]]; then
            {
              echo "## Not a release candidate"
              echo "- Upstream \`CI\` did not succeed (conclusion: \`${conc}\`); not building, pushing, or uploading release manifest artifacts. Fix CI on \`${hb}\` and push again."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "error: upstream CI did not complete successfully; refuse green empty run (conclusion=${conc})" >&2
            exit 1
          fi
          if [[ "${hb}" != "develop" && "${hb}" != "main" ]]; then
            {
              echo "## Not a release candidate"
              echo "- head branch is not \`develop\` or \`main\` (got \`${hb}\`); this workflow is skipped for other branches by policy."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "error: only develop/main push builds are release candidates" >&2
            exit 1
          fi
          {
            echo "- **result:** valid **push** \`CI\` @ \`${hb}\` (success) — this run may build and push digest-pinned images and upload release artifacts."
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0

  build-and-push:
    name: Build and Publish Images
    needs: upstream-ci-release-gate
    if: |
      always() &&
      needs.upstream-ci-release-gate.result == 'success' &&
      (
        (github.event_name == 'workflow_dispatch' &&
          (github.event.inputs.build_target_branch == 'develop' || github.event.inputs.build_target_branch == 'main')) ||
        github.event_name == 'workflow_run'
      )
    uses: ./.github/workflows/_reusable-build.yml
    with:
      # workflow_run: exact CI head commit + branch. workflow_dispatch: explicit develop/main only (never default-branch accidents).
      checkout_ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || format('refs/heads/{0}', github.event.inputs.build_target_branch) }}
      head_branch: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.event.inputs.build_target_branch }}
    secrets: inherit

  publish-build-metadata:
    name: Publish Build Metadata and Promotion Signals
    needs:
      - upstream-ci-release-gate
      - build-and-push
    if: always() && needs.build-and-push.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Write build metadata summary
        shell: bash
        env:
          ACTOR: ${{ github.actor }}
          APP_DIGEST: ${{ needs.build-and-push.outputs.app_digest }}
          APP_IMAGE: ${{ needs.build-and-push.outputs.app_image }}
          APP_REF: ${{ needs.build-and-push.outputs.app_ref }}
          APP_TAG: ${{ needs.build-and-push.outputs.app_tag }}
          BUILD_COMMIT_SHA: ${{ needs.build-and-push.outputs.source_commit_sha }}
          BUILD_RUN_ID: ${{ github.run_id }}
          BUILD_WORKFLOW_NAME: ${{ github.workflow }}
          DOCKERFILE_GOOSE_SHA256: ${{ needs.build-and-push.outputs.dockerfile_goose_sha256 }}
          DOCKERFILE_SHA256: ${{ needs.build-and-push.outputs.dockerfile_sha256 }}
          GO_SUM_SHA256: ${{ needs.build-and-push.outputs.go_sum_sha256 }}
          GOOSE_DIGEST: ${{ needs.build-and-push.outputs.goose_digest }}
          GOOSE_IMAGE: ${{ needs.build-and-push.outputs.goose_image }}
          GOOSE_REF: ${{ needs.build-and-push.outputs.goose_ref }}
          GOOSE_TAG: ${{ needs.build-and-push.outputs.goose_tag }}
          SOURCE_BRANCH: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || (github.event_name == 'workflow_dispatch' && github.event.inputs.build_target_branch || github.ref_name) }}
          # workflow_run: CI head branch. workflow_dispatch: chosen branch (develop/main). Never rely on default github.ref for dispatch.
          SOURCE_REF_TYPE: ${{ (github.event_name == 'workflow_run' || github.event_name == 'workflow_dispatch') && 'branch' || github.ref_type }}
          # Semantic event for the code that was built: the triggering CI’s event (push), not the literal "workflow_run" of this file.
          SOURCE_EVENT: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.event || (github.event_name == 'workflow_dispatch' && 'workflow_dispatch' || github.event_name) }}
          TRIGGER_NAME: ${{ github.event_name }}
          WF_WRITE_BUILD_MANIFESTS: |
            import json
            import os
            import re
            import sys
            from datetime import datetime, timezone
            from pathlib import Path

            def s(k, d=""):
                return os.environ.get(k, d)

            def require_digest_pinned(name, ref):
                if not ref or "@sha256:" not in ref or not re.search(r"@sha256:[0-9a-f]{64}$", ref):
                    print(f"error: {name} must be digest-pinned (ghcr.io/.../img@sha256:...): {ref!r}", file=sys.stderr)
                    raise SystemExit(2)

            app_ref, goose_ref = s("APP_REF"), s("GOOSE_REF")
            require_digest_pinned("app_image_ref", app_ref)
            require_digest_pinned("goose_image_ref", goose_ref)

            gen_at = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
            src_sha = s("BUILD_COMMIT_SHA")
            if not re.fullmatch(r"[0-9a-f]{40}", src_sha):
                print("error: BUILD_COMMIT_SHA must be a 40 hex character git sha", file=sys.stderr)
                raise SystemExit(2)
            bwm = s("BUILD_WORKFLOW_NAME")
            if bwm != "Build and Push Images":
                print(f"error: expected this workflow name Build and Push Images, got {bwm!r}", file=sys.stderr)
                raise SystemExit(2)
            rc, di = s("RELEASE_CHANNEL"), s("DOWNSTREAM_INTENT")
            bmd = {
                "schema_version": "v1",
                "commit_sha": src_sha,
                "source_branch": s("SOURCE_BRANCH"),
                "source_ref_type": s("SOURCE_REF_TYPE"),
                "source_event": s("SOURCE_EVENT"),
                "source_workflow_name": bwm,
                "release_channel": rc,
                "downstream_intent": di,
                "trigger": s("TRIGGER_NAME"),
                "workflow_name": bwm,
                "workflow_run_id": s("BUILD_RUN_ID"),
                "actor": s("ACTOR"),
                "sbom_enabled": True,
                "provenance_enabled": True,
                "source_inputs": {
                    "dockerfile_sha256": s("DOCKERFILE_SHA256"),
                    "dockerfile_goose_sha256": s("DOCKERFILE_GOOSE_SHA256"),
                    "go_sum_sha256": s("GO_SUM_SHA256"),
                },
                "app": {
                    "image": s("APP_IMAGE"),
                    "tag": s("APP_TAG"),
                    "digest": s("APP_DIGEST"),
                    "ref": app_ref,
                },
                "goose": {
                    "image": s("GOOSE_IMAGE"),
                    "tag": s("GOOSE_TAG"),
                    "digest": s("GOOSE_DIGEST"),
                    "ref": goose_ref,
                },
            }
            prom = {
                "schema_version": "v1",
                "workflow_name": bwm,
                "source_workflow_name": bwm,
                "workflow_run_id": s("BUILD_RUN_ID"),
                "commit_sha": src_sha,
                "source_branch": s("SOURCE_BRANCH"),
                "source_ref_type": s("SOURCE_REF_TYPE"),
                "source_event": s("SOURCE_EVENT"),
                "release_channel": rc,
                "downstream_intent": di,
                "actor": s("ACTOR"),
                "app_image": s("APP_IMAGE"),
                "app_tag": s("APP_TAG"),
                "app_ref": app_ref,
                "goose_image": s("GOOSE_IMAGE"),
                "goose_tag": s("GOOSE_TAG"),
                "goose_ref": goose_ref,
                "app_digest": s("APP_DIGEST"),
                "goose_digest": s("GOOSE_DIGEST"),
                "provenance_enabled": True,
                "sbom_enabled": True,
                "source_inputs": {
                    "dockerfile_sha256": s("DOCKERFILE_SHA256"),
                    "dockerfile_goose_sha256": s("DOCKERFILE_GOOSE_SHA256"),
                    "go_sum_sha256": s("GO_SUM_SHA256"),
                },
            }
            contract = {
                "schema_version": "v1",
                "artifact_kind": "image-build",
                "build_workflow_run_id": s("BUILD_RUN_ID"),
                "source_commit_sha": src_sha,
                "source_branch": s("SOURCE_BRANCH"),
                "source_event": s("SOURCE_EVENT"),
                "source_workflow_name": "Build and Push Images",
                "app_image_ref": app_ref,
                "app_digest": s("APP_DIGEST"),
                "goose_image_ref": goose_ref,
                "goose_digest": s("GOOSE_DIGEST"),
                "generated_at_utc": gen_at,
            }
            Path("build-evidence").mkdir(parents=True, exist_ok=True)
            Path("build-evidence/build-metadata-manifest.json").write_text(json.dumps(bmd, indent=2) + "\n", encoding="utf-8")
            Path("build-evidence/image-build-metadata.json").write_text(
                Path("build-evidence/build-metadata-manifest.json").read_text(encoding="utf-8"),
                encoding="utf-8",
            )
            Path("build-evidence/promotion-manifest.json").write_text(json.dumps(prom, indent=2) + "\n", encoding="utf-8")
            Path("build-evidence/immutable-image-contract.json").write_text(json.dumps(contract, indent=2) + "\n", encoding="utf-8")
        run: |
          set -Eeuo pipefail
          mkdir -p build-evidence
          if ! { [[ "${APP_REF}" == *@sha256:* ]] && [[ "${GOOSE_REF}" == *@sha256:* ]]; }; then
            echo "error: app and goose image refs from build must be digest-pinned (must contain @sha256:...)" >&2
            exit 1
          fi
          release_channel="branch-other"
          downstream_intent="ad-hoc"
          if [[ "${SOURCE_REF_TYPE}" == "tag" ]]; then
            release_channel="tag"
            downstream_intent="tagged-release"
          elif [[ "${SOURCE_BRANCH}" == "main" ]]; then
            release_channel="main"
            downstream_intent="production-candidate"
          elif [[ "${SOURCE_BRANCH}" == "develop" ]]; then
            release_channel="develop"
            downstream_intent="develop-prepare-validate-only"
          fi
          export RELEASE_CHANNEL="${release_channel}"
          export DOWNSTREAM_INTENT="${downstream_intent}"
          printenv WF_WRITE_BUILD_MANIFESTS | python3 -

          {
            echo "## Build Metadata and Promotion Signals"
            echo "- **images built and pushed (this run):** \`yes\`"
            echo "- build workflow: \`Build and Push Images\` (this workflow; \`source_workflow_name\` in manifests)"
            echo "- build run id: \`${BUILD_RUN_ID}\` (\`build_workflow_run_id\` in immutable-image-contract)"
            echo "- source branch: \`${SOURCE_BRANCH}\`"
            echo "- source ref type: \`${SOURCE_REF_TYPE}\`"
            echo "- **semantic source event** (from triggering CI, not the literal \`workflow_run\` wrapper): \`${SOURCE_EVENT}\`"
            echo "- release channel: \`${release_channel}\`"
            echo "- downstream intent: \`${downstream_intent}\`"
            echo "- **source commit (checkout) SHA:** \`${BUILD_COMMIT_SHA}\`"
            echo "- trigger: \`${TRIGGER_NAME}\` (this file’s \`on\` — use \`SOURCE_EVENT\` for provenance of code)"
            echo "- actor: \`${ACTOR}\`"
            echo "- app image ref: \`${APP_REF}\`"
            echo "- goose image ref: \`${GOOSE_REF}\`"
            echo "- app digest: \`${APP_DIGEST}\`"
            echo "- goose digest: \`${GOOSE_DIGEST}\`"
            echo "- Dockerfile SHA256: \`${DOCKERFILE_SHA256}\`"
            echo "- Dockerfile.goose SHA256: \`${DOCKERFILE_GOOSE_SHA256}\`"
            echo "- go.sum SHA256: \`${GO_SUM_SHA256}\`"
            echo "- SBOM: \`enabled\`"
            echo "- provenance: \`enabled (mode=max)\`"
            echo "- downstream artifacts: \`build-metadata-manifest\`, \`image-build-metadata\`, \`promotion-manifest\`, \`immutable-image-contract\` (digest-pinned image refs required)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload build metadata manifest
        uses: actions/upload-artifact@v4
        with:
          name: build-metadata-manifest
          path: build-evidence/build-metadata-manifest.json
          if-no-files-found: error
          retention-days: 14

      - name: Upload compatibility image build metadata manifest
        uses: actions/upload-artifact@v4
        with:
          name: image-build-metadata
          path: build-evidence/image-build-metadata.json
          if-no-files-found: error
          retention-days: 14

      - name: Upload promotion manifest
        uses: actions/upload-artifact@v4
        with:
          name: promotion-manifest
          path: build-evidence/promotion-manifest.json
          if-no-files-found: error
          retention-days: 14

      - name: Upload immutable image contract
        uses: actions/upload-artifact@v4
        with:
          name: immutable-image-contract
          path: build-evidence/immutable-image-contract.json
          if-no-files-found: error
          retention-days: 14

  # One place that always runs (with the gate) so the workflow run page shows whether images were built or not.
  build-and-push-outcome:
    name: Outcome (release candidate summary)
    if: always()
    needs:
      - upstream-ci-release-gate
      - build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Write workflow-level outcome
        shell: bash
        run: |
          set -Eeuo pipefail
          g="${{ needs.upstream-ci-release-gate.result }}"
          b="${{ needs.build-and-push.result }}"
          {
            echo "## Build and Push Images — outcome"
            if [[ "$b" == "success" ]]; then
              echo "- **Result:** this run **built and pushed** real images to GHCR and (when publish ran) produced digest-pinned **promotion-manifest**, **image-metadata** / **image-build-metadata**, and **immutable-image-contract** artifacts."
            elif [[ "$g" != "success" ]]; then
              echo "- **Result:** **Not a release candidate.** The upstream \`CI\` gate did not allow a build (wrong workflow name, not a \`push\` to develop/main, failed CI, or ineligible head branch) — **no** GHCR push and **no** release manifest uploads from this run."
            elif [[ "$b" == "skipped" ]]; then
              echo "- **Result:** gate passed for this trigger, but the **Build and Publish** job was skipped (e.g. ineligible \`workflow_dispatch\` input). **Not a release candidate** in the sense of a full build — no new images in this run."
            else
              echo "- **Result:** the build job did not complete successfully (result: \`$b\`). Fix the build, then re-run. No new release-candidate metadata should be produced from a failed build."
            fi
            echo "- gate job: \`upstream-ci-release-gate\` → \`$g\`"
            echo "- \`Build and Publish Images\` (reusable) → \`$b\`"
          } >> "$GITHUB_STEP_SUMMARY"
