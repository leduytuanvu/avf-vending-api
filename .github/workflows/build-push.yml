name: Build and Push Images

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    # Only when CI ran on a branch named develop or main (e.g. push after merge). Pull_request CI
    # runs on the PR head (feature/*), so this workflow is not scheduled (no all-skipped 1s runs).
    branches:
      - develop
      - main
  workflow_dispatch:
    inputs:
      build_target_branch:
        description: "Target branch to check out and build (only develop or main)"
        type: choice
        required: true
        default: develop
        options:
          - develop
          - main

concurrency:
  group: build-push-${{ github.event_name == 'workflow_run' && format('wr-{0}', github.event.workflow_run.head_branch) || format('wd-{0}', github.event.inputs.build_target_branch) || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

# Contract (see scripts/ci/verify_workflow_contracts.sh; enforced in upstream-ci-release-gate):
# - workflow_run auto release candidate: github.event.workflow_run.name == 'CI' && conclusion success &&
#   github.event.workflow_run.event == 'push' && (github.event.workflow_run.head_branch == 'develop' || github.event.workflow_run.head_branch == 'main')
# - If not a release candidate: workflow succeeds, no checkout/build/artifacts, clear step summary; no "fake" release artifacts.
#
# Provenance (supply chain): repo Actions variables PROVENANCE_ENFORCEMENT (warn|enforce) and
# ALLOW_PRIVATE_REPO_PROVENANCE_FALLBACK (true|false) are interpreted in Security Release + _reusable-deploy + deploy gates
# (see docs/runbooks/supply-chain-security.md). GitHub artifact attestation steps follow _reusable-build rules; this workflow
# does not synthesize attestations — only real signing/evidence artifacts (e.g. cosign-signing-evidence) are uploaded when the build runs them.

jobs:
  # Always runs. Sets release_candidate=true only when a real build should run (or manual dispatch to develop/main).
  # Ineligible runs exit 0 with release_candidate=false (neutral — no error) so the workflow is not a false failure.
  upstream-ci-release-gate:
    name: Upstream CI release gate
    runs-on: ubuntu-latest
    outputs:
      release_candidate: ${{ steps.release_gate.outputs.release_candidate }}
    steps:
      - name: Enforce real release-candidate (push CI) or allow manual dispatch
        id: release_gate
        shell: bash
        run: |
          set -Eeuo pipefail
          {
            echo "## Upstream / trigger gate"
            echo ""
            echo "### Enterprise release chain (this workflow = **Build and Push Images**)"
            echo ""
            echo "\`\`\`"
            echo "CI (success)  →  *this run*  →  Security Release  →  Deploy (Staging|Production) [verdict-only]"
            echo "\`\`\`"
            echo ""
            echo "- Releasable images and artifacts (**promotion-manifest**, **image-metadata**, etc.) are produced only for: **push** \`CI\` success on \`develop\`/\`main\`, or \`workflow_dispatch\` to those branches (see gate below)."
            echo "- This workflow is triggered **after** upstream **CI** completes (never the only step after push)."
            echo "- **Security Release** is triggered by **this** workflow completing, then consumes **this run id** for artifacts (deterministic; no \`head_sha\` search on automatic runs)."
            echo "- this workflow event: \`${{ github.event_name }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            {
              echo "- **Manual** \`workflow_dispatch\` — will build to \`${{ github.event.inputs.build_target_branch }}\` (develop or main). Manifest \`source_event\` will be \`workflow_dispatch\`."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "release_candidate=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "${{ github.event_name }}" != "workflow_run" ]]; then
            {
              echo "## Not a release candidate"
              echo "Not a release candidate. No image was built or published."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "release_candidate=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          wn="${{ github.event.workflow_run.name }}"
          ev="${{ github.event.workflow_run.event }}"
          conc="${{ github.event.workflow_run.conclusion }}"
          hb="${{ github.event.workflow_run.head_branch }}"
          {
            echo "- upstream \`name\` (must be \`CI\`): \`${wn}\`"
            echo "- upstream \`event\` (must be \`push\` for auto release candidates): \`${ev}\`"
            echo "- upstream \`conclusion\` (must be \`success\` to build images): \`${conc}\`"
            echo "- upstream \`head_branch\` (must be \`develop\` or \`main\`): \`${hb}\`"
          } >> "$GITHUB_STEP_SUMMARY"
          if [[ "${wn}" != "CI" ]]; then
            {
              echo "## Not a release candidate"
              echo "Not a release candidate. No image was built or published."
              echo "- Upstream workflow is not named \`CI\` (got \`${wn}\`); this workflow will not build, push, or upload promotion artifacts."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "release_candidate=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "${ev}" != "push" ]]; then
            {
              echo "## Not a release candidate"
              echo "Not a release candidate. No image was built or published."
              echo "- \`pull_request\` and other non-**push** CI runs do not produce release images or **promotion-manifest** / **image-metadata** / **immutable-image-contract** for this path."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "release_candidate=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "${conc}" != "success" ]]; then
            {
              echo "## Not a release candidate"
              echo "Not a release candidate. No image was built or published."
              echo "- Upstream \`CI\` did not succeed (conclusion: \`${conc}\`); not building, pushing, or uploading release manifest artifacts. Fix CI on \`${hb}\` and push again."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "release_candidate=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "${hb}" != "develop" && "${hb}" != "main" ]]; then
            {
              echo "## Not a release candidate"
              echo "Not a release candidate. No image was built or published."
              echo "- \`head_branch\` is not \`develop\` or \`main\` (got \`${hb}\`); this run does not build or publish."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "release_candidate=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          {
            echo "- **result:** valid **push** \`CI\` @ \`${hb}\` (success) — this run will build, push digest-pinned images, and upload release artifacts."
          } >> "$GITHUB_STEP_SUMMARY"
          echo "release_candidate=true" >> "$GITHUB_OUTPUT"
          exit 0

  # workflow_run: image build runs only when gate set release_candidate (requires head_branch develop|main, i.e.
  # github.event.workflow_run.head_branch == 'develop' || github.event.workflow_run.head_branch == 'main').
  build-and-push:
    name: Build and Publish Images
    needs: upstream-ci-release-gate
    permissions:
      contents: read
      id-token: write
      packages: write
      actions: write
      attestations: write
    if: |
      always() &&
      needs.upstream-ci-release-gate.result == 'success' &&
      needs.upstream-ci-release-gate.outputs.release_candidate == 'true' &&
      (
        (github.event_name == 'workflow_dispatch' &&
          (github.event.inputs.build_target_branch == 'develop' || github.event.inputs.build_target_branch == 'main')) ||
        github.event_name == 'workflow_run'
      )
    uses: ./.github/workflows/_reusable-build.yml
    with:
      # workflow_run: exact CI head commit + branch. workflow_dispatch: explicit develop/main only (never default-branch accidents).
      checkout_ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || format('refs/heads/{0}', github.event.inputs.build_target_branch) }}
      head_branch: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.event.inputs.build_target_branch }}
    secrets: inherit

  publish-build-metadata:
    name: Publish Build Metadata and Promotion Signals
    needs:
      - upstream-ci-release-gate
      - build-and-push
    if: always() && needs.build-and-push.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
      packages: read

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download Cosign signing evidence from build
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: cosign-signing-evidence
          path: cosign-evidence

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate CycloneDX SBOMs (Trivy, digest-pinned images)
        shell: bash
        env:
          APP_REF: ${{ needs.build-and-push.outputs.app_ref }}
          GOOSE_REF: ${{ needs.build-and-push.outputs.goose_ref }}
        run: |
          set -Eeuo pipefail
          [[ -n "${APP_REF}" ]]
          [[ -n "${GOOSE_REF}" ]]
          mkdir -p security-reports
          trivy_image="aquasec/trivy:0.57.1"
          pull_trivy() {
            local attempt
            for attempt in 1 2 3 4 5; do
              if docker pull "${trivy_image}"; then
                return 0
              fi
              if [[ "${attempt}" -lt 5 ]]; then
                echo "Trivy image pull failed; retrying (${attempt}/5)" >&2
                sleep 10
              fi
            done
            echo "error: failed to pull ${trivy_image} after retries" >&2
            return 1
          }
          pull_trivy
          run_sbom() {
            local out="$1"
            local ref="$2"
            docker run --rm \
              -v "${HOME}/.docker:/root/.docker:ro" \
              -v "${PWD}:/workdir" \
              -w /workdir \
              "${trivy_image}" \
              image \
              --format cyclonedx \
              --output "${out}" \
              "${ref}"
          }
          run_sbom "security-reports/sbom-app.cdx.json" "${APP_REF}"
          run_sbom "security-reports/sbom-goose.cdx.json" "${GOOSE_REF}"
          python3 -c 'import json,sys; json.load(open(sys.argv[1],encoding="utf-8"))' security-reports/sbom-app.cdx.json
          python3 -c 'import json,sys; json.load(open(sys.argv[1],encoding="utf-8"))' security-reports/sbom-goose.cdx.json
          echo "SBOM_GENERATED_AT_UTC=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "${GITHUB_ENV}"

      - name: Write build metadata summary
        shell: bash
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          APP_DIGEST: ${{ needs.build-and-push.outputs.app_digest }}
          APP_IMAGE: ${{ needs.build-and-push.outputs.app_image }}
          APP_REF: ${{ needs.build-and-push.outputs.app_ref }}
          APP_TAG: ${{ needs.build-and-push.outputs.app_tag }}
          BUILD_COMMIT_SHA: ${{ needs.build-and-push.outputs.source_commit_sha }}
          BUILD_RUN_ID: ${{ github.run_id }}
          BUILD_WORKFLOW_NAME: ${{ github.workflow }}
          DOCKERFILE_GOOSE_SHA256: ${{ needs.build-and-push.outputs.dockerfile_goose_sha256 }}
          DOCKERFILE_SHA256: ${{ needs.build-and-push.outputs.dockerfile_sha256 }}
          GO_SUM_SHA256: ${{ needs.build-and-push.outputs.go_sum_sha256 }}
          GOOSE_DIGEST: ${{ needs.build-and-push.outputs.goose_digest }}
          GOOSE_IMAGE: ${{ needs.build-and-push.outputs.goose_image }}
          GOOSE_REF: ${{ needs.build-and-push.outputs.goose_ref }}
          GOOSE_TAG: ${{ needs.build-and-push.outputs.goose_tag }}
          SOURCE_BRANCH: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || (github.event_name == 'workflow_dispatch' && github.event.inputs.build_target_branch || github.ref_name) }}
          # workflow_run: CI head branch. workflow_dispatch: chosen branch (develop/main). Never rely on default github.ref for dispatch.
          SOURCE_REF_TYPE: ${{ (github.event_name == 'workflow_run' || github.event_name == 'workflow_dispatch') && 'branch' || github.ref_type }}
          # Semantic event for the code that was built: CI push, or manual dispatch (not the literal "workflow_run" of this file).
          SOURCE_EVENT: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.event || (github.event_name == 'workflow_dispatch' && 'workflow_dispatch' || github.event_name) }}
          # Provenance: workflow that "owns" the green gate for the commit (CI on auto path); this Build workflow for manual.
          SEMANTIC_SOURCE_WORKFLOW_NAME: ${{ github.event_name == 'workflow_run' && 'CI' || 'Build and Push Images' }}
          TRIGGER_NAME: ${{ github.event_name }}
          WF_WRITE_BUILD_MANIFESTS: |
            import json
            import os
            import re
            import sys
            from datetime import datetime, timezone
            from pathlib import Path

            def s(k, d=""):
                return os.environ.get(k, d)

            def require_digest_pinned(name, ref):
                if not ref or "@sha256:" not in ref or not re.search(r"@sha256:[0-9a-f]{64}$", ref):
                    print(f"error: {name} must be digest-pinned (ghcr.io/.../img@sha256:...): {ref!r}", file=sys.stderr)
                    raise SystemExit(2)

            app_ref, goose_ref = s("APP_REF"), s("GOOSE_REF")
            require_digest_pinned("app_image_ref", app_ref)
            require_digest_pinned("goose_image_ref", goose_ref)

            gen_at = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
            src_sha = s("BUILD_COMMIT_SHA")
            if not re.fullmatch(r"[0-9a-f]{40}", src_sha):
                print("error: BUILD_COMMIT_SHA must be a 40 hex character git sha", file=sys.stderr)
                raise SystemExit(2)
            bwm = s("BUILD_WORKFLOW_NAME")
            if bwm != "Build and Push Images":
                print(f"error: expected this workflow name Build and Push Images, got {bwm!r}", file=sys.stderr)
                raise SystemExit(2)
            sbom_generated = s("SBOM_GENERATED_AT_UTC").strip()
            if not sbom_generated:
                print(
                    "error: SBOM_GENERATED_AT_UTC is required (Generate CycloneDX SBOMs step must run before this step)",
                    file=sys.stderr,
                )
                raise SystemExit(2)
            sbom_meta = {
                "artifact_name": "sbom-reports",
                "generated_at_utc": sbom_generated,
                "tool": "trivy",
                "format": "cyclonedx",
                "trivy_image": "aquasec/trivy:0.57.1",
                "app_image_digest": s("APP_DIGEST"),
                "goose_image_digest": s("GOOSE_DIGEST"),
                "files": ["sbom-app.cdx.json", "sbom-goose.cdx.json"],
            }
            cosign_path = Path("cosign-evidence/cosign-signing-evidence.json")
            if not cosign_path.is_file():
                print(
                    "error: cosign-evidence/cosign-signing-evidence.json missing "
                    "(Build job must upload cosign-signing-evidence before publish metadata)",
                    file=sys.stderr,
                )
                raise SystemExit(2)
            try:
                cosign_doc = json.loads(cosign_path.read_text(encoding="utf-8"))
            except json.JSONDecodeError as e:
                print(f"error: cosign signing evidence is not valid JSON: {e}", file=sys.stderr)
                raise SystemExit(2)
            if cosign_doc.get("schema_version") != "v1":
                print("error: cosign signing evidence schema_version must be v1", file=sys.stderr)
                raise SystemExit(2)
            rc, di = s("RELEASE_CHANNEL"), s("DOWNSTREAM_INTENT")
            bmd = {
                "schema_version": "v1",
                "commit_sha": src_sha,
                "source_branch": s("SOURCE_BRANCH"),
                "source_ref_type": s("SOURCE_REF_TYPE"),
                "source_event": s("SOURCE_EVENT"),
                "source_workflow_name": s("SEMANTIC_SOURCE_WORKFLOW_NAME"),
                "release_channel": rc,
                "downstream_intent": di,
                "trigger": s("TRIGGER_NAME"),
                "workflow_name": bwm,
                "workflow_run_id": s("BUILD_RUN_ID"),
                "actor": s("ACTOR"),
                "sbom_enabled": True,
                "provenance_enabled": True,
                "source_inputs": {
                    "dockerfile_sha256": s("DOCKERFILE_SHA256"),
                    "dockerfile_goose_sha256": s("DOCKERFILE_GOOSE_SHA256"),
                    "go_sum_sha256": s("GO_SUM_SHA256"),
                },
                "app": {
                    "image": s("APP_IMAGE"),
                    "tag": s("APP_TAG"),
                    "digest": s("APP_DIGEST"),
                    "ref": app_ref,
                },
                "goose": {
                    "image": s("GOOSE_IMAGE"),
                    "tag": s("GOOSE_TAG"),
                    "digest": s("GOOSE_DIGEST"),
                    "ref": goose_ref,
                },
            }
            bmd["sbom"] = sbom_meta
            bmd["cosign"] = cosign_doc
            prom = {
                "schema_version": "v1",
                "workflow_name": bwm,
                "source_workflow_name": s("SEMANTIC_SOURCE_WORKFLOW_NAME"),
                "workflow_run_id": s("BUILD_RUN_ID"),
                "build_run_id": s("BUILD_RUN_ID"),
                "commit_sha": src_sha,
                "source_sha": src_sha,
                "source_branch": s("SOURCE_BRANCH"),
                "source_ref_type": s("SOURCE_REF_TYPE"),
                "source_event": s("SOURCE_EVENT"),
                "release_channel": rc,
                "downstream_intent": di,
                "actor": s("ACTOR"),
                "app_image": s("APP_IMAGE"),
                "app_tag": s("APP_TAG"),
                "app_ref": app_ref,
                "goose_image": s("GOOSE_IMAGE"),
                "goose_tag": s("GOOSE_TAG"),
                "goose_ref": goose_ref,
                "app_digest": s("APP_DIGEST"),
                "goose_digest": s("GOOSE_DIGEST"),
                "app_image_digest": s("APP_DIGEST"),
                "goose_image_digest": s("GOOSE_DIGEST"),
                "provenance_enabled": True,
                "sbom_enabled": True,
                "source_inputs": {
                    "dockerfile_sha256": s("DOCKERFILE_SHA256"),
                    "dockerfile_goose_sha256": s("DOCKERFILE_GOOSE_SHA256"),
                    "go_sum_sha256": s("GO_SUM_SHA256"),
                },
            }
            prom["sbom"] = sbom_meta
            prom["cosign"] = cosign_doc
            contract = {
                "schema_version": "v1",
                "artifact_kind": "image-build",
                "build_workflow_run_id": s("BUILD_RUN_ID"),
                "build_run_id": s("BUILD_RUN_ID"),
                "source_commit_sha": src_sha,
                "source_sha": src_sha,
                "source_branch": s("SOURCE_BRANCH"),
                "source_event": s("SOURCE_EVENT"),
                "source_workflow_name": s("SEMANTIC_SOURCE_WORKFLOW_NAME"),
                "app_image_ref": app_ref,
                "app_digest": s("APP_DIGEST"),
                "goose_image_ref": goose_ref,
                "goose_digest": s("GOOSE_DIGEST"),
                "app_image_digest": s("APP_DIGEST"),
                "goose_image_digest": s("GOOSE_DIGEST"),
                "generated_at_utc": gen_at,
            }
            contract["sbom"] = sbom_meta
            contract["cosign"] = cosign_doc
            release_candidate = {
                "schema_version": "v1",
                "kind": "build-release-candidate",
                "repo": s("GITHUB_REPOSITORY"),
                "source_sha": src_sha,
                "source_branch": s("SOURCE_BRANCH"),
                "source_event": s("SOURCE_EVENT"),
                "build_run_id": s("BUILD_RUN_ID"),
                "workflow_run_id": s("BUILD_RUN_ID"),
                "app_image_ref": app_ref,
                "goose_image_ref": goose_ref,
                "generated_at_utc": gen_at,
                "downstream_artifact_names": {
                    "image_metadata": "image-metadata",
                    "promotion_manifest": "promotion-manifest",
                    "immutable_image_contract": "immutable-image-contract",
                    "sbom_reports": "sbom-reports",
                    "cosign_signing_evidence": "cosign-signing-evidence",
                    "build_metadata": ["build-metadata-manifest", "image-build-metadata"],
                    "release_candidate": "release-candidate",
                },
            }
            Path("build-evidence").mkdir(parents=True, exist_ok=True)
            Path("build-evidence/release-candidate.json").write_text(
                json.dumps(release_candidate, indent=2) + "\n", encoding="utf-8"
            )
            Path("build-evidence/build-metadata-manifest.json").write_text(json.dumps(bmd, indent=2) + "\n", encoding="utf-8")
            Path("build-evidence/image-build-metadata.json").write_text(
                Path("build-evidence/build-metadata-manifest.json").read_text(encoding="utf-8"),
                encoding="utf-8",
            )
            Path("build-evidence/promotion-manifest.json").write_text(json.dumps(prom, indent=2) + "\n", encoding="utf-8")
            Path("build-evidence/immutable-image-contract.json").write_text(json.dumps(contract, indent=2) + "\n", encoding="utf-8")
        run: |
          set -Eeuo pipefail
          mkdir -p build-evidence
          if ! { [[ "${APP_REF}" == *@sha256:* ]] && [[ "${GOOSE_REF}" == *@sha256:* ]]; }; then
            echo "error: app and goose image refs from build must be digest-pinned (must contain @sha256:...)" >&2
            exit 1
          fi
          release_channel="branch-other"
          downstream_intent="ad-hoc"
          if [[ "${SOURCE_REF_TYPE}" == "tag" ]]; then
            release_channel="tag"
            downstream_intent="tagged-release"
          elif [[ "${SOURCE_BRANCH}" == "main" ]]; then
            release_channel="main"
            downstream_intent="production-candidate"
          elif [[ "${SOURCE_BRANCH}" == "develop" ]]; then
            release_channel="develop"
            downstream_intent="develop-prepare-validate-only"
          fi
          export RELEASE_CHANNEL="${release_channel}"
          export DOWNSTREAM_INTENT="${downstream_intent}"
          printenv WF_WRITE_BUILD_MANIFESTS | python3 -

          {
            echo "## Build Metadata and Promotion Signals"
            echo "- **images built and pushed (this run):** \`yes\`"
            echo "- build workflow: \`Build and Push Images\` (this workflow; \`source_workflow_name\` in manifests)"
            echo "- build run id: \`${BUILD_RUN_ID}\` (\`build_workflow_run_id\` in immutable-image-contract)"
            echo "- source branch: \`${SOURCE_BRANCH}\`"
            echo "- source ref type: \`${SOURCE_REF_TYPE}\`"
            echo "- **semantic source event** (from triggering CI, not the literal \`workflow_run\` wrapper): \`${SOURCE_EVENT}\`"
            echo "- release channel: \`${release_channel}\`"
            echo "- downstream intent: \`${downstream_intent}\`"
            echo "- **source commit (checkout) SHA:** \`${BUILD_COMMIT_SHA}\`"
            echo "- trigger: \`${TRIGGER_NAME}\` (this file’s \`on\` — use \`SOURCE_EVENT\` for provenance of code)"
            echo "- actor: \`${ACTOR}\`"
            echo "- app image ref: \`${APP_REF}\`"
            echo "- goose image ref: \`${GOOSE_REF}\`"
            echo "- app digest: \`${APP_DIGEST}\`"
            echo "- goose digest: \`${GOOSE_DIGEST}\`"
            echo "- Dockerfile SHA256: \`${DOCKERFILE_SHA256}\`"
            echo "- Dockerfile.goose SHA256: \`${DOCKERFILE_GOOSE_SHA256}\`"
            echo "- go.sum SHA256: \`${GO_SUM_SHA256}\`"
            echo "- SBOM: \`Trivy CycloneDX\` → artifact \`sbom-reports\` (\`sbom-app.cdx.json\`, \`sbom-goose.cdx.json\`; digest-pinned refs)"
            echo "- Cosign: \`keyless (GitHub OIDC)\` → artifact \`cosign-signing-evidence\` (digest-pinned app/goose refs)"
            echo "- provenance: \`enabled (mode=max)\`"
            echo "- downstream artifacts: \`build-metadata-manifest\`, \`image-build-metadata\`, \`promotion-manifest\`, \`immutable-image-contract\`, \`sbom-reports\`, \`cosign-signing-evidence\`, \`release-candidate\` (digest-pinned image refs required)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload SBOM reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom-reports
          path: |
            security-reports/sbom-app.cdx.json
            security-reports/sbom-goose.cdx.json
          if-no-files-found: error
          retention-days: 180

      - name: Upload build metadata manifest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: build-metadata-manifest
          path: build-evidence/build-metadata-manifest.json
          if-no-files-found: error
          retention-days: 180

      - name: Upload compatibility image build metadata manifest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: image-build-metadata
          path: build-evidence/image-build-metadata.json
          if-no-files-found: error
          retention-days: 180

      - name: Upload promotion manifest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: promotion-manifest
          path: build-evidence/promotion-manifest.json
          if-no-files-found: error
          retention-days: 180

      - name: Upload immutable image contract
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: immutable-image-contract
          path: build-evidence/immutable-image-contract.json
          if-no-files-found: error
          retention-days: 180

      - name: Upload release candidate (evidence for Security Release)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-candidate
          path: build-evidence/release-candidate.json
          if-no-files-found: error
          retention-days: 180

      # release-audit-package: canonical layout in docs/operations/release-evidence-retention.md
      - name: Build release audit package (build phase)
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 scripts/release/build_release_evidence_package.py --out release-evidence --phase build --root . --strict-phase build
      - name: Upload release audit package
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-audit-package
          path: release-evidence
          if-no-files-found: error
          retention-days: 90

  # One place that always runs (with the gate) so the workflow run page shows whether images were built or not.
  build-and-push-outcome:
    name: Outcome (release candidate summary)
    if: always()
    needs:
      - upstream-ci-release-gate
      - build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Write workflow-level outcome
        shell: bash
        env:
          RC: ${{ needs.upstream-ci-release-gate.outputs.release_candidate }}
        run: |
          set -Eeuo pipefail
          g="${{ needs.upstream-ci-release-gate.result }}"
          b="${{ needs.build-and-push.result }}"
          rc="${RC:-false}"
          {
            echo "## Build and Push Images — outcome"
            if [[ "$b" == "success" ]]; then
              echo "- **Result:** this run **built and pushed** real images to GHCR and (when publish ran) produced digest-pinned **promotion-manifest**, **image-metadata** (compatibility: **image-build-metadata**), **immutable-image-contract**, **release-candidate** (audit identity), **sbom-reports** (CycloneDX), and **cosign-signing-evidence** artifacts."
            elif [[ "$g" == "success" && "$rc" == "false" ]]; then
              echo "- **Result:** not a **release candidate** (neutral success). \`Not a release candidate. No image was built or published.\` — **no** GHCR images and **no** release manifest uploads from this run."
            elif [[ "$g" != "success" ]]; then
              echo "- **Result:** the gate job did not complete successfully (result: \`$g\`) — see earlier steps. No release artifacts should have been published."
            elif [[ "$b" == "skipped" ]]; then
              echo "- **Result:** build job was \`skipped\` (e.g. release_candidate false or ineligible trigger). No images or release artifacts in this run."
            else
              echo "- **Result:** the build job did not complete successfully (result: \`$b\`). Fix the build, then re-run. No new release-candidate metadata should be produced from a failed build."
            fi
            echo "- \`release_candidate\` (gate output): \`${rc}\`"
            echo "- gate job: \`upstream-ci-release-gate\` → \`$g\`"
            echo "- \`Build and Publish Images\` (reusable) → \`$b\`"
          } >> "$GITHUB_STEP_SUMMARY"
