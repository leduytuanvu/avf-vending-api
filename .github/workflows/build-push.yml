name: Build and Push Images

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  attestations: write
  contents: read
  id-token: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: tags
        shell: bash
        run: |
          repo="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          app_image="ghcr.io/${repo}"
          goose_image="ghcr.io/${repo}-goose"
          sha_tag="sha-${GITHUB_SHA}"

          app_tags=("${app_image}:${sha_tag}")
          goose_tags=("${goose_image}:${sha_tag}")

          if [[ "${GITHUB_REF_TYPE}" == "branch" && "${GITHUB_REF_NAME}" == "main" ]]; then
            app_tags+=("${app_image}:main")
            goose_tags+=("${goose_image}:main")
          fi

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            app_tags+=("${app_image}:${GITHUB_REF_NAME}")
            goose_tags+=("${goose_image}:${GITHUB_REF_NAME}")
          fi

          {
            echo "app_tags<<EOF"
            printf '%s\n' "${app_tags[@]}"
            echo "EOF"
            echo "goose_tags<<EOF"
            printf '%s\n' "${goose_tags[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployments/prod/Dockerfile
          push: true
          provenance: mode=max
          sbom: true
          tags: ${{ steps.tags.outputs.app_tags }}

      - name: Build and push goose image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployments/prod/Dockerfile.goose
          push: true
          provenance: mode=max
          sbom: true
          tags: ${{ steps.tags.outputs.goose_tags }}
