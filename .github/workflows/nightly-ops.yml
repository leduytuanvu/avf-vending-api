name: Nightly Ops

on:
  schedule:
    - cron: "42 2 * * *"
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: nightly-ops-${{ github.ref }}
  cancel-in-progress: true

jobs:
  promotion-artifact-readiness:
    name: Promotion Artifact Readiness
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Resolve latest successful build run
        id: lookup
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          run_id="$(
            gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/build-push.yml/runs?branch=main&status=completed&per_page=20" \
              --jq '[.workflow_runs[]? | select(.conclusion == "success") | .id] | .[0] // empty'
          )"
          [[ -n "${run_id}" ]] || { echo "error: no successful build-push run found on main" >&2; exit 1; }
          echo "run_id=${run_id}" >> "$GITHUB_OUTPUT"

      - name: Download image metadata artifact
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ steps.lookup.outputs.run_id }}
        run: |
          set -Eeuo pipefail
          mkdir -p nightly-reports
          image_metadata_artifact_id="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}/artifacts" --jq '[.artifacts[]? | select(.name == "image-metadata") | .id] | .[0] // empty')"
          promotion_manifest_artifact_id="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}/artifacts" --jq '[.artifacts[]? | select(.name == "promotion-manifest") | .id] | .[0] // empty')"
          [[ -n "${image_metadata_artifact_id}" ]] || { echo "error: image-metadata artifact missing for run ${RUN_ID}" >&2; exit 1; }
          [[ -n "${promotion_manifest_artifact_id}" ]] || { echo "error: promotion-manifest artifact missing for run ${RUN_ID}" >&2; exit 1; }
          gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts/${image_metadata_artifact_id}/zip" > nightly-reports/image-metadata.zip
          gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts/${promotion_manifest_artifact_id}/zip" > nightly-reports/promotion-manifest.zip
          python3 -m zipfile -e nightly-reports/image-metadata.zip nightly-reports
          python3 -m zipfile -e nightly-reports/promotion-manifest.zip nightly-reports

      - name: Validate promotion artifact content
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("nightly-reports/image-metadata.json").read_text(encoding="utf-8"))
          promotion = json.loads(Path("nightly-reports/promotion-manifest.json").read_text(encoding="utf-8"))
          for key in ("git_sha", "event_name", "ref_name", "source_inputs", "app", "goose"):
              if key not in payload:
                  raise SystemExit(f"missing key: {key}")
          for image_key in ("app", "goose"):
              ref = payload[image_key]["ref"]
              if "@sha256:" not in ref:
                  raise SystemExit(f"{image_key} ref is not digest-pinned: {ref}")
          for key in ("dockerfile_sha256", "dockerfile_goose_sha256", "go_sum_sha256"):
              if not payload["source_inputs"].get(key):
                  raise SystemExit(f"missing source input hash: {key}")
          for key in ("commit_sha", "app_ref", "goose_ref", "app_digest", "goose_digest", "source_inputs"):
              if key not in promotion:
                  raise SystemExit(f"missing promotion-manifest key: {key}")
          if promotion["app_ref"] != payload["app"]["ref"]:
              raise SystemExit("promotion-manifest app_ref does not match image-metadata app.ref")
          if promotion["goose_ref"] != payload["goose"]["ref"]:
              raise SystemExit("promotion-manifest goose_ref does not match image-metadata goose.ref")
          PY
          {
            echo "### Promotion artifact readiness"
            echo "- latest successful build run: \`${{ steps.lookup.outputs.run_id }}\`"
            echo "- validated immutable refs in \`image-metadata.json\`"
            echo "- validated matching immutable refs in \`promotion-manifest.json\`"
            echo "- validated build input hashes are present for Dockerfiles and \`go.sum\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload promotion artifact readiness report
        uses: actions/upload-artifact@v4
        with:
          name: nightly-promotion-artifact-readiness
          path: |
            nightly-reports/image-metadata.json
            nightly-reports/promotion-manifest.json
          if-no-files-found: error
          retention-days: 14

  go-maintenance-report:
    name: Go Dependency Maintenance Report
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Generate Go maintenance report
        shell: bash
        run: |
          mkdir -p nightly-reports
          go mod verify > nightly-reports/go-mod-verify.txt
          go list -u -m -json all > nightly-reports/go-module-updates.json
          {
            echo "### Nightly ops summary"
            echo "- Verified the committed Go module cache with \`go mod verify\`."
            echo "- Captured available Go module updates in \`go-module-updates.json\`."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Go maintenance report
        uses: actions/upload-artifact@v4
        with:
          name: nightly-go-maintenance-report
          path: |
            nightly-reports/go-mod-verify.txt
            nightly-reports/go-module-updates.json
          if-no-files-found: error
          retention-days: 14

  runtime-asset-assurance:
    name: Runtime Asset Contract Assurance
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify production runtime assets
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p nightly-reports
          VERIFY_RUNTIME_ASSETS_REPORT_PATH="nightly-reports/runtime-assets-report.json" \
          bash deployments/prod/shared/scripts/verify_runtime_assets.sh nightly-reports/runtime-assets.sha256
          {
            echo "### Runtime asset assurance"
            echo "- validated production compose files with example envs"
            echo "- validated shared production scripts with \`bash -n\`"
            echo "- captured SHA256 inventory for production runtime assets"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload runtime asset report
        uses: actions/upload-artifact@v4
        with:
          name: nightly-runtime-asset-assurance
          path: |
            nightly-reports/runtime-assets.sha256
            nightly-reports/runtime-assets-report.json
          if-no-files-found: error
          retention-days: 14

  restore-readiness:
    name: Managed Service and Restore Preparedness
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install PostgreSQL client tools
        shell: bash
        run: |
          set -Eeuo pipefail
          sudo apt-get update
          sudo apt-get install -y postgresql-client redis-tools

      - name: Run managed service prerequisite contract report
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p nightly-reports
          CHECK_MANAGED_SERVICES_REPORT_PATH="nightly-reports/managed-services-readiness.json" \
          CHECK_MANAGED_SERVICES_STRICT=0 \
          bash deployments/prod/shared/scripts/check_managed_services.sh deployments/prod/app-node/.env.app-node.example | tee nightly-reports/managed-services-readiness.txt

      - name: Run managed PostgreSQL backup readiness report
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p nightly-reports
          BACKUP_MANAGED_POSTGRES_REPORT_PATH="nightly-reports/backup-readiness.json" \
          APP_NODE_ENV_FILE_PATH="deployments/prod/app-node/.env.app-node.example" \
          bash deployments/prod/shared/scripts/backup_managed_postgres.sh nightly-reports/managed-postgres-readiness.dump validate | tee nightly-reports/backup-readiness.txt

      - name: Run non-destructive restore-readiness check
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p nightly-reports
          CHECK_RESTORE_READINESS_REPORT_PATH="nightly-reports/restore-readiness.json" \
          bash deployments/prod/shared/scripts/check_restore_readiness.sh deployments/prod/app-node/.env.app-node.example | tee nightly-reports/restore-readiness.txt

      - name: Run disposable PostgreSQL restore simulation and write evidence
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p nightly-reports
          export PGPASSWORD=nightly-restore-password
          source_container_name="nightly-restore-source"
          target_compose_dir="nightly-reports/restore-helper-target"
          target_env_file="${target_compose_dir}/.env.restore"
          target_compose_file="${target_compose_dir}/docker-compose.restore.yml"
          trap 'docker rm -f "${source_container_name}" >/dev/null 2>&1 || true; docker compose --env-file "${target_env_file}" -f "${target_compose_file}" down -v >/dev/null 2>&1 || true' EXIT

          docker rm -f "${source_container_name}" >/dev/null 2>&1 || true
          mkdir -p "${target_compose_dir}"
          docker run -d \
            --name "${source_container_name}" \
            -e POSTGRES_PASSWORD="${PGPASSWORD}" \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_DB=restore_source \
            -p 127.0.0.1:55432:5432 \
            postgres:16-alpine >/dev/null

          for attempt in $(seq 1 30); do
            if pg_isready -h 127.0.0.1 -p 55432 -U postgres -d restore_source >/dev/null 2>&1; then
              break
            fi
            if [[ "${attempt}" == "30" ]]; then
              echo "error: disposable PostgreSQL restore drill did not become ready" >&2
              exit 1
            fi
            sleep 2
          done

          psql -h 127.0.0.1 -p 55432 -U postgres -d restore_source <<'SQL'
          create table restore_probe (
            id integer primary key,
            machine_code text not null,
            reading integer not null
          );
          create table restore_metadata (
            key text primary key,
            value text not null
          );
          insert into restore_probe (id, machine_code, reading) values
            (1, 'vm-a', 17),
            (2, 'vm-b', 23),
            (3, 'vm-c', 42);
          insert into restore_metadata (key, value) values
            ('schema_version', 'nightly-restore-v1'),
            ('restored_by', 'nightly-ops');
          create index restore_probe_machine_code_idx on restore_probe (machine_code);
          SQL

          pg_dump -h 127.0.0.1 -p 55432 -U postgres --if-exists --clean -d restore_source | gzip -c > nightly-reports/disposable-restore-drill.sql.gz
          gzip -t nightly-reports/disposable-restore-drill.sql.gz

          cat > "${target_env_file}" <<'EOF'
          POSTGRES_PASSWORD=nightly-restore-password
          POSTGRES_USER=postgres
          POSTGRES_DB=restore_target
          DATABASE_URL=postgres://postgres:nightly-restore-password@127.0.0.1:55433/restore_target?sslmode=disable
          COMPOSE_PROJECT_NAME=nightly-restore-helper
          EOF

          cat > "${target_compose_file}" <<'EOF'
          services:
            postgres:
              image: postgres:16-alpine
              environment:
                POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
                POSTGRES_USER: ${POSTGRES_USER}
                POSTGRES_DB: ${POSTGRES_DB}
              ports:
                - "127.0.0.1:55433:5432"
          EOF

          docker compose --env-file "${target_env_file}" -f "${target_compose_file}" up -d postgres
          RESTORE_ENV_FILE="${target_env_file}" \
          RESTORE_COMPOSE_FILE="${target_compose_file}" \
          RESTORE_LONG_LIVED_SERVICES="postgres" \
          RESTORE_REPORT_PATH="nightly-reports/restore-helper-report.json" \
          bash deployments/prod/scripts/restore_postgres.sh --yes nightly-reports/disposable-restore-drill.sql.gz

          source_row_count="$(psql -h 127.0.0.1 -p 55432 -U postgres -d restore_source -Atc 'select count(*) from restore_probe')"
          source_checksum="$(psql -h 127.0.0.1 -p 55432 -U postgres -d restore_source -Atc "select md5(string_agg(machine_code || ':' || reading::text, ',' order by id)) from restore_probe")"
          source_metadata_value="$(psql -h 127.0.0.1 -p 55432 -U postgres -d restore_source -Atc "select value from restore_metadata where key = 'schema_version'")"
          target_row_count="$(psql -h 127.0.0.1 -p 55433 -U postgres -d restore_target -Atc 'select count(*) from restore_probe')"
          target_checksum="$(psql -h 127.0.0.1 -p 55433 -U postgres -d restore_target -Atc "select md5(string_agg(machine_code || ':' || reading::text, ',' order by id)) from restore_probe")"
          target_metadata_value="$(psql -h 127.0.0.1 -p 55433 -U postgres -d restore_target -Atc "select value from restore_metadata where key = 'schema_version'")"
          target_index_count="$(psql -h 127.0.0.1 -p 55433 -U postgres -d restore_target -Atc "select count(*) from pg_indexes where tablename = 'restore_probe' and indexname = 'restore_probe_machine_code_idx'")"
          dump_size_bytes="$(wc -c < nightly-reports/disposable-restore-drill.sql.gz | tr -d ' ')"
          dump_sha256="$(sha256sum nightly-reports/disposable-restore-drill.sql.gz | awk '{print $1}')"

          SOURCE_ROW_COUNT="${source_row_count}" \
          SOURCE_CHECKSUM="${source_checksum}" \
          SOURCE_METADATA_VALUE="${source_metadata_value}" \
          TARGET_ROW_COUNT="${target_row_count}" \
          TARGET_CHECKSUM="${target_checksum}" \
          TARGET_METADATA_VALUE="${target_metadata_value}" \
          TARGET_INDEX_COUNT="${target_index_count}" \
          DUMP_SIZE_BYTES="${dump_size_bytes}" \
          DUMP_SHA256="${dump_sha256}" \
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          source_row_count = os.environ["SOURCE_ROW_COUNT"]
          target_row_count = os.environ["TARGET_ROW_COUNT"]
          if source_row_count != target_row_count:
              raise SystemExit(f"row-count mismatch after disposable restore drill: source={source_row_count} target={target_row_count}")
          if os.environ["SOURCE_CHECKSUM"] != os.environ["TARGET_CHECKSUM"]:
              raise SystemExit("checksum mismatch after restore_postgres.sh disposable drill")
          if os.environ["SOURCE_METADATA_VALUE"] != os.environ["TARGET_METADATA_VALUE"]:
              raise SystemExit("metadata lookup mismatch after restore_postgres.sh disposable drill")
          if os.environ["TARGET_INDEX_COUNT"] != "1":
              raise SystemExit("expected restore_probe_machine_code_idx to exist after restore")

          helper_report = json.loads(Path("nightly-reports/restore-helper-report.json").read_text(encoding="utf-8"))

          report = {
              "drill_type": "disposable-postgres-restore-helper",
              "postgres_image": "postgres:16-alpine",
              "dump_format": "gzip-sql",
              "source_database": "restore_source",
              "target_database": "restore_target",
              "source_row_count": int(source_row_count),
              "target_row_count": int(target_row_count),
              "source_checksum": os.environ["SOURCE_CHECKSUM"],
              "target_checksum": os.environ["TARGET_CHECKSUM"],
              "source_metadata_value": os.environ["SOURCE_METADATA_VALUE"],
              "target_metadata_value": os.environ["TARGET_METADATA_VALUE"],
              "target_index_count": int(os.environ["TARGET_INDEX_COUNT"]),
              "restore_helper_report": helper_report,
              "validated": [
                  "gzip SQL dump creation from disposable source database",
                  "restore_postgres.sh preflight checks",
                  "restore_postgres.sh destructive restore against disposable target only",
                  "fresh post-restore database connection to restored target",
                  "row-count parity for restore_probe",
                  "checksum parity for restore_probe",
                  "metadata lookup parity for restore_metadata",
                  "index presence for restore_probe_machine_code_idx",
              ],
              "not_validated": [
                  "application container boot against restored data",
                  "end-to-end API behavior against restored data",
                  "real production infrastructure",
              ],
              "dump_path": "nightly-reports/disposable-restore-drill.sql.gz",
              "dump_size_bytes": int(os.environ["DUMP_SIZE_BYTES"]),
              "dump_sha256": os.environ["DUMP_SHA256"],
              "verdict": "pass",
          }
          Path("nightly-reports/disposable-restore-drill.json").write_text(json.dumps(report, indent=2) + "\n", encoding="utf-8")
          Path("nightly-reports/restore-smoke-evidence.json").write_text(json.dumps({
              "verdict": "pass",
              "validated": report["validated"],
              "not_validated": report["not_validated"],
              "restore_helper_report_path": "nightly-reports/restore-helper-report.json",
              "disposable_restore_report_path": "nightly-reports/disposable-restore-drill.json",
          }, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Aggregate nightly restore preparedness evidence
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          managed = json.loads(Path("nightly-reports/managed-services-readiness.json").read_text(encoding="utf-8"))
          backup = json.loads(Path("nightly-reports/backup-readiness.json").read_text(encoding="utf-8"))
          restore = json.loads(Path("nightly-reports/restore-readiness.json").read_text(encoding="utf-8"))
          drill = json.loads(Path("nightly-reports/disposable-restore-drill.json").read_text(encoding="utf-8"))

          report = {
              "verdict": "pass",
              "validated": {
                  "managed_services_contract": managed,
                  "backup_readiness": backup,
                  "restore_readiness": restore,
                  "disposable_restore_simulation": drill,
              },
              "validated_summary": [
                  "managed service endpoint contracts evaluated against the example app-node env",
                  "managed PostgreSQL backup helper validated in non-destructive mode",
                  "restore readiness helper validated in non-destructive mode",
                  "disposable PostgreSQL restore simulation completed against disposable containers only",
              ],
              "not_validated": [
                  "real production restore",
                  "application boot against restored production-like data",
                  "real managed service credentials unless supplied outside the example env contract",
              ],
          }
          Path("nightly-reports/nightly-restore-preparedness.json").write_text(json.dumps(report, indent=2) + "\n", encoding="utf-8")
          PY

          {
            echo "### Managed service and restore preparedness"
            echo "- evaluated managed service endpoint contracts from \`.env.app-node.example\`"
            echo "- validated managed PostgreSQL backup helper in non-destructive mode"
            echo "- validated restore helper contract without touching real production infrastructure"
            echo "- completed a disposable PostgreSQL gzip-SQL restore simulation using \`restore_postgres.sh\` against a disposable target only"
            echo "- validated: fresh post-restore DB connection, row count parity, checksum parity, metadata lookup parity, index presence"
            echo "- not validated: application boot against restored data, full API behavior, or real production infrastructure"
            echo "- verified restored row count: \`${source_row_count}\` -> \`${target_row_count}\`"
            echo "- verified restored checksum: \`${source_checksum}\`"
            echo "- disposable dump SHA256: \`${dump_sha256}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload restore readiness report
        uses: actions/upload-artifact@v4
        with:
          name: nightly-restore-drill-report
          path: |
            nightly-reports/managed-services-readiness.txt
            nightly-reports/managed-services-readiness.json
            nightly-reports/backup-readiness.txt
            nightly-reports/backup-readiness.json
            nightly-reports/restore-readiness.txt
            nightly-reports/restore-readiness.json
            nightly-reports/nightly-restore-preparedness.json
          if-no-files-found: error
          retention-days: 14

      - name: Upload disposable restore drill evidence
        uses: actions/upload-artifact@v4
        with:
          name: nightly-disposable-restore-drill
          path: |
            nightly-reports/disposable-restore-drill.json
            nightly-reports/disposable-restore-drill.sql.gz
            nightly-reports/restore-helper-report.json
            nightly-reports/restore-smoke-evidence.json
            nightly-reports/nightly-restore-preparedness.json
          if-no-files-found: error
          retention-days: 14

  ci-cd-inventory:
    name: CI/CD Inventory Report
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Generate CI/CD inventory
        shell: bash
        run: |
          mkdir -p nightly-reports
          {
            echo "Nightly CI/CD inventory"
            echo
            echo "[Workflow files]"
            ls .github/workflows/*.yml
            echo
            echo "[Dependabot coverage]"
            rg -n "package-ecosystem|directory:|interval:|day:|time:" .github/dependabot.yml
            echo
            echo "[Production Docker build inputs]"
            rg -n "^FROM " deployments/prod/Dockerfile*
          } > nightly-reports/ci-cd-inventory.txt

      - name: Upload CI/CD inventory
        uses: actions/upload-artifact@v4
        with:
          name: nightly-ci-cd-inventory
          path: nightly-reports/ci-cd-inventory.txt
          if-no-files-found: error
          retention-days: 14
