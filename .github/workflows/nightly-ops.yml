name: Nightly Ops

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

concurrency:
  group: nightly-ops-${{ github.ref }}
  cancel-in-progress: true

jobs:
  promotion-artifact-readiness:
    name: Promotion Artifact Readiness
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Resolve latest successful build run
        id: lookup
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          run_id="$(
            gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/build-push.yml/runs?branch=main&status=completed&per_page=20" \
              --jq '[.workflow_runs[]? | select(.conclusion == "success") | .id] | .[0] // empty'
          )"
          [[ -n "${run_id}" ]] || { echo "error: no successful build-push run found on main" >&2; exit 1; }
          echo "run_id=${run_id}" >> "$GITHUB_OUTPUT"

      - name: Download image metadata artifact
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ steps.lookup.outputs.run_id }}
        run: |
          set -Eeuo pipefail
          mkdir -p nightly-reports
          image_metadata_artifact_id="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}/artifacts" --jq '[.artifacts[]? | select(.name == "image-metadata") | .id] | .[0] // empty')"
          promotion_manifest_artifact_id="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}/artifacts" --jq '[.artifacts[]? | select(.name == "promotion-manifest") | .id] | .[0] // empty')"
          [[ -n "${image_metadata_artifact_id}" ]] || { echo "error: image-metadata artifact missing for run ${RUN_ID}" >&2; exit 1; }
          [[ -n "${promotion_manifest_artifact_id}" ]] || { echo "error: promotion-manifest artifact missing for run ${RUN_ID}" >&2; exit 1; }
          gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts/${image_metadata_artifact_id}/zip" > nightly-reports/image-metadata.zip
          gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts/${promotion_manifest_artifact_id}/zip" > nightly-reports/promotion-manifest.zip
          python3 -m zipfile -e nightly-reports/image-metadata.zip nightly-reports
          python3 -m zipfile -e nightly-reports/promotion-manifest.zip nightly-reports

      - name: Validate promotion artifact content
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("nightly-reports/image-metadata.json").read_text(encoding="utf-8"))
          promotion = json.loads(Path("nightly-reports/promotion-manifest.json").read_text(encoding="utf-8"))
          for key in ("git_sha", "event_name", "ref_name", "source_inputs", "app", "goose"):
              if key not in payload:
                  raise SystemExit(f"missing key: {key}")
          for image_key in ("app", "goose"):
              ref = payload[image_key]["ref"]
              if "@sha256:" not in ref:
                  raise SystemExit(f"{image_key} ref is not digest-pinned: {ref}")
          for key in ("dockerfile_sha256", "dockerfile_goose_sha256", "go_sum_sha256"):
              if not payload["source_inputs"].get(key):
                  raise SystemExit(f"missing source input hash: {key}")
          for key in ("commit_sha", "app_ref", "goose_ref", "app_digest", "goose_digest", "source_inputs"):
              if key not in promotion:
                  raise SystemExit(f"missing promotion-manifest key: {key}")
          if promotion["app_ref"] != payload["app"]["ref"]:
              raise SystemExit("promotion-manifest app_ref does not match image-metadata app.ref")
          if promotion["goose_ref"] != payload["goose"]["ref"]:
              raise SystemExit("promotion-manifest goose_ref does not match image-metadata goose.ref")
          PY
          {
            echo "### Promotion artifact readiness"
            echo "- latest successful build run: \`${{ steps.lookup.outputs.run_id }}\`"
            echo "- validated immutable refs in \`image-metadata.json\`"
            echo "- validated matching immutable refs in \`promotion-manifest.json\`"
            echo "- validated build input hashes are present for Dockerfiles and \`go.sum\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload promotion artifact readiness report
        uses: actions/upload-artifact@v4
        with:
          name: nightly-promotion-artifact-readiness
          path: |
            nightly-reports/image-metadata.json
            nightly-reports/promotion-manifest.json
          if-no-files-found: error
          retention-days: 14

  go-maintenance-report:
    name: Go Dependency Maintenance Report
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Generate Go maintenance report
        shell: bash
        run: |
          mkdir -p nightly-reports
          go mod verify > nightly-reports/go-mod-verify.txt
          go list -u -m -json all > nightly-reports/go-module-updates.json
          {
            echo "### Nightly ops summary"
            echo "- Verified the committed Go module cache with \`go mod verify\`."
            echo "- Captured available Go module updates in \`go-module-updates.json\`."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Go maintenance report
        uses: actions/upload-artifact@v4
        with:
          name: nightly-go-maintenance-report
          path: |
            nightly-reports/go-mod-verify.txt
            nightly-reports/go-module-updates.json
          if-no-files-found: error
          retention-days: 14

  runtime-asset-assurance:
    name: Runtime Asset Contract Assurance
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify production runtime assets
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p nightly-reports
          VERIFY_RUNTIME_ASSETS_REPORT_PATH="nightly-reports/runtime-assets-report.json" \
          bash deployments/prod/shared/scripts/verify_runtime_assets.sh nightly-reports/runtime-assets.sha256
          {
            echo "### Runtime asset assurance"
            echo "- validated production compose files with example envs"
            echo "- validated shared production scripts with \`bash -n\`"
            echo "- captured SHA256 inventory for production runtime assets"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload runtime asset report
        uses: actions/upload-artifact@v4
        with:
          name: nightly-runtime-asset-assurance
          path: |
            nightly-reports/runtime-assets.sha256
            nightly-reports/runtime-assets-report.json
          if-no-files-found: error
          retention-days: 14

  restore-readiness:
    name: Restore Readiness Reports and Drill Verdict
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install PostgreSQL client tools
        shell: bash
        run: |
          set -Eeuo pipefail
          sudo apt-get update
          sudo apt-get install -y postgresql-client redis-tools

      - name: Run managed service readiness-only report
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p nightly-reports
          CHECK_MANAGED_SERVICES_REPORT_PATH="nightly-reports/managed-services-readiness.json" \
          CHECK_MANAGED_SERVICES_STRICT=0 \
          bash deployments/prod/shared/scripts/check_managed_services.sh deployments/prod/app-node/.env.app-node.example | tee nightly-reports/managed-services-readiness.txt

      - name: Run managed PostgreSQL backup readiness-only report
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p nightly-reports
          BACKUP_MANAGED_POSTGRES_REPORT_PATH="nightly-reports/backup-readiness.json" \
          APP_NODE_ENV_FILE_PATH="deployments/prod/app-node/.env.app-node.example" \
          bash deployments/prod/shared/scripts/backup_managed_postgres.sh validate | tee nightly-reports/backup-readiness.txt

      - name: Run non-destructive restore readiness-only check
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p nightly-reports
          CHECK_RESTORE_READINESS_REPORT_PATH="nightly-reports/restore-readiness.json" \
          bash deployments/prod/shared/scripts/check_restore_readiness.sh deployments/prod/app-node/.env.app-node.example | tee nightly-reports/restore-readiness.txt

      - name: Resolve actual restore drill contract
        id: drill-contract
        shell: bash
        env:
          RESTORE_DRILL_SOURCE_DATABASE_URL: ${{ secrets.RESTORE_DRILL_SOURCE_DATABASE_URL || vars.RESTORE_DRILL_SOURCE_DATABASE_URL }}
          RESTORE_DRILL_SOURCE_IDENTIFIER: ${{ secrets.RESTORE_DRILL_SOURCE_IDENTIFIER || vars.RESTORE_DRILL_SOURCE_IDENTIFIER }}
          RESTORE_DRILL_TARGET_DATABASE_URL: ${{ secrets.RESTORE_DRILL_TARGET_DATABASE_URL || vars.RESTORE_DRILL_TARGET_DATABASE_URL }}
          RESTORE_DRILL_TARGET_DISPOSABLE: ${{ secrets.RESTORE_DRILL_TARGET_DISPOSABLE || vars.RESTORE_DRILL_TARGET_DISPOSABLE }}
          RESTORE_DRILL_TARGET_IDENTIFIER: ${{ secrets.RESTORE_DRILL_TARGET_IDENTIFIER || vars.RESTORE_DRILL_TARGET_IDENTIFIER }}
        run: |
          set -Eeuo pipefail
          mkdir -p nightly-reports
          source deployments/prod/shared/scripts/lib_release.sh

          missing=()
          add_missing() {
            missing+=("$1")
          }

          source_identifier="${RESTORE_DRILL_SOURCE_IDENTIFIER:-}"
          target_identifier="${RESTORE_DRILL_TARGET_IDENTIFIER:-}"

          if [[ -z "${RESTORE_DRILL_SOURCE_DATABASE_URL}" ]]; then
            add_missing "RESTORE_DRILL_SOURCE_DATABASE_URL"
          elif is_placeholder_value "${RESTORE_DRILL_SOURCE_DATABASE_URL}"; then
            add_missing "RESTORE_DRILL_SOURCE_DATABASE_URL must not be placeholder"
          fi

          if [[ -z "${RESTORE_DRILL_TARGET_DATABASE_URL}" ]]; then
            add_missing "RESTORE_DRILL_TARGET_DATABASE_URL"
          elif is_placeholder_value "${RESTORE_DRILL_TARGET_DATABASE_URL}"; then
            add_missing "RESTORE_DRILL_TARGET_DATABASE_URL must not be placeholder"
          fi

          if [[ "$(normalize_bool "${RESTORE_DRILL_TARGET_DISPOSABLE:-0}")" != "1" ]]; then
            add_missing "RESTORE_DRILL_TARGET_DISPOSABLE=1"
          fi

          if [[ -z "${source_identifier}" && -n "${RESTORE_DRILL_SOURCE_DATABASE_URL}" ]] && ! is_placeholder_value "${RESTORE_DRILL_SOURCE_DATABASE_URL}"; then
            source_identifier="$(postgres_identifier_from_url "${RESTORE_DRILL_SOURCE_DATABASE_URL}")"
          fi
          if [[ -z "${target_identifier}" && -n "${RESTORE_DRILL_TARGET_DATABASE_URL}" ]] && ! is_placeholder_value "${RESTORE_DRILL_TARGET_DATABASE_URL}"; then
            target_identifier="$(postgres_identifier_from_url "${RESTORE_DRILL_TARGET_DATABASE_URL}")"
          fi

          [[ -n "${source_identifier}" ]] || add_missing "RESTORE_DRILL_SOURCE_IDENTIFIER"
          [[ -n "${target_identifier}" ]] || add_missing "RESTORE_DRILL_TARGET_IDENTIFIER"

          configured="false"
          if [[ "${#missing[@]}" -eq 0 ]]; then
            configured="true"
            source_env_file="nightly-reports/restore-drill-source.env"
            target_env_file="nightly-reports/restore-drill-target.env"
            printf 'DATABASE_URL=%s\n' "${RESTORE_DRILL_SOURCE_DATABASE_URL}" > "${source_env_file}"
            printf 'DATABASE_URL=%s\n' "${RESTORE_DRILL_TARGET_DATABASE_URL}" > "${target_env_file}"
            {
              echo "source_env_file=${source_env_file}"
              echo "target_env_file=${target_env_file}"
            } >> "${GITHUB_OUTPUT}"
          fi

          {
            echo "restore_drill_configured=${configured}"
            echo "source_identifier=${source_identifier}"
            echo "target_identifier=${target_identifier}"
          } >> "${GITHUB_OUTPUT}"

          printf '%s\n' "${missing[@]}" > nightly-reports/restore-drill-missing.txt
          export RESTORE_DRILL_CONFIGURED="${configured}"
          export RESTORE_DRILL_SOURCE_ID="${source_identifier}"
          export RESTORE_DRILL_TARGET_ID="${target_identifier}"
          restore_drill_target_disposable_normalized="$(normalize_bool "${RESTORE_DRILL_TARGET_DISPOSABLE:-0}")"
          restore_drill_timestamp="$(utc_timestamp)"
          export RESTORE_DRILL_TARGET_DISPOSABLE_NORMALIZED="${restore_drill_target_disposable_normalized}"
          export RESTORE_DRILL_TIMESTAMP="${restore_drill_timestamp}"
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          missing = [line.strip() for line in Path("nightly-reports/restore-drill-missing.txt").read_text(encoding="utf-8").splitlines() if line.strip()]
          configured = os.environ["RESTORE_DRILL_CONFIGURED"] == "true"
          source_identifier = os.environ.get("RESTORE_DRILL_SOURCE_ID", "")
          target_identifier = os.environ.get("RESTORE_DRILL_TARGET_ID", "")
          timestamp = os.environ["RESTORE_DRILL_TIMESTAMP"]

          contract = {
              "control_scope": "restore-drill",
              "configured": configured,
              "backup_source_identifier": source_identifier,
              "restore_target_identifier": target_identifier,
              "target_disposable_confirmed": os.environ.get("RESTORE_DRILL_TARGET_DISPOSABLE_NORMALIZED", "0") == "1",
              "timestamp": timestamp,
              "missing_prerequisites": missing,
          }
          Path("nightly-reports/restore-drill-contract.json").write_text(json.dumps(contract, indent=2) + "\n", encoding="utf-8")

          if not configured:
              verdict = {
                  "control_scope": "restore-drill",
                  "verdict": "not-configured",
                  "restore_drill_executed": False,
                  "backup_source_identifier": source_identifier,
                  "restore_target_identifier": target_identifier,
                  "timestamp": timestamp,
                  "verification_steps_executed": [],
                  "summary_of_what_was_proven": "restore drill did not run because the disposable restore target contract is not fully configured",
                  "control_status": "unmet",
                  "missing_prerequisites": missing,
              }
              Path("nightly-reports/restore-drill-verdict.json").write_text(json.dumps(verdict, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Create actual restore drill backup artifact
        id: backup-drill-source
        if: steps.drill-contract.outputs.restore_drill_configured == 'true'
        shell: bash
        env:
          APP_NODE_ENV_FILE_PATH: ${{ steps.drill-contract.outputs.source_env_file }}
          BACKUP_MANAGED_POSTGRES_REPORT_PATH: nightly-reports/restore-drill-backup.json
          BACKUP_SOURCE_IDENTIFIER: ${{ steps.drill-contract.outputs.source_identifier }}
        run: |
          set -Eeuo pipefail
          bash deployments/prod/shared/scripts/backup_managed_postgres.sh nightly-reports/restore-drill-source.dump execute

      - name: Execute actual restore drill against disposable target
        id: execute-drill-restore
        if: steps.drill-contract.outputs.restore_drill_configured == 'true'
        shell: bash
        env:
          APP_NODE_ENV_FILE_PATH: ${{ steps.drill-contract.outputs.target_env_file }}
          RESTORE_BACKUP_SOURCE_IDENTIFIER: ${{ steps.drill-contract.outputs.source_identifier }}
          RESTORE_DRILL_CONFIRMATION: disposable-restore-drill
          RESTORE_MANAGED_POSTGRES_REPORT_PATH: nightly-reports/restore-drill-restore.json
          RESTORE_TARGET_DISPOSABLE: 1
          RESTORE_TARGET_IDENTIFIER: ${{ steps.drill-contract.outputs.target_identifier }}
        run: |
          set -Eeuo pipefail
          bash deployments/prod/shared/scripts/restore_managed_postgres.sh nightly-reports/restore-drill-source.dump drill

      - name: Aggregate restore readiness and drill verdict
        if: always()
        shell: bash
        env:
          BACKUP_STEP_OUTCOME: ${{ steps.backup-drill-source.outcome || 'skipped' }}
          DRILL_CONFIGURED: ${{ steps.drill-contract.outputs.restore_drill_configured || 'false' }}
          DRILL_RESTORE_OUTCOME: ${{ steps.execute-drill-restore.outcome || 'skipped' }}
          SOURCE_IDENTIFIER: ${{ steps.drill-contract.outputs.source_identifier }}
          TARGET_IDENTIFIER: ${{ steps.drill-contract.outputs.target_identifier }}
        run: |
          set -Eeuo pipefail
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path
          from datetime import datetime, timezone

          def read_json(path):
              file_path = Path(path)
              if not file_path.exists():
                  return None
              return json.loads(file_path.read_text(encoding="utf-8"))

          managed = read_json("nightly-reports/managed-services-readiness.json")
          backup_readiness = read_json("nightly-reports/backup-readiness.json")
          restore_readiness = read_json("nightly-reports/restore-readiness.json")
          contract = read_json("nightly-reports/restore-drill-contract.json")
          drill_backup = read_json("nightly-reports/restore-drill-backup.json")
          drill_restore = read_json("nightly-reports/restore-drill-restore.json")
          existing_verdict = read_json("nightly-reports/restore-drill-verdict.json")

          timestamp = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          configured = os.environ.get("DRILL_CONFIGURED", "false") == "true"
          backup_step_outcome = os.environ.get("BACKUP_STEP_OUTCOME", "skipped")
          restore_step_outcome = os.environ.get("DRILL_RESTORE_OUTCOME", "skipped")
          source_identifier = os.environ.get("SOURCE_IDENTIFIER", "")
          target_identifier = os.environ.get("TARGET_IDENTIFIER", "")
          backup_execution_verdict = "not-configured" if not configured else ("pass" if backup_step_outcome == "success" and drill_backup else ("fail" if backup_step_outcome in ("failure", "cancelled") else "not-run"))

          if existing_verdict is not None:
              verdict = existing_verdict
          elif configured and drill_backup and drill_restore and backup_step_outcome == "success" and restore_step_outcome == "success":
              verdict = {
                  "control_scope": "restore-drill",
                  "verdict": "pass",
                  "restore_drill_executed": True,
                  "backup_source_identifier": drill_backup.get("backup_source_identifier", source_identifier),
                  "backup_source_artifact": {
                      "path": drill_backup.get("output_path", ""),
                      "sha256_path": drill_backup.get("sha256_path", ""),
                      "size_bytes": drill_backup.get("backup_size_bytes", 0),
                  },
                  "restore_target_identifier": drill_restore.get("restore_target_identifier", target_identifier),
                  "timestamp": timestamp,
                  "verification_steps_executed": drill_restore.get("verification_steps_executed", []),
                  "summary_of_what_was_proven": "a real pg_dump backup was generated from the configured source and restored into the configured disposable target, then verified with read-only post-restore checks",
                  "control_status": "met",
              }
          else:
              verdict = {
                  "control_scope": "restore-drill",
                  "verdict": "fail",
                  "restore_drill_executed": configured,
                  "backup_source_identifier": source_identifier,
                  "restore_target_identifier": target_identifier,
                  "timestamp": timestamp,
                  "verification_steps_executed": (drill_restore or {}).get("verification_steps_executed", []),
                  "summary_of_what_was_proven": "restore drill was configured but did not complete successfully",
                  "control_status": "unmet",
                  "step_outcomes": {
                      "backup_generation": backup_step_outcome,
                      "restore_execution": restore_step_outcome,
                  },
              }

          Path("nightly-reports/restore-drill-verdict.json").write_text(json.dumps(verdict, indent=2) + "\n", encoding="utf-8")

          report = {
              "control_scope": "nightly-restore-control",
              "verdict": verdict["verdict"],
              "summary": {
                  "managed_service_readiness_verdict": (managed or {}).get("verdict", "missing"),
                  "backup_readiness_verdict": (backup_readiness or {}).get("verdict", "missing"),
                  "backup_execution_verdict": backup_execution_verdict,
                  "restore_readiness_verdict": (restore_readiness or {}).get("verdict", "missing"),
                  "restore_drill_verdict": verdict["verdict"],
                  "restore_drill_executed": verdict["verdict"] in ("pass", "fail"),
              },
              "runtime_readiness_checks": {
                  "report_path": "nightly-reports/managed-services-readiness.json",
                  "report": managed,
              },
              "backup_readiness_checks": {
                  "report_path": "nightly-reports/backup-readiness.json",
                  "report": backup_readiness,
              },
              "restore_readiness_checks": {
                  "report_path": "nightly-reports/restore-readiness.json",
                  "report": restore_readiness,
              },
              "restore_drill_contract": {
                  "report_path": "nightly-reports/restore-drill-contract.json",
                  "report": contract,
              },
              "restore_drill_execution": {
                  "backup_report_path": "nightly-reports/restore-drill-backup.json" if drill_backup else "",
                  "backup_report": drill_backup,
                  "restore_report_path": "nightly-reports/restore-drill-restore.json" if drill_restore else "",
                  "restore_report": drill_restore,
                  "verdict_report_path": "nightly-reports/restore-drill-verdict.json",
                  "verdict_report": verdict,
              },
          }
          Path("nightly-reports/nightly-restore-preparedness.json").write_text(json.dumps(report, indent=2) + "\n", encoding="utf-8")
          PY

          verdict="$(python3 -c "import json; from pathlib import Path; print(json.loads(Path('nightly-reports/restore-drill-verdict.json').read_text(encoding='utf-8'))['verdict'])")"
          summary="$(python3 -c "import json; from pathlib import Path; print(json.loads(Path('nightly-reports/restore-drill-verdict.json').read_text(encoding='utf-8'))['summary_of_what_was_proven'])")"
          source_id="$(python3 -c "import json; from pathlib import Path; print(json.loads(Path('nightly-reports/restore-drill-verdict.json').read_text(encoding='utf-8')).get('backup_source_identifier',''))")"
          target_id="$(python3 -c "import json; from pathlib import Path; print(json.loads(Path('nightly-reports/restore-drill-verdict.json').read_text(encoding='utf-8')).get('restore_target_identifier',''))")"

          if [[ "${verdict}" == "pass" ]]; then
            drill_status_line="actual restore drill executed and passed"
          elif [[ "${verdict}" == "not-configured" ]]; then
            drill_status_line="actual restore drill not configured; control remains unmet"
          else
            drill_status_line="actual restore drill executed or attempted but failed; control remains unmet"
          fi

          if [[ "${DRILL_CONFIGURED}" != "true" ]]; then
            backup_execution_line="actual backup execution not run because the restore drill is not configured"
          elif [[ "${BACKUP_STEP_OUTCOME}" == "success" ]]; then
            backup_execution_line="actual backup execution completed and produced a restore-drill backup artifact"
          elif [[ "${BACKUP_STEP_OUTCOME}" == "failure" || "${BACKUP_STEP_OUTCOME}" == "cancelled" ]]; then
            backup_execution_line="actual backup execution was attempted but did not complete successfully"
          else
            backup_execution_line="actual backup execution did not run"
          fi

          {
            echo "### Managed service readiness"
            echo "- report only: runtime dependency contract and reachability checks"
            echo "- verdict: \`$(python3 -c "import json; from pathlib import Path; print(json.loads(Path('nightly-reports/managed-services-readiness.json').read_text(encoding='utf-8'))['verdict'])")\`"
            echo "### Backup readiness"
            echo "- report only: backup tooling and source contract checks; no backup artifact is created in this section"
            echo "- verdict: \`$(python3 -c "import json; from pathlib import Path; print(json.loads(Path('nightly-reports/backup-readiness.json').read_text(encoding='utf-8'))['verdict'])")\`"
            echo "### Backup execution"
            echo "- conclusion: \`${backup_execution_line}\`"
            echo "- step outcome: \`${BACKUP_STEP_OUTCOME}\`"
            echo "### Restore readiness"
            echo "- report only: restore tooling and dump contract checks; no restore is executed in this section"
            echo "- verdict: \`$(python3 -c "import json; from pathlib import Path; print(json.loads(Path('nightly-reports/restore-readiness.json').read_text(encoding='utf-8'))['verdict'])")\`"
            echo "### Restore drill execution"
            echo "- verdict: \`${verdict}\`"
            echo "- backup source identifier: \`${source_id:-unset}\`"
            echo "- restore target identifier: \`${target_id:-unset}\`"
            echo "- conclusion: \`${drill_status_line}\`"
            echo "- summary: ${summary}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload restore readiness-only reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-restore-readiness-reports
          path: |
            nightly-reports/managed-services-readiness.txt
            nightly-reports/managed-services-readiness.json
            nightly-reports/backup-readiness.txt
            nightly-reports/backup-readiness.json
            nightly-reports/restore-readiness.txt
            nightly-reports/restore-readiness.json
          if-no-files-found: error
          retention-days: 14

      - name: Upload restore drill verdict and control summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-restore-drill-verdict
          path: |
            nightly-reports/restore-drill-contract.json
            nightly-reports/restore-drill-verdict.json
            nightly-reports/nightly-restore-preparedness.json
          if-no-files-found: error
          retention-days: 14

      - name: Upload actual restore drill execution evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-actual-restore-drill-execution
          path: |
            nightly-reports/restore-drill-backup.json
            nightly-reports/restore-drill-restore.json
            nightly-reports/restore-drill-source.dump
            nightly-reports/restore-drill-source.dump.sha256
            nightly-reports/restore-drill-verdict.json
            nightly-reports/nightly-restore-preparedness.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Enforce actual restore drill control verdict
        if: always()
        run: |
          set -Eeuo pipefail
          verdict="$(python3 -c "import json; from pathlib import Path; print(json.loads(Path('nightly-reports/restore-drill-verdict.json').read_text(encoding='utf-8'))['verdict'])")"
          if [[ "${verdict}" != "pass" ]]; then
            if [[ "${verdict}" == "not-configured" ]]; then
              echo "error: actual restore drill control is unmet because a disposable restore target is not fully configured" >&2
            else
              echo "error: actual restore drill control is unmet because the configured drill did not pass" >&2
            fi
            exit 1
          fi

  ci-cd-inventory:
    name: CI/CD Inventory Report
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Generate CI/CD inventory
        shell: bash
        run: |
          mkdir -p nightly-reports
          {
            echo "Nightly CI/CD inventory"
            echo
            echo "[Workflow files]"
            ls .github/workflows/*.yml
            echo
            echo "[Dependabot coverage]"
            rg -n "package-ecosystem|directory:|interval:|day:|time:" .github/dependabot.yml
            echo
            echo "[Production Docker build inputs]"
            rg -n "^FROM " deployments/prod/Dockerfile*
          } > nightly-reports/ci-cd-inventory.txt

      - name: Upload CI/CD inventory
        uses: actions/upload-artifact@v4
        with:
          name: nightly-ci-cd-inventory
          path: nightly-reports/ci-cd-inventory.txt
          if-no-files-found: error
          retention-days: 14
