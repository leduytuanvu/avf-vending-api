name: Reusable Build and Push

on:
  workflow_call:
    outputs:
      app_image:
        description: "Base app image name"
        value: ${{ jobs.build-and-push.outputs.app_image }}
      app_tag:
        description: "Primary app tag for this branch or release"
        value: ${{ jobs.build-and-push.outputs.app_tag }}
      app_digest:
        description: "Published app image digest"
        value: ${{ jobs.build-and-push.outputs.app_digest }}
      app_ref:
        description: "Published immutable app image ref"
        value: ${{ jobs.build-and-push.outputs.app_ref }}
      goose_image:
        description: "Base goose image name"
        value: ${{ jobs.build-and-push.outputs.goose_image }}
      goose_tag:
        description: "Primary goose tag for this branch or release"
        value: ${{ jobs.build-and-push.outputs.goose_tag }}
      goose_digest:
        description: "Published goose image digest"
        value: ${{ jobs.build-and-push.outputs.goose_digest }}
      goose_ref:
        description: "Published immutable goose image ref"
        value: ${{ jobs.build-and-push.outputs.goose_ref }}
      dockerfile_sha256:
        description: "SHA256 of deployments/prod/Dockerfile"
        value: ${{ jobs.build-and-push.outputs.dockerfile_sha256 }}
      dockerfile_goose_sha256:
        description: "SHA256 of deployments/prod/Dockerfile.goose"
        value: ${{ jobs.build-and-push.outputs.dockerfile_goose_sha256 }}
      go_sum_sha256:
        description: "SHA256 of go.sum"
        value: ${{ jobs.build-and-push.outputs.go_sum_sha256 }}

jobs:
  build-and-push:
    name: Build and Publish Images
    runs-on: ubuntu-latest
    outputs:
      app_image: ${{ steps.tags.outputs.app_image }}
      app_tag: ${{ steps.tags.outputs.primary_tag }}
      app_digest: ${{ steps.metadata.outputs.app_digest }}
      app_ref: ${{ steps.metadata.outputs.app_ref }}
      goose_image: ${{ steps.tags.outputs.goose_image }}
      goose_tag: ${{ steps.tags.outputs.primary_tag }}
      goose_digest: ${{ steps.metadata.outputs.goose_digest }}
      goose_ref: ${{ steps.metadata.outputs.goose_ref }}
      dockerfile_sha256: ${{ steps.source_inputs.outputs.dockerfile_sha256 }}
      dockerfile_goose_sha256: ${{ steps.source_inputs.outputs.dockerfile_goose_sha256 }}
      go_sum_sha256: ${{ steps.source_inputs.outputs.go_sum_sha256 }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: tags
        shell: bash
        run: |
          repo="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          app_image="ghcr.io/${repo}"
          goose_image="ghcr.io/${repo}-goose"
          sha_tag="sha-${GITHUB_SHA}"
          primary_tag="${sha_tag}"

          app_tags=("${app_image}:${sha_tag}")
          goose_tags=("${goose_image}:${sha_tag}")

          if [[ "${GITHUB_REF_TYPE}" == "branch" && "${GITHUB_REF_NAME}" == "develop" ]]; then
            primary_tag="develop-${GITHUB_SHA}"
            app_tags+=("${app_image}:${primary_tag}" "${app_image}:develop-latest")
            goose_tags+=("${goose_image}:${primary_tag}" "${goose_image}:develop-latest")
          elif [[ "${GITHUB_REF_TYPE}" == "branch" && "${GITHUB_REF_NAME}" == "main" ]]; then
            primary_tag="main-${GITHUB_SHA}"
            app_tags+=("${app_image}:${primary_tag}" "${app_image}:main")
            goose_tags+=("${goose_image}:${primary_tag}" "${goose_image}:main")
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            primary_tag="${GITHUB_REF_NAME}"
            app_tags+=("${app_image}:${primary_tag}")
            goose_tags+=("${goose_image}:${primary_tag}")
          fi

          {
            echo "app_image=${app_image}"
            echo "goose_image=${goose_image}"
            echo "sha_tag=${sha_tag}"
            echo "primary_tag=${primary_tag}"
            echo "app_tags<<EOF"
            printf '%s\n' "${app_tags[@]}"
            echo "EOF"
            echo "goose_tags<<EOF"
            printf '%s\n' "${goose_tags[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Capture source input hashes
        id: source_inputs
        shell: bash
        run: |
          {
            echo "dockerfile_sha256=$(sha256sum deployments/prod/Dockerfile | awk '{print $1}')"
            echo "dockerfile_goose_sha256=$(sha256sum deployments/prod/Dockerfile.goose | awk '{print $1}')"
            echo "go_sum_sha256=$(sha256sum go.sum | awk '{print $1}')"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push app image
        id: build_app
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployments/prod/Dockerfile
          push: true
          provenance: mode=max
          sbom: true
          tags: ${{ steps.tags.outputs.app_tags }}

      - name: Build and push goose image
        id: build_goose
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployments/prod/Dockerfile.goose
          push: true
          provenance: mode=max
          sbom: true
          tags: ${{ steps.tags.outputs.goose_tags }}

      - name: Publish app image artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ steps.tags.outputs.app_image }}
          subject-digest: ${{ steps.build_app.outputs.digest }}
          push-to-registry: true

      - name: Publish goose image artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ steps.tags.outputs.goose_image }}
          subject-digest: ${{ steps.build_goose.outputs.digest }}
          push-to-registry: true

      - name: Publish image metadata
        id: metadata
        shell: bash
        run: |
          app_ref="${{ steps.tags.outputs.app_image }}@${{ steps.build_app.outputs.digest }}"
          goose_ref="${{ steps.tags.outputs.goose_image }}@${{ steps.build_goose.outputs.digest }}"

          {
            echo "app_digest=${{ steps.build_app.outputs.digest }}"
            echo "app_ref=${app_ref}"
            echo "goose_digest=${{ steps.build_goose.outputs.digest }}"
            echo "goose_ref=${goose_ref}"
          } >> "$GITHUB_OUTPUT"

          cat > image-metadata.json <<EOF
          {
            "schema_version": "v1",
            "git_sha": "${GITHUB_SHA}",
            "event_name": "${GITHUB_EVENT_NAME}",
            "workflow_name": "${GITHUB_WORKFLOW}",
            "workflow_run_id": "${GITHUB_RUN_ID}",
            "actor": "${GITHUB_ACTOR}",
            "ref_name": "${GITHUB_REF_NAME}",
            "ref_type": "${GITHUB_REF_TYPE}",
            "provenance_enabled": true,
            "sbom_enabled": true,
            "source_inputs": {
              "dockerfile_sha256": "${{ steps.source_inputs.outputs.dockerfile_sha256 }}",
              "dockerfile_goose_sha256": "${{ steps.source_inputs.outputs.dockerfile_goose_sha256 }}",
              "go_sum_sha256": "${{ steps.source_inputs.outputs.go_sum_sha256 }}"
            },
            "app": {
              "image": "${{ steps.tags.outputs.app_image }}",
              "tag": "${{ steps.tags.outputs.primary_tag }}",
              "digest": "${{ steps.build_app.outputs.digest }}",
              "ref": "${app_ref}"
            },
            "goose": {
              "image": "${{ steps.tags.outputs.goose_image }}",
              "tag": "${{ steps.tags.outputs.primary_tag }}",
              "digest": "${{ steps.build_goose.outputs.digest }}",
              "ref": "${goose_ref}"
            }
          }
          EOF

          {
            echo "### Published image metadata"
            echo "- app: \`${app_ref}\`"
            echo "- goose: \`${goose_ref}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload image metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-metadata
          path: image-metadata.json
          if-no-files-found: error
          retention-days: 14
