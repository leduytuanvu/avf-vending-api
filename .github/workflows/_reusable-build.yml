name: Reusable Build and Push

on:
  workflow_call:
    inputs:
      # When the caller is workflow_run( CI ), GITHUB_REF/SHA in the child workflow are not the app commit — pass head_sha/branch from the triggering run.
      checkout_ref:
        description: "Commit SHA (full 40) to check out; empty uses default (triggering ref)"
        type: string
        required: false
        default: ""
      head_branch:
        description: "Branch name for develop/main tag logic when checkout_ref is set (e.g. from workflow_run.head_branch)"
        type: string
        required: false
        default: ""
    outputs:
      app_image:
        description: "Base app image name"
        value: ${{ jobs.build-and-push.outputs.app_image }}
      app_tag:
        description: "Primary app tag for this branch or release"
        value: ${{ jobs.build-and-push.outputs.app_tag }}
      app_digest:
        description: "Published app image digest"
        value: ${{ jobs.build-and-push.outputs.app_digest }}
      app_ref:
        description: "Published immutable app image ref"
        value: ${{ jobs.build-and-push.outputs.app_ref }}
      goose_image:
        description: "Base goose image name"
        value: ${{ jobs.build-and-push.outputs.goose_image }}
      goose_tag:
        description: "Primary goose tag for this branch or release"
        value: ${{ jobs.build-and-push.outputs.goose_tag }}
      goose_digest:
        description: "Published goose image digest"
        value: ${{ jobs.build-and-push.outputs.goose_digest }}
      goose_ref:
        description: "Published immutable goose image ref"
        value: ${{ jobs.build-and-push.outputs.goose_ref }}
      dockerfile_sha256:
        description: "SHA256 of deployments/prod/Dockerfile"
        value: ${{ jobs.build-and-push.outputs.dockerfile_sha256 }}
      dockerfile_goose_sha256:
        description: "SHA256 of deployments/prod/Dockerfile.goose"
        value: ${{ jobs.build-and-push.outputs.dockerfile_goose_sha256 }}
      go_sum_sha256:
        description: "SHA256 of go.sum"
        value: ${{ jobs.build-and-push.outputs.go_sum_sha256 }}
      source_commit_sha:
        description: "Git commit that was built (40-char), from checkout in this workflow"
        value: ${{ jobs.build-and-push.outputs.source_commit_sha }}

permissions:
  contents: read
  actions: write
  packages: write
  attestations: write
  id-token: write

jobs:
  build-and-push:
    name: Build and Publish Images
    runs-on: ubuntu-latest
    outputs:
      app_image: ${{ steps.tags.outputs.app_image }}
      app_tag: ${{ steps.tags.outputs.primary_tag }}
      app_digest: ${{ steps.metadata.outputs.app_digest }}
      app_ref: ${{ steps.metadata.outputs.app_ref }}
      goose_image: ${{ steps.tags.outputs.goose_image }}
      goose_tag: ${{ steps.tags.outputs.primary_tag }}
      goose_digest: ${{ steps.metadata.outputs.goose_digest }}
      goose_ref: ${{ steps.metadata.outputs.goose_ref }}
      dockerfile_sha256: ${{ steps.source_inputs.outputs.dockerfile_sha256 }}
      dockerfile_goose_sha256: ${{ steps.source_inputs.outputs.dockerfile_goose_sha256 }}
      go_sum_sha256: ${{ steps.source_inputs.outputs.go_sum_sha256 }}
      source_commit_sha: ${{ steps.source_commit.outputs.source_commit_sha }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref != '' && inputs.checkout_ref || github.sha }}
          fetch-depth: 0

      - name: Record source commit (authoritative for digest metadata and downstream)
        id: source_commit
        shell: bash
        run: |
          sha="$(git rev-parse HEAD)"
          echo "source_commit_sha=${sha}" >> "$GITHUB_OUTPUT"
          if [[ ! "${sha}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "error: expected 40 hex commit sha, got: ${sha}" >&2
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: tags
        shell: bash
        env:
          INPUT_HEAD_BRANCH: ${{ inputs.head_branch }}
        run: |
          repo="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          app_image="ghcr.io/${repo}"
          goose_image="ghcr.io/${repo}-goose"
          git_sha="$(git rev-parse HEAD)"
          if [[ -n "${INPUT_HEAD_BRANCH}" ]]; then
            ref_name="${INPUT_HEAD_BRANCH}"
            ref_type="branch"
          else
            ref_name="${GITHUB_REF_NAME}"
            ref_type="${GITHUB_REF_TYPE}"
          fi
          sha_tag="sha-${git_sha}"
          primary_tag="${sha_tag}"

          app_tags=("${app_image}:${sha_tag}")
          goose_tags=("${goose_image}:${sha_tag}")

          if [[ "${ref_type}" == "branch" && "${ref_name}" == "develop" ]]; then
            primary_tag="develop-${git_sha}"
            app_tags+=("${app_image}:${primary_tag}" "${app_image}:develop-latest")
            goose_tags+=("${goose_image}:${primary_tag}" "${goose_image}:develop-latest")
          elif [[ "${ref_type}" == "branch" && "${ref_name}" == "main" ]]; then
            primary_tag="main-${git_sha}"
            app_tags+=("${app_image}:${primary_tag}" "${app_image}:main")
            goose_tags+=("${goose_image}:${primary_tag}" "${goose_image}:main")
          elif [[ "${ref_type}" == "tag" ]]; then
            primary_tag="${ref_name}"
            app_tags+=("${app_image}:${primary_tag}")
            goose_tags+=("${goose_image}:${primary_tag}")
          fi

          {
            echo "app_image=${app_image}"
            echo "goose_image=${goose_image}"
            echo "sha_tag=${sha_tag}"
            echo "primary_tag=${primary_tag}"
            echo "app_tags<<GHA__APP_TAGS__"
            printf '%s\n' "${app_tags[@]}"
            echo "GHA__APP_TAGS__"
            echo "goose_tags<<GHA__GOOSE_TAGS__"
            printf '%s\n' "${goose_tags[@]}"
            echo "GHA__GOOSE_TAGS__"
          } >> "$GITHUB_OUTPUT"

      - name: Capture source input hashes
        id: source_inputs
        shell: bash
        run: |
          {
            echo "dockerfile_sha256=$(sha256sum deployments/prod/Dockerfile | awk '{print $1}')"
            echo "dockerfile_goose_sha256=$(sha256sum deployments/prod/Dockerfile.goose | awk '{print $1}')"
            echo "go_sum_sha256=$(sha256sum go.sum | awk '{print $1}')"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push app image
        id: build_app
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployments/prod/Dockerfile
          push: true
          provenance: mode=max
          sbom: true
          tags: ${{ steps.tags.outputs.app_tags }}

      - name: Build and push goose image
        id: build_goose
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployments/prod/Dockerfile.goose
          push: true
          provenance: mode=max
          sbom: true
          tags: ${{ steps.tags.outputs.goose_tags }}

      - name: Publish app image artifact attestation
        if: github.event.repository.private != true
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ steps.tags.outputs.app_image }}
          subject-digest: ${{ steps.build_app.outputs.digest }}
          push-to-registry: true

      - name: Publish goose image artifact attestation
        if: github.event.repository.private != true
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ steps.tags.outputs.goose_image }}
          subject-digest: ${{ steps.build_goose.outputs.digest }}
          push-to-registry: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.7.0

      - name: Cosign sign digest-pinned images (keyless, GitHub OIDC)
        shell: bash
        env:
          APP_REF: ${{ steps.tags.outputs.app_image }}@${{ steps.build_app.outputs.digest }}
          GOOSE_REF: ${{ steps.tags.outputs.goose_image }}@${{ steps.build_goose.outputs.digest }}
        run: |
          set -Eeuo pipefail
          [[ "${APP_REF}" == *@sha256:* ]]
          [[ "${GOOSE_REF}" == *@sha256:* ]]
          cosign sign --yes "${APP_REF}"
          cosign sign --yes "${GOOSE_REF}"

      - name: Verify signatures and write signing evidence
        shell: bash
        env:
          APP_REF: ${{ steps.tags.outputs.app_image }}@${{ steps.build_app.outputs.digest }}
          GOOSE_REF: ${{ steps.tags.outputs.goose_image }}@${{ steps.build_goose.outputs.digest }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_WORKFLOW_REF: ${{ github.workflow_ref }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          set -Eeuo pipefail
          mkdir -p signing-evidence
          issuer='^https://token.actions.githubusercontent.com$'
          identity="^https://github.com/${GITHUB_REPOSITORY}/"
          run_verify() {
            local ref="$1"
            local out="$2"
            cosign verify \
              --certificate-identity-regexp "${identity}" \
              --certificate-oidc-issuer-regexp "${issuer}" \
              --output json \
              "${ref}" > "${out}"
          }
          run_verify "${APP_REF}" signing-evidence/cosign-verify-app.json
          run_verify "${GOOSE_REF}" signing-evidence/cosign-verify-goose.json
          python3 scripts/security/write_cosign_signing_evidence.py \
            --out signing-evidence/cosign-signing-evidence.json \
            --app-ref "${APP_REF}" \
            --goose-ref "${GOOSE_REF}" \
            --verify-app-json signing-evidence/cosign-verify-app.json \
            --verify-goose-json signing-evidence/cosign-verify-goose.json \
            --workflow-run-id "${GITHUB_RUN_ID}" \
            --repository "${GITHUB_REPOSITORY}" \
            --workflow-ref "${GITHUB_WORKFLOW_REF}" \
            --identity-regexp "${identity}" \
            --issuer-regexp "${issuer}"

      - name: Upload Cosign signing evidence
        uses: actions/upload-artifact@v4
        with:
          name: cosign-signing-evidence
          path: signing-evidence/cosign-signing-evidence.json
          if-no-files-found: error
          retention-days: 14

      - name: Publish image metadata
        id: metadata
        shell: bash
        env:
          INPUT_HEAD_BRANCH: ${{ inputs.head_branch }}
          SRC_DOCKERFILE_SHA256: ${{ steps.source_inputs.outputs.dockerfile_sha256 }}
          SRC_DOCKERFILE_GOOSE_SHA256: ${{ steps.source_inputs.outputs.dockerfile_goose_sha256 }}
          SRC_GO_SUM_SHA256: ${{ steps.source_inputs.outputs.go_sum_sha256 }}
          TAG_APP_IMAGE: ${{ steps.tags.outputs.app_image }}
          TAG_GOOSE_IMAGE: ${{ steps.tags.outputs.goose_image }}
          TAG_PRIMARY: ${{ steps.tags.outputs.primary_tag }}
          DIGEST_APP: ${{ steps.build_app.outputs.digest }}
          DIGEST_GOOSE: ${{ steps.build_goose.outputs.digest }}
          WF_WRITE_IMAGE_METADATA_JSON: |
            import json
            import os
            from pathlib import Path

            def s(k, d=""):
                return os.environ.get(k, d)

            meta = {
                "schema_version": "v1",
                "git_sha": s("GIT_SHA_META"),
                "event_name": s("GITHUB_EVENT_NAME"),
                "workflow_name": s("GITHUB_WORKFLOW"),
                "workflow_run_id": s("GITHUB_RUN_ID"),
                "actor": s("GITHUB_ACTOR"),
                "ref_name": s("META_REF_NAME"),
                "ref_type": s("META_REF_TYPE"),
                "provenance_enabled": True,
                "sbom_enabled": True,
                "source_inputs": {
                    "dockerfile_sha256": s("SRC_DOCKERFILE_SHA256"),
                    "dockerfile_goose_sha256": s("SRC_DOCKERFILE_GOOSE_SHA256"),
                    "go_sum_sha256": s("SRC_GO_SUM_SHA256"),
                },
                "app": {
                    "image": s("TAG_APP_IMAGE"),
                    "tag": s("TAG_PRIMARY"),
                    "digest": s("DIGEST_APP"),
                    "ref": s("APP_REF_COMPOSED"),
                },
                "goose": {
                    "image": s("TAG_GOOSE_IMAGE"),
                    "tag": s("TAG_PRIMARY"),
                    "digest": s("DIGEST_GOOSE"),
                    "ref": s("GOOSE_REF_COMPOSED"),
                },
            }
            Path("image-metadata.json").write_text(json.dumps(meta, indent=2) + "\n", encoding="utf-8")
        run: |
          app_ref="${{ steps.tags.outputs.app_image }}@${{ steps.build_app.outputs.digest }}"
          goose_ref="${{ steps.tags.outputs.goose_image }}@${{ steps.build_goose.outputs.digest }}"

          {
            echo "app_digest=${{ steps.build_app.outputs.digest }}"
            echo "app_ref=${app_ref}"
            echo "goose_digest=${{ steps.build_goose.outputs.digest }}"
            echo "goose_ref=${goose_ref}"
          } >> "$GITHUB_OUTPUT"

          git_sha_meta="$(git rev-parse HEAD)"
          if [[ -n "${INPUT_HEAD_BRANCH}" ]]; then
            meta_ref_name="${INPUT_HEAD_BRANCH}"
            meta_ref_type="branch"
          else
            meta_ref_name="${GITHUB_REF_NAME}"
            meta_ref_type="${GITHUB_REF_TYPE}"
          fi
          export GIT_SHA_META="${git_sha_meta}"
          export META_REF_NAME="${meta_ref_name}"
          export META_REF_TYPE="${meta_ref_type}"
          export APP_REF_COMPOSED="${app_ref}"
          export GOOSE_REF_COMPOSED="${goose_ref}"
          printenv WF_WRITE_IMAGE_METADATA_JSON | python3 -

          {
            echo "### Published image metadata"
            echo "- app: \`${app_ref}\`"
            echo "- goose: \`${goose_ref}\`"
            if [[ "${{ github.event.repository.private && 'true' || 'false' }}" == "true" ]]; then
              echo "- GitHub artifact attestations: \`disabled for private repository; feature unavailable\`"
            else
              echo "- GitHub artifact attestations: \`enabled\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload image metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-metadata
          path: image-metadata.json
          if-no-files-found: error
          retention-days: 14
