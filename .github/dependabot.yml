version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: tuesday
      time: "06:00"
    open-pull-requests-limit: 3
    groups:
      github-actions:
        patterns:
          - "*"
    labels:
      - dependencies
      - github-actions

  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: tuesday
      time: "06:15"
    open-pull-requests-limit: 3
    groups:
      go-modules:
        patterns:
          - "*"
    labels:
      - dependencies
      - go

  - package-ecosystem: docker
    directory: /deployments/prod
    schedule:
      interval: weekly
      day: tuesday
      time: "06:30"
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - docker
