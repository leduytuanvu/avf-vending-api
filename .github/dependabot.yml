version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 5
    labels:
      - dependencies

  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:15"
    open-pull-requests-limit: 5
    labels:
      - dependencies

  - package-ecosystem: docker
    directory: /deployments/prod
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
    open-pull-requests-limit: 3
    labels:
      - dependencies
