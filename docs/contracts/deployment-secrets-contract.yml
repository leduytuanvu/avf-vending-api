# Machine-readable contract for GitHub Actions secrets/variables used by staging and production
# deploy workflows. Validated by scripts/ci/verify_deployment_config_contract.py
#
# Policy: new secrets.*/vars.* in deploy-develop.yml or deploy-prod.yml must be added here
# before merge (or an explicit exception path), so operators have a single inventory.
#
version: 1
description: "Secrets and repository variables for deploy-develop (staging) and deploy-prod (production)"

workflows:
  staging: &wf_staging .github/workflows/deploy-develop.yml
  production: &wf_prod .github/workflows/deploy-prod.yml

# Automatic token — not an org/Environment secret, but allowed in expression syntax
implicit:
  allowed_secret_names:
    - GITHUB_TOKEN

# Permission intent (enforced in workflow YAML, documented for audits)
ghcr_and_artifacts:
  description: "Workflow job permissions pull from GHCR using GITHUB_TOKEN; remote hosts may use .env GHCR_* per examples"
  staging_actions:
    actions_write: "artifact download/upload on Security Release chain"
    packages_read: "registry package pull where applicable"
    contents_read: "checkout, promotion manifests"
  production_actions:
    id_token_write: "OIDC where applicable in workflow"
    packages_read: "image metadata / digest alignment"
  remote_host_pull: "On VPS, docker login uses environment variables GHCR_PULL_USERNAME / GHCR_PULL_TOKEN (often repo owner + token); see .env.production.example"

# Database URL and app secrets live on the remote host in the .env file — not as GitHub Actions secrets
remote_env_files:
  staging:
    workflow_binding: "STAGING_REMOTE_ENV_FILE (or PREPROD_REMOTE_ENV_FILE) is the path on the staging host; validate-staging checks file exists and flags CHANGE_ME/placeholder patterns"
    example: deployments/staging/.env.staging.example
  production:
    description: "Per-node or legacy .env on app/data nodes; DATABASE_URL, POSTGRES_*, and payment keys are supplied there; never committed"
    example_primary: deployments/prod/.env.production.example
    examples_nodes:
      - deployments/prod/app-node/.env.app-node.example
      - deployments/prod/data-node/.env.data-node.example

# GitHub — repository and Environment configuration (see docs/operations/deployment-secrets.md)
environments:
  production:
    github_environment_name: production
  staging:
    note: "Staging uses repository-level secrets/variables (no environment name in workflow); keep staging keys distinct from production"

# All secret names that may appear in ${{ secrets.NAME }} in the scoped workflows (OR-chains, etc.)
# Keep aligned with the literal identifiers in the YAML, not the resolved values
github_actions:
  allowed_secrets:
    - GITHUB_TOKEN
    # Staging + shared fallbacks (security-verdict max age)
    - STAGING_SECURITY_VERDICT_MAX_AGE_HOURS
    - SECURITY_VERDICT_MAX_AGE_HOURS
    - STAGING_SSH_KNOWN_HOSTS
    - PREPROD_SSH_KNOWN_HOSTS
    - STAGING_SSH_PORT
    - PREPROD_SSH_PORT
    - STAGING_SSH_KEY
    - STAGING_SSH_PRIVATE_KEY
    - PREPROD_SSH_KEY
    - PREPROD_SSH_PRIVATE_KEY
    - STAGING_SSH_USER
    - PREPROD_SSH_USER
    - STAGING_DEPLOY_ROOT
    - PREPROD_DEPLOY_ROOT
    - STAGING_HOST
    - PREPROD_HOST
    - STAGING_REMOTE_ENV_FILE
    - PREPROD_REMOTE_ENV_FILE
    - STAGING_API_READY_URL
    - STAGING_SMOKE_AUTH_TOKEN
    - STAGING_SMOKE_BASE_URL
    - STAGING_PUBLIC_BASE_URL
    # Production + compatibility aliases
    - PRODUCTION_SECURITY_VERDICT_MAX_AGE_HOURS
    - PRODUCTION_DEPLOY_ROOT
    - DEPLOY_PATH
    - PRODUCTION_APP_NODE_A_HOST
    - PROD_APP_A_HOST
    - APP_A_HOST
    - PRODUCTION_APP_NODE_B_HOST
    - PROD_APP_B_HOST
    - APP_B_HOST
    - PRODUCTION_DATA_NODE_HOST
    - PROD_DATA_NODE_HOST
    - DATA_HOST
    - PRODUCTION_API_DOMAIN
    - PROD_API_DOMAIN
    - API_DOMAIN
    - PRODUCTION_PUBLIC_BASE_URL
    - PROD_PUBLIC_BASE_URL
    - PUBLIC_BASE_URL
    - PRODUCTION_SMOKE_DB_READ_PATH
    - PROD_SMOKE_DB_READ_PATH
    - SMOKE_DB_READ_PATH
    - PRODUCTION_SMOKE_DB_READ_MATCH_REGEX
    - PROD_SMOKE_DB_READ_MATCH_REGEX
    - SMOKE_DB_READ_MATCH_REGEX
    - PRODUCTION_SMOKE_BUSINESS_READONLY_BEARER_TOKEN
    - PRODUCTION_SMOKE_SYNTHETIC_BEARER_TOKEN
    - PRODUCTION_SSH_PORT
    - PROD_SSH_PORT
    - SSH_PORT
    - PRODUCTION_SSH_USER
    - PROD_SSH_USER
    - SSH_USER
    - PRODUCTION_SSH_KNOWN_HOSTS
    - PROD_SSH_KNOWN_HOSTS
    - SSH_KNOWN_HOSTS
    - PRODUCTION_SSH_PRIVATE_KEY
    - PROD_SSH_KEY
    - SSH_KEY
  allowed_variables:
    - PROVENANCE_ENFORCEMENT
    - ALLOW_PRIVATE_REPO_PROVENANCE_FALLBACK
    - SIGNING_ENFORCEMENT
    - STAGING_SECURITY_VERDICT_MAX_AGE_HOURS
    - ENABLE_REAL_STAGING_DEPLOY
    - ALLOW_STAGING_CONTRACT_ONLY
    - ALLOW_DESTRUCTIVE_MIGRATIONS
    - STAGING_SMOKE_BASE_URL
    - STAGING_PUBLIC_BASE_URL
    - STAGING_SMOKE_AUTH_READ_PATH
    - NOTIFY_WEBHOOK_URL
    - SECURITY_VERDICT_MAX_AGE_HOURS
    - PRODUCTION_SECURITY_VERDICT_MAX_AGE_HOURS
    - PRODUCTION_DEPLOY_ROOT
    - PROD_DEPLOY_PATH
    - DEPLOY_PATH
    - PRODUCTION_APP_NODE_A_HOST
    - PROD_APP_A_HOST
    - APP_A_HOST
    - PRODUCTION_APP_NODE_B_HOST
    - PROD_APP_B_HOST
    - APP_B_HOST
    - PRODUCTION_DATA_NODE_HOST
    - PROD_DATA_NODE_HOST
    - DATA_HOST
    - PRODUCTION_API_DOMAIN
    - PROD_API_DOMAIN
    - API_DOMAIN
    - PRODUCTION_PUBLIC_BASE_URL
    - PROD_PUBLIC_BASE_URL
    - PUBLIC_BASE_URL
    - PRODUCTION_SMOKE_DB_READ_PATH
    - PROD_SMOKE_DB_READ_PATH
    - SMOKE_DB_READ_PATH
    - PRODUCTION_SMOKE_DB_READ_MATCH_REGEX
    - PROD_SMOKE_DB_READ_MATCH_REGEX
    - SMOKE_DB_READ_MATCH_REGEX
    - PRODUCTION_ENABLE_TEMPORAL_PROFILE
    - PRODUCTION_SMOKE_BUSINESS_READONLY_SPECS
    - PRODUCTION_SMOKE_SYNTHETIC_GET_PATH
    - PRODUCTION_SMOKE_SYNTHETIC_MATCH_REGEX
    - TRAFFIC_DRAIN_MODE
    - TRAFFIC_DRAIN_WAIT_SECONDS
    - PRODUCTION_ALLOW_SINGLE_APP_NODE
    - ALLOW_IDENTICAL_PRODUCTION_APP_NODES
    - STAGING_SSH_KNOWN_HOSTS
    - PREPROD_SSH_KNOWN_HOSTS
    - STAGING_SSH_PORT
    - PREPROD_SSH_PORT
    - STAGING_SSH_USER
    - PREPROD_SSH_USER
    - STAGING_DEPLOY_ROOT
    - PREPROD_DEPLOY_ROOT
    - STAGING_HOST
    - PREPROD_HOST
    - STAGING_REMOTE_ENV_FILE
    - PREPROD_REMOTE_ENV_FILE
    - PRODUCTION_SSH_PORT
    - PROD_SSH_PORT
    - SSH_PORT
    - PRODUCTION_SSH_USER
    - PROD_SSH_USER
    - SSH_USER
    - PRODUCTION_SSH_KNOWN_HOSTS
    - PROD_SSH_KNOWN_HOSTS
    - SSH_KNOWN_HOSTS

# At least one of each group must appear as a literal in the target workflow (substring secrets.NAME)
secret_literal_groups:
  - id: staging_ssh_private_key
    workflow: *wf_staging
    any_of:
      - STAGING_SSH_KEY
      - STAGING_SSH_PRIVATE_KEY
      - PREPROD_SSH_KEY
      - PREPROD_SSH_PRIVATE_KEY
  - id: production_ssh_private_key
    workflow: *wf_prod
    any_of:
      - PRODUCTION_SSH_PRIVATE_KEY
      - PROD_SSH_KEY
      - SSH_KEY

# Operator / VPS .env only — must NOT be referenced as GitHub secrets in deploy workflows
# (if you need one in GHA, first update this contract and deployment-secrets.md)
vps_env_operator_keys:
  - DATABASE_URL
  - POSTGRES_PASSWORD
  - COMMERCE_PAYMENT_PROVIDER
  - REDIS_URL
  - REDIS_ADDR
  - NATS_URL
  - MQTT_BROKER_URL
  - OBJECT_STORAGE_BUCKET
  - OBJECT_STORAGE_ENDPOINT
  - OBJECT_STORAGE_REGION
  - OBJECT_STORAGE_ACCESS_KEY
  - OBJECT_STORAGE_SECRET_KEY
  - HTTP_AUTH_JWT_SECRET
  - GHCR_PULL_TOKEN
  - PAYMENT_WEBHOOK_SECRET
  - CADDY_ACME_EMAIL
  - EMQX_API_SECRET
  - MQTT_PASSWORD
  - AWS_SECRET_ACCESS_KEY

# Keys documented for observability or webhooks in .env examples but not in deploy workflows
optional_operator_integrations:
  - PAYMENT_ENV
  - COMMERCE_PAYMENT_WEBHOOK_HMAC_SECRET
  - RECONCILER_PAYMENT_PROBE_BEARER_TOKEN
  - OTEL_EXPORTER_OTLP_ENDPOINT

# Human inventory (operators / SOC2): authoritative runtime wiring stays on VPS .env examples — not Secrets.* with these bare names.
# GitHub workflows use prefixed names (PRODUCTION_* / STAGING_* or SSH_*) except where listed under github_actions.allowed_*.
runtime_binding_matrix:
  description: >-
    Requirement summary for DATABASE_URL, Redis, NATS, MQTT (EMQX), object storage (S3-compatible), JWT, payment — by surface.
    “Required” applies when that integration is enabled for the workload (e.g. READINESS_STRICT + Redis-required flags).
  local_dev:
    DATABASE_URL: {required_for: "postgres-backed APIs/tests when DATABASE_URL/.env wired", github_secret_equivalent: "none — developer machine only"}
    REDIS_URL: {required: optional, github_secret_equivalent: "none"}
    NATS_URL: {required: optionalUnlessFlaggedByConfig, github_secret_equivalent: "none"}
    MQTT_BROKER_URL: {required: optionalUnlessMachinePlane, github_secret_equivalent: "none"}
    OBJECT_STORAGE_STAR: {required: optionalUnlessAPI_ARTIFACTS_or_media, github_secret_equivalent: "none"}
    HTTP_AUTH_JWT_SECRET: {required: "typical locally", github_secret_equivalent: "none"}
    payment_secrets: {required: sandbox_for_staging_patterns, github_secret_equivalent: "never production PSP keys"}

  staging_vps_or_host_env:
    DATABASE_URL: {requiredOnHost: mandatory, github_secret_equivalent: "STAGING_REMOTE_ENV_FILE points to file on host — not secrets.DATABASE_URL"}
    REDIS_URL: {requiredOnHost: optional_or_managed}
    NATS_URL: {requiredOnHost: mandatory_when_self_hosted}
    MQTT_BROKER_URL_EMQX_ENDPOINT: {requiredOnHost: mandatory_for_device_plane_in_staging, topic_prefix_must_differ_from_prod: "avf/staging/devices"}
    OBJECT_STORAGE_STAR: {requiredOnHost: optional_if_media_artifacts_enabled}
    HTTP_AUTH_JWT_SECRET: {requiredOnHost: mandatory}
    payment_secrets: {requiredOnHost: "sandbox PSP keys only"}

  production_primary_two_app_nodes_or_managed:
    DATABASE_URL: {requiredOnHost: mandatory_managed_or_roll_your_own, github_secret_equivalent: "PRODUCTION_DATABASE_URL permitted only for manual/separation_gate validation — not app runtime injection from GHA"}
    REDIS_URL: {requiredOnHost: mandatory_in_APP_ENV_production, override_env_only: PRODUCTION_ALLOW_MISSING_REDIS, github_secret_equivalent: "none — VPS .env"}
    NATS_URL: {requiredOnHost: managed_or_data_node_fallback}
    MQTT_TLS_8883: {production_posture_tls_first: true}
    COMMERCE_PAYMENT_PROVIDER: {requiredOnHost: mandatory_live_psp_key_not_sandbox_family, note: "fail-fast at config load; keep aligned with PAYMENT_ENV=live"}
    OBJECT_STORAGE_STAR: {requiredOnHost: optional_media_path}
    HTTP_AUTH_JWT_SECRET: {requiredOnHost: mandatory_production_grade}
    payment_secrets: {requiredOnHost: live_PSP_credentials_in_host_env_only}

rollback_workflow:
  description: >-
    Rollback evidence workflow (rollback-prod.yml) uses environment production and digest-pinned refs only.
    It must not consume STAGING_* or PREPROD_* SSH/DB URLs; resolve prior images via production-deployment-manifest artifact or inputs.
