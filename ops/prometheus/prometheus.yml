# Sample Prometheus config (local/lab with deployments/docker --profile observability).
# Scrape targets use host.docker.internal so Prometheus (in Docker) can reach processes on the host.
# For each Go process set METRICS_ENABLED=true and bind metrics to 0.0.0.0:<port> (not 127.0.0.1)
# if Prometheus runs in a container, e.g. WORKER_METRICS_LISTEN=0.0.0.0:9091.
#
# Series reference: ops/METRICS.md
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: avf_api
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8080"]

  - job_name: avf_worker
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:9091"]

  - job_name: avf_reconciler
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:9092"]

  - job_name: avf_mqtt_ingest
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:9093"]

  - job_name: otel_collector
    static_configs:
      - targets: ["otel-collector:8889"]
