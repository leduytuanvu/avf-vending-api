# Lean staging stack: same artifact pattern as production, isolated under a staging project name.
# Copy .env.staging.example -> .env.staging and fill secrets + image refs before `docker compose up`.

name: avf-vending-staging

networks:
  edge:
    driver: bridge
  internal:
    driver: bridge
    internal: true

volumes:
  postgres_data:
  nats_data:
  emqx_data:
  caddy_data:
  caddy_config:

services:
  postgres:
    image: postgres:16-alpine
    container_name: avf-staging-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: avf_vending
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", 'pg_isready -U "$$POSTGRES_USER" -d avf_vending']
      interval: 10s
      timeout: 5s
      retries: 12
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 768M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nats:
    image: nats:2.10-alpine
    container_name: avf-staging-nats
    restart: unless-stopped
    command: ["-js", "-sd", "/data", "-m", "8222"]
    volumes:
      - nats_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8222/healthz >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  emqx:
    image: emqx/emqx:5.6.0
    container_name: avf-staging-emqx
    hostname: emqx
    restart: unless-stopped
    environment:
      EMQX_NAME: emqx
      EMQX_HOST: emqx
      EMQX_NODE__NAME: emqx@emqx
      EMQX_CLUSTER__DISCOVERY_STRATEGY: manual
      EMQX_DASHBOARD__DEFAULT_USERNAME: ${EMQX_DASHBOARD_USERNAME:?set EMQX_DASHBOARD_USERNAME in .env.staging}
      EMQX_DASHBOARD__DEFAULT_PASSWORD: ${EMQX_DASHBOARD_PASSWORD:?set EMQX_DASHBOARD_PASSWORD in .env.staging}
      EMQX_DASHBOARD__LISTENERS__HTTP__BIND: "127.0.0.1:18083"
      EMQX_LISTENERS__TCP__DEFAULT__BIND: "0.0.0.0:1883"
      EMQX_ALLOW_ANONYMOUS: "false"
      EMQX_AUTHENTICATION__1__MECHANISM: password_based
      EMQX_AUTHENTICATION__1__BACKEND: built_in_database
      EMQX_AUTHENTICATION__1__ENABLE: "true"
      EMQX_NODE__COOKIE: ${EMQX_NODE_COOKIE:?set EMQX_NODE_COOKIE in .env.staging}
    volumes:
      - ./emqx/base.hocon:/opt/emqx/etc/base.hocon:ro
      - ./emqx/default_api_key.conf:/opt/emqx/etc/default_api_key.conf:ro
      - ./emqx/certs:/opt/emqx/etc/certs:ro
      - emqx_data:/opt/emqx/data
    networks:
      internal:
        aliases:
          - emqx
      edge: {}
    ports:
      - "8883:8883"
      - "127.0.0.1:18083:18083"
    # Align Docker health with the management HTTP API (same class of signal as production).
    # `emqx_ctl` can report failures while the HTTP listener is already up.
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:18083/api/v5/status >/dev/null || wget -qO- http://127.0.0.1:18083/api/v5/status >/dev/null",
        ]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 768M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  api:
    image: ${APP_IMAGE_REF:?set APP_IMAGE_REF in .env.staging or via environment}
    container_name: avf-staging-api
    restart: unless-stopped
    command: ["/app/api"]
    env_file:
      - ${STAGING_ENV_FILE:-.env.staging}
    environment:
      MQTT_CLIENT_ID: ${MQTT_CLIENT_ID_API:?set MQTT_CLIENT_ID_API in .env.staging}
    networks:
      - internal
      - edge
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      emqx:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health/live"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "0.60"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  worker:
    image: ${APP_IMAGE_REF:?set APP_IMAGE_REF in .env.staging or via environment}
    container_name: avf-staging-worker
    restart: unless-stopped
    command: ["/app/worker"]
    env_file:
      - ${STAGING_ENV_FILE:-.env.staging}
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", 'read -r cmd </proc/1/comm && [ "$$cmd" = "worker" ]']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.35"
          memory: 384M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  mqtt-ingest:
    image: ${APP_IMAGE_REF:?set APP_IMAGE_REF in .env.staging or via environment}
    container_name: avf-staging-mqtt-ingest
    restart: unless-stopped
    command: ["/app/mqtt-ingest"]
    env_file:
      - ${STAGING_ENV_FILE:-.env.staging}
    environment:
      MQTT_CLIENT_ID: ${MQTT_CLIENT_ID_INGEST:?set MQTT_CLIENT_ID_INGEST in .env.staging}
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      emqx:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'read -r cmd </proc/1/comm && [ "$$cmd" = "mqtt-ingest" ]',
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  reconciler:
    image: ${APP_IMAGE_REF:?set APP_IMAGE_REF in .env.staging or via environment}
    container_name: avf-staging-reconciler
    restart: unless-stopped
    command: ["/app/reconciler"]
    env_file:
      - ${STAGING_ENV_FILE:-.env.staging}
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD-SHELL", 'read -r cmd </proc/1/comm && [ "$$cmd" = "reconciler" ]']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  migrate:
    image: ${GOOSE_IMAGE_REF:?set GOOSE_IMAGE_REF in .env.staging or via environment}
    container_name: avf-staging-migrate
    restart: "no"
    env_file:
      - ${STAGING_ENV_FILE:-.env.staging}
    networks:
      - internal
    volumes:
      - ../../migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint:
      [
        "/bin/sh",
        "-c",
        'exec /usr/local/bin/goose -dir /migrations postgres "$$DATABASE_URL" up',
      ]

  caddy:
    image: caddy:2.8-alpine
    container_name: avf-staging-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      API_DOMAIN: ${API_DOMAIN:-staging-api.ldtv.dev}
      CADDY_ACME_EMAIL: ${CADDY_ACME_EMAIL:?set CADDY_ACME_EMAIL in .env.staging for ACME}
      UPSTREAM_API: ${UPSTREAM_API:-api:8080}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - edge
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.15"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
