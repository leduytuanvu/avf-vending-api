services:
  api:
    environment:
      METRICS_ENABLED: "true"

  worker:
    environment:
      METRICS_ENABLED: "true"
      WORKER_METRICS_LISTEN: 0.0.0.0:9091

  reconciler:
    environment:
      METRICS_ENABLED: "true"
      RECONCILER_METRICS_LISTEN: 0.0.0.0:9092

  mqtt-ingest:
    environment:
      METRICS_ENABLED: "true"
      MQTT_INGEST_METRICS_LISTEN: 0.0.0.0:9093

  prometheus:
    image: prom/prometheus:v3.0.1
    container_name: avf-prod-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - internal
    depends_on:
      api:
        condition: service_started
      worker:
        condition: service_started
      reconciler:
        condition: service_started
      mqtt-ingest:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "0.35"
          memory: 384M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  loki:
    image: grafana/loki:3.0.1
    container_name: avf-prod-loki
    restart: unless-stopped
    command: ["-config.file=/etc/loki/config.yml"]
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./observability/loki/config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  promtail:
    image: grafana/promtail:3.0.1
    container_name: avf-prod-promtail
    restart: unless-stopped
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - ./observability/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail_positions:/var/lib/promtail
    networks:
      - internal
    depends_on:
      loki:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "0.15"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  grafana:
    image: grafana/grafana:11.4.0
    container_name: avf-prod-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-CHANGE_ME_GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-CHANGE_ME_GRAFANA_ADMIN_PASSWORD}
      GF_USERS_DEFAULT_THEME: dark
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - internal
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  prometheus_data:
  loki_data:
  grafana_data:
  promtail_positions:
