global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: blackbox_exporter
    static_configs:
      - targets: ["blackbox-exporter:9115"]

  - job_name: loki
    static_configs:
      - targets: ["loki:3100"]

  - job_name: promtail
    static_configs:
      - targets: ["promtail:9080"]

  - job_name: node_exporter
    static_configs:
      - targets:
          - "app-node-a.internal.example.com:9100"
          - "app-node-b.internal.example.com:9100"
          - "data-node.internal.example.com:9100"

  - job_name: avf_api_metrics
    metrics_path: /metrics
    static_configs:
      - targets: ["app-node-a.internal.example.com:8081"]
        labels:
          node: app-node-a
          role: app-node
      - targets: ["app-node-b.internal.example.com:8081"]
        labels:
          node: app-node-b
          role: app-node

  - job_name: avf_worker_metrics
    metrics_path: /metrics
    static_configs:
      - targets: ["app-node-a.internal.example.com:9091"]
        labels:
          node: app-node-a
          role: app-node
      - targets: ["app-node-b.internal.example.com:9091"]
        labels:
          node: app-node-b
          role: app-node

  - job_name: avf_reconciler_metrics
    metrics_path: /metrics
    static_configs:
      - targets: ["app-node-a.internal.example.com:9092"]
        labels:
          node: app-node-a
          role: app-node

  - job_name: avf_mqtt_ingest_metrics
    metrics_path: /metrics
    static_configs:
      - targets: ["app-node-a.internal.example.com:9093"]
        labels:
          node: app-node-a
          role: app-node

  - job_name: avf_public_api_https
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets: ["https://api.ldtv.dev/health/ready"]
        labels:
          target_kind: public-edge
          component: api
          node: load-balanced
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: avf_app_readiness
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets: ["http://app-node-a.internal.example.com:8081/health/ready"]
        labels:
          node: app-node-a
          role: app-node
          component: api
      - targets: ["http://app-node-b.internal.example.com:8081/health/ready"]
        labels:
          node: app-node-b
          role: app-node
          component: api
      - targets: ["http://app-node-a.internal.example.com:9091/health/ready"]
        labels:
          node: app-node-a
          role: app-node
          component: worker
      - targets: ["http://app-node-b.internal.example.com:9091/health/ready"]
        labels:
          node: app-node-b
          role: app-node
          component: worker
      - targets: ["http://app-node-a.internal.example.com:9092/health/ready"]
        labels:
          node: app-node-a
          role: app-node
          component: reconciler
      - targets: ["http://app-node-a.internal.example.com:9093/health/ready"]
        labels:
          node: app-node-a
          role: app-node
          component: mqtt-ingest
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: avf_data_node_http
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets: ["http://data-node.internal.example.com:8222/healthz"]
        labels:
          node: data-node
          role: data-node
          component: nats-healthz
      - targets: ["http://data-node.internal.example.com:18083/api/v5/status"]
        labels:
          node: data-node
          role: data-node
          component: emqx-status
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: avf_data_node_tcp
    metrics_path: /probe
    params:
      module: [tcp_connect]
    static_configs:
      - targets: ["data-node.internal.example.com:4222"]
        labels:
          node: data-node
          role: data-node
          component: nats-tcp
      - targets: ["data-node.internal.example.com:8883"]
        labels:
          node: data-node
          role: data-node
          component: mqtt-tls
      - targets: ["data-node.internal.example.com:5432"]
        labels:
          node: data-node
          role: data-node
          component: postgres-tcp
      - targets: ["data-node.internal.example.com:6379"]
        labels:
          node: data-node
          role: data-node
          component: redis-tcp
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
