global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: avf_api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8080"]

  - job_name: avf_worker
    metrics_path: /metrics
    static_configs:
      - targets: ["worker:9091"]

  - job_name: avf_reconciler
    metrics_path: /metrics
    static_configs:
      - targets: ["reconciler:9092"]

  - job_name: avf_mqtt_ingest
    metrics_path: /metrics
    static_configs:
      - targets: ["mqtt-ingest:9093"]

  - job_name: promtail
    static_configs:
      - targets: ["promtail:9080"]

  - job_name: loki
    static_configs:
      - targets: ["loki:3100"]
