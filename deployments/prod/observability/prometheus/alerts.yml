groups:
  - name: avf-edge-and-readiness
    rules:
      - alert: AVFPublicAPIHTTPSDown
        expr: probe_success{job="avf_public_api_https"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Public API HTTPS probe failed"
          description: "The public API health endpoint is not reachable over HTTPS."
          first_action: "Check app-node Caddy health, recent deploy activity, DNS/TLS, and load balancer routing."

      - alert: AVFAPIInstanceMetricsDown
        expr: up{job="avf_api_metrics"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "API metrics scrape failed on {{ $labels.node }}"
          description: "Prometheus cannot scrape the API ops endpoint on {{ $labels.instance }}."
          first_action: "Check the app node is exposing 8081 privately and that cmd/api is healthy."

      - alert: AVFAppReadinessFailed
        expr: probe_success{job="avf_app_readiness"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.component }} readiness failed on {{ $labels.node }}"
          description: "The private readiness probe for {{ $labels.component }} on {{ $labels.node }} is failing."
          first_action: "Check the service logs on the affected node and confirm the recent release did not leave the node out of rotation."

      - alert: AVFDeployUnhealthy
        expr: sum by (node) (probe_success{job="avf_app_readiness"} == 0) >= 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "One or more app services remain unhealthy on {{ $labels.node }}"
          description: "At least one private readiness endpoint on {{ $labels.node }} is still failing."
          first_action: "If a deploy is active, stop before moving traffic or continuing to the next node."

      - alert: AVFDatabaseConnectivityLikelyFailed
        expr: sum by (node) (probe_success{job="avf_app_readiness", component=~"api|worker|reconciler|mqtt-ingest"} == 0) >= 3
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "Database connectivity likely failed on {{ $labels.node }}"
          description: "Multiple Postgres-dependent processes on {{ $labels.node }} are failing readiness at the same time."
          first_action: "Verify Postgres reachability and credentials from the affected node before restarting services."

  - name: avf-queue-and-ingest
    rules:
      - alert: AVFWorkerOutboxLagHigh
        expr: max(avf_worker_outbox_oldest_pending_age_seconds{job="avf_worker_metrics"}) > 300
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Worker outbox lag is high"
          description: "The oldest unpublished outbox item has been waiting for more than 5 minutes."
          first_action: "Check worker logs, NATS reachability, and whether publish failures are increasing."

      - alert: AVFWorkerPublishFailuresHigh
        expr: sum(rate(avf_worker_outbox_dispatch_publish_failed_total{job="avf_worker_metrics"}[10m])) > 0.1
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Worker publish failures are sustained"
          description: "Outbox publish failures are occurring continuously over the last 10 minutes."
          first_action: "Check NATS or downstream broker health, credentials, and stream availability."

      - alert: AVFTelemetryQueueLagHigh
        expr: max(avf_telemetry_consumer_lag{job="avf_worker_metrics"}) > 2000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Telemetry JetStream consumer lag is high"
          description: "At least one telemetry durable consumer backlog exceeds 2000 pending messages."
          first_action: "Check worker health, JetStream capacity, and whether mqtt-ingest is producing faster than projection can drain."

      - alert: AVFTelemetryProjectionDBFailures
        expr: max(avf_telemetry_projection_db_fail_consecutive_max{job="avf_worker_metrics"}) >= 3
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Telemetry projection is repeatedly failing DB work"
          description: "The telemetry projection worker is hitting repeated database failures."
          first_action: "Check Postgres health and recent worker logs for projection or transaction errors."

      - alert: AVFMQTTIngestErrorRateHigh
        expr: sum(rate(avf_mqtt_ingest_dispatch_total{job="avf_mqtt_ingest_metrics", result="error"}[10m])) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "MQTT ingest error rate is elevated"
          description: "MQTT ingest is recording more than 1 error per second over the last 10 minutes."
          first_action: "Check mqtt-ingest logs first, then verify broker health and recent payload/schema issues."

      - alert: AVFMQTTIngestReadinessFlapping
        expr: changes(probe_success{job="avf_app_readiness", component="mqtt-ingest"}[15m]) > 2
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "MQTT ingest readiness is flapping"
          description: "The mqtt-ingest readiness probe has toggled repeatedly in the last 15 minutes."
          first_action: "Treat this as a likely broker connectivity or deploy stability issue and inspect mqtt-ingest plus broker logs."

  - name: avf-data-node-and-host
    rules:
      - alert: AVFNATSDown
        expr: probe_success{job="avf_data_node_http", component="nats-healthz"} == 0 or probe_success{job="avf_data_node_tcp", component="nats-tcp"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "NATS on the data node is down"
          description: "The data-node NATS health or TCP probe is failing."
          first_action: "Check the data-node NATS container, disk pressure, and app-node connectivity to port 4222."

      - alert: AVFEMQXDown
        expr: probe_success{job="avf_data_node_http", component="emqx-status"} == 0 or probe_success{job="avf_data_node_tcp", component="mqtt-tls"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "EMQX on the data node is down"
          description: "The data-node EMQX status endpoint or MQTT/TLS port is failing."
          first_action: "Check EMQX process health, certificate files, and whether 8883 is still reachable from devices and app nodes."

      - alert: AVFHostMemoryPressure
        expr: (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) < 0.10
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Host memory pressure on {{ $labels.instance }}"
          description: "Available memory is below 10 percent on {{ $labels.instance }}."
          first_action: "Check container memory growth, recent deploys, and whether any service needs scaling or restart."

      - alert: AVFHostDiskPressure
        expr: (node_filesystem_avail_bytes{mountpoint="/", fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{mountpoint="/", fstype!~"tmpfs|overlay"}) < 0.10
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Host disk pressure on {{ $labels.instance }}"
          description: "Root filesystem free space is below 10 percent on {{ $labels.instance }}."
          first_action: "Check Docker logs, Prometheus/Loki retention growth, and any unexpected data-node storage growth."

  # Telemetry SLO / replay storm (metric names from internal/app/telemetryapp/*_prom.go).
  # Tune thresholds per fleet; see docs/runbooks/production-observability-alerts.md
  - name: avf-telemetry-pressure-and-correctness
    rules:
      - alert: AVFTelemetryIngestQueueDepthHigh
        expr: avg(avf_telemetry_ingest_queue_depth{job="avf_mqtt_ingest_metrics"}) > 200
        for: 10m
        labels:
          severity: warning
          priority: P1
        annotations:
          summary: "MQTT ingest bounded queue is persistently deep"
          description: "Average telemetry_ingest_queue_depth exceeds 200 for 10m (default TELEMETRY_GLOBAL_MAX_INFLIGHT often 256)."
          runbook: "docs/runbooks/production-observability-alerts.md#avftelemetryingestqueuedepthhigh"

      - alert: AVFTelemetryDroppableDropsElevated
        expr: sum(rate(avf_telemetry_ingest_dropped_total{job="avf_mqtt_ingest_metrics",reason="droppable_queue_full"}[10m])) > 5
        for: 15m
        labels:
          severity: warning
          priority: P1
        annotations:
          summary: "Droppable telemetry is being dropped under queue pressure"
          description: "Sustained droppable_queue_full drops — typical during replay storms or undersized TELEMETRY_GLOBAL_MAX_INFLIGHT."
          runbook: "docs/runbooks/production-observability-alerts.md#avftelemetrydroppabledropselevated"

      - alert: AVFTelemetryCriticalIngressRejected
        expr: sum(rate(avf_telemetry_ingest_rejected_total{job="avf_mqtt_ingest_metrics",reason=~"critical_queue_full|critical_queue_full_timeout|critical_missing_idempotency_identity"}[5m])) > 0.02
        for: 5m
        labels:
          severity: critical
          priority: P0
        annotations:
          summary: "Critical-path telemetry is being rejected at mqtt-ingest"
          description: "Rejects for critical queue pressure or missing idempotency identity — data loss risk for audit-critical events."
          runbook: "docs/runbooks/production-observability-alerts.md#avftelemetrycriticalingressrejected"

      - alert: AVFTelemetryCriticalMissingIdentity
        expr: increase(avf_telemetry_ingest_critical_missing_identity_total{job="avf_mqtt_ingest_metrics"}[15m]) > 0
        for: 1m
        labels:
          severity: critical
          priority: P0
        annotations:
          summary: "Critical telemetry reached JetStream bridge without dedupe identity"
          description: "avf_telemetry_ingest_critical_missing_identity_total increased — device payloads missing event_id / dedupe_key / boot_id+seq."
          runbook: "docs/runbooks/production-observability-alerts.md#avftelemetrycriticalmissingidentity"

      - alert: AVFTelemetryRateLimitedSpike
        expr: sum(rate(avf_telemetry_ingest_rate_limited_total{job="avf_mqtt_ingest_metrics"}[10m])) > 10
        for: 15m
        labels:
          severity: warning
          priority: P2
        annotations:
          summary: "Per-machine telemetry rate limits are firing frequently"
          description: "Token-bucket denials suggest replay storm or TELEMETRY_PER_MACHINE_* too tight for legitimate bursts."
          runbook: "docs/runbooks/production-observability-alerts.md#avftelemetryratelimitedspike"

      - alert: AVFTelemetryJetStreamPublishFailures
        expr: sum(rate(avf_telemetry_ingest_publish_failures_total{job="avf_mqtt_ingest_metrics"}[10m])) > 0.05
        for: 5m
        labels:
          severity: critical
          priority: P0
        annotations:
          summary: "JetStream publish failures from mqtt-ingest bridge"
          description: "NATS/JetStream publish path failing — backlog and device retries likely."
          runbook: "docs/runbooks/production-observability-alerts.md#avftelemetryjetstreampublishfailures"

      - alert: AVFTelemetryHandlerRejectRate
        expr: sum(rate(avf_telemetry_ingest_rejected_total{job="avf_mqtt_ingest_metrics",reason="handler_error"}[10m])) > 0.5
        for: 10m
        labels:
          severity: warning
          priority: P1
        annotations:
          summary: "Elevated handler_error rejects during critical inline ingest"
          description: "Critical sync path failures (e.g. bridge/validation) — inspect mqtt-ingest logs."
          runbook: "docs/runbooks/production-observability-alerts.md#avftelemetryhandlerrejectrate"

      - alert: AVFTelemetryConsumerLagCritical
        expr: max(avf_telemetry_consumer_lag{job="avf_worker_metrics"}) > 10000
        for: 15m
        labels:
          severity: critical
          priority: P0
        annotations:
          summary: "Telemetry JetStream lag is critically high"
          description: "At least one durable consumer NumPending exceeds 10000 for 15m — replay storm or worker saturation."
          runbook: "docs/runbooks/production-observability-alerts.md#avftelemetryconsumerlagcritical"

      - alert: AVFTelemetryProjectionHandlerErrors
        expr: sum(rate(avf_telemetry_projection_failures_total{job="avf_worker_metrics",reason="handler_err"}[10m])) > 0.2
        for: 10m
        labels:
          severity: warning
          priority: P1
        annotations:
          summary: "Telemetry projection handler errors are sustained"
          description: "handler_err counter rate high — Postgres/handler failures causing Naks/redelivery."
          runbook: "docs/runbooks/production-observability-alerts.md#avftelemetryprojectionhandlererrors"

      - alert: AVFTelemetryDuplicateReplayPressure
        expr: sum(rate(avf_telemetry_duplicate_total{job="avf_worker_metrics",reason=~"stream_seq|idempotency_replay"}[15m])) > 25
        for: 20m
        labels:
          severity: warning
          priority: P2
        annotations:
          summary: "High duplicate/replay suppression at projection (JetStream redelivery pressure proxy)"
          description: "stream_seq or idempotency_replay duplicates rising — often broker redelivery or consumer restarts; not 1:1 broker redelivery count."
          runbook: "docs/runbooks/production-observability-alerts.md#avftelemetryduplicatereplaypressure"

      - alert: AVFTelemetryIdempotencyConflict
        expr: increase(avf_telemetry_idempotency_conflict_total{job="avf_worker_metrics"}[10m]) > 0
        for: 1m
        labels:
          severity: critical
          priority: P0
        annotations:
          summary: "Idempotency key reused with different payload (duplicate critical business-effect risk)"
          description: "avf_telemetry_idempotency_conflict_total increased — same idempotency_key, different payload hash."
          runbook: "docs/runbooks/production-observability-alerts.md#avftelemetryidempotencyconflict"

  - name: avf-reconciler-commerce
    rules:
      - alert: AVFReconcilerPaymentProbeFailures
        expr: increase(avf_reconciler_job_failures_total{job="avf_reconciler_metrics",reconciler_job="payment_provider_probe"}[30m]) >= 3
        for: 1m
        labels:
          severity: warning
          priority: P1
        annotations:
          summary: "Payment provider probe job reporting row failures"
          description: "Failures in payment_provider_probe reconciliation ticks — PSP or DB read issues."
          runbook: "docs/runbooks/production-observability-alerts.md#avfreconcilerpaymentprobefailures"

      - alert: AVFReconcilerRefundReviewFailures
        expr: increase(avf_reconciler_job_failures_total{job="avf_reconciler_metrics",reconciler_job="refund_review"}[30m]) >= 1
        for: 1m
        labels:
          severity: warning
          priority: P1
        annotations:
          summary: "Refund review reconciler reporting failures"
          description: "refund_review job_failures_total increased — inspect reconciler logs and refund pipeline."
          runbook: "docs/runbooks/production-observability-alerts.md#avfreconcilerrefundreviewfailures"

      - alert: AVFReconcilerDuplicatePaymentEnqueueFailures
        expr: increase(avf_reconciler_job_failures_total{job="avf_reconciler_metrics",reconciler_job="duplicate_payments"}[30m]) >= 3
        for: 1m
        labels:
          severity: warning
          priority: P1
        annotations:
          summary: "Duplicate payment recovery enqueue failures"
          description: "duplicate_payments job failures — NATS/workflow enqueue or read path errors."
          runbook: "docs/runbooks/production-observability-alerts.md#avfreconcilerduplicatepaymentenqueuefailures"

      - alert: AVFReconcilerVendStuckCycleErrors
        expr: increase(avf_reconciler_cycle_completions_total{job="avf_reconciler_metrics",reconciler_job="vend_stuck",result="error"}[1h]) >= 3
        for: 1m
        labels:
          severity: warning
          priority: P1
        annotations:
          summary: "Vend stuck reconciler cycles completing with error"
          description: "vend_stuck tick errors (DB/list failures) — not the same as stuck row count."
          runbook: "docs/runbooks/production-observability-alerts.md#avfreconcilervendstuckcycleerrors"
