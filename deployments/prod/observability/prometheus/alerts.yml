groups:
  - name: avf-edge-and-readiness
    rules:
      - alert: AVFPublicAPIHTTPSDown
        expr: probe_success{job="avf_public_api_https"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Public API HTTPS probe failed"
          description: "The public API health endpoint is not reachable over HTTPS."
          first_action: "Check app-node Caddy health, recent deploy activity, DNS/TLS, and load balancer routing."

      - alert: AVFAPIInstanceMetricsDown
        expr: up{job="avf_api_metrics"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "API metrics scrape failed on {{ $labels.node }}"
          description: "Prometheus cannot scrape the API ops endpoint on {{ $labels.instance }}."
          first_action: "Check the app node is exposing 8081 privately and that cmd/api is healthy."

      - alert: AVFAppReadinessFailed
        expr: probe_success{job="avf_app_readiness"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.component }} readiness failed on {{ $labels.node }}"
          description: "The private readiness probe for {{ $labels.component }} on {{ $labels.node }} is failing."
          first_action: "Check the service logs on the affected node and confirm the recent release did not leave the node out of rotation."

      - alert: AVFDeployUnhealthy
        expr: sum by (node) (probe_success{job="avf_app_readiness"} == 0) >= 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "One or more app services remain unhealthy on {{ $labels.node }}"
          description: "At least one private readiness endpoint on {{ $labels.node }} is still failing."
          first_action: "If a deploy is active, stop before moving traffic or continuing to the next node."

      - alert: AVFDatabaseConnectivityLikelyFailed
        expr: sum by (node) (probe_success{job="avf_app_readiness", component=~"api|worker|reconciler|mqtt-ingest"} == 0) >= 3
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "Database connectivity likely failed on {{ $labels.node }}"
          description: "Multiple Postgres-dependent processes on {{ $labels.node }} are failing readiness at the same time."
          first_action: "Verify Postgres reachability and credentials from the affected node before restarting services."

  - name: avf-queue-and-ingest
    rules:
      - alert: AVFWorkerOutboxLagHigh
        expr: max(avf_worker_outbox_oldest_pending_age_seconds{job="avf_worker_metrics"}) > 300
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Worker outbox lag is high"
          description: "The oldest unpublished outbox item has been waiting for more than 5 minutes."
          first_action: "Check worker logs, NATS reachability, and whether publish failures are increasing."

      - alert: AVFWorkerPublishFailuresHigh
        expr: sum(rate(avf_worker_outbox_dispatch_publish_failed_total{job="avf_worker_metrics"}[10m])) > 0.1
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Worker publish failures are sustained"
          description: "Outbox publish failures are occurring continuously over the last 10 minutes."
          first_action: "Check NATS or downstream broker health, credentials, and stream availability."

      - alert: AVFTelemetryQueueLagHigh
        expr: max(avf_telemetry_consumer_lag{job="avf_worker_metrics"}) > 2000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Telemetry JetStream consumer lag is high"
          description: "At least one telemetry durable consumer backlog exceeds 2000 pending messages."
          first_action: "Check worker health, JetStream capacity, and whether mqtt-ingest is producing faster than projection can drain."

      - alert: AVFTelemetryProjectionDBFailures
        expr: max(avf_telemetry_projection_db_fail_consecutive_max{job="avf_worker_metrics"}) >= 3
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Telemetry projection is repeatedly failing DB work"
          description: "The telemetry projection worker is hitting repeated database failures."
          first_action: "Check Postgres health and recent worker logs for projection or transaction errors."

      - alert: AVFMQTTIngestErrorRateHigh
        expr: sum(rate(avf_mqtt_ingest_dispatch_total{job="avf_mqtt_ingest_metrics", result="error"}[10m])) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "MQTT ingest error rate is elevated"
          description: "MQTT ingest is recording more than 1 error per second over the last 10 minutes."
          first_action: "Check mqtt-ingest logs first, then verify broker health and recent payload/schema issues."

      - alert: AVFMQTTIngestReadinessFlapping
        expr: changes(probe_success{job="avf_app_readiness", component="mqtt-ingest"}[15m]) > 2
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "MQTT ingest readiness is flapping"
          description: "The mqtt-ingest readiness probe has toggled repeatedly in the last 15 minutes."
          first_action: "Treat this as a likely broker connectivity or deploy stability issue and inspect mqtt-ingest plus broker logs."

  - name: avf-data-node-and-host
    rules:
      - alert: AVFNATSDown
        expr: probe_success{job="avf_data_node_http", component="nats-healthz"} == 0 or probe_success{job="avf_data_node_tcp", component="nats-tcp"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "NATS on the data node is down"
          description: "The data-node NATS health or TCP probe is failing."
          first_action: "Check the data-node NATS container, disk pressure, and app-node connectivity to port 4222."

      - alert: AVFEMQXDown
        expr: probe_success{job="avf_data_node_http", component="emqx-status"} == 0 or probe_success{job="avf_data_node_tcp", component="mqtt-tls"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "EMQX on the data node is down"
          description: "The data-node EMQX status endpoint or MQTT/TLS port is failing."
          first_action: "Check EMQX process health, certificate files, and whether 8883 is still reachable from devices and app nodes."

      - alert: AVFHostMemoryPressure
        expr: (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) < 0.10
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Host memory pressure on {{ $labels.instance }}"
          description: "Available memory is below 10 percent on {{ $labels.instance }}."
          first_action: "Check container memory growth, recent deploys, and whether any service needs scaling or restart."

      - alert: AVFHostDiskPressure
        expr: (node_filesystem_avail_bytes{mountpoint="/", fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{mountpoint="/", fstype!~"tmpfs|overlay"}) < 0.10
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Host disk pressure on {{ $labels.instance }}"
          description: "Root filesystem free space is below 10 percent on {{ $labels.instance }}."
          first_action: "Check Docker logs, Prometheus/Loki retention growth, and any unexpected data-node storage growth."

  # Telemetry SLO / replay storm (metric names from internal/app/telemetryapp/*_prom.go).
  # Tune thresholds per fleet; see docs/runbooks/production-observability-alerts.md
  - name: avf-telemetry-pressure-and-correctness
    rules:
      - alert: AVFTelemetryIngestQueueDepthHigh
        expr: avg(avf_telemetry_ingest_queue_depth{job="avf_mqtt_ingest_metrics"}) > 200
        for: 10m
        labels:
          severity: warning
          priority: P1
        annotations:
          summary: "MQTT ingest bounded queue is persistently deep"
          description: "Average telemetry_ingest_queue_depth exceeds 200 for 10m (default TELEMETRY_GLOBAL_MAX_INFLIGHT often 256)."
          runbook: "docs/runbooks/production-observability-alerts.md#avftelemetryingestqueuedepthhigh"

      - alert: AVFTelemetryDroppableDropsElevated
        expr: sum(rate(avf_telemetry_ingest_dropped_total{job="avf_mqtt_ingest_metrics",reason="droppable_queue_full"}[10m])) > 5
        for: 15m
        labels:
          severity: warning
          priority: P1
        annotations:
          summary: "Droppable telemetry is being dropped under queue pressure"
          description: "Sustained droppable_queue_full drops — typical during replay storms or undersized TELEMETRY_GLOBAL_MAX_INFLIGHT."
          runbook: "docs/runbooks/production-observability-alerts.md#avftelemetrydroppabledropselevated"

      - alert: AVFTelemetryCriticalIngressRejected
        expr: sum(rate(avf_telemetry_ingest_rejected_total{job="avf_mqtt_ingest_metrics",reason=~"critical_queue_full|critical_queue_full_timeout|critical_missing_idempotency_identity"}[5m])) > 0.02
        for: 5m
        labels:
          severity: critical
          priority: P0
        annotations:
          summary: "Critical-path telemetry is being rejected at mqtt-ingest"
          description: "Rejects for critical queue pressure or missing idempotency identity — data loss risk for audit-critical events."
          runbook: "docs/runbooks/production-observability-alerts.md#avftelemetrycriticalingressrejected"

      - alert: AVFTelemetryCriticalMissingIdentity
        expr: increase(avf_telemetry_ingest_critical_missing_identity_total{job="avf_mqtt_ingest_metrics"}[15m]) > 0
        for: 1m
        labels:
          severity: critical
          priority: P0
        annotations:
          summary: "Critical telemetry reached JetStream bridge without dedupe identity"
          description: "avf_telemetry_ingest_critical_missing_identity_total increased — device payloads missing event_id / dedupe_key / boot_id+seq."
          runbook: "docs/runbooks/production-observability-alerts.md#avftelemetrycriticalmissingidentity"

      - alert: AVFTelemetryRateLimitedSpike
        expr: sum(rate(avf_telemetry_ingest_rate_limited_total{job="avf_mqtt_ingest_metrics"}[10m])) > 10
        for: 15m
        labels:
          severity: warning
          priority: P2
        annotations:
          summary: "Per-machine telemetry rate limits are firing frequently"
          description: "Token-bucket denials suggest replay storm or TELEMETRY_PER_MACHINE_* too tight for legitimate bursts."
          runbook: "docs/runbooks/production-observability-alerts.md#avftelemetryratelimitedspike"

      - alert: AVFTelemetryJetStreamPublishFailures
        expr: sum(rate(avf_telemetry_ingest_publish_failures_total{job="avf_mqtt_ingest_metrics"}[10m])) > 0.05
        for: 5m
        labels:
          severity: critical
          priority: P0
        annotations:
          summary: "JetStream publish failures from mqtt-ingest bridge"
          description: "NATS/JetStream publish path failing — backlog and device retries likely."
          runbook: "docs/runbooks/production-observability-alerts.md#avftelemetryjetstreampublishfailures"

      - alert: AVFTelemetryHandlerRejectRate
        expr: sum(rate(avf_telemetry_ingest_rejected_total{job="avf_mqtt_ingest_metrics",reason="handler_error"}[10m])) > 0.5
        for: 10m
        labels:
          severity: warning
          priority: P1
        annotations:
          summary: "Elevated handler_error rejects during critical inline ingest"
          description: "Critical sync path failures (e.g. bridge/validation) — inspect mqtt-ingest logs."
          runbook: "docs/runbooks/production-observability-alerts.md#avftelemetryhandlerrejectrate"

      - alert: AVFTelemetryConsumerLagCritical
        expr: max(avf_telemetry_consumer_lag{job="avf_worker_metrics"}) > 10000
        for: 15m
        labels:
          severity: critical
          priority: P0
        annotations:
          summary: "Telemetry JetStream lag is critically high"
          description: "At least one durable consumer NumPending exceeds 10000 for 15m — replay storm or worker saturation."
          runbook: "docs/runbooks/production-observability-alerts.md#avftelemetryconsumerlagcritical"

      - alert: AVFTelemetryProjectionHandlerErrors
        expr: sum(rate(avf_telemetry_projection_failures_total{job="avf_worker_metrics",reason="handler_err"}[10m])) > 0.2
        for: 10m
        labels:
          severity: warning
          priority: P1
        annotations:
          summary: "Telemetry projection handler errors are sustained"
          description: "handler_err counter rate high — Postgres/handler failures causing Naks/redelivery."
          runbook: "docs/runbooks/production-observability-alerts.md#avftelemetryprojectionhandlererrors"

      - alert: AVFTelemetryDuplicateReplayPressure
        expr: sum(rate(avf_telemetry_duplicate_total{job="avf_worker_metrics",reason=~"stream_seq|idempotency_replay"}[15m])) > 25
        for: 20m
        labels:
          severity: warning
          priority: P2
        annotations:
          summary: "High duplicate/replay suppression at projection (JetStream redelivery pressure proxy)"
          description: "stream_seq or idempotency_replay duplicates rising — often broker redelivery or consumer restarts; not 1:1 broker redelivery count."
          runbook: "docs/runbooks/production-observability-alerts.md#avftelemetryduplicatereplaypressure"

      - alert: AVFTelemetryIdempotencyConflict
        expr: increase(avf_telemetry_idempotency_conflict_total{job="avf_worker_metrics"}[10m]) > 0
        for: 1m
        labels:
          severity: critical
          priority: P0
        annotations:
          summary: "Idempotency key reused with different payload (duplicate critical business-effect risk)"
          description: "avf_telemetry_idempotency_conflict_total increased — same idempotency_key, different payload hash."
          runbook: "docs/runbooks/production-observability-alerts.md#avftelemetryidempotencyconflict"

  - name: avf-reconciler-commerce
    rules:
      - alert: AVFReconcilerPaymentProbeFailures
        expr: increase(avf_reconciler_job_failures_total{job="avf_reconciler_metrics",reconciler_job="payment_provider_probe"}[30m]) >= 3
        for: 1m
        labels:
          severity: warning
          priority: P1
        annotations:
          summary: "Payment provider probe job reporting row failures"
          description: "Failures in payment_provider_probe reconciliation ticks — PSP or DB read issues."
          runbook: "docs/runbooks/production-observability-alerts.md#avfreconcilerpaymentprobefailures"

      - alert: AVFReconcilerRefundReviewFailures
        expr: increase(avf_reconciler_job_failures_total{job="avf_reconciler_metrics",reconciler_job="refund_review"}[30m]) >= 1
        for: 1m
        labels:
          severity: warning
          priority: P1
        annotations:
          summary: "Refund review reconciler reporting failures"
          description: "refund_review job_failures_total increased — inspect reconciler logs and refund pipeline."
          runbook: "docs/runbooks/production-observability-alerts.md#avfreconcilerrefundreviewfailures"

      - alert: AVFReconcilerDuplicatePaymentEnqueueFailures
        expr: increase(avf_reconciler_job_failures_total{job="avf_reconciler_metrics",reconciler_job="duplicate_payments"}[30m]) >= 3
        for: 1m
        labels:
          severity: warning
          priority: P1
        annotations:
          summary: "Duplicate payment recovery enqueue failures"
          description: "duplicate_payments job failures — NATS/workflow enqueue or read path errors."
          runbook: "docs/runbooks/production-observability-alerts.md#avfreconcilerduplicatepaymentenqueuefailures"

      - alert: AVFReconcilerVendStuckCycleErrors
        expr: increase(avf_reconciler_cycle_completions_total{job="avf_reconciler_metrics",reconciler_job="vend_stuck",result="error"}[1h]) >= 3
        for: 1m
        labels:
          severity: warning
          priority: P1
        annotations:
          summary: "Vend stuck reconciler cycles completing with error"
          description: "vend_stuck tick errors (DB/list failures) — not the same as stuck row count."
          runbook: "docs/runbooks/production-observability-alerts.md#avfreconcilervendstuckcycleerrors"

  - name: avf-vending-production-operations
    rules:
      - alert: AVFAPIHigh5xxRate
        expr: sum(rate(http_requests_total{job="avf_api_metrics",status=~"5.."}[5m])) / clamp_min(sum(rate(http_requests_total{job="avf_api_metrics"}[5m])), 1) > 0.05
        for: 10m
        labels:
          severity: critical
          priority: P0
        annotations:
          summary: "API 5xx rate is above 5%"
          description: "HTTP 5xx responses are elevated (canonical metric http_requests_total on job avf_api_metrics)."
          runbook: "docs/runbooks/observability-alerts.md#api-high-5xx-rate"

      - alert: AVFGRPCHighErrorRate
        expr: sum(rate(grpc_errors_total{job="avf_api_metrics"}[5m])) / clamp_min(sum(rate(grpc_requests_total{job="avf_api_metrics"}[5m])), 1) > 0.05
        for: 10m
        labels:
          severity: critical
          priority: P0
        annotations:
          summary: "gRPC error rate is above 5%"
          description: "Non-OK gRPC responses (grpc_errors_total vs grpc_requests_total) on the API metrics scrape."
          runbook: "docs/runbooks/observability-alerts.md#grpc-high-error-rate"

      - alert: AVFGRPCHighLatencyP99
        expr: histogram_quantile(0.99, sum(rate(grpc_request_duration_seconds_bucket{job="avf_api_metrics",grpc_code="OK"}[5m])) by (le)) > 3 and sum(rate(grpc_requests_total{job="avf_api_metrics"}[5m])) > 0.5
        for: 15m
        labels:
          severity: warning
          priority: P1
        annotations:
          summary: "gRPC OK-path latency p99 is high"
          description: "99th percentile unary duration for successful RPCs exceeds 3s over 15m — check Postgres, idempotency ledger, and handler hot paths."
          runbook: "docs/runbooks/observability-alerts.md#grpc-high-latency-p99"

      - alert: AVFGRPCMachineIdempotencyConflict
        expr: increase(grpc_idempotency_conflicts_total{job="avf_api_metrics"}[15m]) > 0
        for: 2m
        labels:
          severity: critical
          priority: P0
        annotations:
          summary: "Machine gRPC mutation idempotency conflict"
          description: "Same idempotency_key reused with incompatible payload — investigate client bugs or duplicate sources."
          runbook: "docs/runbooks/observability-alerts.md#grpc-machine-idempotency-conflict"

      - alert: AVFPaymentPaidVendNotCompleted
        expr: increase(avf_commerce_payment_paid_vend_failed_total{job="avf_reconciler_metrics"}[15m]) > 0
        for: 1m
        labels:
          severity: critical
          priority: P0
        annotations:
          summary: "Paid payment has no completed vend (failed or stuck path)"
          description: "Counter covers payment_paid_vend_failed and payment_paid_vend_not_started reconciler detections — customer money with bad or missing terminal vend."
          runbook: "docs/runbooks/observability-alerts.md#payment-paid-but-vend-not-completed"

      - alert: AVFCommandACKTimeoutSpike
        expr: sum(rate(avf_mqtt_command_ack_timeout_total{job="avf_api_metrics"}[10m])) > 0.1
        for: 10m
        labels:
          severity: warning
          priority: P1
        annotations:
          summary: "Command ACK timeouts are spiking"
          description: "Machine command ACK windows are expiring faster than normal (MQTT command plane on API scrape job)."
          runbook: "docs/runbooks/observability-alerts.md#command-ack-timeout-spike"

      - alert: AVFMQTTCommandDispatchRefusedElevated
        expr: sum(rate(avf_mqtt_command_dispatch_refused_total{job="avf_api_metrics"}[10m])) > 0.05
        for: 10m
        labels:
          severity: warning
          priority: P1
        annotations:
          summary: "MQTT machine command publishes are being refused before send"
          description: "dispatch_refused_total is elevated (max_dispatch_attempts, validation, broker publish guard) — check EMQX/API logs and ledger state."
          runbook: "docs/runbooks/observability-alerts.md#mqtt-command-dispatch-refused-elevated"

      - alert: AVFMachineOfflineSpike
        expr: (sum(avf_machine_connectivity_total{job="avf_worker_metrics",status="offline"}) / clamp_min(sum(avf_machine_connectivity_total{job="avf_worker_metrics"}), 1)) > 0.20
        for: 15m
        labels:
          severity: warning
          priority: P1
        annotations:
          summary: "More than 20% of machines are offline"
          description: "Fleet connectivity gauges show a sustained offline spike."
          runbook: "docs/runbooks/observability-alerts.md#machine-offline-spike"

      - alert: AVFNATSOutboxLagHigh
        expr: max(avf_worker_outbox_oldest_pending_age_seconds{job="avf_worker_metrics"}) > 600
        for: 10m
        labels:
          severity: critical
          priority: P0
        annotations:
          summary: "NATS outbox lag exceeds 10 minutes"
          description: "The oldest unpublished outbox item is too old; JetStream publish or worker drain may be unhealthy."
          runbook: "docs/runbooks/observability-alerts.md#nats-outbox-lag-high"

      - alert: AVFRedisUnavailableProduction
        expr: probe_success{job="avf_data_node_tcp",component="redis-tcp"} == 0
        for: 2m
        labels:
          severity: critical
          priority: P0
        annotations:
          summary: "Redis is unavailable in production"
          description: "The production Redis TCP probe is failing."
          runbook: "docs/runbooks/observability-alerts.md#redis-unavailable-in-production"

      - alert: AVFPostgreSQLUnavailable
        expr: probe_success{job="avf_data_node_tcp",component="postgres-tcp"} == 0
        for: 2m
        labels:
          severity: critical
          priority: P0
        annotations:
          summary: "PostgreSQL is unavailable"
          description: "The production PostgreSQL TCP probe is failing."
          runbook: "docs/runbooks/observability-alerts.md#postgresql-unavailable"

      - alert: AVFMQTTIngestDown
        expr: up{job="avf_mqtt_ingest_metrics"} == 0 or probe_success{job="avf_app_readiness",component="mqtt-ingest"} == 0
        for: 2m
        labels:
          severity: critical
          priority: P0
        annotations:
          summary: "MQTT ingest is down"
          description: "The mqtt-ingest metrics scrape or readiness probe is failing."
          runbook: "docs/runbooks/observability-alerts.md#mqtt-ingest-down"

      - alert: AVFReconcilerFailing
        expr: sum(rate(avf_reconciler_cycle_completions_total{job="avf_reconciler_metrics",result!="ok"}[10m])) > 0
        for: 10m
        labels:
          severity: warning
          priority: P1
        annotations:
          summary: "Reconciler cycles are failing"
          description: "At least one reconciler job is completing with a non-ok result."
          runbook: "docs/runbooks/observability-alerts.md#reconciler-failing"

      - alert: AVFRefundPendingTooLong
        expr: increase(avf_commerce_refund_pending_too_long_total{job="avf_reconciler_metrics"}[30m]) > 0
        for: 1m
        labels:
          severity: warning
          priority: P1
        annotations:
          summary: "Refund has been pending too long"
          description: "The refund review reconciler detected a refund that needs manual or provider-side attention."
          runbook: "docs/runbooks/observability-alerts.md#refund-pending-too-long"

      - alert: AVFPaymentWebhookHMACRejectionsSpike
        expr: sum(rate(payment_webhook_rejections_total{job="avf_api_metrics",reason=~".*[Hh]mac.*|^401_.*"}[10m])) > 0.2
        for: 10m
        labels:
          severity: warning
          priority: P1
        annotations:
          summary: "Elevated payment webhook HMAC / 401-style rejections"
          description: "Spike in payment_webhook_rejections_total with HMAC or 401-ish reasons — replay attack, clock skew, secret rotation, or proxy stripping headers."
          runbook: "docs/runbooks/observability-alerts.md#payment-webhook-hmac-rejections-spike"

      - alert: AVFOutboxDeadLettered
        expr: increase(avf_worker_outbox_dispatch_dead_lettered_total{job="avf_worker_metrics"}[20m]) >= 1
        for: 10m
        labels:
          severity: critical
          priority: P0
        annotations:
          summary: "Outbox rows were dead-lettered after publish exhaustion"
          description: "Worker quarantined one or more outbox rows — inspect NATS JetStream, credentials, and DLQ companion publish path before clearing."
          runbook: "docs/runbooks/observability-alerts.md#outbox-dead-lettered"

      - alert: AVFMediaProcessingFailedAuditSpike
        expr: increase(audit_events_total{job="avf_api_metrics",action="media.processing_failed"}[2h]) >= 10
        for: 1h
        labels:
          severity: warning
          priority: P1
        annotations:
          summary: "Elevated media variant / processing failures (audit trail)"
          description: "audit_events_total for action media.processing_failed is high — object store, image decode, or sizing limits."
          runbook: "docs/runbooks/observability-alerts.md#media-processing-failed-audit-spike"

      - alert: AVFPaymentWebhookInvalidSignatureBurst
        expr: sum(rate(payment_webhook_rejections_total{job="avf_api_metrics",reason="webhook_hmac_invalid"}[10m])) > 0.1
        for: 10m
        labels:
          severity: warning
          priority: P1
        annotations:
          summary: "Payment webhook invalid HMAC signature rate is elevated"
          description: "Threshold: >0.1/s over 10m on payment_webhook_rejections_total{reason=\"webhook_hmac_invalid\"} — secret mismatch, tampering, or edge stripping X-AVF-Webhook-Signature."
          runbook: "docs/runbooks/payment-webhook-replay.md#invalid-signature-spike"

      - alert: AVFPaymentWebhookTimestampSkewBurst
        expr: sum(rate(payment_webhook_rejections_total{job="avf_api_metrics",reason="webhook_timestamp_skew"}[10m])) > 0.1
        for: 10m
        labels:
          severity: warning
          priority: P1
        annotations:
          summary: "Payment webhook timestamp skew rejections elevated"
          description: "Threshold: >0.1/s over 10m — clock skew between provider and API, or replay outside COMMERCE_PAYMENT_WEBHOOK_REPLAY_WINDOW."
          runbook: "docs/runbooks/payment-webhook-replay.md#timestamp-skew"

      - alert: AVFPaymentWebhookAmountCurrencyMismatch
        expr: increase(payment_webhook_amount_currency_mismatch_total{job="avf_api_metrics"}[30m]) > 0
        for: 2m
        labels:
          severity: critical
          priority: P0
        annotations:
          summary: "Webhook amount/currency disagreed with persisted payment"
          description: "Threshold: any increase in 30m — opens webhook_amount_currency_mismatch reconciliation case; financial data mismatch risk."
          runbook: "docs/runbooks/observability-alerts.md#payment-webhook-amount-currency-mismatch"

      - alert: AVFPaymentProviderProbeStaleBacklog
        expr: max(payment_provider_probe_stale_pending_queue{job="avf_reconciler_metrics"}) > 0
        for: 30m
        labels:
          severity: warning
          priority: P1
        annotations:
          summary: "Payments remain past pending-timeout in provider-probe selection"
          description: "Threshold: gauge >0 for 30m — PSP not transitioning rows, probe errors, or network; see reconciler logs payment_provider_probe."
          runbook: "docs/runbooks/observability-alerts.md#payment-provider-probe-stale-backlog"

      - alert: AVFPaymentPaidVendNotStartedCases
        expr: increase(avf_commerce_reconciliation_cases_total{job="avf_reconciler_metrics",case_type="payment_paid_vend_not_started"}[30m]) > 0
        for: 1m
        labels:
          severity: critical
          priority: P0
        annotations:
          summary: "Captured payment but vend never started"
          description: "Threshold: any new case in 30m — money taken without vend kickoff; triage with payment_paid_vend_not_started queue."
          runbook: "docs/runbooks/observability-alerts.md#payment-paid-vend-not-started"

      - alert: AVFInventoryNegativeStockAttemptsSpike
        expr: sum(rate(inventory_negative_stock_attempts_total{job="avf_api_metrics"}[15m])) > 0.02
        for: 15m
        labels:
          severity: warning
          priority: P1
        annotations:
          summary: "Oversell prevention firing repeatedly (negative stock attempts)"
          description: "Threshold: >0.02/s over 15m — planogram drift, double vend, or bad fill data."
          runbook: "docs/runbooks/inventory-negative-stock.md"

      - alert: AVFCatalogOrMediaGRPCErrorBurst
        expr: sum(rate(grpc_errors_total{job="avf_api_metrics",service=~".*MachineCatalogService.*|.*MachineMediaService.*"}[10m])) > 0.2
        for: 10m
        labels:
          severity: warning
          priority: P1
        annotations:
          summary: "Machine catalog or media gRPC errors are elevated"
          description: "Threshold: >0.2 non-OK completions/s over 10m for catalog/media services — DB, salecatalog build, or presign path."
          runbook: "docs/runbooks/catalog-sync-mismatch.md"

      - alert: AVFWorkerOutboxPendingDepthHigh
        expr: max(avf_worker_outbox_pending_total{job="avf_worker_metrics"}) > 2000
        for: 20m
        labels:
          severity: warning
          priority: P1
        annotations:
          summary: "Worker outbox pending row count is very high"
          description: "Threshold: >2000 unpublished rows for 20m — publish slowness or worker saturation; correlate with dispatch_publish_failed and oldest_pending_age_seconds."
          runbook: "docs/runbooks/observability-alerts.md#worker-outbox-pending-depth-high"

      - alert: AVFDataPlaneDependencyDegraded
        expr: min(probe_success{job="avf_data_node_tcp",component=~"redis-tcp|postgres-tcp|nats-tcp"}) == 0
        for: 3m
        labels:
          severity: critical
          priority: P0
        annotations:
          summary: "One or more core data-plane TCP probes failing (Postgres/Redis/NATS)"
          description: "Threshold: min(probe_success) over redis-tcp, postgres-tcp, nats-tcp on avf_data_node_tcp == 0 for 3m — at least one dependency unhealthy."
          runbook: "docs/runbooks/production-day-2-incidents.md#managed-db-unavailable"

      - alert: AVFEmqxProbeFlapping
        expr: changes(probe_success{job="avf_data_node_http",component="emqx-status"}[20m]) > 3
        for: 5m
        labels:
          severity: warning
          priority: P1
        annotations:
          summary: "EMQX status probe is flapping"
          description: "Threshold: >3 state changes in 20m — broker reload, cert, or host stress; correlate with mqtt-ingest and device offline rate."
          runbook: "docs/runbooks/production-day-2-incidents.md#mqtt-broker-loss-when-self-hosted-fallback-is-used"
