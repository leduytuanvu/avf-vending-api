# Lean production stack: single Ubuntu 24.04 VPS (target: 2 vCPU / 8 GB RAM).
# Copy .env.production.example -> .env.production and fill secrets + image refs before `docker compose up`.
#
# Image-only deployment (GHCR): there is no `build:` anywhere. The VPS pulls prebuilt images only.
# App binaries (`api`, `worker`, `reconciler`, `mqtt-ingest`) share one immutable image ref:
#   ${APP_IMAGE_REF}
# Migrations use the goose image ref:
#   ${GOOSE_IMAGE_REF}
#
# Telemetry / NATS / MQTT safety: `api`, `worker`, `mqtt-ingest`, and `reconciler` load `env_file`
# (PROD_ENV_FILE or `.env.production`) for NATS_URL, APP_ENV, TELEMETRY_*, MQTT_*, METRICS_*, etc.
# Avoid duplicating large `environment:` blocks per service unless you need Compose-time overrides (e.g. MQTT_CLIENT_ID).
#
# Intentionally NOT included: ClickHouse, Temporal, Prometheus, Grafana, Loki, MinIO, Redis
# (Redis is optional for this API — leave unset unless you enable features that require it).
#
# Usage (from this directory):
#   docker compose --env-file .env.production -f docker-compose.prod.yml up -d

name: avf-vending-prod

networks:
  edge:
    driver: bridge
  internal:
    driver: bridge
    internal: true

volumes:
  postgres_data:
  nats_data:
  emqx_data:
  caddy_data:
  caddy_config:

services:
  postgres:
    image: postgres:16-alpine
    container_name: avf-prod-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Single app database owned by POSTGRES_USER (avoids brittle init scripts for credentials).
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB in .env.production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'pg_isready -U "$$POSTGRES_USER" -d "${POSTGRES_DB:?set POSTGRES_DB in .env.production}"',
        ]
      interval: 10s
      timeout: 5s
      retries: 12
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 768M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nats:
    image: nats:2.10-alpine
    container_name: avf-prod-nats
    restart: unless-stopped
    command: ["-js", "-sd", "/data", "-m", "8222"]
    volumes:
      - nats_data:/data
    networks:
      - internal
    # No host ports — JetStream / core NATS reachable only inside `internal` network.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8222/healthz >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  emqx:
    image: emqx/emqx:5.6.0
    container_name: avf-prod-emqx
    hostname: emqx
    restart: unless-stopped
    environment:
      EMQX_NAME: emqx
      EMQX_HOST: emqx
      EMQX_NODE__NAME: emqx@emqx
      EMQX_CLUSTER__DISCOVERY_STRATEGY: manual
      EMQX_DASHBOARD__DEFAULT_USERNAME: ${EMQX_DASHBOARD_USERNAME:?set EMQX_DASHBOARD_USERNAME in .env.production}
      EMQX_DASHBOARD__DEFAULT_PASSWORD: ${EMQX_DASHBOARD_PASSWORD:?set EMQX_DASHBOARD_PASSWORD in .env.production}
      EMQX_DASHBOARD__LISTENERS__HTTP__BIND: "0.0.0.0:18083"
      EMQX_LISTENERS__TCP__DEFAULT__BIND: "0.0.0.0:1883"
      EMQX_LISTENERS__SSL__DEFAULT__ENABLED: "false"
      EMQX_LISTENERS__WS__DEFAULT__ENABLED: "false"
      EMQX_LISTENERS__WSS__DEFAULT__ENABLED: "false"
      EMQX_AUTHENTICATION__1__MECHANISM: password_based
      EMQX_AUTHENTICATION__1__BACKEND: built_in_database
      EMQX_AUTHENTICATION__1__ENABLE: "true"
      EMQX_NODE__COOKIE: ${EMQX_NODE_COOKIE:?set EMQX_NODE_COOKIE in .env.production}
    volumes:
      - ./emqx/base.hocon:/opt/emqx/etc/base.hocon:ro
      - ./emqx/certs:/opt/emqx/etc/certs:ro
      - emqx_data:/opt/emqx/data
    networks:
      internal:
        aliases:
          - emqx
      edge: {}
    ports:
      - "127.0.0.1:18083:18083"
    # Align Docker health with the management HTTP API (same signal release.sh uses).
    # `emqx_ctl` can report failures while the HTTP listener is already up.
    # The official EMQX image may not ship `curl`/`wget`, so use bash `/dev/tcp` instead.
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -lc 'exec 3<>/dev/tcp/127.0.0.1/18083; printf %b \"GET /api/v5/status HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3; grep -Fq \"emqx is running\" <&3'",
        ]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 768M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  api:
    image: ${APP_IMAGE_REF:?set APP_IMAGE_REF in .env.production or via environment}
    container_name: avf-prod-api
    restart: unless-stopped
    command: ["/app/api"]
    # Shared prod env: NATS_URL, APP_ENV, TELEMETRY_*, METRICS_*, etc.
    env_file:
      - ${PROD_ENV_FILE:-.env.production}
    environment:
      MQTT_CLIENT_ID: ${MQTT_CLIENT_ID_API:?set MQTT_CLIENT_ID_API in .env.production}
    networks:
      - internal
      - edge
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      emqx:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:8080/health/live | grep -qx ok && curl -fsS http://127.0.0.1:8080/health/ready | grep -qx ok",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "0.60"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  worker:
    image: ${APP_IMAGE_REF:?set APP_IMAGE_REF in .env.production or via environment}
    container_name: avf-prod-worker
    restart: unless-stopped
    command: ["/app/worker"]
    # JetStream projection + metrics/health: NATS_URL, TELEMETRY_*, METRICS_ENABLED, WORKER_METRICS_LISTEN.
    env_file:
      - ${PROD_ENV_FILE:-.env.production}
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", 'read -r cmd </proc/1/comm && [ "$$cmd" = "worker" ]']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.35"
          memory: 384M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  mqtt-ingest:
    image: ${APP_IMAGE_REF:?set APP_IMAGE_REF in .env.production or via environment}
    container_name: avf-prod-mqtt-ingest
    restart: unless-stopped
    command: ["/app/mqtt-ingest"]
    # Bounded MQTT → NATS: NATS_URL, MQTT_*, TELEMETRY_* (ingress + stream limits), METRICS_*.
    env_file:
      - ${PROD_ENV_FILE:-.env.production}
    environment:
      MQTT_CLIENT_ID: ${MQTT_CLIENT_ID_INGEST:-avf-prod-mqtt-ingest}
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      emqx:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'read -r cmd </proc/1/comm && [ "$$cmd" = "mqtt-ingest" ]',
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  reconciler:
    image: ${APP_IMAGE_REF:?set APP_IMAGE_REF in .env.production or via environment}
    container_name: avf-prod-reconciler
    restart: unless-stopped
    command: ["/app/reconciler"]
    # Same env_file as other app services for consistent validation; reconciler does not host telemetry projection.
    env_file:
      - ${PROD_ENV_FILE:-.env.production}
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD-SHELL", 'read -r cmd </proc/1/comm && [ "$$cmd" = "reconciler" ]']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  migrate:
    image: ${GOOSE_IMAGE_REF:?set GOOSE_IMAGE_REF in .env.production or via environment}
    container_name: avf-prod-migrate
    restart: "no"
    env_file:
      - ${PROD_ENV_FILE:-.env.production}
    networks:
      - internal
    volumes:
      - ../../migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint:
      [
        "/bin/sh",
        "-c",
        'exec /usr/local/bin/goose -dir /migrations postgres "$$DATABASE_URL" up',
      ]

  caddy:
    image: caddy:2.8-alpine
    container_name: avf-prod-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      API_DOMAIN: ${API_DOMAIN:-api.ldtv.dev}
      CADDY_ACME_EMAIL: ${CADDY_ACME_EMAIL:?set CADDY_ACME_EMAIL in .env.production for ACME}
      UPSTREAM_API: ${UPSTREAM_API:-api:8080}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - edge
    depends_on:
      api:
        condition: service_healthy
    # `caddy:2.8-alpine` does not ship `curl`; use busybox `wget` (same pattern as `nats` above).
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://api:8080/health/live | grep -qx ok",
        ]
      interval: 30s
      timeout: 5s
      retries: 8
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.15"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
