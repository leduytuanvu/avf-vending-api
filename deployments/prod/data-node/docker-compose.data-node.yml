name: ${COMPOSE_PROJECT_NAME:-avf-vending-prod-data}

networks:
  internal:
    driver: bridge

volumes:
  nats_data:
  emqx_data:

services:
  nats:
    image: nats:2.10-alpine@sha256:b83efabe3e7def1e0a4a31ec6e078999bb17c80363f881df35edc70fcb6bb927 # nats:2.10-alpine
    restart: unless-stopped
    command: ["-js", "-sd", "/data", "-m", "8222"]
    volumes:
      - nats_data:/data
    networks:
      - internal
    ports:
      - "${PRIVATE_BIND_IP:-0.0.0.0}:4222:4222"
      - "${NATS_MONITOR_BIND_IP:-127.0.0.1}:8222:8222"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8222/healthz >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.35"
          memory: 384M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  emqx:
    image: emqx/emqx:5.6.0@sha256:e1af4f7e3a46d4eba391edb4bd15c7a8b654893d0c9b8d943188640062537a43 # emqx/emqx:5.6.0
    restart: unless-stopped
    hostname: emqx
    environment:
      EMQX_NAME: emqx
      EMQX_HOST: emqx
      EMQX_NODE__NAME: emqx@emqx
      EMQX_CLUSTER__DISCOVERY_STRATEGY: manual
      EMQX_DASHBOARD__DEFAULT_USERNAME: ${EMQX_DASHBOARD_USERNAME:?set EMQX_DASHBOARD_USERNAME in .env.data-node}
      EMQX_DASHBOARD__DEFAULT_PASSWORD: ${EMQX_DASHBOARD_PASSWORD:?set EMQX_DASHBOARD_PASSWORD in .env.data-node}
      EMQX_DASHBOARD__LISTENERS__HTTP__BIND: "0.0.0.0:18083"
      EMQX_LISTENERS__TCP__DEFAULT__BIND: "${EMQX_TCP_BIND:-127.0.0.1:1883}"
      EMQX_LISTENERS__SSL__DEFAULT__ENABLED: "${EMQX_SSL_ENABLED:-true}"
      EMQX_LISTENERS__SSL__DEFAULT__BIND: "0.0.0.0:8883"
      EMQX_LISTENERS__WS__DEFAULT__ENABLED: "false"
      EMQX_LISTENERS__WSS__DEFAULT__ENABLED: "false"
      EMQX_AUTHENTICATION__1__MECHANISM: password_based
      EMQX_AUTHENTICATION__1__BACKEND: built_in_database
      EMQX_AUTHENTICATION__1__ENABLE: "true"
      EMQX_NODE__COOKIE: ${EMQX_NODE_COOKIE:?set EMQX_NODE_COOKIE in .env.data-node}
    volumes:
      - ../emqx/base.hocon:/opt/emqx/etc/base.hocon:ro
      - ../emqx/certs:/opt/emqx/etc/certs:ro
      - emqx_data:/opt/emqx/data
    networks:
      internal:
        aliases:
          - emqx
    ports:
      - "${MQTT_PLAINTEXT_BIND_IP:-127.0.0.1}:1883:1883"
      - "${MQTT_TLS_BIND_IP:-0.0.0.0}:8883:8883"
      - "${EMQX_DASHBOARD_BIND_IP:-127.0.0.1}:18083:18083"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -lc 'exec 3<>/dev/tcp/127.0.0.1/18083; printf %b \"GET /api/v5/status HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3; grep -Fq \"emqx is running\" <&3'",
        ]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: "0.60"
          memory: 768M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
