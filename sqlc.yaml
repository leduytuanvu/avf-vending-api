version: "2"
sql:
  - engine: "postgresql"
    schema:
      - "db/schema/01_platform.sql"
    queries: "db/queries"
    gen:
      go:
        package: "db"
        out: "internal/gen/db"
        sql_package: "pgx/v5"
        emit_json_tags: false
        emit_prepared_queries: false
        emit_interface: true
        emit_empty_slices: true
        emit_exported_queries: true
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "timestamptz"
            go_type: "time.Time"
